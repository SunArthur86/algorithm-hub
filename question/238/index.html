n- 题型：数组\n- 为什么选这题：它是前缀思想的经典变体——从\"前缀和\"升级到\"前缀积 × 后缀积\"，不使用除法的约束让这道题的设计非常优雅。\n\n## 🧠 思考路径\n\n如果允许用除法，最简单的做法是先算所有数的总乘积，然后每个位置除以自己。但题目不允许，而且如果有零存在，除法也会出错。\n\n换个角度：对于位置 `i`，`answer[i]` 等于\"它左边所有数的乘积\"乘以\"它右边所有数的乘积\"。如果我能预先算出每个位置左边和右边的累积乘积，直接相乘就是答案。\n\n具体做法是两遍遍历：\n1. 第一遍从左到右，计算每个位置左侧所有数的乘积（前缀积），存入 `answer` 数组。\n2. 第二遍从右到左，用一个变量 `right` 维护右侧的累积乘积，直接乘到 `answer[i]` 上。\n\n这样不需要额外的数组（除了返回的 `answer`），空间复杂度满足 `O(1)` 的要求。\n\n这题的关键词不是\"算乘积\"，而是\"前缀积从左扫一遍，后缀积从右扫一遍，两两相乘\"。\n\n## 💻 Java 题解\n\n### 解法 1：前缀积 × 后缀积\n\nresult[i] = 左边所有数的积 × 右边所有数的积。两次遍历：先正向求前缀积，再反向乘后缀积。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int[] productExceptSelf(int[] nums) {\n        int n = nums.length;\n        int[] result = new int[n];\n        result[0] = 1;\n        // 前缀积\n        for (int i = 1; i \u003c n; i++)\n            result[i] = result[i-1] * nums[i-1];\n        // 后缀积\n        int right = 1;\n        for (int i = n - 1; i \u003e= 0; i--) {\n            result[i] *= right;\n            right *= nums[i];\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 先填前缀积\n- 再用right变量反向乘后缀积\n- result数组不算额外空间→O(1)\n\n**执行步骤：**\n1. result[i] = nums[0..i-1]的积\n1. 反向遍历乘以nums[i+1..n-1]的积\n\n\n## ⚠️ 易错点\n\n- 第一遍遍历时，`answer[i] = left` 必须在 `left *= nums[i]` 之前，否则会把自身也算进去。\n- `answer` 数组初始值要全设为 `1`，不是 `0`。\n- 第二遍遍历是从右往左（`n-1` 到 `0`），方向别写反。\n- 题目要求不算额外空间，所以用 `answer` 数组同时充当前缀积的存储。\n\n- right 变量初始化为1\n\n- O(1)空间需要用result数组本身\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。两遍遍历，各 `O(n)`。\n- 空间复杂度：`O(1)`（不算返回的 `answer` 数组）。只用两个变量 `left` 和 `right`。\n\n## 🏢 实际业务应用\n\n- 金融分析中，计算某一天\"排除自身后其他所有交易量的乘积\"，用于敏感性分析，和这题的前缀/后缀分解思路一致。\n- 图像处理中，对每个像素计算\"周围所有像素亮度的乘积\"（排除自身），用于某些滤波算法。\n- 推荐系统里，对每个商品计算\"其他所有商品评分的乘积\"作为基线分数，排除当前商品避免自身干扰。\n\n- 金融分析中，计算某一天\"排除自身后其他所有交易量的乘积\"，用于敏感性分析，和这题的前缀/后缀分解思路一致。\n- 图像处理中，对每个像素计算\"周围所有像素亮度的乘积\"（排除自身），用于某些滤波算法。\n- 推荐系统里，对每个商品计算\"其他所有商品评分的乘积\"作为基线分数，排除当前商品避免自身干扰。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊给每位好汉评\"搭档综合实力分\"的场景。\n\n宋江给每位好汉打一个分数：这个分数等于\"站在他左边所有人的战力乘积\"乘以\"站在他右边所有人的战力乘积\
