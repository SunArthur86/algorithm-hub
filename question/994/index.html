部目标所需的最少步数。\n\n## 🧠 思考路径\n\n这题的模型是\"多源 BFS\"。初始时所有腐烂的橘子都是 BFS 的起点，它们同时向外扩散。\n\n做法是：先把所有初始腐烂橘子的坐标加入队列，然后进行 BFS。每一轮（一层 BFS）代表一分钟，所有当前队列中的腐烂橘子同时感染相邻的新鲜橘子。\n\nBFS 结束后，检查网格中是否还有新鲜橘子。如果有，说明有些橘子被隔离了（被空格子围住），返回 `-1`。如果没有，返回 BFS 经过的轮数。\n\n## 💻 Java 题解\n\n### 解法 1：多源 BFS\n\n所有初始腐烂橘子同时入队，BFS逐层扩散。层数即分钟数。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(m×n)`\n\n```java\nclass Solution {\n    public int orangesRotting(int[][] grid) {\n        int m = grid.length, n = grid[0].length;\n        Queue\u003cint[]\u003e q = new LinkedList\u003c\u003e();\n        int fresh = 0;\n        for (int i = 0; i \u003c m; i++)\n            for (int j = 0; j \u003c n; j++) {\n                if (grid[i][j] == 2) q.offer(new int[]{i, j});\n                else if (grid[i][j] == 1) fresh++;\n            }\n        int minutes = 0;\n        int[][] dirs = {{0,1},{0,-1},{1,0},{-1,0}};\n        while (!q.isEmpty() \u0026\u0026 fresh \u003e 0) {\n            int size = q.size();\n            for (int i = 0; i \u003c size; i++) {\n                int[] cur = q.poll();\n                for (int[] d : dirs) {\n                    int r = cur[0]+d[0], c = cur[1]+d[1];\n                    if (r\u003e=0 \u0026\u0026 r\u003cm \u0026\u0026 c\u003e=0 \u0026\u0026 c\u003cn \u0026\u0026 grid[r][c]==1) {\n                        grid[r][c] = 2;\n                        fresh--;\n                        q.offer(new int[]{r, c});\n                    }\n                }\n            }\n            minutes++;\n        }\n        return fresh == 0 ? minutes : -1;\n    }\n}\n```\n\n**关键点：**\n- 多源同时BFS\n- 层数=分钟数\n- fresh==0 判断是否全部腐烂\n\n**执行步骤：**\n1. 所有腐烂橘子入队\n1. BFS逐层扩散\n1. 每层minutes++\n1. fresh\u003e0 则返回-1\n\n\n## ⚠️ 易错点\n\n- BFS 要按层处理，不能直接把新腐烂的橘子也当作\"本分钟\"的——用 `for _ in range(len(queue))` 控制每层。\n- 如果一开始没有新鲜橘子，应返回 0（不需要任何时间）。\n- 如果一开始没有腐烂橘子但有新鲜橘子，返回 -1。\n\n- 初始没有新鲜橘子时返回0\n\n- queue判空和 fresh\u003e0 双条件\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`，每个格子最多被访问一次。\n- 空间复杂度：`O(m × n)`，最坏情况下队列中包含所有格子。\n\n## 🏢 实际业务应用\n\n- 疫情传播模拟系统（如 COVID-19 传播模型），多源 BFS 模拟病毒从多个爆发点向外扩散的过程。\n- 网络故障排查中的影响范围分析，从多个故障节点出发计算级联故障的时间。\n- 社交媒体上的信息传播模型（如微博热搜扩散），计算一条信息覆盖所有目标用户需要的时间。\n\n- 疫情传播模拟系统（如 COVID-19 传播模型），多源 BFS 模拟病毒从多个爆发点向外扩散的过程。\n- 网络故障排查中的影响范围分析，从多个故障节点出发计算级联故障的时间。\n- 社交媒体上的信息传播模型（如微博热搜扩散），计算一条信息覆盖所有目标用户需要的时间。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里赤壁之战的\"火攻蔓延\"。\n\n黄盖的火船同时点燃了曹操连环船的多个位置（多源起点）。每过一刻钟，火焰向相邻的船只蔓延。周瑜站在高处观察：多久之后所有敌船都会着火？如果有些船被江面隔开（空格子），火永远烧不到，那就返回 `-1`。\n\n对应关系是：\n\n- \"火船位置\"对应初始腐烂橘子\n- \"火焰蔓延到相邻船只\"对应感染相邻格子\n- \"一刻钟一步\"对应 BFS 的一层\n- \"被江面隔开的船\"对应无法到达的新鲜橘子\n\n可以把它类比成《三国演义》里赤壁之战的\"火攻蔓延\"。\n\n黄盖的火船同时点燃了曹操连环船的多个位置（多源起点）。每过一刻钟，火焰向相邻的船只蔓延。周瑜站在高处观察：多久之后所有敌船都会着火？如果有些船被江面隔开（空格子），火永远烧不到，那就返回 `-1`。\n\n对应关系是：\n\n- \"火船位置\"对应初始腐烂橘子\n- \"火焰蔓延到相邻船只\"对应感染相邻格子\n- \"一刻钟一步\"对应 BFS 的一层\n- \"被江面隔开的船\"对应无法到达的新鲜橘子\n\n森林的果树园里，有几棵苹果树生病了。病会每分钟传染给相邻的树。啄木鸟医生从生病的树开始，一圈一圈往外看：第一分钟传染给邻居，第二分钟传染给邻居的邻居……最后检查有没有\"被小路隔开、永远不会被传染的健康树\"。如果没有，就告诉园长\"总共需要多少分钟\"。\n\n森林的果树园里，有几棵苹果树生病了。病会每分钟传染给相邻的树。啄木鸟医生从生病的树开始，一圈一圈往外看：第一分钟传染给邻居，第二分钟传染给邻居的邻居……最后检查有没有\"被小路隔开、永远不会被传染的健康树\"。如果没有，就告诉园长\"总共需要多少分钟\"。\n\n## 🎵 记忆口诀\n\n多源BFS，逐层扩散，最后查残留。\n\n多源BFS，逐层扩散，最后查残留。\n\n## 🔗 延伸练习\n\n- `542. 01 矩阵`：多源 BFS 的另一道经典题，求每个格子到最近的 0 的距离。\n- `1162. 地图分析`：多源 BFS 求最远的海洋格子到最近陆地的距离，和本题的\"扩散\"模型类似。\n\n- `542. 01 矩阵`：多源 BFS 的另一道经典题，求每个格子到最近的 0 的距离。\n- `1162. 地图分析`：多源 BFS 求最远的海洋格子到最近陆地的距离，和本题的\"扩散\"模型类似。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🕸️\"}],994,\". \",\"腐烂的橘子\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0994\",\"lcId\":994,\"slug\":\"rotting-oranges\",\"title\":\"腐烂的橘子\",\"question\":\"腐烂的橘子\",\"answ
