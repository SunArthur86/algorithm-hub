\"维护窗口内的候选最大值\"这个思想吃透，所有滑动窗口类问题都能迎刃而解。\n\n## 🧠 思考路径\n\n暴力做法是对每个窗口都扫描一遍找最大值，时间 `O(n * k)`，窗口大了就很慢。\n\n关键观察：当一个更大的数进入窗口后，它前面那些比它小的数就永远不可能成为最大值了——它们既比当前数小，又会比当前数更早离开窗口。这些\"没有希望的候选者\"可以直接淘汰。\n\n这就引出了单调队列：一个双端队列，存储数组下标，保持队列中的值单调递减。队头始终是当前窗口的最大值。具体操作：\n- 新元素入队时，从队尾弹出所有比它小的元素（它们不可能成为最大值了）。\n- 如果队头元素已经滑出窗口（下标 \u003c 当前窗口左端），从队头弹出。\n- 每个窗口的最大值就是队头元素对应的值。\n\n每个元素最多入队出队各一次，所以整体时间 `O(n)`。\n\n这题的关键词不是\"找最大值\"，而是\"维护一个单调递减的候选队列，过期的从前面删，太弱的从后面删\"。\n\n## 💻 Java 题解\n\n### 解法 1：单调队列（双端队列）\n\n维护一个单调递减的双端队列。队首是最大值的索引。新元素入队时，从队尾弹出所有比它小的。队首超出窗口范围则弹出。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(k)`\n\n```java\nclass Solution {\n    public int[] maxSlidingWindow(int[] nums, int k) {\n        int n = nums.length;\n        int[] result = new int[n - k + 1];\n        Deque\u003cInteger\u003e dq = new ArrayDeque\u003c\u003e(); // 存索引\n        for (int i = 0; i \u003c n; i++) {\n            // 移除超出窗口的队首\n            while (!dq.isEmpty() \u0026\u0026 dq.peekFirst() \u003c i - k + 1)\n                dq.pollFirst();\n            // 维护单调递减：弹出比当前小的\n            while (!dq.isEmpty() \u0026\u0026 nums[dq.peekLast()] \u003c nums[i])\n                dq.pollLast();\n            dq.offerLast(i);\n            // 窗口满后记录队首（最大值）\n            if (i \u003e= k - 1)\n                result[i - k + 1] = nums[dq.peekFirst()];\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 队列存索引不是值\n- 维护单调递减\n- 队首始终是窗口最大值\n\n**执行步骤：**\n1. 遍历每个元素\n1. 移除超出窗口范围的队首\n1. 从队尾弹出比当前元素小的\n1. 当前索引入队\n1. 窗口满后取队首为结果\n\n\n## ⚠️ 易错点\n\n- 队列里存的是下标，不是值。比较大小用 `nums[dq[-1]]`，不是 `dq[-1]`。\n- 移除过期元素的条件是 `dq[0] \u003c i - k + 1`（严格小于），不是 `\u003c=`。\n- 先移除过期，再移除弱者，最后加入当前元素——顺序不能乱。\n- 只有当 `i \u003e= k - 1` 时才开始记录结果（窗口还没形成时不算）。\n\n- 队列存索引不是值——需要用索引判断是否过期\n\n- 不是大顶堆——大顶堆删除超时元素是 O(k)\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个元素最多入队出队各一次。\n- 空间复杂度：`O(k)`。队列最多存 `k` 个下标。\n\n## 🏢 实际业务应用\n\n- 股票实时行情中，显示过去 `k` 分钟内的最高价，每来一个新价格就更新，用的就是滑动窗口最大值。\n- 网络监控中，统计过去 `k` 秒内的最大延迟或最大流量，实时更新。\n- 图像处理中的局部最大值滤波器：在一个滑动窗口内取最大值作为中心像素的新值。\n\n- 股票实时行情中，显示过去 `k` 分钟内的最高价，每来一个新价格就更新，用的就是
