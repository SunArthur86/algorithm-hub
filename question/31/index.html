\"就地修改数组\"的经典题，考察从右往左扫描和双指针交换的思维，也是理解排列字典序的关键一步。\n\n## 🧠 思考路径\n\n先想\"下一个排列比当前排列大在哪里\"。从右往左看，如果一段后缀是降序的，那它已经是这一段能排出的最大值，想变大只能往左找。\n\n所以第一步：从右往左找到第一个\"升高的位置\"，也就是找到第一对 `nums[i] \u003c nums[i+1]` 的 `i`。这个位置就是我们能做文章的地方。\n\n找到 `i` 之后，我们想让 `nums[i]` 变大一点点。多大呢？比它大的最小值。所以在 `i` 右边的降序后缀里，从右往左找第一个比 `nums[i]` 大的元素，和 `nums[i]` 交换。\n\n交换之后，`i` 右边那段仍然是降序的（因为我们选的是\"刚好比 `nums[i]` 大\"的元素来交换），但我们要的是\"下一个排列\"，也就是只比原来大一点点，所以把 `i` 右边翻转成升序即可。\n\n如果从头到尾都没找到 `nums[i] \u003c nums[i+1]`，说明整个数组是降序的，直接全部翻转成升序。\n\n## 💻 Java 题解\n\n### 解法 1：三步法\n\n1. 从右找第一个i使得nums[i]\u003cnums[i+1]。2. 从右找第一个j使得nums[j]\u003enums[i]。3. 交换i和j，反转i+1到末尾。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public void nextPermutation(int[] nums) {\n        // 1. 找下降点\n        int i = nums.length - 2;\n        while (i \u003e= 0 \u0026\u0026 nums[i] \u003e= nums[i + 1]) i--;\n        if (i \u003e= 0) {\n            // 2. 找比nums[i]大的最小值\n            int j = nums.length - 1;\n            while (nums[j] \u003c= nums[i]) j--;\n            // 3. 交换\n            swap(nums, i, j);\n        }\n        // 4. 反转i+1到末尾\n        reverse(nums, i + 1, nums.length - 1);\n    }\n    private void swap(int[] nums, int i, int j) { int t = nums[i]; nums[i] = nums[j]; nums[j] = t; }\n    private void reverse(int[] nums, int l, int r) { while (l \u003c r) swap(nums, l++, r--); }\n}\n```\n\n**关键点：**\n- 从右找第一个下降\n- 从右找第一个比它大的\n- 交换后反转后面\n\n**执行步骤：**\n1. 找i（第一个下降点）\n1. 找j（大于nums[i]的最右值）\n1. 交换\n1. 反转i+1到末尾\n\n\n## ⚠️ 易错点\n\n- 找 `i` 的时候条件是 `nums[i] \u003e= nums[i+1]`（注意是 `\u003e=` 不是 `\u003e`），要跳过所有相等和降序的位置，找到第一个严格升高的地方。\n- 找 `j` 的时候条件是 `nums[j] \u003c= nums[i]`（注意是 `\u003c=` 不是 `\u003c`），因为等于 `nums[i]` 的元素交换后没有意义。\n- 如果整个数组是降序的，`i` 会变成 `-1`，这时跳过交换步骤，直接翻转整个数组。\n\n- i\u003c0说明整体降序→全反转得到最小\n\n- 反转不是排序——后面已经是降序\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。最多扫描两遍数组（找 `i` 和找 `j`），翻转也是 `O(n)`。\n- 空间复杂度：`O(1)`。只用了常数个变量，所有操作就地进行。\n\n## 🏢 实际业务应用\n\n- 代码生成工具中按字典序枚举所有排列时，用这个算法从当前排列生成下一个，不需要额外空间存储所有排列。\n- 游戏里的关卡排序或卡牌组合排序，需要\"找出比当前组合稍大的下一个组合\"时，就是下一个排列的逻辑。\n- 数据库查询优化器在枚举多表连接的顺序时，用排列生成来穷举所有 join 顺序，下一个排列算法负责按字典序推进。\n\n- 代码生成工具中按字典序枚举所有排列时，用这个算法从当前排列生成下一个，不需要额外空间存储所有排列。\n- 游戏里的关卡排序或卡牌组合排序，需要\"找出比当前组合稍大的下一个组合\"时，就是下一个排列的逻辑。\n- 数据库查询优化器在枚举多表连接的顺序时，用排列生成来穷举所有 join 顺序，下一个排列算法负责按字典序推进。\n\n## 📖 形象类比\n\n可以类比《三国演义》里诸葛亮北伐时调兵遣将的过程。\n\n每次北伐的排兵布阵就像一个排列。打完一仗之后，诸葛亮不能随便乱调（那样可能跳过很多中等方案），而是要找到\"比当前布阵稍好一点的下一个方案\"。他会从最后面的部队往前看，找到第一个还能调整的位置，在那里做一个最小的改变，然后把后面的部队重新按最优顺序排列。\n\n对应关系是：\n\n- \"从后往前找第一个能调整的位置\"对应找 `i`\n- \"选一个比当前稍强的将领替换\"对应找 `j` 并交换\n- \"后面的部队重新列队\"对应翻转后缀\n\n可以类比《三国演义》里诸葛亮北伐时调兵遣将的过程。\n\n每次北伐的排兵布阵就像一个排列。打完一仗之后，诸葛亮不能随便乱调（那样可能跳过很多中等方案），而是要找到\"比当前布阵稍好一点的下一个方案\"。他会从最后面的部队往前看，找到第一个还能调整的位置，在那里做一个最小的改变，然后把后面的部队重新按最优顺序排列。\n\n对应关系是：\n\n- \"从后往前找第一个能调整的位置\"对应找 `i`\n- \"选一个比当前稍强的将领替换\"对应找 `j` 并交换\n- \"后面的部队重新列队\"对应翻转后缀\n\n小兔子要排列一排蘑菇，从矮到高编号。兔子妈妈说：\"每次只能做一个最小的改变，让排列变成下一个更大的。\"小兔子从最后一个蘑菇往前看，找到第一个可以长高的位置，把右边比它稍大一点的蘑菇换过来，再把后面的蘑菇全部翻成从矮到高。如果整排已经是从高到矮，那就翻个儿，从头开始。\n\n小兔子要排列一排蘑菇，从矮到高编号。兔子妈妈说：\"每次只能做一个最小的改变，让排列变成下一个更大的。\"小兔子从最后一个蘑菇往前看，找到第一个可以长高的位置，把右边比它稍大一点的蘑菇换过来，再把后面的蘑菇全部翻成从矮到高。如果整排已经是从高到矮，那就翻个儿，从头开始。\n\n## 🎵 记忆口诀\n\n从右找升点，换大翻后缀。\n\n从右找升点，换大翻后缀。\n\n## 🔗 延伸练习\n\n- `46. 全排列`：从\"下一个排列\"升级到生成所有排列，可以用本题的方法反复调用，也可以用回溯。\n- `556. 下一个更大元素 III`：完全相同的思路，只不过操作对象从数组变成了整数。\n\n- `46. 全排列`：从\"下一个排列\"升级到生成所有排列，可以用本题的方法反复调用，也可以用回溯。\n- `556. 下一个更大元素 III`：完全相同的思路，只不过操作对象从数组变成了整数。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⚡\"}],31,\". \",\"下一个排列\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0031\",\"lcId\":31,\"slug\":\"next-permutation\",\"title\":\"下一个排列\",\"question\":\"下一个排列\",\
