列、组合、子集题都一通百通。\n\n## 🧠 思考路径\n\n最直接的想法是：如果有 `n` 个数，第一个位置有 `n` 种选择，第二个位置有 `n-1` 种，以此类推。这就是\"逐位枚举\"的思路——每个位置都试一遍所有还没用过的数。\n\n怎么实现\"记录哪些数用过了\"？最简单的方式是维护一个 `used` 数组（或集合），每次选一个数就标记为\"已用\"，进入下一层递归；递归返回后，取消标记（\"撤销选择\"），再试下一个数。这就是回溯的核心：**做选择 → 递归 → 撤销选择**。\n\n整个过程可以画成一棵决策树。树的每一层对应排列的一个位置，每个分支对应选择一个还没用过的数。当所有位置都填满了，就得到一个完整的排列。\n\n## 💻 Java 题解\n\n### 解法 1：回溯\n\nDFS选择每个未使用的数，加入path，标记visited，递归后回溯。\n\n- ⏱ 时间复杂度：`O(n!×n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cInteger\u003e\u003e permute(int[] nums) {\n        List\u003cList\u003cInteger\u003e\u003e result = new ArrayList\u003c\u003e();\n        backtrack(nums, new boolean[nums.length], new ArrayList\u003c\u003e(), result);\n        return result;\n    }\n    private void backtrack(int[] nums, boolean[] used, List\u003cInteger\u003e path, List\u003cList\u003cInteger\u003e\u003e result) {\n        if (path.size() == nums.length) {\n            result.add(new ArrayList\u003c\u003e(path));\n            return;\n        }\n        for (int i = 0; i \u003c nums.length; i++) {\n            if (used[i]) continue;\n            used[i] = true; path.add(nums[i]);\n            backtrack(nums, used, path, result);\n            path.remove(path.size() - 1); used[i] = false;\n        }\n    }\n}\n```\n\n**关键点：**\n- visited数组标记\n- path.size()==nums.length 收集结果\n- 回溯：移除+取消标记\n\n**执行步骤：**\n1. 遍历每个未使用的数\n1. 加入path+标记\n1. 递归\n1. 回溯\n\n\n## ⚠️ 易错点\n\n- 收集结果时必须拷贝 `path`（`path[:]` 或 `new ArrayList\u003c\u003e(path)`），不能直接 `result.append(path)`。因为 `path` 是引用类型，后续的修改会影响已收集的结果。\n- Python 中 `path.pop()` 要在递归返回后执行，不能遗漏，否则 `path` 越来越长。\n- Java 中 `path.remove(path.size() - 1)` 移除的是最后一个元素，不要写成 `path.remove(i)`——后者按索引移除，逻辑不对。\n- 递归终止条件是 `len(path) == len(nums)`，不是 `i == len(nums)`。\n\n- 结果要 new ArrayList\u003c\u003e(path) 创建副本\n\n- 回溯时先 remove 再 set used=false\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n × n!)`。一共有 `n!` 种排列，每种排列需要 `O(n)` 时间拷贝到结果中。\n- 空间复杂度：`O(n)`。递归深度为 `n`，`path` 和 `used` 各占 `O(n)`。\n\n## 🏢 实际业务应用\n\n- **测试用例生成**：在做全量回归测试时，如果有 `n` 个独立的测试模块需要按不同顺序执行来验证顺序依赖问题，全排列可以生成所有可能的执行顺序。\n- **旅行商问题（TSP）**：快递员要经过多个配送点，每个配送点恰好经过一次。所有可能的路线就是城市的全排列。虽然精确解代价太大，但全排列是暴力求解的起点。\n- **排课系统**：将 `n` 门课程安排到 `n` 个时间段中，每个时间段一门课。所有合法的排课方案就是课程的全排列，回溯可以在此基础上加入约束剪枝。\n- **密码爆破**：已知密码由若干个字符组成且每个字符不重复，生成所有可能的排列就是攻击字典。理解回溯有助于设计防暴力破解的安全策略。\n\n- **测试用例生成**：在做全量回归测试时，如果有 `n` 个独立的测试模块需要按不同顺序执行来验证顺序依赖问题，全排列可以生成所有可能的执行顺序。\n- **旅行商问题（TSP）**：快递员要经过多个配送点，每个配送点恰好经过一次。所有可能的路线就是城市的全排列。虽然精确解代价太大，但全排列是暴力求解的起点。\n- **排课系统**：将 `n` 门课程安排到 `n` 个时间段中，每个时间段一门课。所有合法的排课方案就是课程的全排列，回溯可以在此基础上加入约束剪枝。\n- **密码爆破**：已知密码由若干个字符组成且每个字符不重复，生成所有可能的排列就是攻击字典。理解回溯有助于设计防暴力破解的安全策略。\n\n## 📖 形象类比\n\n可以类比《三国演义》中诸葛亮排兵布阵的场景。\n\n诸葛亮要在五虎上将中选出三人分别镇守前、中、后三军。每选一人，就让他站到对应的位置上，然后从剩下的人中继续选。选完三个位置后，一种布阵方案就确定了。然后让最后那位将军退下来，换另一个未上场的人试试。以此类推，直到所有可能的布阵都列出来，再从中挑出最优方案。\n\n对应关系：\n\n- \"五虎上将\"对应数组 `nums`\n- \"前中后三个位置\"对应排列的三个槽位\n- \"选一个人站上去\"对应 `path.append()` 和 `used[i] = True`\n- \"让他退下来换人\"对应 `path.pop()` 和 `used[i] = False`\n- \"一种布阵方案\"对应一个完整的排列\n\n可以类比《三国演义》中诸葛亮排兵布阵的场景。\n\n诸葛亮要在五虎上将中选出三人分别镇守前、中、后三军。每选一人，就让他站到对应的位置上，然后从剩下的人中继续选。选完三个位置后，一种布阵方案就确定了。然后让最后那位将军退下来，换另一个未上场的人试试。以此类推，直到所有可能的布阵都列出来，再从中挑出最优方案。\n\n对应关系：\n\n- \"五虎上将\"对应数组 `nums`\n- \"前中后三个位置\"对应排列的三个槽位\n- \"选一个人站上去\"对应 `path.append()` 和 `used[i] = True`\n- \"让他退下来换人\"对应 `path.pop()` 和 `used[i] = False`\n- \"一种布阵方案\"对应一个完整的排列\n\n小猴子要给森林音乐会排节目单，有四首曲子可以选，每场演奏三首，顺序不同算不同方案。它先选一首放第一个位置，再从剩下的里面选一首放第二个位置，再选一首放第三个。排好一种方案后记下来，然后把第三首换掉试试别的，再把第二首也换掉……一棵决策树就这么长出来了，树上每条从根到叶的路径就是一张节目单。\n\n小猴子要给森林音乐会排节目单，有四首曲子可以选，每场演奏三首，顺序不同算不同方案。它先选一首放第一个位置，再从剩下的里面选一首放第二个位置，再选一首放第三个。排好一种方案后记下来，然后把第三首换掉试试别的，再把第二首也换掉……一棵决策树就这么长出来了，树上每条从根到叶的路径就是一张节目单。\n\n## 🎵 记忆口诀\n\n选入、递归、撤销，三步走。\n\n选入、递归、撤销，三步走。\n\n## 🔗 延伸练习\n\n- `47. 全排列 II`：数组中有重复元素，需要在回溯时跳过重复的排列。在此基础上多加一个剪枝条件。\n- `78. 子集`：从\"全排列\"变成\"所有子集\"，回溯框架不变，只是每次选择都可以直接收集结果，不用等到路径满了。\n\n- `47. 全排列 II`：数组中有重复元素，需要在回溯时跳过重复的排列。在此基础上多加一个剪枝条件。\n- `78. 子集`：从\"全排列\"变成\"所有子集\"，回溯框架不变，只是每次选择都可以直接收集结果，不用等到路径满了。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":
