(1) 拿到，就必须在每次 push/pop 的时候维护好最小值信息。\n\n最直观的想法：用一个额外的变量存当前最小值。但 pop 的时候，如果弹出的正好是最小值，怎么知道\"次小值\"是多少？\n\n答案是再用一个栈——最小值栈。每次 push 的时候，把当前的最小值也压入最小值栈；每次 pop 的时候，两个栈同步弹出。这样最小值栈的栈顶始终是当前栈的最小值。\n\n所以这题的关键词不是\"栈\"，而是\"主栈管数据，辅栈管最小值，同步进出\"。\n\n## 💻 Java 题解\n\n### 解法 1：辅助栈\n\n主栈存数据，辅助栈同步存当前最小值。push时辅助栈push min(val, 当前栈顶)，pop时两个栈同步弹。\n\n- ⏱ 时间复杂度：`O(1) all ops`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass MinStack {\n    Deque\u003cInteger\u003e stack, minStack;\n    public MinStack() { stack = new ArrayDeque\u003c\u003e(); minStack = new ArrayDeque\u003c\u003e(); }\n    public void push(int val) {\n        stack.push(val);\n        minStack.push(minStack.isEmpty() ? val : Math.min(val, minStack.peek()));\n    }\n    public void pop() { stack.pop(); minStack.pop(); }\n    public int top() { return stack.peek(); }\n    public int getMin() { return minStack.peek(); }\n}\n```\n\n**关键点：**\n- 辅助栈同步记录最小值\n- push时与辅助栈顶比较取min\n\n**执行步骤：**\n1. push: 两栈同时push\n1. pop: 两栈同时pop\n1. getMin: 返回辅助栈顶\n\n\n## ⚠️ 易错点\n\n- `min_stack` 每次 push 都要压值，不能只在更小的时候压——否则 pop 时两个栈长度不一致，对应关系就乱了。\n- 比较时用 `\u003c=` 不是 `\u003c`，保证相等时也压入，否则弹出后可能丢失最小值。\n- 两个栈必须同步 pop，不能只弹一个。\n\n- push第一个元素时辅助栈为空要特殊处理\n\n## 📊 复杂度分析\n\n- 时间复杂度：所有操作都是 `O(1)`。\n- 空间复杂度：`O(n)`。最坏情况最小值栈和主栈一样长。\n\n## 🏢 实际业务应用\n\n- 监控系统中的\"当前最低水位\"：服务器指标（CPU、内存）实时压栈式记录，需要随时查询历史最低点，不需要遍历全部数据。\n- 编辑器的撤销栈：每次操作记录当前文档状态的最小信息量（比如最小内存快照），撤销时能快速恢复到最优状态。\n- 游戏里的状态回溯：角色属性变化压栈，需要随时知道\"历史最低血量\"来触发成就系统。\n\n- 监控系统中的\"当前最低水位\"：服务器指标（CPU、内存）实时压栈式记录，需要随时查询历史最低点，不需要遍历全部数据。\n- 编辑器的撤销栈：每次操作记录当前文档状态的最小信息量（比如最小内存快照），撤销时能快速恢复到最优状态。\n- 游戏里的状态回溯：角色属性变化压栈，需要随时知道\"历史最低血量\"来触发成就系统。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里刘备行军时粮草官的记账方式。\n\n刘备的军队一路行进，每到一处就建一个粮仓（push）。粮草官同时记两本账：一本记每个粮仓有多少粮（主栈），另一本记\"到这一站为止，最少的存粮是多少\"（辅助栈）。撤军时（pop），两本账同步翻一页。刘备问\"现在最缺粮的是多少\"（getMin），粮草官看第二本账最后一页就行。\n\n对应关系是：\n\n- \"粮仓\"对应栈里的元素\n- \"粮草账本\"对应主栈 `stack`\n- \"最少存粮账本\"对应辅助栈 `min_stack`\n- \"同步翻页\"对应同步 pop\n- \"看最后一页就知最少\"对应 O(1) 查询\n\n这段记忆的关键是：记账时多记一笔\"到目前最少多少\"，查的时候就不必翻遍整本账。\n\n可以把它类比成《三国演义》里刘备行军时粮草官的记账方式。\n\n刘备的军队一路行进，每到一处就建一个
