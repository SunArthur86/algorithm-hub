最大金额是\"前 i-2 家的最大金额 + 当前金额\"。\n- 不抢这家：最大金额就是\"前 i-1 家的最大金额\"。\n\n所以 `dp[i] = max(dp[i-1], dp[i-2] + nums[i])`。\n\n初始化：`dp[0] = nums[0]`，`dp[1] = max(nums[0], nums[1])`。\n\n空间优化：只需要两个变量 `prev2` 和 `prev1` 滚动更新。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（空间优化）\n\ndp[i]=max(不偷=dp[i-1], 偷=dp[i-2]+nums[i])。两个变量滚动。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int rob(int[] nums) {\n        if (nums.length == 1) return nums[0];\n        int prev2 = nums[0], prev1 = Math.max(nums[0], nums[1]);\n        for (int i = 2; i \u003c nums.length; i++) {\n            int curr = Math.max(prev1, prev2 + nums[i]);\n            prev2 = prev1; prev1 = curr;\n        }\n        return prev1;\n    }\n}\n```\n\n**关键点：**\n- dp[i]=max(dp[i-1], dp[i-2]+nums[i])\n- 偷或不偷两种选择\n- 两个变量滚动\n\n**执行步骤：**\n1. base case: dp[0]=nums[0], dp[1]=max(nums[0],nums[1])\n1. 递推\n1. 返回dp[n-1]\n\n\n## ⚠️ 易错点\n\n- 数组只有 1 个元素时要特殊处理，否则 `nums[1]` 会越界。\n- `prev2` 代表\"前 i-2 家的最大值\"，`prev1` 代表\"前 i-1 家的最大值\"，滚动时先更新 `prev2` 再更新 `prev1`。\n- 不能同时抢相邻两家，但可以隔一家抢。\n\n- n=1直接返回nums[0]\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，遍历一次。\n- 空间复杂度：`O(1)`，只用了两个变量。\n\n## 🏢 实际业务应用\n\n- 资源调度中的\"不相邻选择\"问题：比如任务排期中不能连续执行某些任务。\n- 投资决策中的\"不能连续两天买入\"约束下的最大收益。\n- 日程安排中\"不能安排相邻时间段\"的最优选择。\n\n- 资源调度中的\"不相邻选择\"问题：比如任务排期中不能连续执行某些任务。\n- 投资决策中的\"不能连续两天买入\"约束下的最大收益。\n- 日程安排中\"不能安排相邻时间段\"的最优选择。\n\n## 📖 形象类比\n\n可以类比成《水浒传》里时迁（鼓上蚤）夜里偷盗。\n\n时迁沿着一条街挨家挨户偷，但有个规矩：不能连续偷两家（太容易被发现）。每到一家门口，他要想：是偷这家（那上一家不能偷，只能用上上家的成果），还是跳过这家（保留上一家的成果）？他每次都选收益更大的方案。\n\n对应关系是：\n\n- \"每家的财产\"对应 `nums[i]`\n- \"偷这家\"对应 `prev2 + nums[i]`\n- \"跳过这家\"对应 `prev1`\n- \"选收益更大的\"对应 `max(prev1, prev2 + nums[i])`\n\n这段记忆的关键是：每个位置只有两个选择，取较大的那个。\n\n可以类比成《水浒传》里时迁（鼓上蚤）夜里偷盗。\n\n时迁沿着一条街挨家挨户偷，但有个规矩：不能连续偷两家（太容易被发现）。每到一家门口，他要想：是偷这家（那上一家不能偷，只能用上上家的成果），还是跳过这家（保留上一家的成果）？他每次都选收益更大的方案。\n\n对应关系是：\n\n- \"每家的财产\"对应 `nums[i]`\n- \"偷这家\"对应 `prev2 + nums[i]`\n- \"跳过这家\"对应 `prev1`\n- \"选收益更大的\"对应 `max(prev1, prev2 + nums[i])`\n\n这段记忆的关键是：每个位置只有两个选择，取较大的那个。\n\n小狐狸沿着河边偷鱼。每块石头上放了一筐鱼，但不能连续两块石头都偷（会留下气味）。小狐狸想：偷当
