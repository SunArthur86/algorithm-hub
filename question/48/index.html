法是另开一个矩阵，把每个元素从旧位置搬到新位置。新位置的规律是：原来在 `(i, j)` 的元素，旋转后到 `(j, n-1-i)`。但这需要额外空间。\n\n能不能原地做？有两种思路：\n\n**思路一：先转置，再水平翻转。** 矩阵转置（沿主对角线翻转）后，再沿垂直中线左右翻转，等价于顺时针旋转 90 度。比如 `(i, j)` 转置变成 `(j, i)`，翻转变成 `(j, n-1-i)`，正好就是旋转后的位置。每步都是简单的两两交换，原地完成。\n\n**思路二：四元素一轮换。** 每次取四个\"互为旋转对应\"的元素进行循环交换：`(i,j) → (j,n-1-i) → (n-1-i,n-1-j) → (n-1-j,i) → (i,j)`。只需遍历四分之一矩阵即可完成全部旋转。\n\n两种方法都行，思路一更直观，思路二更一步到位。这里选用思路一。\n\n## 💻 Java 题解\n\n### 解法 1：转置 + 翻转\n\n先沿主对角线转置（matrix[i][j]↔matrix[j][i]），再对每行做水平翻转。\n\n- ⏱ 时间复杂度：`O(n²)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public void rotate(int[][] matrix) {\n        int n = matrix.length;\n        // 转置\n        for (int i = 0; i \u003c n; i++)\n            for (int j = i + 1; j \u003c n; j++) {\n                int t = matrix[i][j]; matrix[i][j] = matrix[j][i]; matrix[j][i] = t;\n            }\n        // 水平翻转每行\n        for (int i = 0; i \u003c n; i++) {\n            int l = 0, r = n - 1;\n            while (l \u003c r) {\n                int t = matrix[i][l]; matrix[i][l] = matrix[i][r]; matrix[i][r] = t;\n                l++; r--;\n            }\n        }\n    }\n}\n```\n\n**关键点：**\n- 转置：沿主对角线交换\n- 翻转：每行左右翻转\n- 两步组合等价于旋转90°\n\n**执行步骤：**\n1. 转置：matrix[i][j]↔matrix[j][i]\n1. 每行水平翻转\n1. 验证：(i,j)→(j,i)→(j,n-1-i)\n\n\n## ⚠️ 易错点\n\n- 转置时内层循环从 `i + 1` 开始，不是从 `0` 开始。如果从 `0` 开始，会交换两次等于没交换。\n- 如果要求逆时针旋转 90 度，则是\"先转置，再上下翻转\"（翻转行而非列），不要搞混方向。\n- Java 翻转行时不能直接 `Arrays.reverse()`（Java 数组没有这个方法），需要手动双指针交换。\n- Python 的 `matrix[i].reverse()` 是原地操作，不需要赋值回去。\n\n- 转置时 j 从 i+1 开始防止交换两次\n\n- 翻转是对每行操作不是整体\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n²)`。转置遍历 `n²/2` 次，翻转遍历 `n²/2` 次，总计 `O(n²)`。\n- 空间复杂度：`O(1)`。原地操作，只用了一个临时变量。\n\n## 🏢 实际业务应用\n\n- **图像处理**：用户在手机上旋转照片时，图片的像素矩阵需要原地旋转。90 度、180 度、270 度旋转是最基本的图像变换操作，JPEG 解码后的像素操作就是矩阵旋转。\n- **游戏开发**：俄罗斯方块中方块的旋转、棋盘游戏中棋盘的视角切换，本质都是矩阵旋转。原地旋转可以避免频繁创建新数组带来的内存压力。\n- **地图渲染**：导航 App 切换地图朝向（北朝上、车头朝上）时，瓦片地图的二维数组需要旋转后重新渲染。\n- **电子表格**：Excel 中\"转置粘贴\"功能把行变列、列变行，就是矩阵转置操作；而旋转则是转置加翻转的组合。\n\n- **图像处理**：用户在手机上旋转照片时，图片的像素矩阵需要原地旋转。90 度、180 度、270 度旋转是最基本的图像变换操作，JP
