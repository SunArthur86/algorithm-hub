 指向\"下一个非零元素应该放的位置\"，快指针 `fast` 遍历数组。每遇到一个非零元素，就把它放到 `slow` 的位置，`slow` 后移。遍历结束后，从 `slow` 到末尾全部填零。\n\n更简洁的写法：遇到非零就和 `slow` 交换（即使 `slow == fast` 也没关系），这样一步到位，不需要最后补零。\n\n所以这题的关键词不是\"移动零\"，而是\"快指针找非零，慢指针标位置，交换\"。\n\n## 💻 Java 题解\n\n### 解法 1：双指针一次遍历\n\n慢指针指向下一个非零位置。快指针遍历数组，遇到非零就交换到慢指针位置，慢指针前进。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public void moveZeroes(int[] nums) {\n        int slow = 0;\n        for (int fast = 0; fast \u003c nums.length; fast++) {\n            if (nums[fast] != 0) {\n                int temp = nums[slow];\n                nums[slow] = nums[fast];\n                nums[fast] = temp;\n                slow++;\n            }\n        }\n    }\n}\n```\n\n**关键点：**\n- 原地操作 O(1) 空间\n- 交换而非覆盖——保持非零元素顺序\n- 慢指针始终指向下一个非零应放的位置\n\n**执行步骤：**\n1. slow=0, fast=0\n1. fast 遍历数组\n1. 遇到非零：交换 nums[slow] 和 nums[fast]，slow++\n1. fast 继续前进\n\n\n## ⚠️ 易错点\n\n- 交换写法比\"先移动非零再补零\"更简洁，且保持稳定性（非零元素相对顺序不变）。\n- `slow == fast` 时交换是自己和自己交换，不影响结果。\n- 不要用覆盖写法（先移后补零），容易出错。\n\n- 不能用覆盖法后补零——题目要求原地修改\n\n- 交换确保非零元素顺序不变\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。\n- 空间复杂度：`O(1)`。\n\n## 🏢 实际业务应用\n\n- 数据清洗中，把无效数据（用 0 或 null 表示）移到末尾，保持有效数据的顺序。\n- 文件系统中，把已删除的文件块集中到末尾，便于空间回收。\n- 日志处理中，把空行移到末尾，保持有效日志的顺序。\n\n- 数据清洗中，把无效数据（用 0 或 null 表示）移到末尾，保持有效数据的顺序。\n- 文件系统中，把已删除的文件块集中到末尾，便于空间回收。\n- 日志处理中，把空行移到末尾，保持有效日志的顺序。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山排座次时\"把空位挪到后面\"。\n\n一百零八将按编号排列，但有些位置空着（用 0 表示）。宋江让两个人配合：一个人（快指针）从头到尾走，看到有人的位置就告诉另一个人（慢指针）；另一个人把有人的位置一个一个往前填。最后空位自然都到了末尾。\n\n对应关系是：\n\n- \"0\"对应空位\n- \"快指针\"对应从头走到尾检查的人\n- \"慢指针\"对应负责往前填的人\n- \"交换\"对应把有人位置挪到前面\n\n这段记忆的关键是：快指针找非零，慢指针标下一个放的位置，交换即可。\n\n可以把它类比成《水浒传》里梁山排座次时\"把空位挪到后面\"。\n\n一百零八将按编号排列，但有些位置空着（用 0 表示）。宋江让两个人配合：一个人（快指针）从头到尾走，看到有人的位置就告诉另一个人（慢指针）；另一个人把有人的位置一个一个往前填。最后空位自然都到了末尾。\n\n对应关系是：\n\n- \"0\"对应空位\n- \"快指针\"对应从头走到尾检查的人\n- \"慢指针\"对应负责往前填的人\n- \"交换\"对应把有人位置挪到前面\n\n这段记忆的关键是：快指针找非零，慢指针标下一个放的位置，交换即可。\n\n小兔子整理胡萝卜筐，有些筐格是空的。它用两只手：右手从头到尾扫，看到有胡萝卜的格子就和左手位置的格子交换，左手每次换完往后移一格。扫完一遍，所有胡萝卜都在前面，空格都在后面。\n\n小兔子整理胡萝卜筐，有些筐格是空的。它用两只手：右手从头到尾扫，看到有胡萝卜的格子就和左手
