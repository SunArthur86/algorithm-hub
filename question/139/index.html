配类 DP 的代表题，\"能否拼出来\"的判断模式在很多场景都会出现。\n\n## 🧠 思考路径\n\n最直觉的想法是递归：从 `s` 开头尝试匹配字典里的每个单词，匹配成功就对剩余部分递归判断。但这样会有大量重复计算——比如 `\"aaaaab\"` 匹配 `\"a\"` 时，`\"aaaab\"` 会被反复计算。\n\n加上记忆化就能变成 `O(n²)`，但 DP 更简洁。\n\n设 `dp[i]` 表示 `s[0..i-1]`（前 `i` 个字符）能否被拆分。对于每个位置 `i`，枚举所有 `j \u003c i`：如果 `dp[j]` 为 `True`（前 `j` 个字符能拆分），且 `s[j..i-1]` 在字典里，那 `dp[i] = True`。\n\n初始条件 `dp[0] = True`（空字符串一定能拆分）。\n\n所以这题的关键词不是\"拆字符串\"，而是\"用 DP 记录每个前缀是否可拆，逐步推出整串\"。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划\n\ndp[i]=true表示s[0..i)可拆分。对每个i，检查是否存在单词w使得s[i-w.len..i)==w 且 dp[i-w.len]==true。\n\n- ⏱ 时间复杂度：`O(n×m)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public boolean wordBreak(String s, List\u003cString\u003e wordDict) {\n        Set\u003cString\u003e dict = new HashSet\u003c\u003e(wordDict);\n        boolean[] dp = new boolean[s.length() + 1];\n        dp[0] = true;\n        for (int i = 1; i \u003c= s.length(); i++)\n            for (int j = 0; j \u003c i; j++)\n                if (dp[j] \u0026\u0026 dict.contains(s.substring(j, i))) {\n                    dp[i] = true; break;\n                }\n        return dp[s.length()];\n    }\n}\n```\n\n**关键点：**\n- dp[0]=true 空串可拆分\n- 双重循环i和j\n- substring(j,i)\n\n**执行步骤：**\n1. dp[0]=true\n1. 对每个i枚举j\n1. dp[j]==true且s[j..i)在字典中→dp[i]=true\n\n\n## ⚠️ 易错点\n\n- `dp` 数组长度是 `n + 1`，不是 `n`，因为 `dp[0]` 对应空串。\n- `s[j:i]` 是左闭右开，对应 `s` 的第 `j` 到第 `i-1` 个字符。\n- 字典要转成 `set`，否则每次 `in` 查询是 `O(m)`（m 是字典大小），总复杂度会变成 `O(n² · m)`。\n- `dp[0] = True` 是边界条件，不能漏，否则后面全为 `False`。\n\n- dp[0]=true 是关键base case\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n²)`。两层循环，每次子串查询 `O(1)`（set）。\n- 空间复杂度：`O(n + m)`。`dp` 数组 `O(n)`，字典集合 `O(m)`。\n\n## 🏢 实际业务应用\n\n- 搜索引擎的分词系统：判断用户输入的查询能否被拆分成合法的词组，直接影响搜索结果的召回。\n- 密码强度检测中的\"字典词检测\"：判断密码是否由字典中的常见词拼接而成，如果是则判定为弱密码。\n- 自然语言处理的分词预处理：中文分词中，判断一个句子能否被词表完全覆盖，是最基础的分词可行性检查。\n\n- 搜索引擎的分词系统：判断用户输入的查询能否被拆分成合法的词组，直接影响搜索结果的召回。\n- 密码强度检测中的\"字典词检测\"：判断密码是否由字典中的常见词拼接而成，如果是则判定为弱密码。\n- 自然语言处理的分词预处理：中文分词中，判断一个句子能否被词表完全覆盖，是最基础的分词可行性检查。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里孙悟空识别妖精变化的口诀。\n\n唐僧念的是一长串咒语（字符串 `s`），悟空手里有一本\"
