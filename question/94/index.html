是二叉树三大遍历之一，掌握递归和迭代两种写法，是后续所有树题的基石。对于 BST，中序遍历的结果恰好是升序序列。\n\n## 🧠 思考路径\n\n最直觉的写法是递归：定义一个辅助函数，先递归左子树，把根节点的值加入结果，再递归右子树。代码极其简洁，3 行核心逻辑。\n\n但面试中通常会追问迭代写法。递归的本质是用系统栈保存\"返回地址\"，迭代写法就是用显式栈来模拟这个过程。\n\n迭代中序遍历的思路：\n1. 从根节点出发，一直往左走，把沿途节点都压入栈。\n2. 栈顶弹出，访问该节点（加入结果）。\n3. 转向该节点的右子树，重复步骤 1。\n\n这个过程模拟了\"先走到底，再回头，再转向右边\"的递归行为。\n\n## 💻 Java 题解\n\n### 解法 1：递归\n\n递归访问左子树、记录当前节点、递归访问右子树。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public List\u003cInteger\u003e inorderTraversal(TreeNode root) {\n        List\u003cInteger\u003e result = new ArrayList\u003c\u003e();\n        inorder(root, result);\n        return result;\n    }\n    private void inorder(TreeNode node, List\u003cInteger\u003e result) {\n        if (node == null) return;\n        inorder(node.left, result);\n        result.add(node.val);\n        inorder(node.right, result);\n    }\n}\n```\n\n**关键点：**\n- 左→根→右顺序\n- 递归终止条件 node==null\n\n**执行步骤：**\n1. 递归左子树\n1. 访问当前节点\n1. 递归右子树\n\n\n### 解法 2：迭代（栈）\n\n用栈模拟递归。一路向左走到底，弹出访问，再转向右子树。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public List\u003cInteger\u003e inorderTraversal(TreeNode root) {\n        List\u003cInteger\u003e result = new ArrayList\u003c\u003e();\n        Deque\u003cTreeNode\u003e stack = new ArrayDeque\u003c\u003e();\n        TreeNode curr = root;\n        while (curr != null || !stack.isEmpty()) {\n            while (curr != null) {\n                stack.push(curr);\n                curr = curr.left;\n            }\n            curr = stack.pop();\n            result.add(curr.val);\n            curr = curr.right;\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 一路向左压栈\n- 弹出时访问\n- 转向右子树\n\n**执行步骤：**\n1. 一路向左压栈\n1. 弹出栈顶访问\n1. 转向右子树继续\n\n\n## ⚠️ 易错点\n\n- 迭代写法中，内层 `while` 是\"一路往左压栈\"，外层 `while` 是\"整个遍历还没结束\"。两个循环的条件不同，不要混用。\n- 弹出节点后要转向右子树，而不是左子树。`curr = curr.right` 这一步容易漏。\n- 栈里存的是节点引用，不是值。弹出后才能访问值。\n- 递归写法中不要忘了 `base case`（节点为空直接返回）。\n\n- 迭代法外层 while 条件是 curr!=null || !stack.isEmpty()\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点访问一次。\n- 空间复杂度：`O(h)`。`h` 是树的高度，栈的最大深度等于树的高度。最坏情况（链状树）为 `O(n)`，平衡树为 `O(log n)`。\n\n## 🏢 实际业务应用\n\n- 数据库 B+ 树的范围查询：B+ 树的叶子节点形成有序链表，中序遍历的\"左→根→右\"逻辑正是数据库按索引顺序扫描数据的核心原理。\n- 表达式求值：中缀表达式对应中序遍历，编译器需要按\"左操作数→运算符→右操作数\"的顺序构建和求值。\n- 文件系统目录排序：操作系统按字典序列出文件夹内容时，内部维护的树结构按中序遍历输出有序结果。\n- JSON/XML 的有序解析：嵌套数据结构的深度优先解析，本质上就是树的中序或前序遍历。\n\n- 数据库 B+ 树的范围查询：B+ 树的叶子节点形成有序链表，中序遍历的\"左→根→右\"逻辑正是数据库按索引顺序扫描数据的核心原理。\n- 表达式求值：中缀表达式对应中序遍历，编译器需要按\"左操作数→运算符→右操作数\"的顺序构建和求值。\n- 文件系统目录排序：操作系统按字典序列出文件夹内容时，内部维护的树结构按中序遍历输出有序结果。\n- JSON/XML 的有序解析：嵌套数据结构的深度优先解析，本质上就是树的中序或前序遍历。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山好汉排座次的场景。\n\n宋江要按照武功高低的顺序宣读好汉名单。梁山的好汉按二叉搜索树组织：左边的武功低，右边的武功高。宋江的宣读规则是\"先看左边的人，再念中间这位，最后看右边的人\"。\n\n于是宋江从自己开始，一直往左边走，走到最左边的杜迁，先念他的名字。然后回到上一级宋万，再念。然后看宋万右边有没有人……如此反复，最终所有人的名字按武功从低到高全部念完。\n\n对应关系是：\n\n- \"二叉搜索树\"对应梁山好汉的武功排名树\n- \"左子树\"对应武功更低的兄弟们\n- \"右子树\"对应武功更高的兄弟们\n- \"中序遍历结果\"对应按武功排序的好汉名单\n\n这段记忆的关键是：先走左边到底，回头念自己，再走右边。这就是\"左→根→右\"。\n\n可以把它类比成《水浒传》里梁山好汉排座次的场景。\n\n宋江要按照武功高低的顺序宣读好汉名单。梁山的好汉按二叉搜索树组织：左边的武功低，右边的武功高。宋江的宣读规则是\"先看左边的人，再念中间这位，最后看右边的人\"。\n\n于是宋江从自己开始，一直往左边走，走到最左边的杜迁，先念他的名字。然后回到上一级宋万，再念。然后看宋万右边有没有人……如此反复，最终所有人的名字按武功从低到高全部念完。\n\n对应关系是：\n\n- \"二叉搜索树\"对应梁山好汉的武功排名树\n- \"左子树\"对应武功更低的兄弟们\n- \"右子树\"对应武功更高的兄弟们\n- \"中序遍历结果\"对应按武功排序的好汉名单\n\n这段记忆的关键是：先走左边到底，回头念自己，再走右边。这就是\"左→根→右\"。\n\n猫头鹰老师带小动物们去参观一棵神奇的大树。树上每根树枝的左边结的果子比较小，右边结的果子比较大。老师要求大家按照从小到大的顺序摘果子。\n\n小兔子先沿着左边的小枝一直走到底，摘了最小的果子。然后退回到上一根枝，摘那根枝上的果子，再走到右边的枝继续摘。就这样走走退退，最后所有果子按从小到大的顺序整整齐齐地排在了篮子里。\n\n猫头鹰老师带小动物们去参观一棵神奇的大树。树上每根树枝的左边结的果子比较小，右边结的果子比较大。老师要求大家按照从小到大的顺序摘果子。\n\n小兔子先沿着左边的小枝一直走到底，摘了最小的果子。然后退回到上一根枝，摘那根枝上的果子，再走到右边的枝继续摘。就这样走走退退，最后所有果子按从小到大的顺序整整齐齐地排在了篮子里。\n\n## 🎵 记忆口诀\n\n一路向左压到底，弹出访问再往右。\n\n一路向左压到底，弹出访问再往右。\n\n## 🔗 延伸练习\n\n- `144. 二叉树的前序遍历`：把\"左→根→右\"换成\"根→左→右\"，体会访问顺序的变化。\n- `145. 二叉树的后序遍历`：把顺序换成\"左→右→根\"，迭代写法难度升级。\n\n- `144. 二叉树的前序遍历`：把\"左→根→右\"换成\"根→左→右\"，体会访问顺序的变化。\n- `145. 二叉树的后序遍历`：把顺序换成\"左→右→根\"，迭代写法难度升级。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margi
