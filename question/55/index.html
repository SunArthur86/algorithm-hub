径，看有没有一条能到终点。但这样最坏是指数级的。\n\n换个角度：我不需要知道\"怎么跳\"，只需要知道\"最远能跳到哪\"。从左往右扫描，维护一个变量 `farthest` 表示当前能到达的最远位置。每到一个位置 `i`，先看 `i` 是否在可达范围内（`i \u003c= farthest`），如果是就更新 `farthest = max(farthest, i + nums[i])`。\n\n如果扫描过程中 `farthest` 已经超过了最后一个位置，直接返回 `true`。如果扫描完了还没到，或者某个位置 `i` 超过了 `farthest`（说明中间断了，跳不过去），就返回 `false`。\n\n这就是贪心：每一步都不做具体决策，只维护\"目前能到的最远处\"。\n\n## 💻 Java 题解\n\n### 解法 1：贪心（最远可达）\n\n遍历时维护maxReach=i+nums[i]。如果i\u003emaxReach则失败。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public boolean canJump(int[] nums) {\n        int maxReach = 0;\n        for (int i = 0; i \u003c nums.length; i++) {\n            if (i \u003e maxReach) return false;\n            maxReach = Math.max(maxReach, i + nums[i]);\n        }\n        return true;\n    }\n}\n```\n\n**关键点：**\n- maxReach=i+nums[i]\n- i\u003emaxReach→无法到达\n\n**执行步骤：**\n1. 遍历\n1. 更新maxReach\n1. i超过maxReach返回false\n\n\n## ⚠️ 易错点\n\n- 检查 `i \u003e farthest` 必须在更新 `farthest` 之前：先判断当前位置是否可达，再更新最远范围。\n- 不要把 `farthest` 和 `i` 搞混：`farthest` 是\"目前能到的最远位置\"，`i + nums[i]` 是\"从当前位置跳出去能到的位置\"。\n- `nums[i]` 可以是 `0`：跳到这个位置就\"停住\"了，如果此时 `farthest` 也等于 `i` 且 `i` 不是终点，就跳不动了。\n\n- 先判断i\u003emaxReach再更新\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。只遍历一次数组，每个位置做 O(1) 操作。\n- 空间复杂度：`O(1)`。只用了 `farthest` 一个变量。\n\n## 🏢 实际业务应用\n\n- 网络路由可达性判断：网络中的每个节点有一定范围的信号覆盖，判断从源节点能否到达目标节点，本质就是\"最远能覆盖到哪\"。\n- 任务流水线的可达性分析：流水线上每道工序有缓冲区大小限制（跳跃能力），判断工件能否从第一道工序流转到最后一道。\n- 规划系统中的资源跳转：在项目管理中，每个里程碑能跳过的步骤数有限，贪心策略可以快速判断是否能到达最终节点。\n- 文件系统的读取范围预测：磁盘调度器根据连续扇区的读取能力判断能否在一次寻道中完成读取任务。\n\n- 网络路由可达性判断：网络中的每个节点有一定范围的信号覆盖，判断从源节点能否到达目标节点，本质就是\"最远能覆盖到哪\"。\n- 任务流水线的可达性分析：流水线上每道工序有缓冲区大小限制（跳跃能力），判断工件能否从第一道工序流转到最后一道。\n- 规划系统中的资源跳转：在项目管理中，每个里程碑能跳过的步骤数有限，贪心策略可以快速判断是否能到达最终节点。\n- 文件系统的读取范围预测：磁盘调度器根据连续扇区的读取能力判断能否在一次寻道中完成读取任务。\n\n## 📖 形象类比\n\n《西游记》中，唐僧师徒过火焰山，路上有几座驿站，每座驿站有不同数量的\"筋斗云配额\"——有的能飞三座山，有的只能飞一座。孙悟空不需要规划具体怎么飞，只要算出\"从出发开始，最远能飞到第几座山\"就行了。\n\n对应关系：\n\n- \"数组的每个位置\"对应\"路上的每座驿站\"\n- \"nums[i]\"对应\"这座驿站的筋斗云配额\"\n- \"farthest\"对应\"目前最远能飞到的山\"\n- \"i \u003e farthest\"对应\"这座山飞不到了，断了\"\n- \"farthest \u003e= 终点\"对应\"能飞到目的地\"\n\n核心：不纠结具体路线，只盯\"最远能到哪\"。\n\n《西游记》中，唐僧师徒过火焰山，路上有几座驿站，每座驿站有不同数量的\"筋斗云配额\"——有的能飞三座山，有的只能飞一座。孙悟空不需要规划具体怎么飞，只要算出\"从出发开始，最远能飞到第几座山\"就行了。\n\n对应关系：\n\n- \"数组的每个位置\"对应\"路上的每座驿站\"\n- \"nums[i]\"对应\"这座驿站的筋斗云配额\"\n- \"farthest\"对应\"目前最远能飞到的山\"\n- \"i \u003e farthest\"对应\"这座山飞不到了，断了\"\n- \"farthest \u003e= 终点\"对应\"能飞到目的地\"\n\n核心：不纠结具体路线，只盯\"最远能到哪\"。\n\n小青蛙要跳过一排荷叶到对岸。每片荷叶上写着\"从这里最多能跳几步\"。小青蛙不规划路线，只是每跳到一片荷叶上，就更新自己\"最远能跳到哪片\"。如果最远能到对岸，它就开心地叫了一声\"呱\"；如果跳到某片荷叶发现前面的都够不着了，它就摇摇头说\"过不去\"。\n\n小青蛙要跳过一排荷叶到对岸。每片荷叶上写着\"从这里最多能跳几步\"。小青蛙不规划路线，只是每跳到一片荷叶上，就更新自己\"最远能跳到哪片\"。如果最远能到对岸，它就开心地叫了一声\"呱\"；如果跳到某片荷叶发现前面的都够不着了，它就摇摇头说\"过不去\"。\n\n## 🎵 记忆口诀\n\n不问怎么跳，只问最远到哪。\n\n不问怎么跳，只问最远到哪。\n\n## 🔗 延伸练习\n\n- `45. 跳跃游戏 II`：不仅要判断能不能到，还要求\"最少跳几次才能到\"，贪心策略需要升级为\"按阶段扩展\"。\n- `1306. 跳跃游戏 III`：可以往左或往右跳，且必须刚好跳 `nums[i]` 步（不是最多），变成 BFS 问题。\n\n- `45. 跳跃游戏 II`：不仅要判断能不能到，还要求\"最少跳几次才能到\"，贪心策略需要升级为\"按阶段扩展\"。\n- `1306. 跳跃游戏 III`：可以往左或往右跳，且必须刚好跳 `nums[i]` 步（不是最多），变成 BFS 问题。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🎯\"}],55,\". \",\"跳跃游戏\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0055\",\"lcId\":55,\"slug\":\"jump-game\",\"title\":\"跳跃游戏\",\"question\":\"跳跃游戏\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"greedy\",\"categories\":[\"greedy\"],\"tags\":[\"贪心\",\"数组\",\"动态规划\"],\"url\":\"https://leetcode.cn/problems/jump-game/\",\"planOrder\":78,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"你站在数组的第一个位置，每个位置的数字表示你从这里\\\"最多能跳几步\\\"。问：能不能跳到最后一个位置？能就返回 `true`，不能就返回 `false`。\",\"an
