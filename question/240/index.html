步都能排除一行或一列，是\"搜索空间逐步缩小\"的完美示范。\n\n## 🧠 思考路径\n\n暴力遍历是 `O(m * n)`，但完全没有利用矩阵的有序性。\n\n如果从左上角（最小值）开始，右边和下边都比它大，不知道该往哪走。如果从右下角（最大值）开始，左边和上边都比它小，同样不确定。\n\n关键发现：从右上角开始看——当前元素左边的都比它小，下面的都比它大。所以：\n- 如果当前元素等于 `target`，找到了。\n- 如果当前元素大于 `target`，那这一列下面的数都更大，不可能了，排除这一列（`j--`）。\n- 如果当前元素小于 `target`，那这一行左边的数都更小，不可能了，排除这一行（`i++`）。\n\n每一步都排除一行或一列，最多走 `m + n` 步。也可以从左下角开始，逻辑对称。\n\n这题的关键词不是\"二分查找\"，而是\"从右上角出发，利用行列有序性每步排除一行或一列\"。\n\n## 💻 Java 题解\n\n### 解法 1：右上角搜索（Z形查找）\n\n从右上角出发，当前值比 target 大就左移（减小），比 target 小就下移（增大）。\n\n- ⏱ 时间复杂度：`O(m+n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public boolean searchMatrix(int[][] matrix, int target) {\n        int m = matrix.length, n = matrix[0].length;\n        int row = 0, col = n - 1; // 从右上角开始\n        while (row \u003c m \u0026\u0026 col \u003e= 0) {\n            if (matrix[row][col] == target) return true;\n            else if (matrix[row][col] \u003e target) col--;\n            else row++;\n        }\n        return false;\n    }\n}\n```\n\n**关键点：**\n- 右上角是分界点：左小右大下大\n- 每次排除一行或一列\n- O(m+n) 时间\n\n**执行步骤：**\n1. 从右上角 (0,n-1) 开始\n1. 等于 target 返回 true\n1. 大于 target 左移 col--\n1. 小于 target 下移 row++\n\n\n## ⚠️ 易错点\n\n- 起点必须是右上角或左下角，不能是左上角或右下角——左上角两个方向都是增大，无法决定走哪边。\n- 矩阵为空时需要提前判断，否则访问 `matrix[0]` 会报错。\n- 每一步只移动一个方向（行或列），不要同时移动。\n\n- 不能从左上角或右下角开始——两个方向同增/同减\n\n- 左下角也可以作为起点\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m + n)`。最多走 `m` 步向下和 `n` 步向左。\n- 空间复杂度：`O(1)`。只用两个指针。\n\n## 🏢 实际业务应用\n\n- 数据库索引中，多列联合索引的搜索可以用类似的\"排除法\"策略——每一步都能剪枝一部分搜索空间。\n- 电子表格中在行列都有序的数据区域里查找某个值，从右上角开始是最自然的交互方式。\n- 游戏地图中，如果地形数据按行列有序排列（比如高度从西北到东南递增），查找特定高度的地块可以用这个方法。\n\n- 数据库索引中，多列联合索引的搜索可以用类似的\"排除法\"策略——每一步都能剪枝一部分搜索空间。\n- 电子表格中在行列都有序的数据区域里查找某个值，从右上角开始是最自然的交互方式。\n- 游戏地图中，如果地形数据按行列有序排列（比如高度从西北到东南递增），查找特定高度的地块可以用这个方法。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里诸葛亮在排兵布阵的沙盘上找某个特定位置的场景。\n\n沙盘上的兵力按行列排列：越往东兵力越多（行有序），越往南兵力越多（列有序）。诸葛亮站在沙盘的东北角（右上角）：如果当前位置兵力太多，就往西退一步（排除东边一列）；如果兵力太少，就往南走一步（排除北边一行）。每一步都排除掉一整行或一整列，很快就找到目标。\n\n对应关系是：\n\n- \"东北角\"对应右上角起点\n- \"兵力太多往西退\"对应当前值大于 target，左移\n- \"兵力太少往南走\"对应当前值小于 target，下移\n- \"排除一整行或一整列\"对应搜索空间逐步缩小\n\n这段记忆的关键是：从右上角出发，利用有序性每步排除一整行或一整列。\n\n可以把它类比成《三国演义》里诸葛亮在排兵布阵的沙盘上找某个特定位置的场景。\n\n沙盘上的兵力按行列排列：越往东兵力越多（行有序），越往南兵力越多（列有序）。诸葛亮站在沙盘的东北角（右上角）：如果当前位置兵力太多，就往西退一步（排除东边一列）；如果兵力太少，就往南走一步（排除北边一行）。每一步都排除掉一整行或一整列，很快就找到目标。\n\n对应关系是：\n\n- \"东北角\"对应右上角起点\n- \"兵力太多往西退\"对应当前值大于 target，左移\n- \"兵力太少往南走\"对应当前值小于 target，下移\n- \"排除一整行或一整列\"对应搜索空间逐步缩小\n\n这段记忆的关键是：从右上角出发，利用有序性每步排除一整行或一整列。\n\n小松鼠在果园里找一颗特定大小的果子。果园按规则排列：从左到右果子越来越大，从上到下也越来越大。小松鼠站在右上角：如果这颗果子太大了，就往左走（左边的更小）；如果太小了，就往下走（下面的更大）。每走一步就排除一整行或一整列，很快就找到了。\n\n小松鼠在果园里找一颗特定大小的果子。果园按规则排列：从左到右果子越来越大，从上到下也越来越大。小松鼠站在右上角：如果这颗果子太大了，就往左走（左边的更小）；如果太小了，就往下走（下面的更大）。每走一步就排除一整行或一整列，很快就找到了。\n\n## 🎵 记忆口诀\n\n右上角出发，大了往左，小了往下。\n\n右上角出发，大了往左，小了往下。\n\n## 🔗 延伸练习\n\n- `74. 搜索二维矩阵`：更强的有序条件（整行整列连续），可以用二分查找做到 `O(log(m*n))`。\n- `378. 有序矩阵中第 K 小的元素`：在同样的矩阵中找第 K 小，结合二分和这个搜索技巧。\n\n- `74. 搜索二维矩阵`：更强的有序条件（整行整列连续），可以用二分查找做到 `O(log(m*n))`。\n- `378. 有序矩阵中第 K 小的元素`：在同样的矩阵中找第 K 小，结合二分和这个搜索技巧。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🔲\"}],240,\". \",\"搜索二维矩阵 II\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0240\",\"lcId\":240,\"slug\":\"search-a-2d-matrix-ii\",\"title\":\"搜索二维矩阵 II\",\"question\":\"搜索二维矩阵 II\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"matrix\",\"categories\":[\"matrix\"],\"tags\":[\"数组\",\"二分查找\",\"分治\",\"矩阵\"],\"url\":\"https://leetcode.cn/problems/search-a-2d-matrix-ii/\",\"planOrder\":21,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一个 `m × n` 的矩阵，满足每行从左到右递增、每列从上到下递增。判断目标值 `target` 是否在矩阵中。  重点不在\\\"怎么遍历矩阵\\\"，而在
