"类似，只不过比较的不是\"同一位置\"，而是\"镜像位置\"。\n\n两棵子树互为镜像，等价于：\n1. 根节点值相同\n2. 左子树的左子树和右子树的右子树互为镜像\n3. 左子树的右子树和右子树的左子树互为镜像\n\n即 `isMirror(left.left, right.right) and isMirror(left.right, right.left)`。\n\n递归和迭代都可以。迭代版本用队列实现，每次弹出两个节点，依次比较它们的外侧孩子和内侧孩子。\n\n## 💻 Java 题解\n\n### 解法 1：递归比较镜像\n\n比较左子树和右子树是否镜像对称。mirror(left,right): left.val==right.val 且 mirror(left.left,right.right) 且 mirror(left.right,right.left)。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public boolean isSymmetric(TreeNode root) {\n        return mirror(root.left, root.right);\n    }\n    private boolean mirror(TreeNode a, TreeNode b) {\n        if (a == null \u0026\u0026 b == null) return true;\n        if (a == null || b == null) return false;\n        return a.val == b.val\n            \u0026\u0026 mirror(a.left, b.right)\n            \u0026\u0026 mirror(a.right, b.left);\n    }\n}\n```\n\n**关键点：**\n- mirror(left.left, right.right)\n- mirror(left.right, right.left)\n- 同时为 null 返回 true\n\n**执行步骤：**\n1. 比较根的左右子树\n1. 递归交叉比较\n1. 值相等且子树镜像对称\n\n\n## ⚠️ 易错点\n\n- 镜像比较的配对是\"左的左 vs 右的右\"和\"左的右 vs 右的左\"，不是\"左的左 vs 右的左\"。\n- 根节点本身不需要和谁比较，直接从 `root.left` 和 `root.right` 开始。\n- 空树（`root == null`）是对称的，但 LeetCode 保证至少有一个节点。\n- 迭代写法中队列每次弹出两个元素，入队也要成对入。\n\n- 一个为 null 一个不为 null 返回 false\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点访问一次。\n- 空间复杂度：`O(h)`（递归）或 `O(n)`（迭代队列）。最坏情况（完美二叉树）队列最多存 `n/2` 个节点。\n\n## 🏢 实际业务应用\n\n- 数据对称性校验：分布式系统中主从节点的数据拓扑是否对称，用于快速检测数据漂移。\n- 图像镜像检测：图像处理中判断一张图片左右是否对称，内部数据结构是二叉树形式的像素层级表示。\n- UI 布局对称性验证：前端框架中判断组件树的左右布局是否对称，用于自动化 UI 测试。\n- 数学公式的对称性分析：在符号计算中，判断表达式的左右子表达式是否对称，用于化简和优化。\n\n- 数据对称性校验：分布式系统中主从节点的数据拓扑是否对称，用于快速检测数据漂移。\n- 图像镜像检测：图像处理中判断一张图片左右是否对称，内部数据结构是二叉树形式的像素层级表示。\n- UI 布局对称性验证：前端框架中判断组件树的左右布局是否对称，用于自动化 UI 测试。\n- 数学公式的对称性分析：在符号计算中，判断表达式的左右子表达式是否对称，用于化简和优化。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里诸葛亮排八阵图的场景。\n\n八阵图讲究左右对称，左翼的阵型和右翼的阵型互为镜像。诸葛亮巡视时，总是对比左边和右边的对应位置：左翼前排左边第三个士兵和右翼前排右边第三个士兵是否身高相同、兵器相同；左翼后排右边第一个骑兵和右翼后排左边第一个骑兵是否装备一致。\n\n对应关系是：\n\n- \"二叉树\"对应八阵图的阵型\n- \"左子树\"对应左翼阵型\n- \"右子树\"对应右翼阵型\n- \"镜像比较\"对应诸葛亮对比左右翼对应位置\n- \"`p.left vs q.right`\"对应左翼的左边 vs 右翼的右边\n\n这段记忆的关键是：镜像比较不是同位比较，而是\"左的左 vs 右的右\"。\n\n可以把它类比成《三国演义》里诸葛亮排八阵图的场景。\n\n八阵图讲究左右对称，左翼的阵型和右翼的阵型互为镜像。诸葛亮巡视时，总是对比左边和右边的对应位置：左翼前排左边第三个士兵和右翼前排右边第三个士兵是否身高相同、兵器相同；左翼后排右边第一个骑兵和右翼后排左边第一个骑兵是否装备一致。\n\n对应关系是：\n\n- \"二叉树\"对应八阵图的阵型\n- \"左子树\"对应左翼阵型\n- \"右子树\"对应右翼阵型\n- \"镜像比较\"对应诸葛亮对比左右翼对应位置\n- \"`p.left vs q.right`\"对应左翼的左边 vs 右翼的右边\n\n这段记忆的关键是：镜像比较不是同位比较，而是\"左的左 vs 右的右\"。\n\n小蝴蝶在湖边看到一棵大树的倒影，它好奇这棵树是不是真的左右对称。于是它飞到树的左边看了一根枝条，再飞到右边的对应位置看另一根。两根枝条上的果子数量和颜色都一样，小蝴蝶又往更深处飞去，看左边枝条的左分枝和右边枝条的右分枝……一直检查到最深的叶子，发现全都一一对应，这才认定这棵树真的是对称的。\n\n小蝴蝶在湖边看到一棵大树的倒影，它好奇这棵树是不是真的左右对称。于是它飞到树的左边看了一根枝条，再飞到右边的对应位置看另一根。两根枝条上的果子数量和颜色都一样，小蝴蝶又往更深处飞去，看左边枝条的左分枝和右边枝条的右分枝……一直检查到最深的叶子，发现全都一一对应，这才认定这棵树真的是对称的。\n\n## 🎵 记忆口诀\n\n左左比右右，左右比右左，镜像同步走。\n\n左左比右右，左右比右左，镜像同步走。\n\n## 🔗 延伸练习\n\n- `100. 相同的树`：本题的基础版，判断两棵树是否完全相同。\n- `572. 另一棵树的子树`：综合了\"相同的树\"和子树匹配的思路。\n\n- `100. 相同的树`：本题的基础版，判断两棵树是否完全相同。\n- `572. 另一棵树的子树`：综合了\"相同的树\"和子树匹配的思路。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🌳\"}],101,\". \",\"对称二叉树\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0101\",\"lcId\":101,\"slug\":\"symmetric-tree\",\"title\":\"对称二叉树\",\"question\":\"对称二叉树\",\"answer\":\"$e\",\"difficulty\":\"Easy\",\"category\":\"binary-tree\",\"categories\":[\"binary-tree\"],\"tags\":[\"树\",\"深度优先搜索\",\"广度优先搜索\",\"二叉树\"],\"url\":\"https://leetcode.cn/problems/symmetric-tree/\",\"planOrder\":39,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一棵二叉树的根节点 `root`，判断它是否是轴对称的。  对称的定义：如果把这棵树沿中轴线对折，左右两边能完全重合。即左子树和右子树互为镜像。\",\
