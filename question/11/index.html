积取最大值，时间 `O(n²)`。\n\n观察面积公式：`面积 = min(h[i], h[j]) × (j - i)`。如果左右两个指针分别站在数组两端，每次移动较短的那个指针向内靠拢，面积有可能变大（因为距离在减小，但如果新的线更高，面积的损失可能被弥补）。而移动较长的那边没有意义——面积受短板限制，长板变长也没用。\n\n这就是贪心策略：每次放弃短板，因为短板决定了当前面积的上限，留着它不可能得到更大的面积。\n\n## 💻 Java 题解\n\n### 解法 1：贪心双指针\n\n左右指针从两端出发。每次移动较短的一边（因为移动较长边不可能获得更大水量），记录最大值。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int maxArea(int[] height) {\n        int left = 0, right = height.length - 1;\n        int maxWater = 0;\n        while (left \u003c right) {\n            int h = Math.min(height[left], height[right]);\n            int w = right - left;\n            maxWater = Math.max(maxWater, h * w);\n            if (height[left] \u003c height[right]) left++;\n            else right--;\n        }\n        return maxWater;\n    }\n}\n```\n\n**关键点：**\n- 面积 = min(h[left],h[right]) × 宽度\n- 移动较短的一边\n- 一次遍历 O(n)\n\n**执行步骤：**\n1. left=0, right=n-1\n1. 计算当前水量并更新最大值\n1. 移动较短的一边\n1. 直到 left \u003e= right\n\n\n## ⚠️ 易错点\n\n- 移动较短的那边，不是移动任意一边。移动长板只会让距离变小而短板不变，面积不可能增大。\n- 面积由短板决定，所以用 `min(height[left], height[right])`。\n- 两边高度相等时，移动哪边都可以，不影响正确性。\n\n- 不是移动较长边！移动较长边宽度减少但高度不会增加\n\n- 宽度是 right-left 不是 right-left+1\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。左右指针各最多遍历一半。\n- 空间复杂度：`O(1)`。只用常数个变量。\n\n## 🏢 实际业务应用\n\n- 容量规划：在资源受限的系统中（CPU、内存、带宽），最大吞吐量由最短的那块\"板\"决定，优化策略就是找到并提升瓶颈。\n- 双边界最优搜索：在价格区间、时间窗口等场景中，寻找两个端点使目标函数最大化。\n- 图像处理：在图像的直方图中寻找最大矩形面积，逻辑与此题类似。\n\n- 容量规划：在资源受限的系统中（CPU、内存、带宽），最大吞吐量由最短的那块\"板\"决定，优化策略就是找到并提升瓶颈。\n- 双边界最优搜索：在价格区间、时间窗口等场景中，寻找两个端点使目标函数最大化。\n- 图像处理：在图像的直方图中寻找最大矩形面积，逻辑与此题类似。\n\n## 📖 形象类比\n\n可以类比《三国演义》里草船借箭时调兵的决策。\n\n诸葛亮安排两排草船夹江而立。箭从两岸射来，每排船的载箭量取决于那一侧船的\"防御能力\"（高度）。他想让两排船之间装的箭最多，面积就是\"两排船的距离 × 较低一侧的防御能力\"。他先让两排船站在最远处，然后每次把防御能力更低的那一排往内收——因为低的那侧限制了总载箭量，收进来可能遇到更高的船。\n\n对应关系是：\n\n- \"两排草船\"对应左右两个指针\n- \"防御能力\"对应竖线高度 `height`\n- \"两排船的距离\"对应 `right - left`\n- \"较低一侧的限制\"对应 `min(height[left], height[right])`\n- \"移动较低的一侧\"对应移动短板\n\n记忆的关键是：谁短动谁，短板决定了上限。\n\n可以类比《三国演义》里草船借箭时调兵的决策。\n\n诸葛亮安排两排草船夹江而立。箭从两岸射来，每排船的载箭量取决于那一侧船的\"防御能力\"（高度）。他想让两排船之间装的箭
