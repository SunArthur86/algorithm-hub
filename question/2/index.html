n\n最自然的想法就是模拟竖式加法。从最低位（链表头）开始，一位一位地加，有进位就记下来带到下一位。\n\n关键在于：两个链表长度可能不一样，有一个先走完；走完的那个相当于不断补零。最后如果还剩进位，要额外挂一个节点。\n\n整个过程只需要一个指针沿着两条链同步往后走，一个变量 `carry` 记进位。不需要先把链表转成数字再相加，因为数字可能非常大，直接用链表操作更安全。\n\n## 💻 Java 题解\n\n### 解法 1：模拟加法 + 进位\n\n遍历两个链表，逐位相加加上进位。 carry = sum / 10, new digit = sum % 10。\n\n- ⏱ 时间复杂度：`O(max(m,n))`\n- 💾 空间复杂度：`O(max(m,n))`\n\n```java\nclass Solution {\n    public ListNode addTwoNumbers(ListNode l1, ListNode l2) {\n        ListNode dummy = new ListNode(0), curr = dummy;\n        int carry = 0;\n        while (l1 != null || l2 != null || carry != 0) {\n            int sum = carry;\n            if (l1 != null) { sum += l1.val; l1 = l1.next; }\n            if (l2 != null) { sum += l2.val; l2 = l2.next; }\n            curr.next = new ListNode(sum % 10);\n            carry = sum / 10;\n            curr = curr.next;\n        }\n        return dummy.next;\n    }\n}\n```\n\n**关键点：**\n- carry = sum / 10\n- digit = sum % 10\n- 循环条件包含 carry!=0 处理最高位进位\n\n**执行步骤：**\n1. 逐位相加+进位\n1. 创建新节点存储当前位\n1. 更新进位\n1. 遍历完链表后处理剩余进位\n\n\n## ⚠️ 易错点\n\n- 循环条件不能只写 `while l1 and l2`，因为两个链表长度不同，短的走完后长的那部分还要继续处理。\n- 最后如果 `carry` 不为 0，要额外挂一个进位节点，不能丢掉。比如 `9 + 1 = 10`，结果链表要多一位。\n- 新链表的头节点最好用哨兵节点（dummy），否则第一次插入时要特殊处理。\n\n- 忘记 carry!=0 条件导致最高位进位丢失\n\n- dummy 节点简化代码\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(max(m, n))`。`m` 和 `n` 是两个链表的长度，最多遍历较长链表的长度加一。\n- 空间复杂度：`O(max(m, n))`。结果链表的长度最多是 `max(m, n) + 1`。\n\n## 🏢 实际业务应用\n\n- 大整数加法：当数字超出语言原生整数范围（比如 64 位）时，用链表或数组逐位存储并模拟加法是标准做法，常见于密码学、区块链的哈希运算。\n- 多精度计算库：底层实现和本题逻辑一致，如 Java 的 `BigInteger`、Python 的长整数，本质上都是逐位操作 + 进位传播。\n- 金融系统中的金额精确计算：某些场景需要用定点数逐位运算来避免浮点误差，进位逻辑与本题完全相同。\n\n- 大整数加法：当数字超出语言原生整数范围（比如 64 位）时，用链表或数组逐位存储并模拟加法是标准做法，常见于密码学、区块链的哈希运算。\n- 多精度计算库：底层实现和本题逻辑一致，如 Java 的 `BigInteger`、Python 的长整数，本质上都是逐位操作 + 进位传播。\n- 金融系统中的金额精确计算：某些场景需要用定点数逐位运算来避免浮点误差，进位逻辑与本题完全相同。\n\n## 📖 形象类比\n\n可以类比《水浒传》里两路粮草逐位清点的场景。\n\n宋江派了两路人马分别从东边和西边运粮回来，每路粮草按车计数，打头的车装的是零散袋数（个位），后面依次是十袋一捆、百袋一箱。军师吴用要把两路粮草合在一起算总数，他从前到后一车一车地加：先算袋数，满了十袋就捆成一捆记到下一位；再算捆数，满了十捆就装箱记到再下一位。\n\n对应关系是：\n\n- \"两路粮草车队\"对应两个输入链表 `l1` 和 `l2`\n- \"一车一车地加\"对应逐节点相加\n- \"满了十袋捆一捆\"对应进位 `carry`\n- \"最终合出来的车队\"对应结果链表\n\n记忆的关键是：从最低位开始加，逢十进一，和竖式加法一模一样。\n\n可以类比《水浒传》里两路粮草逐位清点的场景。\n\n宋江派了两路人马分别从东边和西边运粮回来，每路粮草按车计数，打头的车装的是零散袋数（个位），后面依次是十袋一捆、百袋一箱。军师吴用要把两路粮草合在一起算总数，他从前到后一车一车地加：先算袋数，满了十袋就捆成一捆记到下一位；再算捆数，满了十捆就装箱记到再下一位。\n\n对应关系是：\n\n- \"两路粮草车队\"对应两个输入链表 `l1` 和 `l2`\n- \"一车一车地加\"对应逐节点相加\n- \"满了十袋捆一捆\"对应进位 `carry`\n- \"最终合出来的车队\"对应结果链表\n\n记忆的关键是：从最低位开始加，逢十进一，和竖式加法一模一样。\n\n小兔和小松鼠各自背了一串果子回来，每串果子上挂着数字牌，从尾巴到头是个位、十位、百位。猫头鹰负责算总共有多少颗果子。它从两串果子的尾巴开始，把同一位置的果子数加起来，如果超过十颗就包一小袋记到前面。一路往前算，最后如果手里还有一小袋没挂上去，就再添一个位置。\n\n小兔和小松鼠各自背了一串果子回来，每串果子上挂着数字牌，从尾巴到头是个位、十位、百位。猫头鹰负责算总共有多少颗果子。它从两串果子的尾巴开始，把同一位置的果子数加起来，如果超过十颗就包一小袋记到前面。一路往前算，最后如果手里还有一小袋没挂上去，就再添一个位置。\n\n## 🎵 记忆口诀\n\n逐位相加，逢十进一。\n\n逐位相加，逢十进一。\n\n## 🔗 延伸练习\n\n- `445. 两数相加 II`：链表变成正序存储（高位在头），需要先反转或用栈来处理。\n- `43. 字符串相乘`：从\"链表加法\"扩展到\"字符串乘法\"，进位逻辑更复杂。\n\n- `445. 两数相加 II`：链表变成正序存储（高位在头），需要先反转或用栈来处理。\n- `43. 字符串相乘`：从\"链表加法\"扩展到\"字符串乘法\"，进位逻辑更复杂。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⛓️\"}],2,\". \",\"两数相加\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0002\",\"lcId\":2,\"slug\":\"add-two-numbers\",\"title\":\"两数相加\",\"question\":\"两数相加\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"linked-list\",\"categories\":[\"linked-list\"],\"tags\":[\"递归\",\"链表\",\"数学\"],\"url\":\"https://leetcode.cn/problems/add-two-numbers/\",\"planOrder\":28,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你两个链表，每个节点存一位数字，整体按逆序排列（个位在头）。你要把这两个\\\"链表数\\\"加起来，结果也用同样的逆序链表返回。  比如 `2 → 4 → 3` 代表 342，`5
