理全都有，能把链表基本功一次拉满。\n\n## 🧠 思考路径\n\n先拆成子问题：能不能先翻转一条链表的前 K 个节点？这是经典的\"头插法\"翻转链表，用三个指针 `prev`、`curr`、`next` 就能搞定。\n\n然后考虑分组：翻完一组之后，前一组的尾巴要接到下一组的翻转结果上。这就需要记住前一组的尾节点（翻转后它变成了这组的最后一个节点），等下一组翻完，直接把前一组尾巴的 next 指过去。\n\n还要处理边界：翻之前先数一下够不够 K 个节点，不够就不翻直接接上去。\n\n这样整件事就拆成了三个步骤：先数够不够 K 个 → 翻转这 K 个 → 递归处理剩下的。递归的思路最清晰：翻转前 K 个，返回新的头，然后递归处理后半段，把前半段的尾接上递归结果。\n\n## 💻 Java 题解\n\n### 解法 1：迭代分组翻转\n\n每次找到 k 个节点的区间，翻转这一段，连接前后。用 dummy 简化。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public ListNode reverseKGroup(ListNode head, int k) {\n        ListNode dummy = new ListNode(0, head);\n        ListNode prev = dummy;\n        while (true) {\n            // 检查是否有 k 个节点\n            ListNode tail = prev;\n            for (int i = 0; i \u003c k; i++) {\n                tail = tail.next;\n                if (tail == null) return dummy.next;\n            }\n            ListNode next = tail.next;\n            // 翻转 prev.next 到 tail\n            ListNode curr = prev.next, newTail = curr;\n            prev.next = null;\n            for (int i = 0; i \u003c k; i++) {\n                ListNode temp = curr.next;\n                curr.next = prev.next;\n                prev.next = curr;\n                curr = temp;\n            }\n            newTail.next = next;\n            prev = newTail;\n        }\n    }\n}\n```\n\n**关键点：**\n- 先检查是否有 k 个\n- 翻转区间内链表\n- 连接前后段\n\n**执行步骤：**\n1. 检查是否有 k 个节点\n1. 翻转这 k 个\n1. 连接前段和后段\n1. prev 移到当前段的末尾\n\n\n## ⚠️ 易错点\n\n- 翻转前的\"数够不够 K 个\"这步不能省。如果不检查就直接翻转，最后不足 K 个的组也会被翻转，答案就错了。\n- 翻转之后，`head` 变成了这组的最后一个节点，它的 `next` 必须接上后面递归/迭代的返回值，否则链表在这里就断了。\n- 迭代版本中，翻转一组时 `prev` 初始值应该是什么？是 `prevGroup`（前一组的尾/虚拟头），不是 `null`。如果写成 `null`，翻转后第一个节点会指向 `null` 而不是前一组，链表就断了。\n\n- 不足 k 个不翻转\n\n- 翻转后要正确连接前后段\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，每个节点最多被访问两次（一次数够不够，一次翻转）。\n- 空间复杂度：`O(n/k)`（递归版本），递归深度为组数。迭代版本是 `O(1)`。\n\n## 🏢 实际业务应用\n\n- **大数据分批处理**：Apache Spark、Flink 在处理流式数据时，经常按固定大小的 batch 分组处理，每组内部可能需要倒序回放（比如时间窗口内的日志要按时间从新到旧展示），分组翻转的逻辑和本题一致。\n- **消息队列的消费确认**：Kafka、RabbitMQ 在消费消息时，支持按
