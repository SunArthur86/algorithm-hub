找右边第一个比它大的元素\"。用单调栈存下标，保持栈中温度单调递减。新温度进来时，只要比栈顶高就弹出栈顶并计算间隔天数。每元素最多进出栈一次，`O(n)`。\n\n## 💻 Java 题解\n\n### 解法 1：单调递减栈\n\n栈存索引，栈内温度递减。遇到比栈顶高的温度时弹出，计算天数差。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int[] dailyTemperatures(int[] temperatures) {\n        int n = temperatures.length;\n        int[] result = new int[n];\n        Deque\u003cInteger\u003e stack = new ArrayDeque\u003c\u003e();\n        for (int i = 0; i \u003c n; i++) {\n            while (!stack.isEmpty() \u0026\u0026 temperatures[i] \u003e temperatures[stack.peek()]) {\n                int idx = stack.pop();\n                result[idx] = i - idx;\n            }\n            stack.push(i);\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 单调递减栈\n- 遇到更高温弹出\n- 天数差 = 当前索引 - 弹出索引\n\n**执行步骤：**\n1. 遍历每天温度\n1. 比栈顶高时弹出计算天数差\n1. 当前索引入栈\n\n\n## ⚠️ 易错点\n\n1. **栈里存下标不是温度值**\n   因为要算间隔天数 `i - idx`。\n\n2. **维护的是递减栈**\n   栈顶是最近还没找到更高温度的那天。\n\n3. **比较条件是严格小于**\n   相等不算\"更高\"，用 `\u003c` 不是 `\u003c=`。\n\n4. **栈里剩余元素答案保持 0**\n   它们右边已没有更高温度。\n\n- 栈存索引不是温度值\n\n- 用while不是if\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`\n- 空间复杂度：`O(n)`\n\n## 🏢 实际业务应用\n\n1. **价格上涨等待时间**\n   对每个时点求后面第一个更高价格的间隔。\n   典型系统：**量化行情分析系统**。\n\n2. **资源峰值监控**\n   计算某个监控点后多久遇到更高负载。\n   典型系统：**基础设施监控平台**。\n\n3. **用户活跃度趋势检测**\n   判断某天之后多久出现更高活跃峰值。\n   典型系统：**增长分析看板**。\n\n1. **价格上涨等待时间**\n   对每个时点求后面第一个更高价格的间隔。\n   典型系统：**量化行情分析系统**。\n\n2. **资源峰值监控**\n   计算某个监控点后多久遇到更高负载。\n   典型系统：**基础设施监控平台**。\n\n3. **用户活跃度趋势检测**\n   判断某天之后多久出现更高活跃峰值。\n   典型系统：**增长分析看板**。\n\n## 📖 形象类比\n\n| 算法元素 | 名著角色/设定 | 对应含义 |\n|---|---|---|\n| 栈中旧日气温 | 等待机会的将领 | 还没等到更好消息 |\n| 新温度到来 | 捷报传来 | 一到就解决一批等待者 |\n| 弹栈 | 领命出战 | 找到了\"下一更大\" |\n| 间隔天数 | 等候时长 | 从等待到兑现经历多少天 |\n\n| 算法元素 | 名著角色/设定 | 对应含义 |\n|---|---|---|\n| 栈中旧日气温 | 等待机会的将领 | 还没等到更好消息 |\n| 新温度到来 | 捷报传来 | 一到就解决一批等待者 |\n| 弹栈 | 领命出战 | 找到了\"下一更大\" |\n| 间隔天数 | 等候时长 | 从等待到兑现经历多少天 |\n\n森林气象站里，小兔每天记录温度，最关心\"还要等几天才会更暖和\"。猫头鹰爷爷让它准备一个\"等待名单\"，把还没等到更暖天的日期压进去。每当新的一天更暖和，就把名单里比它低的那些天一口气划掉，记下等待天数。这样一遍走完，每一天要等多久就全知道了。\n\n
