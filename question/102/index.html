序遍历\n- 难度：中等\n- 题型：二叉树\n- 为什么选这题：层序遍历（BFS）是树和图中最基础的广度优先搜索模式，几乎所有\"按层处理\"的题目都以此为基础。\n\n## 🧠 思考路径\n\n层序遍历的核心是 BFS（广度优先搜索），用队列来实现。\n\n关键点：如何区分不同层？有两种方式：\n\n1. **记录每层的节点数**：进入每层前，先获取当前队列长度 `size`，然后只弹出 `size` 个节点。这 `size` 个节点就是这一层的所有节点。\n2. **用 `null` 做分隔符**：每层之间插入一个 `null` 标记。\n\n方式 1 更常见也更简洁。每次处理完一层的所有节点后，这一层节点的所有孩子恰好都被加入了队列，正好是下一层的全部节点。\n\n## 💻 Java 题解\n\n### 解法 1：BFS 队列\n\n用队列逐层处理。每轮记录当前层大小，全部弹出后进入下一层。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cInteger\u003e\u003e levelOrder(TreeNode root) {\n        List\u003cList\u003cInteger\u003e\u003e result = new ArrayList\u003c\u003e();\n        if (root == null) return result;\n        Queue\u003cTreeNode\u003e q = new LinkedList\u003c\u003e();\n        q.offer(root);\n        while (!q.isEmpty()) {\n            int size = q.size();\n            List\u003cInteger\u003e level = new ArrayList\u003c\u003e();\n            for (int i = 0; i \u003c size; i++) {\n                TreeNode node = q.poll();\n                level.add(node.val);\n                if (node.left != null) q.offer(node.left);\n                if (node.right != null) q.offer(node.right);\n            }\n            result.add(level);\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 每层先记录 size 再处理\n- size 固定确保每层分离\n\n**执行步骤：**\n1. 根节点入队\n1. 记录当前层 size\n1. 弹出 size 个节点加入 level\n1. 子节点入队\n\n\n## ⚠️ 易错点\n\n- `size = len(queue)` 必须在内层循环之前获取。如果在内层循环中用 `len(queue)` 判断，队列长度会动态变化，导致层和层混在一起。\n- 根节点为空时直接返回空列表，不要入队。\n- Python 中用 `deque` 的 `popleft()` 而不是 `list.pop(0)`，后者是 `O(n)` 的。\n- 每一层的节点列表是新建的，不要复用同一个列表对象。\n\n- 不记录 size 会导致层混在一起\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点入队出队各一次。\n- 空间复杂度：`O(n)`。队列最多存储一层节点，完美二叉树最后一层有 `n/2` 个节点。\n\n## 🏢 实际业务应用\n\n- 组织架构层级展示：企业通讯录按层级（CEO→VP→Manager→Staff）展示，本质就是树的层序遍历。\n- 社交网络的好友推荐：BFS 按层搜索，第一层是一度好友，第二层是二度好友，依次推荐。\n- 游戏中的回合制战斗：每回合（层）处理所有角色的行动，用队列管理行动顺序。\n- 任务调度系统：按优先级层级分发任务，同一优先级的任务在一轮中全部处理完再进入下一轮。\n\n- 组织架构层级展示：企业通讯录按层级（CEO→VP→Manager→Staff）展示，本质就是树的层序遍历。\n- 社交网络的好友推荐：BF
