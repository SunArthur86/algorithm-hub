O(n²)`。数组一长，就会慢得很明显。\n\n这时要换个角度想。假设我现在看到一个数 `x`，那我真正想知道的不是\"它能和谁配\"，而是\"我还缺一个 `target - x`\"。如果我能很快知道\"前面有没有出现过这个缺的数\"，那就不用回头把所有数再翻一遍。\n\n这正是哈希表擅长的事。我们一边遍历数组，一边把已经见过的数记到哈希表里。每来一个新数，就先查它的补数在不在表里；在，就直接得到答案；不在，再把自己存进去。\n\n所以这题的关键词不是\"找两数\"，而是\"把找搭档这件事，变成一次哈希查询\"。\n\n## 💻 Java 题解\n\n### 解法 1：哈希表一次遍历（最优）\n\n边遍历边查哈希表。对每个元素 nums[i]，检查 target - nums[i] 是否已在表中。如果在，直接返回；不在则将当前元素存入表中。这样不会用到自己（因为存入发生在检查之后）。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int[] twoSum(int[] nums, int target) {\n        Map\u003cInteger, Integer\u003e map = new HashMap\u003c\u003e();\n        for (int i = 0; i \u003c nums.length; i++) {\n            int complement = target - nums[i];\n            if (map.containsKey(complement)) {\n                return new int[]{map.get(complement), i};\n            }\n            map.put(nums[i], i);\n        }\n        return new int[0]; // 题目保证有解，不会执行到这\n    }\n}\n```\n\n**关键点：**\n- 一次遍历完成\n- 先查再存避免用到自己\n- HashMap 查找 O(1)\n\n**执行步骤：**\n1. 初始化空 HashMap\n1. 遍历每个元素 nums[i]\n1. 计算 complement = target - nums[i]\n1. 若 complement 在 map 中，返回结果\n1. 否则将 nums[i]:i 存入 map\n\n\n### 解法 2：暴力双重循环\n\n枚举所有两两组合，检查和是否等于 target。简单直观但效率低。\n\n- ⏱ 时间复杂度：`O(n²)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int[] twoSum(int[] nums, int target) {\n        for (int i = 0; i \u003c nums.length; i++) {\n            for (int j = i + 1; j \u003c nums.length; j++) {\n                if (nums[i] + nums[j] == target) {\n                    return new int[]{i, j};\n                }\n            }\n        }\n        return new int[0];\n    }\n}\n```\n\n**关键点：**\n- 最简单的思路\n- 无需额外空间\n- 大数据量超时\n\n**执行步骤：**\n1. 外层循环 i 从 0 到 n-1\n1. 内层循环 j 从 i+1 到 n-1\n1. 检查 nums[i]+nums[j]==target\n\n\n## ⚠️ 易错点\n\n- 不要先把当前数放进哈希表，再查补数。否则在 `target = 2 × num` 的情况下，可能会把自己和自己配对。\n- 哈希表里存的是\"数值 → 下标\"，不是\"下标 → 数值\"。\n- 题目返回的是下标，不是两个数本身。\n\n- 不要先存完再查——会导致可能用到自己\n\n- 注意返回的是索引不是值\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个数只遍历一次，哈希查询平均是 `O(1)`。\n- 空间复杂度：`O(n)`。最坏情况下，需要把所有数都记进哈希表。\n\n##
