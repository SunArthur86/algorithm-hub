：它是\"双堆\"技巧的代表作，用一个最大堆和一个最小堆把数据流一分为二，中位数在堆顶直接取。\n\n## 🧠 思考路径\n\n如果每次都排序，`addNum` 是 O(n log n)，太慢。如果用有序数据结构（如平衡 BST），复杂度可以，但实现复杂。\n\n最优雅的方案是双堆：一个大顶堆存较小的一半，一个小顶堆存较大的一半。保持两个堆大小差不超过 1，中位数就是较大的那个堆顶或两个堆顶的平均。\n\n添加元素时：先和大顶堆顶比较，小的放大顶堆，大的放小顶堆。然后平衡两个堆的大小。\n\n所以这题的关键词不是\"排序找中间\"，而是\"大顶堆装左半、小顶堆装右半，中位数在堆顶\"。\n\n## 💻 Java 题解\n\n### 解法 1：双堆（大顶+小顶）\n\n大顶堆存较小的一半，小顶堆存较大的一半。两堆大小差不超过1。大顶堆可以多一个。\n\n- ⏱ 时间复杂度：`O(log n) add`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass MedianFinder {\n    PriorityQueue\u003cInteger\u003e left;  // 大顶堆（较小的一半）\n    PriorityQueue\u003cInteger\u003e right; // 小顶堆（较大的一半）\n    public MedianFinder() {\n        left = new PriorityQueue\u003c\u003e(Collections.reverseOrder());\n        right = new PriorityQueue\u003c\u003e();\n    }\n    public void addNum(int num) {\n        left.offer(num);\n        right.offer(left.poll()); // 先放大顶堆，再把大顶堆最大值移到小顶堆\n        if (left.size() \u003c right.size()) left.offer(right.poll()); // 平衡\n    }\n    public double findMedian() {\n        return left.size() \u003e right.size() ? left.peek() : (left.peek() + right.peek()) / 2.0;\n    }\n}\n```\n\n**关键点：**\n- left大顶堆存较小半，right小顶堆存较大半\n- 先入left→移到right→平衡回left\n- left可以多一个\n\n**执行步骤：**\n1. 新元素先入left\n1. left.poll移到right\n1. 若left少则right.poll移回left\n1. 中位数看堆顶\n\n\n## ⚠️ 易错点\n\n- Python 的 `heapq` 是小顶堆，大顶堆用存负数来模拟。\n- 平衡时注意方向：大顶堆多出来的移到小顶堆，小顶堆多出来的移到大顶堆。\n- 取中位数时注意整数除法和浮点除法的区别。\n\n- 平衡条件：left.size() \u003e= right.size()\n\n- addNum的三步操作顺序不能错\n\n## 📊 复杂度分析\n\n- 时间复杂度：`addNum` 为 `O(log n)`，`findMedian` 为 `O(1)`。\n- 空间复杂度：`O(n)`。\n\n## 🏢 实际业务应用\n\n- 实时监控系统：持续接收传感器数据，实时计算中位数来反映系统当前状态。\n- 金融交易系统：实时计算股票价格的中位数，过滤极端值的影响。\n- 在线评测系统：实时统计用户分数的中位数，反映整体水平。\n\n- 实时监控系统：持续接收传感器数据，实时计算中位数来反映系统当前状态。\n- 金融交易系统：实时计算股票价格的中位数，过滤极端值的影响。\n- 在线评测系统：实时统计用户分数的中位数，反映整体水平。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里宋江按武力值把好汉分成两队。\n\n宋江把武力值较低的一半好汉放在左营（大顶堆，武力值最高的是队长），较高的一半放在右营（小顶堆，武力值最低的是队长）。每次新来一个好汉，先和左营队长比，弱的放左营，强的放右营。然后看两营人数差太多就调人。中位数就是两营队长的中间值。\n\n对应关系是：\n\n- \"大顶堆\"对应左营（武力值低的半边，队长最强）\n- \"小顶堆\"对应右营（武力值高的半边，队长最弱）\n- \"堆顶\"对应两营的队长\n- \"平衡\"对应调人保持两营人数差不超过 1\n\n这段记忆的关键是：两个堆各管一半，中位数在两个堆顶之间。\n\n可以把它类比成《水浒传》里宋江按武力值把好汉分成两队。\n\n宋江把武力值较低的一半好汉放在左营（大顶堆，武力值最高的是队长），较高的一半放在右营（小顶堆，武力值最低的是队长）。每次新来一个好汉，先和左营队长比，弱的放左营，强的放右营。然后看两营人数差太多就调人。中位数就是两营队长的中间值。\n\n对应关系是：\n\n- \"大顶堆\"对应左营（武力值低的半边，队长最强）\n- \"小顶堆\"对应右营（武力值高的半边，队长最弱）\n- \"堆顶\"对应两营的队长\n- \"平衡\"对应调人保持两营人数差不超过 1\n\n这段记忆的关键是：两个堆各管一半，中位数在两个堆顶之间。\n\n小兔子把收集到的松果按重量分成两堆：轻的一堆最重的在最上面（大顶堆），重的一堆最轻的在最上面（小顶堆）。每次新来一颗松果，和轻堆最上面的比：轻的放轻堆，重的放重堆。两堆数量差太多就移一颗过去。中位数就是两堆最上面那颗的中间值。\n\n小兔子把收集到的松果按重量分成两堆：轻的一堆最重的在最上面（大顶堆），重的一堆最轻的在最上面（小顶堆）。每次新来一颗松果，和轻堆最上面的比：轻的放轻堆，重的放重堆。两堆数量差太多就移一颗过去。中位数就是两堆最上面那颗的中间值。\n\n## 🎵 记忆口诀\n\n大顶堆装左半小顶堆装右半，中位数在堆顶取。\n\n大顶堆装左半小顶堆装右半，中位数在堆顶取。\n\n## 🔗 延伸练习\n\n- `480. 滑动窗口中位数`：加上窗口限制，需要在双堆基础上支持删除操作。\n- `703. 数据流中的第 K 大元素`：只用一个小顶堆就能解决。\n\n- `480. 滑动窗口中位数`：加上窗口限制，需要在双堆基础上支持删除操作。\n- `703. 数据流中的第 K 大元素`：只用一个小顶堆就能解决。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⛰️\"}],295,\". \",\"数据流的中位数\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0295\",\"lcId\":295,\"slug\":\"find-median-from-data-stream\",\"title\":\"数据流的中位数\",\"question\":\"数据流的中位数\",\"answer\":\"$e\",\"difficulty\":\"Hard\",\"category\":\"heap\",\"categories\":[\"heap\"],\"tags\":[\"设计\",\"双指针\",\"数据流\",\"排序\",\"堆\"],\"url\":\"https://leetcode.cn/problems/find-median-from-data-stream/\",\"planOrder\":76,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"设计一个数据结构，支持两种操作：`addNum(num)` 添加一个数字，`findMedian()` 返回当前所有数字的中位数。数据流中的数字数量最大为 10^5。  重点不在\\\"怎么排序找中位数\\\"，\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem
