就往前看它最后出现在哪里。但这样每个字母都要回溯，效率不高。\n\n换一个角度：先做一遍预处理，记录每个字母最后出现在哪个位置。这一步 `O(n)` 搞定。\n\n然后再从头遍历，维护一个\"当前片段的右边界\"。每走到一个字符，就把右边界更新为\"这个字符最后出现位置\"和\"当前右边界\"中更大的那个。当遍历到了右边界时，说明当前片段里所有字母的最后一次出现都在这个位置或之前了——可以切一刀。\n\n这就是贪心：在能切的地方尽量切，每次切都保证当前片段是合法的最短片段。\n\n## 💻 Java 题解\n\n### 解法 1：贪心（记录最后位置）\n\n先记录每个字母最后出现位置。遍历时维护当前片段的结束边界，到达边界时切割。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public List\u003cInteger\u003e partitionLabels(String s) {\n        int[] last = new int[26];\n        for (int i = 0; i \u003c s.length(); i++) last[s.charAt(i) - 'a'] = i;\n        List\u003cInteger\u003e result = new ArrayList\u003c\u003e();\n        int start = 0, end = 0;\n        for (int i = 0; i \u003c s.length(); i++) {\n            end = Math.max(end, last[s.charAt(i) - 'a']);\n            if (i == end) { result.add(end - start + 1); start = i + 1; }\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 先记录每个字母最后出现位置\n- end=max(end, last[char])\n- i==end时切割\n\n**执行步骤：**\n1. 预记录最后位置\n1. 遍历更新end\n1. 到达end切割\n\n\n## ⚠️ 易错点\n\n- 必须先完成\"记录最后位置\"的预处理，再开始分段。如果边遍历边分，可能会漏掉后面出现的同字母。\n- 判断\"可以切一刀\"的条件是 `i == end`，不是 `last[c] == i`。因为 `end` 是当前片段内所有字母的最后位置的最大值。\n- 每次切完要更新 `start`，否则片段长度会算错。\n\n- 必须先遍历一次记录所有最后位置\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。两遍扫描，每遍都是线性的。\n- 空间复杂度：`O(1)`。只有 26 个字母，最后位置数组大小固定。\n\n## 🏢 实际业务应用\n\n- 视频编辑软件（如 Adobe Premiere Pro）在进行场景检测时，需要根据镜头内容的连续性把视频分成片段——和本题\"根据字母的最后出现来切分\"逻辑类似。\n- 微服务架构中的事务边界划分：当一组操作涉及多个服务时，需要确定哪些操作可以放在同一个本地事务中（同一片段），哪些必须跨事务——类似于判断数据依赖关系的最远边界。\n- 日志系统的分段压缩（如 Kafka 的 Log Segment）：根据消息的 key 分布确定分段点，保证同一个 key 的消息落在同一段内，便于快速检索。\n\n- 视频编辑软件（如 Adobe Premiere Pro）在进行场景检测时，需要根据镜头内容的连续性把视频分成片段——和本题\"根据字母的最后出现来切分\"逻辑类似。\n- 微服务架构中的事务边界划分：当一组操作涉及多个服务时，需要确定哪些操作可以放在同一个本地事务中（同一片段），哪些必须跨事务——类似于判断数据依赖关系的最远边界。\n- 日志系统的分段压缩（如 Kafka 的 Log Segment）：根据消息的 key 分布确定分段点，保证同一个 key 的消息落在同一段内，便于快速检索。\n\n## 📖 形象类比\n\n可以类比为《水浒传》里梁山泊分寨的过程。\n\n宋江要把一百零八将分到不同的山寨。规则是：如果两个人之间有任何联系（比如师徒、同乡），就必须分到同一个山寨。为了尽量多分几个山寨（减少每个山寨的管理压力），宋江先摸清了每个人\"关联链\"的最远端——相当于本题里每个字母最后出现的位置。然后按顺序安排，一旦当
