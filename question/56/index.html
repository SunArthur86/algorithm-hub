新区间可能又要和之前的比较，搞不清楚顺序。\n\n关键观察：如果按起点从小到大排序，重叠的区间一定会相邻。排序后从左到右扫描，拿\"当前区间\"和\"结果里最后一个区间\"比较：如果当前起点 \u003c= 上一条的终点，说明有重叠，合并（更新终点为两者终点的较大值）；否则，没有重叠，把当前区间直接加入结果。\n\n排序保证了\"前面的区间终点一定 \u003c= 后面的区间终点\"吗？不一定，但排序后前面的起点一定 \u003c= 后面的起点，所以只需看终点即可。\n\n## 💻 Java 题解\n\n### 解法 1：排序 + 合并\n\n按区间起点排序。遍历时如果当前区间起点\u003c=上一个的终点，合并；否则新增。\n\n- ⏱ 时间复杂度：`O(n log n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int[][] merge(int[][] intervals) {\n        Arrays.sort(intervals, (a, b) -\u003e a[0] - b[0]);\n        List\u003cint[]\u003e result = new ArrayList\u003c\u003e();\n        for (int[] interval : intervals) {\n            if (!result.isEmpty() \u0026\u0026 interval[0] \u003c= result.get(result.size()-1)[1])\n                result.get(result.size()-1)[1] = Math.max(result.get(result.size()-1)[1], interval[1]);\n            else\n                result.add(interval);\n        }\n        return result.toArray(new int[0][]);\n    }\n}\n```\n\n**关键点：**\n- 按起点排序\n- 重叠条件：当前start\u003c=上一end\n- 合并时取较大的end\n\n**执行步骤：**\n1. 按起点排序\n1. 遍历比较与前一个的终点\n1. 重叠则合并，否则新增\n\n\n## ⚠️ 易错点\n\n- 必须先排序！不排序就直接扫描，会漏掉不相邻的重叠区间。\n- 合并时终点要取 `max`，不是简单替换：比如 `[1, 5]` 和 `[2, 3]` 重叠，合并后是 `[1, 5]`，不是 `[1, 3]`。\n- 题目说\"首尾相接也算重叠\"：`[1, 4]` 和 `[4, 5]` 要合并成 `[1, 5]`，判断条件是 `\u003c=`，不是 `\u003c`。\n\n- 合并时要更新end为max不是覆盖\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n log n)`。排序占主导，扫描是 `O(n)`。\n- 空间复杂度：`O(n)`。最坏情况所有区间都不重叠，结果数组大小为 `n`（不算排序的额外空间）。\n\n## 🏢 实际业务应用\n\n- 日历系统的空闲时段计算：多个会议时间段可能有重叠，合并后得到\"被占用的时间段\"，再取反就是空闲时段。Google Calendar、Outlook 都在做这件事。\n- 网络安全中的 IP 段合并：防火墙规则可能包含大量重叠的 IP 范围，合并后减少规则数量，提升匹配效率。\n- 版本控制系统中的冲突范围：多人编辑同一文件时，合并各人的修改区间，找出所有冲突区域。\n- 物流系统的配送时间窗口合并：多个订单的配送时间窗口可能重叠，合并后统一安排一趟配送。\n\n- 日历系统的空闲时段计算：多个会议时间段可能有重叠，合并后得到\"被占用的时间段\"，再取反就是空闲时段。Google Calendar、Outlook 都在做这件事。\n- 网络安全中的 IP 段合并：防火墙规则可能包含大量重叠的 IP 范围，合并后减少规则数量，提升匹配效率。\n- 版本控制系统中的冲突范围：多人编辑同一文件时，合并各人的修改区间，找出所有冲突区域。\n- 物流系统的配送时间窗口合并：多个订单的配送时间窗口可能重叠，合并后统一安排一趟配送。\n\n## 📖 形象类比\n\n《红楼梦》中，王熙凤管理大观园的工程进度，多支施工队各自报上了自己的施工时间段。有些队伍的工期有重叠，需要合并成一个大工期来统筹安排。\n\n对应关系：\n\n- \"区间\"对应\"施工
