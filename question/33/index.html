n- 为什么选这题：它是二分查找的经典变体——数组不再全局有序，而是被旋转过，需要先判断哪一半有序再决定搜索方向，是掌握\"二分不是只能用在排好序的数组上\"的关键题。\n\n## 🧠 思考路径\n\n普通的二分查找要求整个数组有序，但现在数组被\"折了一下\"，变成了两段有序的区间。\n\n关键观察：虽然整体无序，但取中点 `mid` 之后，左半边和右半边**必然有一半是有序的**。这是因为旋转点只有一个，它最多破坏了一半的有序性。\n\n所以每次二分时，先判断左半边 `[left, mid]` 是否有序（条件是 `nums[left] \u003c= nums[mid]`）。如果有序，再看 `target` 是否落在这个有序区间里，是就在左半边找，否则去右半边。如果左半边无序，那右半边一定有序，同理判断 `target` 是否在右半边。\n\n这样每次都能排除一半，仍然是 `O(log n)`。\n\n## 💻 Java 题解\n\n### 解法 1：二分（判断有序半段）\n\n每次二分时，判断左半还是右半有序。然后判断target是否在有序的那一半里。\n\n- ⏱ 时间复杂度：`O(log n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int search(int[] nums, int target) {\n        int left = 0, right = nums.length - 1;\n        while (left \u003c= right) {\n            int mid = left + (right - left) / 2;\n            if (nums[mid] == target) return mid;\n            // 左半有序\n            if (nums[left] \u003c= nums[mid]) {\n                if (target \u003e= nums[left] \u0026\u0026 target \u003c nums[mid]) right = mid - 1;\n                else left = mid + 1;\n            }\n            // 右半有序\n            else {\n                if (target \u003e nums[mid] \u0026\u0026 target \u003c= nums[right]) left = mid + 1;\n                else right = mid - 1;\n            }\n        }\n        return -1;\n    }\n}\n```\n\n**关键点：**\n- nums[left]\u003c=nums[mid] 判断左半有序\n- target在有序半段则搜该半\n- 否则搜另一半\n\n**执行步骤：**\n1. 二分mid\n1. 判断哪半有序\n1. 判断target在哪个范围\n1. 缩小搜索范围\n\n\n## ⚠️ 易错点\n\n- 判断左半边有序时用 `nums[left] \u003c= nums[mid]`，注意是 `\u003c=` 不是 `\u003c`，因为当 `left == mid` 时（区间只剩两个元素），左半边只有一个元素，也算有序。\n- 判断 `target` 在哪个范围时，边界条件要写清楚：左半边是 `nums[left] \u003c= target \u003c nums[mid]`，右半边是 `nums[mid] \u003c target \u003c= nums[right]`，注意哪边包含等号。\n- 不要忘了找不到时返回 `-1`。\n\n- nums[left]\u003c=nums[mid] 用\u003c=处理left==mid的情况\n\n- 边界用\u003e=和\u003c=\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(log n)`。每次排除一半，标准二分。\n- 空间复杂度：`O(1)`。只用了几个指针变量。\n\n## 🏢 实际业务应用\n\n- 日志系统中按时间戳搜索，但日志文件可能因为时钟回拨或日志轮转导致时间戳不是严格递增的，形成\"旋转\"结构，需要这种先判断有序区间再二分的方法。\n- CDN 缓存的环形缓冲区查找：环形缓冲区的数据逻辑上是排序的，但在物理存储上被\"旋转\"了，查找某个版
