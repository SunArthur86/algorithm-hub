衡 BST\"的基础题，\"取中间元素当根\"的分治策略简洁优美，也是后续红黑树、AVL 树等平衡操作的起点。\n\n## 🧠 思考路径\n\n数组已经是有序的，而 BST 的中序遍历正好是有序序列。关键是怎么保证平衡。\n\n要平衡，就要让左右子树的节点数尽量接近。最自然的做法是取数组的中间元素作为根，这样左半部分和右半部分的元素数量最多差 1。\n\n递归分治：\n1. 取 `nums[mid]` 作为根节点。\n2. `nums[left..mid-1]` 递归构造左子树。\n3. `nums[mid+1..right]` 递归构造右子树。\n4. `left \u003e right` 时返回空节点。\n\n中间元素的选择：`mid = (left + right) // 2`（偶数时偏左）或 `mid = (left + right + 1) // 2`（偏右）。两种都能构造出合法的平衡 BST，只是形状可能不同。题目说\"答案不唯一\"，任选一种即可。\n\n## 💻 Java 题解\n\n### 解法 1：分治（取中点为根）\n\n每次取数组中间元素作为当前根，左半部分递归构建左子树，右半部分构建右子树。这样保证平衡。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(log n)`\n\n```java\nclass Solution {\n    public TreeNode sortedArrayToBST(int[] nums) {\n        return build(nums, 0, nums.length - 1);\n    }\n    private TreeNode build(int[] nums, int left, int right) {\n        if (left \u003e right) return null;\n        int mid = left + (right - left) / 2;\n        TreeNode root = new TreeNode(nums[mid]);\n        root.left = build(nums, left, mid - 1);\n        root.right = build(nums, mid + 1, right);\n        return root;\n    }\n}\n```\n\n**关键点：**\n- 中点为根保证平衡\n- 左半→左子树，右半→右子树\n- mid = left + (right-left)/2 防溢出\n\n**执行步骤：**\n1. 取中点为根\n1. 递归构建左子树\n1. 递归构建右子树\n\n\n## ⚠️ 易错点\n\n- `mid = left + (right - left) / 2` 可以防止整数溢出（虽然 Python 不存在这个问题，但 Java 中是良好习惯）。\n- 左子树的范围是 `[left, mid-1]`，右子树是 `[mid+1, right]`，`mid` 本身已经用作根了，不要重复包含。\n- 答案不唯一：选偏左的中间还是偏右的中间都行，LeetCode 接受任何合法的平衡 BST。\n- 不要忘记 `left \u003e right` 的终止条件，否则会无限递归。\n\n- mid = left + (right-left)/2 防止整数溢出\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个元素恰好被访问一次作为某个节点的值。\n- 空间复杂度：`O(log n)`。递归栈深度等于树的高度 `O(log n)`（因为树是平衡的）。\n\n## 🏢 实际业务应用\n\n- 数据库索引构建：从有序的数据批量构建平衡 BST 索引（如 B 树的批量加载），比逐个插入快得多。\n- 游戏排行榜的平衡存储：将排序后的玩家分数列表转化为平衡 BST，支持快速的范围查询（如\"找出前 100 名\"）。\n- 折半查找的数据结构化：二分查找用数组实现，但如果数据需要频繁插入删除，先转成平衡 BST 更灵活。\n- 时间线数据的层级展示：将按时间排序的事件列表转化为平衡树结构，便于按时间范围查询和展示。\n\n- 数据库索引构建：从有序的数据批量构建平衡 BST 索引（如 B 树的批量加载），比逐个插入快得多。\n- 游戏排行榜的平衡存储：将排序后的玩家分数列表转化为平衡 BST，支持快速的范围查询（如\"找出前 100 名\"）。\n- 折半查找的数据结构化：二分查找用数组实现，但如果数据需要频繁插入删除，先转成平衡 BST 更灵活。\n- 时间线数据的层级展示：将按时间排序的事
