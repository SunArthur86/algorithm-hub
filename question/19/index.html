做法是先遍历一遍算出链表长度 `L`，然后再遍历到第 `L-n` 个结点删掉。需要两遍遍历。\n\n用快慢指针可以一遍搞定：快指针先走 `n` 步，然后快慢指针同时走。当快指针到达链表末尾时，慢指针刚好停在倒数第 `n+1` 个位置（待删除节点的前一个），直接跳过待删除节点即可。\n\n关键细节：用哨兵节点（dummy head）指向头结点，这样删除头结点的边界情况和删除中间节点用同一套逻辑处理。\n\n## 💻 Java 题解\n\n### 解法 1：快慢指针 + dummy\n\n快指针先走 n 步，然后快慢同时走。快指针到 null 时，慢指针的 next 就是要删除的。用 dummy 处理删头节点的情况。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public ListNode removeNthFromEnd(ListNode head, int n) {\n        ListNode dummy = new ListNode(0, head);\n        ListNode fast = dummy, slow = dummy;\n        for (int i = 0; i \u003c n; i++) fast = fast.next;\n        while (fast.next != null) { fast = fast.next; slow = slow.next; }\n        slow.next = slow.next.next;\n        return dummy.next;\n    }\n}\n```\n\n**关键点：**\n- dummy 处理删除头节点\n- fast 先走 n 步\n- fast.next!=null 条件让 slow 停在被删节点前一个\n\n**执行步骤：**\n1. dummy 指向 head\n1. fast 先走 n 步\n1. fast 和 slow 同时走直到 fast.next=null\n1. 删除 slow.next\n\n\n## ⚠️ 易错点\n\n- 必须用哨兵节点。否则删除头结点时（即倒数第 `L` 个），`slow` 没有前驱节点可以操作。\n- 快指针先走 `n` 步，不是 `n-1` 步。因为我们要让 `slow` 停在待删除节点的前一个位置。\n- `n` 保证是合法的（1 ≤ n ≤ 链表长度），不需要额外检查。\n\n- 不用 dummy 时删除头节点会出错\n\n- fast 先走 n 步不是 n+1 步\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(L)`。`L` 是链表长度，一遍遍历。\n- 空间复杂度：`O(1)`。\n\n## 🏢 实际业务应用\n\n- 日志裁剪：保留最近 N 条日志，删除倒数第 N 条之前的旧记录。\n- 缓存链维护：在 LRU 缓存中，删除链表中特定位置的节点。\n- 消息队列管理：从消息链表中移除特定位置的过期消息。\n\n- 日志裁剪：保留最近 N 条日志，删除倒数第 N 条之前的旧记录。\n- 缓存链维护：在 LRU 缓存中，删除链表中特定位置的节点。\n- 消息队列管理：从消息链表中移除特定位置的过期消息。\n\n## 📖 形象类比\n\n可以类比《西游记》里唐僧在行军队伍中传令的场景。\n\n唐僧站在队伍前面，让孙悟空先往前跑 `n` 步，然后两人同时往前走。当孙悟空跑到队伍末尾时，唐僧刚好站在要被调走的那位和尚的前一个人旁边。他传令让前面的人跳过这个和尚，和后面的人直接牵手。\n\n对应关系是：\n\n- \"行军队伍\"对应链表\n- \"先跑 n 步的孙悟空\"对应快指针\n- \"同时走的唐僧\"对应慢指针\n- \"跳过这个和尚\"对应 `slow.next = slow.next.next`\n\n记忆的关键是：快先走 n 步，然后同步走，快到尾慢就在目标前。\n\n可以类比《西游记》里唐僧在行军队伍中传令的场景。\n\n唐僧站在队伍前面，让孙悟空先往前跑 `n` 步，然后两人同时往前走。当孙悟空跑到队伍末尾时，唐僧刚好站在要被调走的那位和尚的前一个人旁边。他传令让前面的人跳过这个和尚，和后面的人直接牵手。\n\n对应关系是：\n\n- \"行军队伍\"对应链表\n- \"先跑 n 步的孙悟空\"对应快指针\n- \"同时走的唐僧\"对应慢指针\n- \"跳过这个和尚\"对应 `slow.next = slow.next.next`\n\n记忆的关键是：快先走 n 步，然后同步走，快到尾慢就在目标前。\n\n一排小蚂蚁扛着食物排
