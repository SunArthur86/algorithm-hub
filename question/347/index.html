用哈希表，遍历一遍数组就能得到每个元素的出现次数。\n\n问题变成：从一堆\"元素→频率\"的键值对中，找出频率最高的 k 个。\n\n方法一：全部排序。按频率从高到低排序，取前 k 个。时间 `O(n log n)`，简单但不是最优。\n\n方法二：用堆（优先队列）。维护一个大小为 k 的最小堆。遍历所有频率对，把当前元素加入堆；如果堆的大小超过 k，就把堆顶（频率最小的）弹出去。遍历结束后，堆里剩下的就是频率最高的 k 个。时间 `O(n log k)`，当 k 远小于 n 时优势明显。\n\n方法三：桶排序。频率最大不会超过 n，所以建 n+1 个桶，第 i 个桶放所有频率为 i 的元素。从高频率桶往低频率桶收集，收集够 k 个就停。时间 `O(n)`，但空间开销大一些。\n\n这里给堆解法，因为它最通用、面试最常考。\n\n## 💻 Java 题解\n\n### 解法 1：频率Map + 小顶堆\n\n统计频率后，用大小K的小顶堆按频率排序，保留频率最高的K个。\n\n- ⏱ 时间复杂度：`O(n log k)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int[] topKFrequent(int[] nums, int k) {\n        Map\u003cInteger, Integer\u003e freq = new HashMap\u003c\u003e();\n        for (int n : nums) freq.merge(n, 1, Integer::sum);\n        PriorityQueue\u003cint[]\u003e pq = new PriorityQueue\u003c\u003e((a, b) -\u003e a[1] - b[1]);\n        for (var entry : freq.entrySet()) {\n            pq.offer(new int[]{entry.getKey(), entry.getValue()});\n            if (pq.size() \u003e k) pq.poll();\n        }\n        int[] result = new int[k];\n        for (int i = 0; i \u003c k; i++) result[i] = pq.poll()[0];\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 先统计频率\n- 小顶堆按频率排序\n- 堆大小K保留最高频\n\n**执行步骤：**\n1. 统计频率\n1. 入小顶堆（按频率）\n1. 保留K个\n1. 返回堆中元素\n\n\n## ⚠️ 易错点\n\n- 堆的类型一定要是最小堆（默认就是），不是最大堆。因为我们要\"淘汰频率最小的\"。\n- Java 中 PriorityQueue 默认就是最小堆，比较器 `freq.get(a) - freq.get(b)` 是升序。\n- 返回的是元素值，不是频率值。\n- 题目保证答案唯一，不需要处理频率相同的情况。\n\n- Comparator比较频率不是值\n\n- 堆中存[val, freq]对\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n log k)`。统计频率 `O(n)`，堆操作最多 n 次，每次 `O(log k)`。\n- 空间复杂度：`O(n)`。哈希表存频率 `O(n)`，堆最多 `O(k)`。\n\n## 🏢 实际业务应用\n\n- 搜索引擎热搜榜（百度热搜、微博热搜）：从海量搜索词中实时提取 Top K 热词，用的就是\"哈希计数 + 小顶堆\"这套。\n- 推荐系统热门商品（淘宝\"猜你喜欢\"）：统计商品点击频率，取 Top K 作为热门推荐。\n- 日志分析中的异常检测（ELK Stack）：统计错误码出现频率，频率最高的 k 个错误码优先排查。\n\n- 搜索引擎热搜榜（百度热搜、微博热搜）：从海量搜索词中实时提取 Top K 热词，用的就是\"哈希计数 + 小顶堆\"这套。\n- 推荐系统热门商品（淘宝\"猜你喜欢\"）：统计商品点击频率，取 Top K 作为热门推荐。\n- 日志分析中的异常检测（ELK Stack）：统计错误码出现频率，频率最高的 k 个错误码优先排查。\n\n## 📖 形象类比\n\n可以类比《三国演义》里曹操评选\"功劳最大的几位将军\"。\n\n曹操手下将领众多，每次战役都有战功记录。他让人把所有战功汇总成\"每人总功劳簿
