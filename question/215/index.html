题，必须拿下。\n\n## 🧠 思考路径\n\n最直接的想法，是把数组排序后取第 `k` 个。时间复杂度 `O(n log n)`，能用但不够优雅。\n\n更好的想法是用\"最小堆\"维护前 `k` 个最大的元素。建一个大小为 `k` 的最小堆，堆顶是当前最小的元素。遍历数组时，如果当前元素比堆顶大，就替换堆顶（弹出小的，推入大的）。遍历结束后，堆顶就是第 `k` 大的元素。\n\n为什么用最小堆而不是最大堆？因为我们要保留前 `k` 个最大的，堆顶是最小的那个\"守门员\"——只有比它大的才能进来，进来之后它继续守门。\n\n时间复杂度是 `O(n log k)`，当 `k \u003c\u003c n` 时远优于排序。空间复杂度 `O(k)`。\n\n还有一个更快的算法：快速选择（QuickSelect），基于快排的分区思想，平均 `O(n)`，但最坏 `O(n²)`。\n\n这题的关键词不是\"排序取第 k 个\"，而是\"用最小堆当守门员，只留前 k 大\"。\n\n## 💻 Java 题解\n\n### 解法 1：小顶堆（大小K）\n\n维护大小为K的小顶堆。堆满后新元素比堆顶大就替换。最终堆顶即第K大。\n\n- ⏱ 时间复杂度：`O(n log k)`\n- 💾 空间复杂度：`O(k)`\n\n```java\nclass Solution {\n    public int findKthLargest(int[] nums, int k) {\n        PriorityQueue\u003cInteger\u003e pq = new PriorityQueue\u003c\u003e();\n        for (int num : nums) {\n            pq.offer(num);\n            if (pq.size() \u003e k) pq.poll();\n        }\n        return pq.peek();\n    }\n}\n```\n\n**关键点：**\n- 小顶堆大小K\n- 堆顶是K个中最小的=第K大\n- pq.size()\u003ek 弹出堆顶\n\n**执行步骤：**\n1. 遍历每个元素入堆\n1. 堆超过k弹出最小\n1. 返回堆顶\n\n\n### 解法 2：快速选择（Hoare）\n\n类似快排的partition，每次只递归包含第K大的一侧。平均O(n)。\n\n- ⏱ 时间复杂度：`O(n) avg`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int findKthLargest(int[] nums, int k) {\n        return quickSelect(nums, 0, nums.length - 1, k);\n    }\n    private int quickSelect(int[] nums, int lo, int hi, int k) {\n        int pivot = nums[lo], i = lo + 1, j = hi;\n        while (i \u003c= j) {\n            if (nums[i] \u003c pivot \u0026\u0026 nums[j] \u003e pivot) swap(nums, i++, j--);\n            if (nums[i] \u003e= pivot) i++;\n            if (nums[j] \u003c= pivot) j--;\n        }\n        swap(nums, lo, j);\n        if (j == k - 1) return nums[j];\n        return j \u003c k - 1 ? quickSelect(nums, j + 1, hi, k) : quickSelect(nums, lo, j - 1, k);\n    }\n    private void swap(int[] nums, int i, int j) { int t = nums[i]; nums[i] = nums[j]; nums[j] = t; }\n}\n```\n\n**关键点：**\n- partition只递归一侧\n- 降序排列，找第K大=k-1位置\n- 平均O(n)\n\n**执行步骤：**\n1. partition选pivot\n1. 判断pivot位置\n1. 只递归目标侧\n\n\n## ⚠️ 易错点\n\n- 是\"第 k 大\"不是\"第 k 小\"。第 1 大就是最大值，第 `n` 大就是最小值。\n- 最小堆的堆顶是最小值，是\"前 k 大中最小的那个\"——恰好就是第 k 大。\n- `heapreplace` 是先弹出再推入，比分开调用 `heappop` + `heappush` 更高效。\n- 快速选择法平均 `O(n)` 但最坏 `O(n²)`，面试时两种方法都要会。\n\n- 第K大对应降序索引k-1\n\n- 快速选择最坏O(n²)，随机化pivot可优化\n\n## 📊 复杂度分析\n\n- 时间复杂度：堆法 `O(n log k)`；快速选择法平均 `O(n)`，最坏 `O(n²)`。\n- 空间复杂度：堆法 `O(k)`；快速选择法 `O(1)`（原地分区）。\n\n## 🏢 实际业务应用\n\n- 推荐系统的 Top-N 排行榜：从海量内容中选出评分最高的 N 个，用最小堆维护候选集。\n- 实时监控系统的高延迟请求筛选：持续接收请求延迟数据，找出第 K 大的延迟值作为告警阈值。\n- 流式数据的 Top-K 频繁项：日志分析中找出出现频率最高的 K 个错误码，堆是标准数据结构。\n\n- 推荐系统的 Top-N 排行榜：从海量内容中选出评分最高的 N 个，用最小堆维护候选集。\n- 实时监控系统的高延迟请求筛选：持续接收请求延迟数据，找出第 K 大的延迟值作为告警阈值。\n- 流式数据的 Top-K 频繁项：日志分析中找出出现频率最高的 K 个错误码，堆是标准数据结构。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊选\"第 K 把交椅\"的过程。\n\n宋江在门口设了一个\"守门官\"（最小堆的堆顶），只有比守门官厉害的好汉才能入座。一开始让前 K 个好汉坐好，其中最弱的那个就是守门官。之后每来一个新好汉，如果比守门官弱就直接让他走；如果比守门官强，就把守门官请出去，新好汉坐进来，再从剩下的人里选出新的守门官（堆自动调整）。最后坐在交椅上最弱的那个，就是第 K 把交椅的主人。\n\n对应关系是：\n\n- \"数组元素\"对应来应聘的好汉\n- \"大小为 k 的最小堆\"对应 K 把交椅\n- \"堆顶\"对应守门官（当前最弱的好汉）\n- \"替换堆顶\"对应新好汉比守门官强就替换\n- \"最终堆顶\"对应第 K 把交椅\n\n这段记忆的关键是：不需要知道所有人谁最厉害，只需要守住 K 个名额，不断淘汰最弱的。\n\n可以把它类比成《水浒传》里梁山泊选\"第 K 把交椅\"的过程。\n\n宋江在门口设了一个\"守门官\"（最小堆的堆顶），只有比守门官厉害的好汉才能入座。一开始让前 K 个好汉坐好，其中最弱的那个就是守门官。之后每来一个新好汉，如果比守门官弱就直接让他走；如果比守门官强，就把守门官请出去，新好汉坐进来，再从剩下的人里选出新的守门官（堆自动调整）。最后坐在交椅上最弱的那个，就是第 K 把交椅的主人。\n\n对应关系是：\n\n- \"数组元素\"对应来应聘的好汉\n- \"大小为 k 的最小堆\"对应 K 把交椅\n- \"堆顶\"对应守门官（当前最弱的好汉）\n- \"替换堆顶\"对应新好汉比守门官强就替换\n- \"最终堆顶\"对应第 K 把交椅\n\n这段记忆的关键是：不需要知道所有人谁最厉害，只需要守住 K 个名额，不断淘汰最弱的。\n\n小猴子要选出力气最大的 K 只动物来搬最大的石头。他在门口放了一块\"门槛石\"（最小堆的堆顶），只有举得起比门槛石更重的动物才能进候选圈。每进一只，门槛石就自动调整为当前候选圈里最轻的那块。等所有动物都试过了，门槛石上的重量就是\"第 K 大\"的力气值。\n\n小猴子要选出力气最大的 K 只动物来搬最大的石头。他在门口放了一块\"门槛石\"（最小堆的堆顶），只有举得起比门槛石更重的动物才能进候选圈。每进一只，门槛石就自动调整为当前候选圈里最轻的那块。等所有动物都试过了，门槛石上的重量就是\"第 K 大\"的力气值。\n\n## 🎵 记忆口诀\n\n最小堆当守门员，比它大的才能进。\n\n最小堆当守门员，比它大的才能进。\n\n## 🔗 延伸练习\n\n- `347. 前 K 个高频元素`：Top-K 的变体，比的是频率而不是数值大小。\n- `703. 数据流中的第 K 大元素`：本题的动态版，数据持续流入，需要实时维护第 K 大。\n\n- `347. 前 K 个高频元素`：Top-K 的变体，比的是频率而不是数值大小。\n- `703. 数据流中的第 K 大元素`：本题的动态版，数据持续流入，需要实时维护第 K 大。"])</script><script>self.__next_f.p
