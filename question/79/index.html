子，从每个起始格子出发做 DFS。每一步检查四个方向，如果相邻格子的字母匹配下一个字符，就继续深入。为了防止重复使用同一个格子，在访问后临时标记为已访问（比如改成 `#`），递归返回后再恢复。\n\n这是一个典型的\"尝试-标记-递归-回溯-恢复\"流程。匹配成功就立即返回 `true`，不需要继续搜索。\n\n## 💻 Java 题解\n\n### 解法 1：DFS + 回溯\n\n遍历每个格子作为起点，DFS匹配单词。用visited或原地修改标记已访问。\n\n- ⏱ 时间复杂度：`O(m×n×3^L)`\n- 💾 空间复杂度：`O(L)`\n\n```java\nclass Solution {\n    public boolean exist(char[][] board, String word) {\n        for (int i = 0; i \u003c board.length; i++)\n            for (int j = 0; j \u003c board[0].length; j++)\n                if (dfs(board, word, 0, i, j)) return true;\n        return false;\n    }\n    private boolean dfs(char[][] board, String word, int idx, int i, int j) {\n        if (idx == word.length()) return true;\n        if (i \u003c 0 || i \u003e= board.length || j \u003c 0 || j \u003e= board[0].length || board[i][j] != word.charAt(idx))\n            return false;\n        char temp = board[i][j];\n        board[i][j] = '#'; // 标记\n        boolean found = dfs(board, word, idx+1, i+1, j) || dfs(board, word, idx+1, i-1, j)\n                     || dfs(board, word, idx+1, i, j+1) || dfs(board, word, idx+1, i, j-1);\n        board[i][j] = temp; // 恢复\n        return found;\n    }\n}\n```\n\n**关键点：**\n- 原地修改board标记访问\n- 四个方向DFS\n- 匹配失败恢复board\n\n**执行步骤：**\n1. 每个格子作为起点尝试\n1. 匹配第一个字符\n1. DFS四个方向\n1. 回溯恢复\n\n\n## ⚠️ 易错点\n\n- 标记和恢复必须成对出现，否则后续搜索会受影响。\n- 边界检查要在访问数组之前做，否则会越界。\n- 可以加一个优化：统计 `board` 和 `word` 的字符频率，如果 `board` 中某字符不够，直接返回 `false`。或者从字符频率更少的方向开始搜索（正序 vs 倒序）。\n\n- board[i][j]='#' 要恢复，否则影响其他路径\n\n- 先检查board[i][j]!=word[idx]\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n × 4^L)`，其中 `L` 是 `word` 的长度。每个格子可能作为起点，每次 DFS 最多 4 个方向，深度为 `L`。\n- 空间复杂度：`O(L)`，递归栈深度最多 `L`。\n\n## 🏢 实际业务应用\n\n- 手机游戏\"单词消消乐\"的核心逻辑：在字母网格中搜索有效单词，路径不能交叉。\n- 导航系统的路径可行性检查：在网格地图中判断从 A 到 B 是否存在满足约束条件的路径。\n- OCR 后处理中的文字区域验证：识别出的文字块是否在二维布局中形成合理的连续区域。\n- 机器人路径规划中的可达性判断：机器人在网格环境中能否沿合法路径到达目标位置。\n\n- 手机游戏\"单词消消乐\"的核心逻辑：在字母网格中搜索有效单词，路径不能交叉。\n- 导航系统的路径可行性检查：在网格地图中判断从 A 到 B 是否存在满足约束条件的路径。\n- OCR 后处理中的文字区域验证：识别出的文字块是否在二维布局中形成合理的连续区域。\n- 机器人路径规划中的可达性判断：机器人
