度：中等\n- 题型：二分查找\n- 为什么选这题：它展示了二分查找不只能找\"某个值\"，还能找\"转折点\"，是二分思维的扩展。\n\n## 🧠 思考路径\n\n暴力遍历是 O(n)，但题目说数组本质是有序的，只是被旋转了一下。我们能不能利用这个有序性？\n\n观察旋转数组的特征：它被分成了两段，每段内部都是升序的，但第二段的起点就是最小值。如果拿中间元素和右端点比：\n\n- `nums[mid] \u003e nums[right]`：mid 在左半段，最小值在 mid 右边。\n- `nums[mid] \u003c= nums[right]`：mid 在右半段（或刚好是最小值），最小值在 mid 或它左边。\n\n这样每次都能把搜索范围缩小一半，这就是标准二分的变体。\n\n所以这题的关键词不是\"找最小值\"，而是\"和右端点比较，判断最小值在哪一侧\"。\n\n## 💻 Java 题解\n\n### 解法 1：二分（与右端比较）\n\n每次与nums[right]比较。nums[mid]\u003enums[right]→最小在右半(left=mid+1)，否则在左半(right=mid)。\n\n- ⏱ 时间复杂度：`O(log n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int findMin(int[] nums) {\n        int left = 0, right = nums.length - 1;\n        while (left \u003c right) {\n            int mid = left + (right - left) / 2;\n            if (nums[mid] \u003e nums[right]) left = mid + 1;\n            else right = mid;\n        }\n        return nums[left];\n    }\n}\n```\n\n**关键点：**\n- 与nums[right]比较不是nums[left]\n- right=mid 不是 mid-1（mid可能是答案）\n- 循环条件 left\u003cright\n\n**执行步骤：**\n1. 二分\n1. nums[mid]\u003enums[right]→left=mid+1\n1. 否则right=mid\n1. 返回nums[left]\n\n\n## ⚠️ 易错点\n\n- 循环条件是 `left \u003c right`，不是 `left \u003c= right`，否则可能死循环。\n- 当 `nums[mid] \u003c= nums[right]` 时，`right = mid`（不是 `mid - 1`），因为 mid 本身可能就是最小值。\n- 这题和右端点比较，不是和左端点比较。和左端点比较的逻辑不同，容易写错。\n\n- right=mid不是mid-1因为mid可能就是最小值\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(log n)`。每次折半。\n- 空间复杂度：`O(1)`。\n\n## 🏢 实际业务应用\n\n- 时间序列数据的异常检测：传感器数据按时间排序，设备重启后时间戳回绕，形成类似\"旋转\"的数据，找转折点就是找重启时刻。\n- 循环缓冲区的起点定位：日志系统用环形缓冲区存储，读取时需要找到最早的那条记录。\n- 股票价格周期分析：某些周期性波动数据在取模后呈现旋转排序特征，定位最小值对应周期的起始点。\n\n- 时间序列数据的异常检测：传感器数据按时间排序，设备重启后时间戳回绕，形成类似\"旋转\"的数据，找转折点就是找重启时刻。\n- 循环缓冲区的起点定位：日志系统用环形缓冲区存储，读取时需要找到最早的那条记录。\n- 股票价格周期分析：某些周期性波动数据在取模后呈现旋转排序特征，定位最小值对应周期的起始点。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山好汉排座次后被打乱的场景。\n\n宋江让人按武功排名站成一圈，但有一天大家外出回来后顺序打乱了——排名高的站在前面，排名低的站在后面，但中间有个断点，最低排名的就在那个断点处。吴用站在圈外，每次看中间的人和最后一个人比武功：如果中间的比最后的高，说明断点还在后面；如果中间的比最后的低或一样，说明断点就在这一半。\n\n对应关系是：\n\n- \"武功排名\"对应数组值\n- \"断点处\"对应最小值（旋转点）\n- \"中间和最后一个比\"对应 `nums[mid]` vs `nums[right]`\n- \"断点在后面/前面\"对应 `left = mid + 1` / `right = mid`\n\n这段记忆的关键是：和最后一个比，就能判断断点在哪一侧。\n\n可以把它类比成《水浒传》里梁山好汉排座次后被打乱的场景。\n\n宋江让人按武功排名站成一圈，但有一天大家外出回来后顺序打乱了——排名高的站在前面，排名低的站在后面，但中间有个断点，最低排名的就在那个断点处。吴用站在圈外，每次看中间的人和最后一个人比武功：如果中间的比最后的高，说明断点还在后面；如果中间的比最后的低或一样，说明断点就在这一半。\n\n对应关系是：\n\n- \"武功排名\"对应数组值\n- \"断点处\"对应最小值（旋转点）\n- \"中间和最后一个比\"对应 `nums[mid]` vs `nums[right]`\n- \"断点在后面/前面\"对应 `left = mid + 1` / `right = mid`\n\n这段记忆的关键是：和最后一个比，就能判断断点在哪一侧。\n\n小松鼠把按大小排好的松果摆成一排，但不小心被碰倒了，前面的大松果滚到了后面，形成两段：前段大、后段小。小松鼠每次拿起中间那颗和最后那颗比：如果中间的比最后的大，说明最小的还在右边；如果中间的比较小，说明最小就在这一段。每比一次范围缩一半，很快找到最小的那颗。\n\n小松鼠把按大小排好的松果摆成一排，但不小心被碰倒了，前面的大松果滚到了后面，形成两段：前段大、后段小。小松鼠每次拿起中间那颗和最后那颗比：如果中间的比最后的大，说明最小的还在右边；如果中间的比较小，说明最小就在这一段。每比一次范围缩一半，很快找到最小的那颗。\n\n## 🎵 记忆口诀\n\n中间比右边，大则右找，小则左边留。\n\n中间比右边，大则右找，小则左边留。\n\n## 🔗 延伸练习\n\n- `33. 搜索旋转排序数组`：在旋转数组中找特定值，而非最小值，二分的判断条件更复杂。\n- `154. 寻找旋转排序数组中的最小值 II`：允许重复元素，需要额外处理 `nums[mid] == nums[right]` 的情况。\n\n- `33. 搜索旋转排序数组`：在旋转数组中找特定值，而非最小值，二分的判断条件更复杂。\n- `154. 寻找旋转排序数组中的最小值 II`：允许重复元素，需要额外处理 `nums[mid] == nums[right]` 的情况。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🔍\"}],153,\". \",\"寻找旋转排序数组中的最小值\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0153\",\"lcId\":153,\"slug\":\"find-minimum-in-rotated-sorted-array\",\"title\":\"寻找旋转排序数组中的最小值\",\"question\":\"寻找旋转排序数组中的最小值\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"binary-search\",\"categories\":[\"binary-search\"],\"tags\":[\"数组\",\"二分查找\"],\"url\":\"https://leetcode.cn/problems/find-minimum-in-rotated-sorted-array/\",\"planOrder\":67,
