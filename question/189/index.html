 思考路径\n\n暴力法：每次把最后一个元素移到最前面，重复 k 次。时间 `O(n × k)`，太慢。\n\n三次反转法：观察轮转后的结果，前 `k` 个元素是原数组末尾的 `k` 个元素，后面是原数组前面的 `n - k` 个元素。所以：\n\n1. 反转整个数组。\n2. 反转前 `k` 个元素。\n3. 反转后 `n - k` 个元素。\n\n为什么有效？第一步反转后，原来的\"末尾 k 个\"变成了\"前 k 个\"，但顺序反了。第二步把它们再反转回来，顺序就对了。第三步同理处理后 `n - k` 个。\n\n## 💻 Java 题解\n\n### 解法 1：三次翻转（最优）\n\n先翻转整个数组，再翻转前 k 个，再翻转后 n-k 个。k 需取模。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public void rotate(int[] nums, int k) {\n        k %= nums.length;\n        reverse(nums, 0, nums.length - 1);\n        reverse(nums, 0, k - 1);\n        reverse(nums, k, nums.length - 1);\n    }\n    private void reverse(int[] nums, int l, int r) {\n        while (l \u003c r) {\n            int t = nums[l]; nums[l] = nums[r]; nums[r] = t;\n            l++; r--;\n        }\n    }\n}\n```\n\n**关键点：**\n- k %= n 处理 k\u003en\n- 三次翻转：全翻+前k翻+后n-k翻\n- O(1) 空间\n\n**执行步骤：**\n1. k 取模\n1. 翻转整个数组\n1. 翻转前 k 个\n1. 翻转剩余部分\n\n\n## ⚠️ 易错点\n\n- 必须先 `k %= n`，否则 `k` 可能大于数组长度。\n- 三次反转的顺序和区间不能搞错：先整体，再前 k，再后 n-k。\n- 反转函数的参数是闭区间 `[l, r]`。\n\n- 忘记 k %= nums.length\n\n- 翻转的边界不要搞错\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，每个元素最多被交换两次。\n- 空间复杂度：`O(1)`，原地操作。\n\n## 🏢 实际业务应用\n\n- 循环队列的底层数组轮转操作。\n- 时间序列数据的滚动窗口：定期把最新的数据\"轮转\"到数组头部。\n- 游戏中玩家列表的轮转（比如\"下一个玩家\"的循环切换）。\n\n- 循环队列的底层数组轮转操作。\n- 时间序列数据的滚动窗口：定期把最新的数据\"轮转\"到数组头部。\n- 游戏中玩家列表的轮转（比如\"下一个玩家\"的循环切换）。\n\n## 📖 形象类比\n\n可以类比成《西游记》里取经团队的轮值安排。\n\n唐僧师徒四人加上白龙马，每天由不同的人负责值夜。轮转 k 次意味着\"从名单末尾调 k 个人到前面\"。唐僧的做法是：先让所有人掉头站（整体反转），然后前 k 个人再转回来站好，后面的人也转回来站好。两次转身后，轮转完成。\n\n对应关系是：\n\n- \"所有人掉头站\"对应整体反转\n- \"前 k 个人转回来\"对应反转前 k 个\n- \"后面的人转回来\"对应反转后 n-k 个\n\n这段记忆的关键是：整体反转 + 两段分别反转 = 轮转。\n\n可以类比成《西游记》里取经团队的轮值安排。\n\n唐僧师徒四人加上白龙马，每天由不同的人负责值夜。轮转 k 次意味着\"从名单末尾调 k 个人到前面\"。唐僧的做法是：先让所有人掉头站（整体反转），然后前 k 个人再转回来站好，后面的人也转回来站好。两次转身后，轮转完成。\n\n对应关系是：\n\n- \"所有人掉头站\"对应整体反转\n- \"前 k 个人转回来\"对应反转前 k 个\n- \"后面的人转回来\"对应反转后 n-k 个\n\n这段记忆的关键是：整体反转 + 两段分别反转 = 轮转。\n\n小蚂蚁们排成一列搬食物。猫头鹰喊：\"后面的 k 只蚂蚁到前面去！\"蚂蚁们集体掉头，然后前 k 只再转回来，后面的也转回来。三次转身后，后面的 k 只已经到了前面。\n\n小蚂蚁们排成一列搬食物。猫头鹰喊：\"后面的 k 只蚂蚁到前面去！\"蚂蚁们集体掉头，然后前 k 只再转回来，
