其中一个链表走完，把另一个链表剩余部分直接接上。\n\n可以用迭代或递归两种方式实现。递归更简洁：每次选较小的头节点，它的 `next` 指向剩余部分的合并结果。\n\n## 💻 Java 题解\n\n### 解法 1：迭代 + dummy 节点\n\n创建 dummy 头节点，逐个比较两个链表的节点，较小的接到结果链表后面。\n\n- ⏱ 时间复杂度：`O(m+n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public ListNode mergeTwoLists(ListNode list1, ListNode list2) {\n        ListNode dummy = new ListNode(0), tail = dummy;\n        while (list1 != null \u0026\u0026 list2 != null) {\n            if (list1.val \u003c= list2.val) { tail.next = list1; list1 = list1.next; }\n            else { tail.next = list2; list2 = list2.next; }\n            tail = tail.next;\n        }\n        tail.next = list1 != null ? list1 : list2;\n        return dummy.next;\n    }\n}\n```\n\n**关键点：**\n- dummy 节点简化头节点处理\n- 比较值小的先接\n- 剩余部分直接拼接\n\n**执行步骤：**\n1. 创建 dummy 头\n1. 比较两个链表当前节点\n1. 较小的接到 tail 后面\n1. 剩余直接拼接\n\n\n## ⚠️ 易错点\n\n- 用哨兵节点避免处理\"第一个节点接谁\"的边界情况。\n- 某个链表走完后，另一个链表剩余部分直接接上即可，不需要逐个节点处理。\n- 递归版本要注意栈深度，链表很长时可能栈溢出。\n\n- 忘记 dummy 节点导致头节点处理复杂\n\n- 剩余链表直接接上不用再遍历\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m + n)`。两个链表各遍历一次。\n- 空间复杂度：迭代 `O(1)`，递归 `O(m + n)`（栈空间）。\n\n## 🏢 实际业务应用\n\n- 有序数据流合并：两个有序的消息队列、日志流合并成一个有序流，用于实时数据分析。\n- 归并排序的核心操作：归并排序的\"归并\"步骤就是把两个有序子数组合并成一个，逻辑与此题完全一致。\n- 数据库有序索引合并：两个有序索引段的合并查询，底层就是链表/数组的有序合并。\n\n- 有序数据流合并：两个有序的消息队列、日志流合并成一个有序流，用于实时数据分析。\n- 归并排序的核心操作：归并排序的\"归并\"步骤就是把两个有序子数组合并成一个，逻辑与此题完全一致。\n- 数据库有序索引合并：两个有序索引段的合并查询，底层就是链表/数组的有序合并。\n\n## 📖 形象类比\n\n可以类比《红楼梦》里两份名册按序并档的场景。\n\n王熙凤有两份按姓氏笔画排序的名册，要把它们合成一份。她左右手各指一份名册的第一行，每次比较两行的笔画数，笔画少的先抄到新名册上。一份抄完了，另一份剩下的直接照抄过去。\n\n对应关系是：\n\n- \"两份名册\"对应两个有序链表\n- \"比较笔画数\"对应比较节点值\n- \"笔画少的先抄\"对应较小的先接入结果\n- \"剩下的直接照抄\"对应剩余部分直接接上\n\n记忆的关键是：两头比大小，小的先接走。\n\n可以类比《红楼梦》里两份名册按序并档的场景。\n\n王熙凤有两份按姓氏笔画排序的名册，要把它们合成一份。她左右手各指一份名册的第一行，每次比较两行的笔画数，笔画少的先抄到新名册上。一份抄完了，另一份剩下的直接照抄过去。\n\n对应关系是：\n\n- \"两份名册\"对应两个有序链表\n- \"比较笔画数\"对应比较节点值\n- \"笔画少的先抄\"对应较小的先接入结果\n- \"剩下的直接照抄\"对应剩余部分直接接上\n\n记忆的关键是：两头比大小，小的先接走。\n\n两排小蚂蚁各扛着一颗按大小排好序的果子，小鹿要把它们合成一排。它看看两排最前面哪颗更小，更小的那颗先放到新队列里。一排拿完了，另一排剩下的直接排在后面。\n\n两排小蚂蚁各扛着一颗按大小排好序的果子，小鹿要把它们合成一排。它看看两排最前面哪颗更小，更小的那颗先放到新队列里。一排拿
