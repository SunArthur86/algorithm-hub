n\n## 🧠 思考路径\n\n一棵树的最大深度 = 1（根节点本身）+ max(左子树的最大深度, 右子树的最大深度)。\n\n如果节点为空，深度为 0。这就是递归的全部逻辑。\n\n也可以用 BFS（层序遍历），数一共有多少层就是最大深度。但递归写法更简洁，也更符合直觉。\n\n## 💻 Java 题解\n\n### 解法 1：DFS 递归\n\n树的深度 = max(左子树深度, 右子树深度) + 1。空节点深度为0。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public int maxDepth(TreeNode root) {\n        if (root == null) return 0;\n        return 1 + Math.max(maxDepth(root.left), maxDepth(root.right));\n    }\n}\n```\n\n**关键点：**\n- max(left, right) + 1\n- 空节点返回0\n\n**执行步骤：**\n1. 空节点返回0\n1. 递归求左右子树深度\n1. 取最大值+1\n\n\n### 解法 2：BFS 层序遍历\n\n逐层遍历，层数即为深度。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int maxDepth(TreeNode root) {\n        if (root == null) return 0;\n        Queue\u003cTreeNode\u003e q = new LinkedList\u003c\u003e();\n        q.offer(root);\n        int depth = 0;\n        while (!q.isEmpty()) {\n            int size = q.size();\n            depth++;\n            for (int i = 0; i \u003c size; i++) {\n                TreeNode node = q.poll();\n                if (node.left != null) q.offer(node.left);\n                if (node.right != null) q.offer(node.right);\n            }\n        }\n        return depth;\n    }\n}\n```\n\n**关键点：**\n- BFS 逐层计数\n- 每层 size 固定后再处理\n\n**执行步骤：**\n1. 入队根节点\n1. 逐层弹出并计数\n1. 子节点入队\n\n\n## ⚠️ 易错点\n\n- 空树的深度是 0，不是 -1 或 1。根节点单独存在时深度是 1（`0 + 1 = 1`）。\n- BFS 写法中 `depth += 1` 放在外层循环（每层开始时），不是内层循环。\n- 递归法虽然简洁，但极端情况（链状树，`n = 10⁴`）可能导致栈溢出。Python 默认递归深度约 1000，可能需要 `sys.setrecursionlimit`。\n\n- 递归终止条件 root==null 返回0\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点访问一次。\n- 空间复杂度：`O(h)`（递归）或 `O(n)`（BFS）。递归栈深度等于树高。\n\n## 🏢 实际业务应用\n\n- 文件系统目录深度计算：操作系统需要知道目录嵌套的最大深度，用于设置路径长度限制或优化查找策略。\n- DOM 树渲染深度分析：浏览器渲染引擎计算 DOM 树的最大深度，用于性能优化和布局计算。\n- 组织架构层级统计：HR 系统需要知道公司组织架构的最大汇报层级数。\n- 嵌套 JSON 深度检测：API 框架限制请求体的嵌套深度以防止恶意构造的超深 JSON。\n\n- 文件系统目录深度计算：操作系统需要知道目录嵌套的最大深度，用于设置路径长度限制或优化查找策略。\n- DOM 树渲染深度分析：浏览器渲染引擎计算 DOM 树的最大深度，用于性能优化和布局计算。\n- 组织架构层级统计：HR 系统需要知道公司组织架构的最大汇报层级数。\n- 嵌套 JSON 深度检测：API 框架限制请求体的嵌套深度以防止恶意构造的超深
