栈，遇到右括号就检查栈顶是否是对应的左括号：是就弹出，不是就不合法。最后栈为空说明所有括号都配对了。\n\n## 💻 Java 题解\n\n### 解法 1：栈\n\n遍历字符串，左括号入栈，右括号弹出栈顶检查是否匹配。最后栈必须为空。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public boolean isValid(String s) {\n        Deque\u003cCharacter\u003e stack = new ArrayDeque\u003c\u003e();\n        Map\u003cCharacter, Character\u003e pairs = Map.of(')', '(', ']', '[', '}', '{');\n        for (char c : s.toCharArray()) {\n            if (pairs.containsValue(c)) stack.push(c);\n            else if (pairs.containsKey(c)) {\n                if (stack.isEmpty() || stack.pop() != pairs.get(c)) return false;\n            }\n        }\n        return stack.isEmpty();\n    }\n}\n```\n\n**关键点：**\n- 右括号→左括号的映射\n- 弹出时检查匹配\n- 最后栈为空才有效\n\n**执行步骤：**\n1. 左括号入栈\n1. 右括号弹出栈顶比较\n1. 遍历完栈必须为空\n\n\n## ⚠️ 易错点\n\n- 遇到右括号时栈可能为空（如 `\"]\"`），要先检查栈是否为空再取栈顶。\n- 遍历结束后必须检查栈是否为空。如果有剩余的左括号（如 `\"([\"`），说明没有配对完。\n- 奇数长度的字符串一定不合法，可以提前返回。\n\n- 右括号时栈可能为空\n\n- Map.of 是Java9+特性\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。遍历字符串一次。\n- 空间复杂度：`O(n)`。栈最多存 `n/2` 个左括号。\n\n## 🏢 实际业务应用\n\n- 代码编辑器的语法校验：IDE 实时检测括号是否匹配，标红未闭合的括号。\n- 模板引擎解析：HTML/XML 标签的嵌套检查（`\u003cdiv\u003e...\u003c/div\u003e`）与括号匹配逻辑完全一致。\n- 表达式计算：数学表达式的求值中，括号匹配是第一步。\n- JSON/YAML 解析器：解析嵌套结构时，用栈跟踪当前所在的层级。\n\n- 代码编辑器的语法校验：IDE 实时检测括号是否匹配，标红未闭合的括号。\n- 模板引擎解析：HTML/XML 标签的嵌套检查（`\u003cdiv\u003e...\u003c/div\u003e`）与括号匹配逻辑完全一致。\n- 表达式计算：数学表达式的求值中，括号匹配是第一步。\n- JSON/YAML 解析器：解析嵌套结构时，用栈跟踪当前所在的层级。\n\n## 📖 形象类比\n\n可以类比《红楼梦》里丫鬟整理礼盒的场景。\n\n贾府送来一套套嵌套的礼盒，每个大盒子里面套着小盒子。丫鬟要检查每层盒子是否正确关闭：最里层的盒子先关上，然后关外面的，最外层的最后关。如果关的顺序不对，或者有盒子没关上，就不合格。\n\n对应关系是：\n\n- \"打开的盒子\"对应左括号（入栈）\n- \"关上盒子\"对应右括号（出栈）\n- \"最里层先关\"对应栈的 LIFO 特性\n- \"有盒子没关\"对应栈非空\n\n记忆的关键是：后开先关，栈来匹配。\n\n可以类比《红楼梦》里丫鬟整理礼盒的场景。\n\n贾府送来一套套嵌套的礼盒，每个大盒子里面套着小盒子。丫鬟要检查每层盒子是否正确关闭：最里层的盒子先关上，然后关外面的，最外层的最后关。如果关的顺序不对，或者有盒子没关上，就不合格。\n\n对应关系是：\n\n- \"打开的盒子\"对应左括号（入栈）\n- \"关上盒子\"对应右括号（出栈）\n- \"最里层先关\"对应栈的 LIFO 特性\n- \"有盒子没关\"对应栈非空\n\n记忆的关键是：后开先关，栈来匹配。\n\n小松鼠在森林里找到了一排魔法门，门有三种形状：圆的、方的和花形的。每扇门打开后，必须按相反顺序关上——最后打开的门要最先关上。小松鼠一边走一边记住打开的门，关的时候从最后记住的开始关
