入门题，能帮你建立\"做选择 → 走到底 → 退回来换一条路\"的核心直觉。\n\n## 🧠 思考路径\n\n最直觉的想法：从第一个字符开始，尝试不同长度的切割。切出一段回文子串后，对剩下的部分继续切；如果某一段不是回文，就跳过这种切法。\n\n这个过程天然是一棵决策树：每个位置决定\"在哪里切一刀\"。树的每一层是当前切分的位置，每条路径是一种完整的分割方案。\n\n关键在于：走到某一步时，如果当前的切法已经让某段不是回文了，后面的尝试毫无意义——直接回头。这就是\"回溯\"的精髓：**发现此路不通，立刻掉头，不继续浪费**。\n\n所以这题的关键词不是\"切字符串\"，而是\"在决策树上做深度优先搜索，遇到非法状态就剪枝回退\"。\n\n## 💻 Java 题解\n\n### 解法 1：回溯 + 回文判断\n\n从start遍历end，如果s[start..end]是回文，递归分割end+1后面的部分。\n\n- ⏱ 时间复杂度：`O(n×2ⁿ)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cString\u003e\u003e partition(String s) {\n        List\u003cList\u003cString\u003e\u003e result = new ArrayList\u003c\u003e();\n        backtrack(s, 0, new ArrayList\u003c\u003e(), result);\n        return result;\n    }\n    private void backtrack(String s, int start, List\u003cString\u003e path, List\u003cList\u003cString\u003e\u003e result) {\n        if (start == s.length()) { result.add(new ArrayList\u003c\u003e(path)); return; }\n        for (int end = start; end \u003c s.length(); end++) {\n            if (isPalindrome(s, start, end)) {\n                path.add(s.substring(start, end + 1));\n                backtrack(s, end + 1, path, result);\n                path.remove(path.size() - 1);\n            }\n        }\n    }\n    private boolean isPalindrome(String s, int l, int r) {\n        while (l \u003c r) if (s.charAt(l++) != s.charAt(r--)) return false;\n        return true;\n    }\n}\n```\n\n**关键点：**\n- 遍历所有可能的分割点\n- 只对回文子串递归\n- start==s.length() 收集结果\n\n**执行步骤：**\n1. 从start遍历end\n1. 判断s[start..end]是否回文\n1. 是→递归分割剩余\n1. 回溯\n\n\n## ⚠️ 易错点\n\n- 回溯后别忘了 `pop` 撤销选择，否则路径会越攒越多。\n- 回文判断可以用 `s == s[::-1]` 快速实现，也可以预处理一个二维 DP 表来加速重复查询。\n- 子串范围是 `s[start:end+1]`，注意右端点是闭区间。\n- 收集结果时要拷贝一份 `path[:]`，不能直接加入引用，否则后续 pop 会影响已存结果。\n\n- substring(start, end+1) 注意+1\n\n- 只对回文子串才继续分割\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n · 2ⁿ)`。最坏情况下每个位置都切或不切，有 `2ⁿ` 种分割方案，每种方案需要 `O(n)` 判断回文。\n- 空间复杂度：`O(n)`。递归深度最多 `n` 层，`path` 最多存 `n` 个子串。\n\n## 🏢 实际业务应用\n\n- 文本排版系统中，把一段话按语义断句，每句必须满足某些约束（比如长度限制、关键词
