解\"树上的路径问题\"的关键一步。\n\n## 🧠 思考路径\n\n暴力做法：枚举每个节点作为路径起点，向下 DFS 枚举所有路径，统计和等于 `targetSum` 的数量。时间复杂度 `O(n²)`，对于较大的树会很慢。\n\n优化思路：在数组中，我们用前缀和 + 哈希表来 `O(n)` 解决\"子数组和等于 k\"的问题。树上能不能做同样的事？\n\n可以。在 DFS 遍历树时，维护从根到当前节点的\"路径前缀和\"。对于当前节点，如果存在某个祖先节点的前缀和恰好等于 `当前前缀和 - targetSum`，那么从那个祖先到当前节点的路径和就是 `targetSum`。用哈希表记录每种前缀和出现的次数，就能 `O(1)` 查询。\n\n回溯时要把当前前缀和从哈希表中移除（计数减一），保证不同分支之间不互相干扰。\n\n所以这题的本质是：树上 DFS + 前缀和 + 哈希表。\n\n## 💻 Java 题解\n\n### 解法 1：前缀和 + DFS\n\nDFS过程中用 HashMap 记录前缀和出现次数。对每个节点，查找当前前缀和-target 出现次数。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int pathSum(TreeNode root, int targetSum) {\n        Map\u003cLong, Integer\u003e prefixCount = new HashMap\u003c\u003e();\n        prefixCount.put(0L, 1);\n        return dfs(root, 0, targetSum, prefixCount);\n    }\n    private int dfs(TreeNode node, long currSum, int target, Map\u003cLong, Integer\u003e map) {\n        if (node == null) return 0;\n        currSum += node.val;\n        int count = map.getOrDefault(currSum - target, 0);\n        map.merge(currSum, 1, Integer::sum);\n        count += dfs(node.left, currSum, target, map);\n        count += dfs(node.right, currSum, target, map);\n        map.merge(currSum, -1, Integer::sum); // 回溯\n        return count;\n    }\n}\n```\n\n**关键点：**\n- 前缀和差等于target\n- HashMap记录前缀和频率\n- 回溯时移除当前前缀和\n\n**执行步骤：**\n1. DFS遍历\n1. 累加前缀和\n1. 查找 currSum-target 的出现次数\n1. 回溯移除\n\n\n## ⚠️ 易错点\n\n- 必须初始化 `prefix[0] = 1`，否则从根节点出发的路径无法被统计。\n- 回溯时一定要将前缀和从哈希表中减回，否则左子树的前缀和会影响右子树的计算。\n- 节点值可能为负数，前缀和不单调递增，不能用双指针替代哈希表。\n- Java 中前缀和可能溢出 int 范围，要用 `long` 类型。\n\n- 必须回溯——否则会统计非路径上的前缀和\n\n- 用 long 防溢出\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点访问一次，哈希表查询 `O(1)`。\n- 空间复杂度：`O(n)`。哈希表和递归栈最坏都是 `O(n)`。\n\n## 🏢 实际业务应用\n\n- 金融风控系统（如支付宝、微信支付）检测\"时间窗口内的交易金额总和是否命中阈值\"，本质就是滑动窗口上的前缀和查询。\n- 网络监控系统（如 Datadog、Zabbix）统计\"某段时间内的流量总和是否异常\"，底层也依赖前缀和加速区间查询。\n- 游戏 AI 中的伤害计算，统计\"从某个技能释放时刻到当前时刻的累计伤害\"是否触发了某个阈值技能，用前缀和可以快速计算。\n- 编译器的代码覆盖率分析，统计\"从入口到每个函数的路径覆盖次数\"，也需要类似的路径枚举 + 前缀和技巧。\n\n- 金融风控系统（如支付宝、微信支付）检测\"时间窗口内的交易金额总和
