机链表的复制\n- 难度：中等\n- 题型：链表\n- 为什么选这题：它从普通的链表复制升级为带随机指针的复制，是链表操作和哈希映射的综合训练。\n\n## 🧠 思考路径\n\n如果只有 `next` 指针，顺着走一遍就能复制完。但 `random` 指针可能指向前面的节点——如果那个节点还没创建副本，`random` 就无法设置。\n\n最直觉的做法是用哈希表：第一遍遍历创建所有新节点并存入映射 `原节点 → 新节点`，第二遍遍历设置 `next` 和 `random`，通过查表找到对应的新节点。时间和空间都是 `O(n)`。\n\n还有一道巧妙的 `O(1)` 空间解法：把新节点\"穿插\"在原节点后面。即对每个原节点 `A`，创建新节点 `A'`，让 `A.next = A'`，`A'.next = B`。这样设置 `random` 时，`A'.random = A.random.next`（因为原节点的下一个就是它的副本）。最后再拆开两条链表。\n\n所以这题的关键词不是\"复制链表\"，而是\"用映射保证 random 指向正确的副本\"。\n\n## 💻 Java 题解\n\n### 解法 1：插入复制节点 + 拆分\n\n第一步：在每个节点后插入复制节点。第二步：设置 random 指针（copy.random = original.random.next）。第三步：拆分两个链表。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public Node copyRandomList(Node head) {\n        if (head == null) return null;\n        // 1. 插入复制节点\n        Node curr = head;\n        while (curr != null) {\n            Node copy = new Node(curr.val);\n            copy.next = curr.next;\n            curr.next = copy;\n            curr = copy.next;\n        }\n        // 2. 设置 random\n        curr = head;\n        while (curr != null) {\n            if (curr.random != null) curr.next.random = curr.random.next;\n            curr = curr.next.next;\n        }\n        // 3. 拆分\n        curr = head;\n        Node newHead = head.next;\n        while (curr != null) {\n            Node copy = curr.next;\n            curr.next = copy.next;\n            if (copy.next != null) copy.next = copy.next.next;\n            curr = curr.next;\n        }\n        return newHead;\n    }\n}\n```\n\n**关键点：**\n- 三步走：插入→设置random→拆分\n- O(1) 空间不使用 HashMap\n- copy.random = curr.random.next\n\n**执行步骤：**\n1. 每个节点后插入复制节点\n1. 设置复制节点的 random\n1. 拆分两个链表\n\n\n## ⚠️ 易错点\n\n- 哈希表法中，`mapping.get(cur.next)` 可能返回 `null`（当 `cur.next` 为 null 时），用 `get` 而不是 `getOrDefault` 就行，null 自动处理。\n- 穿插法中，设置 `random` 时要检查 `cur.random != null`，因为 `null` 没有 `next`。\n- 拆链表时，`cur.next = cur.next.next` 恢复原链表，`copyCur.next = cur.next` 提取新链表，两步顺序不能反。\n- 两种方法都能通过，哈希表法更直观，穿插法更省空间。\n\n- random 可能为 null 要检查\n\n- 拆分时注意 copy.next 的更新\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。无论哪种方法都遍历 2-3 次。\n- 空间复杂度：哈希表法 `O(n)`，穿插法 `O(1)`。\n\n## 🏢 实际业务应用\n\n- 深度克隆复杂对象：前端框架中，组件树有父子关系（next）和跨层级引用（random），克隆组件树时需要保证引用拓扑正确。\n- 文档编辑器的复制粘贴：复制一段富文本时，内容之间有锚点引用（类似 random），粘贴后引用必须指向新文档中的对应位置。\n- 数据库的快照机制：克隆一组有外键关联的记录，外键可以跨表（类似 random），需要保证新记录的外键指向新的目标。\n\n- 深度克隆复杂对象：前端框架中，组件树有父子关系（next）和跨层级引用（random），克隆组件树时需要保证引用拓扑正确。\n- 文档编辑器的复制粘贴：复制一段富文本时，内容之间有锚点引用（类似 random），粘贴后引用必须指向新文档中的对应位置。\n- 数据库的快照机制：克隆一组有外键关联的记录，外键可以跨表（类似 random），需要保证新记录的外键指向新的目标。\n\n## 📖 形象类比\n\n可以把它类比成《红楼梦》里贾母安排丫鬟搬新院子。\n\n每个丫鬟有一个\"直属上级\"（next 指针）和一个\"可以随时请教的嬷嬷\"（random 指针）。搬到新院子后，人事关系必须保持不变，但人必须是新招的。王熙凤的方案是：先给每个老丫鬟配一个\"影子替身\"，记在花名册上（哈希表）；然后逐个替身安排直属上级和请教嬷嬷，都通过花名册找到对应的替身。\n\n对应关系是：\n\n- \"老丫鬟\"对应原链表节点\n- \"影子替身\"对应新链表节点\n- \"花名册\"对应哈希表映射\n- \"直属上级\"对应 next 指针\n- \"请教嬷嬷\"对应 random 指针\n- \"通过花名册找替身\"对应查表设置指针\n\n这段记忆的关键是：先建映射再设指针，random 指向的是替身而不是本人。\n\n可以把它类比成《红楼梦》里贾母安排丫鬟搬新院子。\n\n每个丫鬟有一个\"直属上级\"（next 指针）和一个\"可以随时请教的嬷嬷\"（random 指针）。搬到新院子后，人事关系必须保持不变，但人必须是新招的。王熙凤的方案是：先给每个老丫鬟配一个\"影子替身\"，记在花名册上（哈希表）；然后逐个替身安排直属上级和请教嬷嬷，都通过花名册找到对应的替身。\n\n对应关系是：\n\n- \"老丫鬟\"对应原链表节点\n- \"影子替身\"对应新链表节点\n- \"花名册\"对应哈希表映射\n- \"直属上级\"对应 next 指针\n- \"请教嬷嬷\"对应 random 指针\n- \"通过花名册找替身\"对应查表设置指针\n\n这段记忆的关键是：先建映射再设指针，random 指向的是替身而不是本人。\n\n蚂蚁搬家时，每只蚂蚁知道自己下一只跟着谁（next），还认识一只\"好朋友蚂蚁\"可以随时串门（random）。搬到新家后，蚁后给每只老蚂蚁安排一个\"影子蚂蚁\"。影子蚂蚁不认识彼此，但蚁后拿着对照表一一介绍：\"你的邻居是这只影子，你的好朋友是那只影子。\"搬家结束，新蚁群的关系和老蚁群一模一样。\n\n蚂蚁搬家时，每只蚂蚁知道自己下一只跟着谁（next），还认识一只\"好朋友蚂蚁\"可以随时串门（random）。搬到新家后，蚁后给每只老蚂蚁安排一个\"影子蚂蚁\"。影子蚂蚁不认识彼此，但蚁后拿着对照表一一介绍：\"你的邻居是这只影子，你的好朋友是那只影子。\"搬家结束，新蚁群的关系和老蚁群一模一样。\n\n## 🎵 记忆口诀\n\n先建映射再连线，random 查表找替身；穿插法则更省地，拆链恢复两不误。\n\n先建映射再连线，random 查表找替身；穿插法则更省地，拆链恢复两不误。\n\n## 🔗 延伸练习\n\n- `133. 克隆图`：从链表升级到图，random 变成了邻居列表，但核心思路（映射表去重）完全一样。\n- `146. LRU 缓存`：同样是链表 + 哈希表的综合运用，但侧重于缓存淘汰策略。\n\n- `133. 克隆图`：从链表升级到图，random 变成了邻居列表，但核心思路（映射表去重）完全一样。\n- `146. LRU 缓存`：同样是链表 + 哈希表的综合运用，但侧重于缓存淘汰策略。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0
