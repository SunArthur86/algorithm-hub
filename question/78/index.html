，而子集要收集所有长度的路径。也就是说，递归树上的每一个节点都是一个合法结果。\n\n代码模板几乎一样，唯一的不同是：不再等 `len(path) == k` 才收集，而是每进入一层递归就先把当前 `path` 加进结果。\n\n同样可以用\"选或不选\"的视角理解：对于每个元素，要么选它加入子集，要么不选。这形成了一棵二叉决策树，所有从根到叶子的路径就对应所有子集。\n\n## 💻 Java 题解\n\n### 解法 1：回溯（选/不选）\n\n从index开始，每个元素都可以选或不选。每次进入递归先收集当前子集。\n\n- ⏱ 时间复杂度：`O(2ⁿ×n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cInteger\u003e\u003e subsets(int[] nums) {\n        List\u003cList\u003cInteger\u003e\u003e result = new ArrayList\u003c\u003e();\n        backtrack(nums, 0, new ArrayList\u003c\u003e(), result);\n        return result;\n    }\n    private void backtrack(int[] nums, int start, List\u003cInteger\u003e path, List\u003cList\u003cInteger\u003e\u003e result) {\n        result.add(new ArrayList\u003c\u003e(path)); // 每步都收集\n        for (int i = start; i \u003c nums.length; i++) {\n            path.add(nums[i]);\n            backtrack(nums, i + 1, path, result);\n            path.remove(path.size() - 1);\n        }\n    }\n}\n```\n\n**关键点：**\n- 每次进入都收集（包括空集）\n- for循环从start开始避免重复\n- 不需要终止条件——遍历完自然结束\n\n**执行步骤：**\n1. 收集当前path\n1. 从start遍历选下一个元素\n1. 递归+回溯\n\n\n## ⚠️ 易错点\n\n- 收集结果要在循环之前，不是之后。空集 `[]` 也是合法子集，必须收集。\n- 收集时要做深拷贝（`path[:]` 或 `new ArrayList\u003c\u003e(path)`），否则后续的 `pop` 会修改已收集的结果。\n- `start` 参数保证元素的选取顺序是递增的，避免出现 `[2,1]` 和 `[1,2]` 的重复。\n\n- 和全排列不同——for从start开始不是0\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n × 2ⁿ)`，共有 `2ⁿ` 个子集，每个子集平均 `O(n)` 时间拷贝。\n- 空间复杂度：`O(n)`，递归栈深度最多 `n`。\n\n## 🏢 实际业务应用\n\n- 权限系统的角色-权限矩阵：枚举所有权限子集来评估最小权限配置方案。\n- 特征工程中的特征子集选择：从 N 个特征中枚举所有子集，逐一训练模型比较效果（适用于特征数较少的场景）。\n- 购物平台的搭配推荐：从一组商品中枚举所有可能的搭配组合，按用户偏好排序推荐。\n- 配置管理的开关组合：系统有多个功能开关，需要测试所有 `2ⁿ` 种开关组合下系统的行为。\n\n- 权限系统的角色-权限矩阵：枚举所有权限子集来评估最小权限配置方案。\n- 特征工程中的特征子集选择：从 N 个特征中枚举所有子集，逐一训练模型比较效果（适用于特征数较少的场景）。\n- 购物平台的搭配推荐：从一组商品中枚举所有可能的搭配组合，按用户偏好排序推荐。\n- 配置管理的开关组合：系统有多个功能开关，需要测试所有 `2ⁿ` 种开关组合下系统的行为。\n\n## 📖 形象类比\n\n可以类比《水浒传》里梁山泊招安前的军力部署。\n\n宋江手下一百零八将，每次出征不必全员出动。小规模探路只需派两人，中等规模劫法场要十来人，大决战才全员出动。每种不同的出人方案就是一个\"子集\"。吴用负责列举所有可能的组合——每多一个人，方案数就翻一倍，所以 108 人的方案总数是天文数字。实际做题时 `n` 比较小
