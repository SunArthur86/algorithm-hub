路径\n\n最朴素的想法：每次从 K 条链表的当前头节点中，遍历找出最小值，取下来接到结果链表末尾，重复直到所有链表都为空。这样做每找一个节点要比较 K 次，总共 N 个节点，时间复杂度 `O(NK)`，K 大了就很慢。\n\n能不能更快地找到\"当前 K 个头节点中的最小值\"？这就想到了最小堆（优先队列）。把 K 个头节点全扔进堆里，每次弹出的就是全局最小，再把弹出节点的 next 塞回堆里。堆操作是 `O(logK)`，总时间 `O(NlogK)`，大幅优化。\n\n另一种思路是分治：两两合并，像锦标赛一样层层向上。第一轮 K 条变成 K/2 条，第二轮 K/2 变成 K/4 条……总共 `logK` 轮，每轮所有节点参与一次合并，也是 `O(NlogK)`。\n\n两种方法复杂度一样，但堆的写法更直觉，分治的写法更优雅。\n\n## 💻 Java 题解\n\n### 解法 1：小顶堆（优先队列）\n\n把每个链表的头节点放入小顶堆。每次弹出最小的，接到结果后面，然后把它的 next 放入堆。\n\n- ⏱ 时间复杂度：`O(N log k)`\n- 💾 空间复杂度：`O(k)`\n\n```java\nclass Solution {\n    public ListNode mergeKLists(ListNode[] lists) {\n        PriorityQueue\u003cListNode\u003e pq = new PriorityQueue\u003c\u003e((a, b) -\u003e a.val - b.val);\n        for (ListNode l : lists) if (l != null) pq.offer(l);\n        ListNode dummy = new ListNode(0), tail = dummy;\n        while (!pq.isEmpty()) {\n            ListNode node = pq.poll();\n            tail.next = node;\n            tail = tail.next;\n            if (node.next != null) pq.offer(node.next);\n        }\n        return dummy.next;\n    }\n}\n```\n\n**关键点：**\n- 堆中始终有 k 个元素（每个链表一个）\n- 弹出最小→接上→放入 next\n- O(N log k)\n\n**执行步骤：**\n1. 所有头节点入堆\n1. 弹最小节点接到结果\n1. 该节点 next 入堆\n1. 重复直到堆空\n\n\n## ⚠️ 易错点\n\n- Python 的 `heapq` 在元组比较时，如果 `val` 相同会继续比较下一个元素。`ListNode` 不支持比较，会报错。解决办法是在元组中加一个唯一的 `index` 字段来打破平局。\n- 输入的 `lists` 可能包含空链表（`None`/`null`），入堆前必须判空，否则空指针异常。\n- 分治写法里，`left == right` 是递归终止条件，漏掉这一步会无限递归。\n\n- 空链表不要入堆\n\n- Comparator 用 lambda 比较值\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(NlogK)`，其中 N 是所有节点的总数，K 是链表条数。每个节点入堆出堆各一次，每次堆操作 `O(logK)`。\n- 空间复杂度：`O(K)`（堆方案），堆里最多同时存 K 个节点。分治方案的空间是 `O(logK)` 的递归栈深度。\n\n## 🏢 实际业务应用\n\n- **搜索引擎的结果合并**：Google、Bing 等搜索引擎会从多个索引分片（shard）返回各自排好序的结果，汇总层需要把这些有序列表合并成一条统一的排序结果返回给用户，用的就是多路归并。\n- **日志系统的多源聚合**：ELK Stack、Splunk 等日志平台在查询时间范围内的日志时，数据可能分散在多个节点上、各自按时间排序，聚合服务需要多路归并成一条时间有序的日志流。\n- **数据库的 External Sort**：MySQL、PostgreSQL 在处理大数据量的 `ORDER BY` 时，如果数据量超过内存，会先把各块排序成有序的临时文件，最后用多路归并合并这些有序段。\n- **音视频播放器的多字幕/多音轨同步**：VLC、FFmpeg 在处理多路字幕流或音频流时，需要按时间戳将多路有序流合并成统一的输出时间线。\n\n-
