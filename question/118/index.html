题几乎不需要复杂的思考——每一行的内容完全由上一行决定。`row[i] = prev_row[i-1] + prev_row[i]`，边界位置填 1。\n\n动态规划的特征很明显：有明确的递推关系（状态转移），有边界条件（首尾为 1），有计算顺序（从上到下逐行生成）。这也是为什么它常被用作 DP 入门题。\n\n实现时可以直接逐行构建：从第一行 `[1]` 开始，每生成新的一行，就把它加入结果列表。\n\n## 💻 Java 题解\n\n### 解法 1：逐行构建\n\n每行首尾为1，中间元素=上一行[j-1]+上一行[j]。\n\n- ⏱ 时间复杂度：`O(n²)`\n- 💾 空间复杂度：`O(n²)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cInteger\u003e\u003e generate(int numRows) {\n        List\u003cList\u003cInteger\u003e\u003e result = new ArrayList\u003c\u003e();\n        for (int i = 0; i \u003c numRows; i++) {\n            List\u003cInteger\u003e row = new ArrayList\u003c\u003e();\n            for (int j = 0; j \u003c= i; j++) {\n                if (j == 0 || j == i) row.add(1);\n                else row.add(result.get(i-1).get(j-1) + result.get(i-1).get(j));\n            }\n            result.add(row);\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 首尾为1\n- 中间=上一行相邻两数之和\n\n**执行步骤：**\n1. 逐行构建\n1. 首尾填1\n1. 中间取上一行之和\n\n\n## ⚠️ 易错点\n\n- 第 `i` 行有 `i + 1` 个元素（从 0 开始计数），不是 `i` 个。\n- 中间元素的索引范围是 `[1, i-1]`（`i` 从 0 开始），不要越界。\n- 初始化每行时可以先填满 1，再修改中间位置，代码更简洁。\n\n- 注意索引边界\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(numRows²)`。第 `i` 行需要 `O(i)` 时间，总和是 `1 + 2 + ... + numRows = O(numRows²)`。\n- 空间复杂度：`O(numRows²)`。存储整个三角需要同等大小的空间（不算返回值则为 `O(numRows)` 用于当前行）。\n\n## 🏢 实际业务应用\n\n- 组合数学和概率计算：杨辉三角的第 `n` 行第 `k` 个值就是组合数 `C(n, k)`，在统计分析和概率模型中广泛使用。\n- 金融中的期权定价：二叉树模型（Binomial Tree）的节点值就是杨辉三角的系数，用于计算期权在不同价格路径下的公允价值。\n- 游戏开发中的技能树设计：技能的伤害系数或解锁条件可以按杨辉三角的模式递增，形成\"越往后组合越多\"的成长曲线。\n\n- 组合数学和概率计算：杨辉三角的第 `n` 行第 `k` 个值就是组合数 `C(n, k)`，在统计分析和概率模型中广泛使用。\n- 金融中的期权定价：二叉树模型（Binomial Tree）的节点值就是杨辉三角的系数，用于计算期权在不同价格路径下的公允价值。\n- 游戏开发中的技能树设计：技能的伤害系数或解锁条件可以按杨辉三角的模式递增，形成\"越往后组合越多\"的成长曲线。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里唐僧取经路上的磨难计数。\n\n取经路上每往前走一步（每一行），可能遇到的磨难组合就更多。第一层只有一种磨难，第二层有两种组合，第三层每种磨难又能和前面的组合出新的分支。每一层的磨难数等于上一层\"相邻两次经历的磨难数之和\"。观音菩萨看着这份磨难表，就知道第 `n` 天唐僧可能遇到的磨难组合有多少种。\n\n对应关系是：\n\n- \"磨难表\"对应杨辉三角\n- \"每层组合数\"对应行中的数值\n- \"相邻经历的磨难数之和\"对应 `prev[i-1] + prev[i]`\n- \"组合数\"对应组合数 `C(n, k)`\
