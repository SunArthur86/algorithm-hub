遍。但 `n × n` 个格子选 `n` 个，组合数爆炸，根本不现实。\n\n观察规则：每行只能放一个皇后（否则同行冲突）。所以可以逐行放置——第 0 行放一个、第 1 行放一个……放完 `n` 行就得到一个解。每行只需要选\"放在第几列\"。\n\n再进一步：放某行的皇后时，怎么快速判断是否和已有皇后冲突？列冲突用一个集合记录已占列；主对角线（左上到右下）的特征是 `行号 - 列号` 相同；副对角线（右上到左下）的特征是 `行号 + 列号` 相同。三个集合就能 O(1) 判断冲突。\n\n如果某一行所有列都冲突，说明前面选错了，需要\"回退\"到上一行换个位置——这就是回溯。\n\n## 💻 Java 题解\n\n### 解法 1：回溯 + 列/对角线标记\n\n逐行放置皇后。用colUsed、diag1、diag2三个数组检查冲突。O(n)检查。\n\n- ⏱ 时间复杂度：`O(n!)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cString\u003e\u003e solveNQueens(int n) {\n        List\u003cList\u003cString\u003e\u003e result = new ArrayList\u003c\u003e();\n        boolean[] col = new boolean[n], d1 = new boolean[2*n], d2 = new boolean[2*n];\n        char[][] board = new char[n][n];\n        for (char[] row : board) Arrays.fill(row, '.');\n        solve(n, 0, col, d1, d2, board, result);\n        return result;\n    }\n    private void solve(int n, int row, boolean[] col, boolean[] d1, boolean[] d2,\n                        char[][] board, List\u003cList\u003cString\u003e\u003e result) {\n        if (row == n) {\n            List\u003cString\u003e solution = new ArrayList\u003c\u003e();\n            for (char[] r : board) solution.add(new String(r));\n            result.add(solution);\n            return;\n        }\n        for (int c = 0; c \u003c n; c++) {\n            int diag1 = row + c, diag2 = row - c + n - 1;\n            if (col[c] || d1[diag1] || d2[diag2]) continue;\n            board[row][c] = 'Q'; col[c] = true; d1[diag1] = true; d2[diag2] = true;\n            solve(n, row + 1, col, d1, d2, board, result);\n            board[row][c] = '.'; col[c] = false; d1[diag1] = false; d2[diag2] = false;\n        }\n    }\n}\n```\n\n**关键点：**\n- 逐行放置\n- 3个数组标记列和对角线\n- 对角线索引: row+c 和 row-c+n-1\n\n**执行步骤：**\n1. 逐行遍历每列\n1. 检查列和对角线冲突\n1. 放置+标记\n1. 递归下一行\n1. 回溯\n\n\n## ⚠️ 易错点\n\n- 对角线冲突判断：主对角线用 `row - col`，副对角线用 `row + col`，不能搞反。搞反了某些冲突就检测不到。\n- 回溯时必须撤销选择：把列、两条对角线从集合中移除，否则后面的分支会被错误地判定为冲突。\n- 生成棋盘时，每一行都要新建一个字符数组来填充，不能复用同一个对象。\n\n- 对角线索引公式：d1=row+c, d2=row-c+n-1\n\n- char数组转String构建棋盘\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n!)`。第一行有 `n` 个选择，第二行最多 `n-1` 个，以此类推。实际运行因剪枝远小于 `n!`。\n- 空间复杂度：`O(n)`。递归栈深度为 `n`，三个集合最多各存 `n` 个元素。\n\n## 🏢 实际业务应用\n\n- 任务调度中的资源分配：多个任务争抢有限的 CPU 核心、内存段，要求互不冲突，回溯可以搜索所有可行的分配方案。\n- 数独求解器、填字游戏等约束满足问题：每个格子必须满足行列区域不重复的约束，本质就是 N 皇后的变体。\n- 集成电路布线：芯片上多个元件不能走同一通道或交叉干扰，需要搜索合法的布局方案，用回溯+剪枝加速。\n- 会议室排期系统：若干会议需要分配到不同的会议室和时间段，同一时间同一房间只能有一个会议，约束结构与 N 皇后一致。\n\n- 任务调度中的资源分配：多个任务争抢有限的 CPU 核心、内存段，要求互不冲突，回溯可以搜索所有可行的分配方案。\n- 数独求解器、填字游戏等约束满足问题：每个格子必须满足行列区域不重复的约束，本质就是 N 皇后的变体。\n- 集成电路布线：芯片上多个元件不能走同一通道或交叉干扰，需要搜索合法的布局方案，用回溯+剪枝加速。\n- 会议室排期系统：若干会议需要分配到不同的会议室和时间段，同一时间同一房间只能有一个会议，约束结构与 N 皇后一致。\n\n## 📖 形象类比\n\n《三国演义》中，诸葛亮布八阵图，需要在特定的位置安排不同的阵旗，每面阵旗之间不能互相干扰（否则阵法自破）。\n\n对应关系：\n\n- \"棋盘上的每一行\"对应\"八阵图中的每一层防线\"\n- \"皇后不能同行同列同对角线\"对应\"阵旗之间不能互相遮挡信号\"\n- \"尝试放一个皇后\"对应\"在某层防线上试探插旗\"\n- \"冲突就回退\"对应\"发现信号干扰后撤回阵旗，换位重插\"\n- \"找到一种合法摆法\"对应\"八阵图终于运转流畅\"\n\n核心对应：逐层选择 + 冲突检测 + 不行就撤，正是回溯的思想。\n\n《三国演义》中，诸葛亮布八阵图，需要在特定的位置安排不同的阵旗，每面阵旗之间不能互相干扰（否则阵法自破）。\n\n对应关系：\n\n- \"棋盘上的每一行\"对应\"八阵图中的每一层防线\"\n- \"皇后不能同行同列同对角线\"对应\"阵旗之间不能互相遮挡信号\"\n- \"尝试放一个皇后\"对应\"在某层防线上试探插旗\"\n- \"冲突就回退\"对应\"发现信号干扰后撤回阵旗，换位重插\"\n- \"找到一种合法摆法\"对应\"八阵图终于运转流畅\"\n\n核心对应：逐层选择 + 冲突检测 + 不行就撤，正是回溯的思想。\n\n小猫在河边摆了一排石头，想把 `n` 条小鱼分别放在不同的石头上。但小鱼脾气大，如果两条在同一列或者同一斜线上，它们就会打架跳走。小猫从第一行石头开始，一条一条地放，放之前先看看这列和两条斜线上有没有鱼。如果有就换个位置，如果怎么放都不行，就把上一条鱼捞起来换个地方。最终，小猫找到了所有和平共处的摆法。\n\n小猫在河边摆了一排石头，想把 `n` 条小鱼分别放在不同的石头上。但小鱼脾气大，如果两条在同一列或者同一斜线上，它们就会打架跳走。小猫从第一行石头开始，一条一条地放，放之前先看看这列和两条斜线上有没有鱼。如果有就换个位置，如果怎么放都不行，就把上一条鱼捞起来换个地方。最终，小猫找到了所有和平共处的摆法。\n\n## 🎵 记忆口诀\n\n逐行放皇后，冲突就回头。\n\n逐行放皇后，冲突就回头。\n\n## 🔗 延伸练习\n\n- `52. N 皇后 II`：只要求返回解的个数，不用输出棋盘，是本题的简化版本。\n- `37. 解数独`：从\"行+列+对角线\"三种约束升级到\"行+列+宫\"三种约束，回溯框架相同但约束更复杂。\n\n- `52. N 皇后 II`：只要求返回解的个数，不用输出棋盘，是本题的简化版本。\n- `37. 解数独`：从\"行+列+对角线\"三种约束升级到\"行+列+宫\"三种约束，回溯框架相同但约束更复杂。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"
