操作的理解，要求原地修改，是面试中高频的\"手速题\"。\n\n## 🧠 思考路径\n\n前序遍历的顺序是\"根 → 左 → 右\"。展开后，每个节点的右指针指向前序遍历中的下一个节点。\n\n**思路一：先序遍历 + 数组记录**。先用前序遍历把所有节点按顺序存进数组，然后遍历数组，把每个节点的左指针置空、右指针指向下一个节点。这需要 `O(n)` 额外空间。\n\n**思路二：递归后序遍历（推荐）**。从后往前处理。利用一个全局变量 `prev` 记录上一个处理过的节点。按\"右 → 左 → 根\"的顺序遍历（前序遍历的逆序），每处理一个节点就把它接到 `prev` 前面。这样不需要额外数组。\n\n**思路三：迭代法（Morris 风格）**。找到当前节点左子树的最右节点，把当前节点的右子树接到这个最右节点的右边，然后把左子树移到右边。`O(1)` 空间。\n\n## 💻 Java 题解\n\n### 解法 1：反向后序遍历（O(1)空间）\n\n按 右→左→根 的顺序遍历（后序的逆序），用全局 prev 指针连接。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    TreeNode prev = null;\n    public void flatten(TreeNode root) {\n        if (root == null) return;\n        flatten(root.right);\n        flatten(root.left);\n        root.right = prev;\n        root.left = null;\n        prev = root;\n    }\n}\n```\n\n**关键点：**\n- 先右后左的后序遍历\n- prev 指向前一个处理的节点\n- 处理顺序：最右→→根\n\n**执行步骤：**\n1. 递归右子树\n1. 递归左子树\n1. root.right=prev, root.left=null\n1. prev=root\n\n\n## ⚠️ 易错点\n\n- 必须先把右子树接好，再移动左子树。顺序反了会丢失右子树。\n- 迭代法中，找\"左子树的最右节点\"时，是沿着右指针走到底，不是沿左指针。\n- 递归法必须按\"右 → 左 → 根\"的顺序处理，不能按正常的\"根 → 左 → 右\"。因为我们需要从尾部向前拼接。\n- 题目要求原地修改，不要新建节点。\n\n- 先递归右再递归左\n\n- 记得 left=null\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点只被访问一次。\n- 空间复杂度：递归法 `O(h)`（递归栈），迭代法 `O(1)`。\n\n## 🏢 实际业务应用\n\n- 导航菜单系统中，将多层嵌套的树形菜单展开为扁平的列表展示（面包屑导航），方便移动端渲染。\n- 文件系统目录结构转成一维路径列表，用于批量操作（打包、同步、搜索）。\n- 评论系统中，将嵌套的回复树展平为按时间顺序排列的列表，用于简化前端渲染逻辑。\n\n- 导航菜单系统中，将多层嵌套的树形菜单展开为扁平的列表展示（面包屑导航），方便移动端渲染。\n- 文件系统目录结构转成一维路径列表，用于批量操作（打包、同步、搜索）。\n- 评论系统中，将嵌套的回复树展平为按时间顺序排列的列表，用于简化前端渲染逻辑。\n\n## 📖 形象类比\n\n可以把它类比成《红楼梦》里贾府的家谱整理。\n\n贾府的家谱是一棵大树，有嫡系和旁系的分支（左子树和右子树）。朝廷要按辈分顺序（前序遍历）整理一份单线名单。于是族长把每个分支\"拍平\"——先把旁系接到嫡系的末尾，再把嫡系提到前面。最终家谱从一棵树变成了一条按辈分排列的单链名单。\n\n对应关系是：\n\n- \"贾府家谱树\"对应二叉树\n- \"按辈分的单线名单\"对应展开后的链表\n- \"旁系接嫡系末尾\"对应右子树接到前驱节点\n- \"嫡系提到前面\"对应左子树移到右边\n\n可以把它类比成《红楼梦》里贾府的家谱整理。\n\n贾府的家谱是一棵大树，有嫡系和旁系的分支（左子树和右子树）。朝廷要按辈分顺序（前序遍历）整理一份单线名单。于是族长把每个分支\"拍平\"——先把旁系接到嫡系的末尾，再把嫡系提到前面。最终家谱从一棵树变成了一条按辈分排列的单链名单。\n\n对应关系是：\n\n- \"贾府家谱树\"对应二叉树\n- \"按辈分的单线名单\"对应展开后的链表\n- \"旁系接嫡系末尾\"对应右子树接到前驱节点\n- \"嫡系提到前面\"对应左子树移到右边\n\n猫头鹰老师让小动物们排成一队报数。但小动物们站成了树形的阵型——每个动物左边站一个，右边站一个。猫头鹰说：\"按从上到下、先左后右的顺序，排成一条直线。\"于是每个动物先把右边的队伍接到左边队伍的最后面，然后自己往右移，直到所有人都排成一条笔直的队伍。\n\n猫头鹰老师让小动物们排成一队报数。但小动物们站成了树形的阵型——每个动物左边站一个，右边站一个。猫头鹰说：\"按从上到下、先左后右的顺序，排成一条直线。\"于是每个动物先把右边的队伍接到左边队伍的最后面，然后自己往右移，直到所有人都排成一条笔直的队伍。\n\n## 🎵 记忆口诀\n\n左接右尾，右移左空。\n\n左接右尾，右移左空。\n\n## 🔗 延伸练习\n\n- `144. 二叉树的前序遍历`：理解前序遍历顺序是本题的基础。\n- `430. 扁平化多级双向链表`：从二叉树扩展到多级链表的扁平化，思路类似但需要处理双向指针。\n- `897. 递增顺序搜索树`：按中序遍历展开为链表，和本题按前序展开形成对比。\n\n- `144. 二叉树的前序遍历`：理解前序遍历顺序是本题的基础。\n- `430. 扁平化多级双向链表`：从二叉树扩展到多级链表的扁平化，思路类似但需要处理双向指针。\n- `897. 递增顺序搜索树`：按中序遍历展开为链表，和本题按前序展开形成对比。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🌳\"}],114,\". \",\"二叉树展开为链表\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0114\",\"lcId\":114,\"slug\":\"flatten-binary-tree-to-linked-list\",\"title\":\"二叉树展开为链表\",\"question\":\"二叉树展开为链表\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"binary-tree\",\"categories\":[\"binary-tree\"],\"tags\":[\"栈\",\"树\",\"深度优先搜索\",\"链表\",\"二叉树\"],\"url\":\"https://leetcode.cn/problems/flatten-binary-tree-to-linked-list/\",\"planOrder\":46,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一棵二叉树，请你将它展开为一条单链表。展开的规则是：按照前序遍历的顺序，所有节点只有右子节点，左子节点全部为空。要求原地修改，不返回新树。  直观理解就是：把树\\\"拍扁\\\"，让它变成一条向右延伸的链。\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\
