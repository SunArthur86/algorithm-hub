\"，是\"换个角度建模\"的经典案例。\n\n## 🧠 思考路径\n\n每个元素的值在 `[1, n]` 范围内，所以可以把 `nums[i]` 看成\"从节点 i 指向节点 nums[i] 的指针\"。这样数组就变成了一个链表（或更准确地说，一个有环的有向图）。\n\n因为数组有 `n+1` 个元素但值只有 `n` 种可能，所以一定有重复，这意味着链表一定有环。重复的数就是环的入口。\n\n找环的入口用 Floyd 龟兔赛跑算法：快指针每次走两步，慢指针每次走一步，相遇后，一个指针回到起点，两个指针每次各走一步，再次相遇就是环的入口。\n\n所以这题的关键词不是\"找重复\"，而是\"数组即链表，重复即环入口\"。\n\n## 💻 Java 题解\n\n### 解法 1：Floyd判圈（快慢指针）\n\n把nums[i]看作i→nums[i]的链表。重复元素造成环。快慢指针找相遇点，再找入环点。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int findDuplicate(int[] nums) {\n        // 快慢指针找相遇点\n        int slow = nums[0], fast = nums[0];\n        do {\n            slow = nums[slow];\n            fast = nums[nums[fast]];\n        } while (slow != fast);\n        // 找入环点\n        slow = nums[0];\n        while (slow != fast) {\n            slow = nums[slow];\n            fast = nums[fast];\n        }\n        return slow;\n    }\n}\n```\n\n**关键点：**\n- nums[i]作为链表指针\n- do-while找相遇点\n- 第二次同速找入环点=重复值\n\n**执行步骤：**\n1. 快慢指针找相遇点\n1. 一个指针回头\n1. 同速走找入环点\n\n\n## ⚠️ 易错点\n\n- 初始时 `slow = fast = nums[0]`，不是 0。0 不在值域 `[1, n]` 中。\n- 快指针是 `nums[nums[fast]]`，不是 `nums[fast * 2]`。\n- 第二阶段两个指针每次各走一步，不是一快一慢。\n\n- do-while不是while（初始slow==fast）\n\n- 入环点就是重复元素\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。\n- 空间复杂度：`O(1)`。\n\n## 🏢 实际业务应用\n\n- 数据校验中，检测数组或链表中的循环引用。\n- 内存管理中，检测对象引用图中是否存在循环引用（垃圾回收的环检测）。\n- 数据库中，检测外键关系是否有循环依赖。\n\n- 数据校验中，检测数组或链表中的循环引用。\n- 内存管理中，检测对象引用图中是否存在循环引用（垃圾回收的环检测）。\n- 数据库中，检测外键关系是否有循环依赖。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里追查情报泄露的源头。\n\n情报在好汉之间传递，每张情报上写着\"交给谁\"。吴用发现情报最终会传到某个人手里形成循环（环）。他派两个密探：一个跑得快，一个跑得慢。快密探先进入循环被慢密探追上。然后一个密探回到起点，两人以同样速度走，再次相遇的地方就是循环的入口——那个泄露情报的人。\n\n对应关系是：\n\n- \"nums[i]\"对应\"交给谁\"\n- \"环\"对应情报传递的循环\n- \"快慢指针\"对应两个密探\n- \"环入口\"对应泄露情报的人\n\n这段记忆的关键是：数组值当下标形成链表，重复值造成环，Floyd 找环入口。\n\n可以把它类比成《水浒传》里追查情报泄露的源头。\n\n情报在好汉之间传递，每张情报上写着\"交给谁\"。吴用发现情报最终会传到某个人手里形成循环（环）。他派两个密探：一个跑得快，一个跑得慢。快密探先进入循环被慢密探追上。然后一个密探回到起点，两人以同样速度走，再次相遇的地方就是循环的入口——那个泄露情报的人。\n\n对应关系是：\n\n- \"nums[i]\"对应\"交给谁\"\n- \"环\"对应情报传递的循环\n- \"快慢指针\"对应两个密探\n- \"环入口\"对应泄露情报的人\n\n这段记忆的关键是：数组值
