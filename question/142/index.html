题的方法，快慢指针找到相遇点。但相遇点不一定是环的入口。\n\n设链表头到环入口距离为 `a`，环入口到相遇点距离为 `b`，相遇点到环入口剩余距离为 `c`。环的长度 = `b + c`。\n\n慢指针走的距离：`a + b`。\n快指针走的距离：`a + b + k(b + c)`（快指针在环里绕了 `k` 圈）。\n快指针走的距离是慢指针的两倍：`a + b + k(b + c) = 2(a + b)`。\n\n化简得：`a = (k - 1)(b + c) + c`。\n\n这意味着：从链表头走 `a` 步等于从相遇点走 `c + (k-1)圈` 的距离，都到达环入口。\n\n所以，让一个指针从链表头出发，另一个指针从相遇点出发，两者每次都走一步，它们一定会在环入口相遇。\n\n所以这题的关键词不是\"找到环在哪\"，而是\"相遇后，一个回起点一个留在原地，同步走就会在入口碰面\"。\n\n## 💻 Java 题解\n\n### 解法 1：快慢指针 + 数学推导\n\n快慢指针相遇后，一个指针从头出发，另一个从相遇点出发，同速走再次相遇即为环入口。数学证明：a=(n-1)(b+c)+c。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\npublic class Solution {\n    public ListNode detectCycle(ListNode head) {\n        ListNode slow = head, fast = head;\n        while (fast != null \u0026\u0026 fast.next != null) {\n            slow = slow.next;\n            fast = fast.next.next;\n            if (slow == fast) {\n                ListNode p = head;\n                while (p != slow) { p = p.next; slow = slow.next; }\n                return p;\n            }\n        }\n        return null;\n    }\n}\n```\n\n**关键点：**\n- 第一次相遇后\n- 一个指针从头开始\n- 同速走再次相遇即入口\n\n**执行步骤：**\n1. 快慢指针找相遇点\n1. 一个指针放回头部\n1. 同速走直到相遇\n1. 相遇点即环入口\n\n\n## ⚠️ 易错点\n\n- 第二阶段两个指针都是从\"链表头\"和\"相遇点\"同时出发，不是从\"头\"和\"环入口\"出发。\n- 找到相遇点后，`slow` 不要重置为 `head`，应该留在相遇点，新开一个 `ptr` 从 `head` 出发。\n- 数学推导中 `k ≥ 1`（快指针至少绕了一圈），但不影响结论。\n- 链表只有两个节点形成环时，也要正确处理。\n\n- 相遇判断不能在初始位置——要先走\n\n- 第二次相遇用同速不是快慢\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。找相遇点最多 `O(n)`，找入口最多 `O(n)`。\n- 空间复杂度：`O(1)`。只用了几个指针变量。\n\n## 🏢 实际业务应用\n\n- 死锁定位：在检测到环路后，需要找到环路中的\"关键节点\"（环入口），对应最先造成循环等待的进程。\n- 版本控制系统检测合并冲突：当分支历史形成环（虽然少见）时，需要找到环的入口来确定冲突源头。\n- 内存泄漏分析：引用链形成环时，找到环的入口就是找到泄漏的起始位置。\n\n- 死锁定位：在检测到环路后，需要找到环路中的\"关键节点\"（环入口），对应最先造成循环等待的进程。\n- 版本控制系统检测合并冲突：当分支历史形成环（虽然少见）时，需要找到环的入口来确定冲突源头。\n- 内存泄漏分析：引用链形成环时，找到环的入口就是找到泄漏的起始位置。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里赤壁之战后追查\"谁最先放走了曹操\"。\n\n探子沿着逃跑路线追踪，发现足迹在某个山谷里绕成了一圈（链表有环）。两个探子从同一地点出发，一个快跑一个慢走，在山谷里碰面了。然后一个探子回到起点，另一个留在碰面处，两人以相同速度前进。再次相遇的地方，就是逃兵进入山谷的入口——也就是问题的根源。\n\n对应关系是：\n\n- \"逃跑路线\"对应链表\n- \"山谷绕圈\"对应环\n- \"快跑探子和慢走探子碰面\"对应
