\n\n走完一层后，外圈已经被掏空了，内圈缩小一圈，继续重复同样的操作。用四个变量 `top`、`bottom`、`left`、`right` 表示当前还没遍历的区域的边界。\n\n每走完一条边，对应的边界就往内缩一格。当 `top \u003e bottom` 或 `left \u003e right` 时，说明全部走完了。\n\n需要注意的是：非方阵（行数和列数不同）时，最后可能只剩一行或一列，要避免重复取。\n\n## 💻 Java 题解\n\n### 解法 1：边界收缩法\n\n维护四个边界，按 右→下→左→上 顺序遍历，每次遍历完一条边就收缩对应边界。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public List\u003cInteger\u003e spiralOrder(int[][] matrix) {\n        List\u003cInteger\u003e result = new ArrayList\u003c\u003e();\n        int top = 0, bottom = matrix.length - 1;\n        int left = 0, right = matrix[0].length - 1;\n        while (top \u003c= bottom \u0026\u0026 left \u003c= right) {\n            for (int j = left; j \u003c= right; j++) result.add(matrix[top][j]);\n            top++;\n            for (int i = top; i \u003c= bottom; i++) result.add(matrix[i][right]);\n            right--;\n            if (top \u003c= bottom) {\n                for (int j = right; j \u003e= left; j--) result.add(matrix[bottom][j]);\n                bottom--;\n            }\n            if (left \u003c= right) {\n                for (int i = bottom; i \u003e= top; i--) result.add(matrix[i][left]);\n                left++;\n            }\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 四边界收缩\n- 右→下→左→上循环\n- 下和左方向需要额外检查边界\n\n**执行步骤：**\n1. 初始化 top/bottom/left/right\n1. 向右遍历 top 行，top++\n1. 向下遍历 right 列，right--\n1. 向左遍历 bottom 行（如果还有），bottom--\n1. 向上遍历 left 列（如果还有），left++\n\n\n## ⚠️ 易错点\n\n- 向左和向上遍历之前，必须检查边界条件（`top \u003c= bottom` 和 `left \u003c= right`），否则在非方阵时会重复取元素。比如 3×4 矩阵走完一圈后可能只剩中间一行，如果不检查就会倒着再取一遍。\n- 循环变量的范围要仔细：向右是 `left → right`，向左是 `right → left`，不要搞反方向或漏端点。\n- 边界缩小（`top++`、`right--` 等）必须在遍历完当前边之后立刻做，不要放错位置。\n\n- 向左和向上时需要 if 检查防止重复遍历\n\n- 单行/单列的边界条件\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`。每个元素恰好被访问一次。\n- 空间复杂度：`O(1)`（不算返回结果数组），只用了四个边界变量。\n\n## 🏢 实际业务应用\n\n- 图像处理中的像素遍历：某些图像滤波算法需要从外向内逐圈处理像素，螺旋遍历正好匹配这种\"洋葱剥层\"模式。\n- 二维表格的数据导出：Excel 或报表工具中，用户指定\"按螺旋顺序提取数据\"，后端需要按此顺序重新排列单元格。\n- 游戏开发中的地图迷雾揭开：策略游戏中，视野从中
