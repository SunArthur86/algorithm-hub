rd1` 的前 `i` 个字符变成 `word2` 的前 `j` 个字符需要多少步，那 `i+1` 和 `j+1` 的情况能不能从它推出？\n\n可以。如果 `word1[i-1] == word2[j-1]`，这两个字符对齐了，不用额外操作，直接继承 `dp[i-1][j-1]`。如果不等，就有三种选择：替换（从 `dp[i-1][j-1]` 加一步）、删除（从 `dp[i-1][j]` 加一步）、插入（从 `dp[i][j-1]` 加一步），取三者最小值。\n\n于是问题变成了一张二维表格的填充问题，每个格子只依赖它左边、上边、左上的三个格子。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划\n\n字符相等：dp[i][j]=dp[i-1][j-1]。不等：dp[i][j]=1+min(替换dp[i-1][j-1], 删除dp[i-1][j], 插入dp[i][j-1])。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(m×n)`\n\n```java\nclass Solution {\n    public int minDistance(String word1, String word2) {\n        int m = word1.length(), n = word2.length();\n        int[][] dp = new int[m + 1][n + 1];\n        for (int i = 0; i \u003c= m; i++) dp[i][0] = i;\n        for (int j = 0; j \u003c= n; j++) dp[0][j] = j;\n        for (int i = 1; i \u003c= m; i++)\n            for (int j = 1; j \u003c= n; j++) {\n                if (word1.charAt(i-1) == word2.charAt(j-1))\n                    dp[i][j] = dp[i-1][j-1];\n                else\n                    dp[i][j] = 1 + Math.min(dp[i-1][j-1], Math.min(dp[i-1][j], dp[i][j-1]));\n            }\n        return dp[m][n];\n    }\n}\n```\n\n**关键点：**\n- 三种操作：替换/删除/插入\n- base case: dp[i][0]=i, dp[0][j]=j\n- 相等不操作\n\n**执行步骤：**\n1. 初始化第一行第一列\n1. 字符相等→dp[i-1][j-1]\n1. 不等→1+min(三方向)\n\n\n## ⚠️ 易错点\n\n- 边界初始化不能忘：`dp[i][0] = i` 表示把 `word1` 的前 `i` 个字符全删变成空串；`dp[0][j] = j` 表示在空串上插入 `j` 个字符。\n- 状态转移时\"插入\"是 `dp[i][j-1] + 1`（对 `word2` 少匹配一个），\"删除\"是 `dp[i-1][j] + 1`（对 `word1` 少处理一个），别搞反。\n- 可以用一维数组优化空间，但要注意左上角的值需要用临时变量保存。\n\n- 三种操作分别对应三个方向：dp[i-1][j-1], dp[i-1][j], dp[i][j-1]\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`，其中 `m` 和 `n` 分别是两个字符串的长度。\n- 空间复杂度：`O(m × n)`。可以优化到 `O(min(m, n))`，用一维数组滚动。\n\n## 🏢 实际业务应用\n\n- 搜索引擎的\"拼写纠错\"功能：用户输入 `googel`，系统计算编辑距离发现 `google` 只差一步，自动推荐正确拼写。\n- DNA 序列比对工具（如 BLAST）：比较两段基因序列的相似度，核心就是计算编辑距离的变体，匹配罚分不同。\n- 版本控制系统的 diff 算法：Git 显示两个文件之间的差异，底层依赖编辑距离的变种来寻找最小编辑集。\n- 通讯录或 CRM 系统的模糊搜索：用户输入有错别字时，通过编辑距离找到最接近的联系人或客户名。\n\n- 搜索引擎的\"拼写纠错\"功能：用户输入 `googel`，系统计算编辑距离发现 `google` 只差一步，自动推荐正确拼写。\n- DNA 序列比对工具（如 B
