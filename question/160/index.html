—走完自己的路再走对方的路，必然在交点相遇，是链表题里的思维艺术品。\n\n## 🧠 思考路径\n\n最直接的想法是让两个指针同步走，但两条链表长度不同，同步走就会错过交点。如果能先知道长度差，让长的那个先走几步就行。\n\n但有个更巧妙的办法：让两个指针分别从 A 和 B 出发，走完自己的链表后，跳到另一条链表的头部继续走。这样两个指针各走了 `lenA + lenB` 步，必然同时到达交点（如果存在的话）。如果不存在交点，两个指针会同时到达 `null`。\n\n为什么？因为走的总步数一样。如果存在交点，指针 A 走完 A 链表后从 B 链表头开始，指针 B 走完 B 链表后从 A 链表头开始。两者在交点处恰好走了相同的步数。\n\n所以这题的关键词不是\"找交点\"，而是\"走完自己的再走对方的，总步数一样必然相遇\"。\n\n## 💻 Java 题解\n\n### 解法 1：双指针交叉走\n\npA 从 headA 出发走完 A 转 B，pB 从 headB 出发走完 B 转 A。如果没有交点，两指针最终同时为 null。\n\n- ⏱ 时间复杂度：`O(m+n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\npublic class Solution {\n    public ListNode getIntersectionNode(ListNode headA, ListNode headB) {\n        if (headA == null || headB == null) return null;\n        ListNode pA = headA, pB = headB;\n        while (pA != pB) {\n            pA = pA == null ? headB : pA.next;\n            pB = pB == null ? headA : pB.next;\n        }\n        return pA;\n    }\n}\n```\n\n**关键点：**\n- pA 走完 A 转 B\n- pB 走完 B 转 A\n- 走的总路程相同，必在交点相遇\n\n**执行步骤：**\n1. pA=headA, pB=headB\n1. pA 到 null 转 headB\n1. pB 到 null 转 headA\n1. pA==pB 时即为交点\n\n\n## ⚠️ 易错点\n\n- 跳转条件是 `a == null` 时跳到 `headB`，不是 `a.next == null`。要走到 null 才跳，而不是走到最后一个节点就跳。\n- 如果没有交点，两个指针会在同一轮都走到 `null`，循环结束，返回 `null`。\n- 不要修改链表结构，也不要用额外空间（哈希表存节点虽然能过，但空间是 O(n)）。\n\n- 无交点时两指针最终都为 null（同时走完 m+n）\n\n- 不要修改链表结构\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m + n)`。两个指针各走 `m + n` 步。\n- 空间复杂度：`O(1)`。只用了两个指针。\n\n## 🏢 实际业务应用\n\n- Git 分支的 merge base 查找：两个分支的提交历史是两条链表，它们在某次提交后合并（相交），找 merge base 就是找交点。\n- 社交网络共同好友定位：两个用户的社交关系链在某个人处开始重叠，找\"最早的共同节点\"就是找交点。\n- 依赖管理中的公共依赖检测：两个包的依赖树在某个公共包处汇合，需要找到最浅的公共依赖。\n\n- Git 分支的 merge base 查找：两个分支的提交历史是两条链表，它们在某次提交后合并（相交），找 merge base 就是找交点。\n- 社交网络共同好友定位：两个用户的社交关系链在某个人处开始重叠，找\"最早的共同节点\"就是找交点。\n- 依赖管理中的公共依赖检测：两个包的依赖树在某个公共包处汇合，需要找到最浅的公共依赖。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里刘备和曹操的行军路线在某个城池交汇的场景。\n\n刘备从荆州出发，曹操从许都出发，两人各走各的路。到了某个城池（交点），两军碰面了。诸葛亮让两个斥候分别从荆州和许都出发，每人走完自己的路线后，跳到对方的起点继续走。因为两人走的总路程一样长，必然在同一个城池相遇。\n\n对应关系是：\n\n- \"两条行军路线\"对应两条链表\n- \"交汇的城池\"对应交点\n- \"走完自己的再走对方的\"对应指针跳转\n- \"总路程一样\"对应 `lenA + lenB = lenB + lenA`\n\n这段记忆的关键是：走的路程一样长，必定在同一处碰面。\n\n可以把它类比成《三国演义》里刘备和曹操的行军路线在某个城池交汇的场景。\n\n刘备从荆州出发，曹操从许都出发，两人各走各的路。到了某个城池（交点），两军碰面了。诸葛亮让两个斥候分别从荆州和许都出发，每人走完自己的路线后，跳到对方的起点继续走。因为两人走的总路程一样长，必然在同一个城池相遇。\n\n对应关系是：\n\n- \"两条行军路线\"对应两条链表\n- \"交汇的城池\"对应交点\n- \"走完自己的再走对方的\"对应指针跳转\n- \"总路程一样\"对应 `lenA + lenB = lenB + lenA`\n\n这段记忆的关键是：走的路程一样长，必定在同一处碰面。\n\n两条小溪从不同方向流过来，在某个地方汇成一条河。小鸭子从 A 溪出发，小天鹅从 B 溪出发，各自游到尽头后飞到对方的源头继续游。因为两条溪加一条河的总长度对双方都一样，所以它们一定会在汇合点相遇。如果两条溪各流各的没汇合（没有交点），它们就都游到大海（null）才停下。\n\n两条小溪从不同方向流过来，在某个地方汇成一条河。小鸭子从 A 溪出发，小天鹅从 B 溪出发，各自游到尽头后飞到对方的源头继续游。因为两条溪加一条河的总长度对双方都一样，所以它们一定会在汇合点相遇。如果两条溪各流各的没汇合（没有交点），它们就都游到大海（null）才停下。\n\n## 🎵 记忆口诀\n\n走完自己走对方，总步相同必相遇。\n\n走完自己走对方，总步相同必相遇。\n\n## 🔗 延伸练习\n\n- `141. 环形链表`：链表的另一个经典问题，判断链表是否有环，同样用双指针但方式不同。\n- `19. 删除链表的倒数第 N 个结点`：同样是双指针遍历链表，但关注的是距离而非交点。\n\n- `141. 环形链表`：链表的另一个经典问题，判断链表是否有环，同样用双指针但方式不同。\n- `19. 删除链表的倒数第 N 个结点`：同样是双指针遍历链表，但关注的是距离而非交点。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⛓️\"}],160,\". \",\"相交链表\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0160\",\"lcId\":160,\"slug\":\"intersection-of-two-linked-lists\",\"title\":\"相交链表\",\"question\":\"相交链表\",\"answer\":\"$e\",\"difficulty\":\"Easy\",\"category\":\"linked-list\",\"categories\":[\"linked-list\"],\"tags\":[\"哈希表\",\"链表\",\"双指针\"],\"url\":\"https://leetcode.cn/problems/intersection-of-two-linked-lists/\",\"planOrder\":22,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你两个单链表的头节点 `headA` 和 `headB`，它们可能在某个节点开始相交（共享后面的所有节点）。找出并返回相交的起始节点。如果不相交，返回 `null`。  重点不在\\\"遍历链表\\\"，而在\\\"\",\"analo
