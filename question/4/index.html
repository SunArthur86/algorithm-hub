方式。\n\n## 🧠 思考路径\n\n最朴素的做法是把两个数组合并再排序，直接取中位数。但合并需要 `O(m+n)` 的时间，不满足题目的 `O(log(m+n))` 要求。\n\n要达到对数级别，必须用二分。关键观察是：中位数的本质是一条\"分割线\"——把合并后的数组分成两半，左半边最大的数 ≤ 右半边最小的数，且左右两边的元素个数相等（或差一个）。\n\n既然两个数组各自有序，我们可以在较短的数组上二分找分割线的位置。设 `nums1` 的分割点为 `i`，`nums2` 的分割点为 `j = (m+n+1)/2 - i`，只要保证 `nums1[i-1] ≤ nums2[j]` 且 `nums2[j-1] ≤ nums1[i]`，就找到了正确的分割线。\n\n## 💻 Java 题解\n\n### 解法 1：二分切分（O(log(min(m,n)))）\n\n在较短数组上二分切分位置i，另一个数组切分位置j=(m+n+1)/2-i。检查边界条件。\n\n- ⏱ 时间复杂度：`O(log(min(m,n)))`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public double findMedianSortedArrays(int[] nums1, int[] nums2) {\n        if (nums1.length \u003e nums2.length) return findMedianSortedArrays(nums2, nums1);\n        int m = nums1.length, n = nums2.length;\n        int left = 0, right = m;\n        while (left \u003c= right) {\n            int i = (left + right) / 2, j = (m + n + 1) / 2 - i;\n            int left1 = i == 0 ? Integer.MIN_VALUE : nums1[i-1];\n            int right1 = i == m ? Integer.MAX_VALUE : nums1[i];\n            int left2 = j == 0 ? Integer.MIN_VALUE : nums2[j-1];\n            int right2 = j == n ? Integer.MAX_VALUE : nums2[j];\n            if (left1 \u003c= right2 \u0026\u0026 left2 \u003c= right1) {\n                if ((m + n) % 2 == 1) return Math.max(left1, left2);\n                return (Math.max(left1, left2) + Math.min(right1, right2)) / 2.0;\n            } else if (left1 \u003e right2) right = i - 1;\n            else left = i + 1;\n        }\n        return 0.0;\n    }\n}\n```\n\n**关键点：**\n- 在较短数组上二分\n- j=(m+n+1)/2-i 保证左半\u003e=右半\n- left1\u003c=right2 \u0026\u0026 left2\u003c=right1 为正确切分\n\n**执行步骤：**\n1. 二分切分位置i\n1. 计算j\n1. 检查边界条件\n1. 奇数取max(left)，偶数取avg\n\n\n## ⚠️ 易错点\n\n- 必须在较短的数组上做二分。否则 `j = totalLeft - i` 可能为负数。\n- 边界处理：`i = 0` 时 `nums1` 左半为空，`i = m` 时 `nums1` 右半为空，需要用 `-inf` 和 `+inf` 填充。\n- 奇偶判断：`(m + n + 1) // 2` 保证了奇数时左半多一个元素，中位数直接取左半最大值。\n- 二分循环中移动方向：`nums1LeftMax \u003e nums2RightMin` 说明 `nums1` 分多了，往左移；反之往右移。\n\n- 确保nums1是较短数组\n\n- 边界用MIN_VALUE/MAX_VALUE处理\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(log(min(m, n)))`。只在较短数组上做二分。\n- 空间复杂度：`O(1)`。只用了常数个变量。\n\n## 🏢 实际业务应用\n\n- 双数据源的实时中位数统计：比如两个机房各自上报延迟数据，需要实时计算全局中位数，不合并数组直接查中位数，避免数据搬迁。\n- 分位数计算：将中位数的分割线思路推广到任意分位数（P90、P95、P99），监控系统中的延迟指标统计常用此方法。\n- 数据库的排序归并优化：两个有序索引段的合并查询中，快速定位中间位置的记录。\n\n- 双数据源的实时中位数统计：比如两个机房各自上报延迟数据，需要实时计算全局中位数，不合并数组直接查中位数，避免数据搬迁。\n- 分位数计算：将中位数的分割线思路推广到任意分位数（P90、P95、P99），监控系统中的延迟指标统计常用此方法。\n- 数据库的排序归并优化：两个有序索引段的合并查询中，快速定位中间位置的记录。\n\n## 📖 形象类比\n\n可以类比《红楼梦》里两册账本对齐中间线的场景。\n\n王熙凤有两本账册，一本记东府的开支（已按日期排好），一本记西府的开支（也按日期排好）。她想知道两府合在一起的开支\"中间值\"是多少。她不是把两本账重新合并抄一遍，而是在较薄的那本上找一条分割线，然后由这条线的位置算出另一本上对应的分割线位置。两条分割线左边的所有开支都 ≤ 右边的所有开支时，中间值就找到了。\n\n对应关系是：\n\n- \"东府账册\"和\"西府账册\"对应两个有序数组 `nums1` 和 `nums2`\n- \"较薄账册上的分割线\"对应 `nums1` 上的分割点 `i`\n- \"另一本账册上的分割线\"对应由 `i` 算出的 `j`\n- \"左边开支 ≤ 右边开支\"对应分割条件\n- \"中间值\"对应中位数\n\n记忆的关键是：不合并，直接在较短的那个上面画线找分割点。\n\n可以类比《红楼梦》里两册账本对齐中间线的场景。\n\n王熙凤有两本账册，一本记东府的开支（已按日期排好），一本记西府的开支（也按日期排好）。她想知道两府合在一起的开支\"中间值\"是多少。她不是把两本账重新合并抄一遍，而是在较薄的那本上找一条分割线，然后由这条线的位置算出另一本上对应的分割线位置。两条分割线左边的所有开支都 ≤ 右边的所有开支时，中间值就找到了。\n\n对应关系是：\n\n- \"东府账册\"和\"西府账册\"对应两个有序数组 `nums1` 和 `nums2`\n- \"较薄账册上的分割线\"对应 `nums1` 上的分割点 `i`\n- \"另一本账册上的分割线\"对应由 `i` 算出的 `j`\n- \"左边开支 ≤ 右边开支\"对应分割条件\n- \"中间值\"对应中位数\n\n记忆的关键是：不合并，直接在较短的那个上面画线找分割点。\n\n森林里有两组松鼠，A 组按身高从矮到高站成一排，B 组也是。猫头鹰想找出所有松鼠身高中最中间的那只。它没有让两组松鼠混在一起重新排队，而是只看 A 组较短的那排，在中间画一条线，然后在 B 组上也画一条对应位置的线。如果线左边最矮的松鼠比线右边最高的还矮，中间那只松鼠就找到了。\n\n森林里有两组松鼠，A 组按身高从矮到高站成一排，B 组也是。猫头鹰想找出所有松鼠身高中最中间的那只。它没有让两组松鼠混在一起重新排队，而是只看 A 组较短的那排，在中间画一条线，然后在 B 组上也画一条对应位置的线。如果线左边最矮的松鼠比线右边最高的还矮，中间那只松鼠就找到了。\n\n## 🎵 记忆口诀\n\n短数组分，二分画线找中位。\n\n短数组分，二分画线找中位。\n\n## 🔗 延伸练习\n\n- `153. 寻找旋转排序数组中的最小值`：同样是二分，但需要在\"断点\"数组上找转折。\n- `4. 本题的扩展`：将中位数推广到第 k 小的数，本质是同样的分割线思路。\n\n- `153. 寻找旋转排序数组中的最小值`：同样是二分，但需要在\"断点\"数组上找转折。\n- `4. 本题的扩展`：将中位数推广到第 k 小的数，本质是同样的分割线思路。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"dis
