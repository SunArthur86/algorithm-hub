否等于 `k`。时间 `O(n²)`。\n\n优化思路：用前缀和。定义 `prefix[i]` 为 `nums[0] + nums[1] + ... + nums[i-1]`。那么子数组 `nums[j..i]` 的和等于 `prefix[i+1] - prefix[j]`。要让它等于 `k`，就是 `prefix[j] = prefix[i+1] - k`。\n\n所以对于每个位置 `i`，我只需要知道\"之前有多少个前缀和等于 `prefix[i+1] - k`\"。这正是哈希表擅长的——用哈希表记录每个前缀和出现的次数，一边遍历一边查询。\n\n## 💻 Java 题解\n\n### 解法 1：前缀和 + 哈希表（最优）\n\n边遍历边计算前缀和，用哈希表记录每个前缀和出现的次数。对当前位置 j，查找 prefix-k 出现了多少次，即为以 j 结尾的和为 k 的子数组个数。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int subarraySum(int[] nums, int k) {\n        Map\u003cInteger, Integer\u003e map = new HashMap\u003c\u003e();\n        map.put(0, 1); // 前缀和为0出现1次（空前缀）\n        int sum = 0, count = 0;\n        for (int num : nums) {\n            sum += num;\n            count += map.getOrDefault(sum - k, 0);\n            map.merge(sum, 1, Integer::sum);\n        }\n        return count;\n    }\n}\n```\n\n**关键点：**\n- map.put(0,1) 处理从头开始的子数组\n- sum-k 表示前面有多少个前缀和使得差值为k\n- map.merge 简化计数\n\n**执行步骤：**\n1. 初始化 map{0:1}\n1. 遍历累加 sum\n1. count += map[sum-k]\n1. map[sum]++\n\n\n## ⚠️ 易错点\n\n- 必须先查询再更新哈希表。如果先更新再查询，可能会把当前位置的前缀和自己也算进去。\n- 哈希表初始要放入 `{0: 1}`，否则当子数组从第一个元素开始时会漏算。\n- 本题数组元素可以为负数，所以前缀和不一定单调递增，不能用滑动窗口。\n\n- 忘记 map.put(0,1) 会导致漏算从头开始的子数组\n\n- 不能用滑动窗口——数组有负数\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，一趟遍历，每次哈希查询 O(1)。\n- 空间复杂度：`O(n)`，最坏情况下哈希表存储 `n` 个不同的前缀和。\n\n## 🏢 实际业务应用\n\n- 股票交易系统中统计\"累计收益恰好等于目标值\"的交易区间数量，前缀和 + 哈希是标配。\n- 网络流量监控中，统计\"某段时间内的流量增量等于某个阈值\"的时间窗口个数。\n- 电商平台订单分析中，统计\"连续订单金额之和等于某促销阈值\"的区间数量，用于评估促销策略。\n\n- 股票交易系统中统计\"累计收益恰好等于目标值\"的交易区间数量，前缀和 + 哈希是标配。\n- 网络流量监控中，统计\"某段时间内的流量增量等于某个阈值\"的时间窗口个数。\n- 电商平台订单分析中，统计\"连续订单金额之和等于某促销阈值\"的区间数量，用于评估促销策略。\n\n## 📖 形象类比\n\n可以类比为《水浒传》中梁山泊统计粮草收支。\n\n每运进一批粮草就记一笔账（前缀和）。宋江想知道\"中间有没有哪一段时间的净收入刚好是 `k` 石粮\"。他让人把每一笔累计总额记在账本上，每来一笔新账，就回头查\"之前有没有哪笔累计总额和当前差 `k` 石\"。\n\n对应关系：\n\n- \"每批粮草\"对应 `nums[i]`\n- \"累计总额\"对应前缀和 `prefix_sum`\n- \"差 `k` 石\"对应 `prefix_sum - k`\n- \"账本\"对应哈希表 `sum_count`\n\n可以类比为《水浒传》中梁山泊统计粮草收支。\n\n每运进一批粮草就记一笔账（前缀和）。宋江想知道\"中间有没有哪一段时间的净收入刚好是 `k` 石粮\"。他让人把每一笔累计总额记在账本上，每来一笔新账，就回头查\"之
