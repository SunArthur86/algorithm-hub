\n## 🧠 思考路径\n\n最容易想到的是用哈希表计数，O(n) 时间 O(n) 空间。排序取中位数也可以，O(n log n) 时间 O(1) 空间。\n\n但有个更妙的算法：Boyer-Moore 投票法。想象一个场景：每个多数元素投一票，每个其他元素投反对票。因为多数元素超过一半，它们最终一定不会被完全抵消。\n\n具体做法：维护一个候选者 `candidate` 和一个计数器 `count`。遍历数组，如果 `count == 0`，把当前元素设为候选者。如果当前元素等于候选者，`count++`；否则 `count--`。最后剩下的候选者就是多数元素。\n\n所以这题的关键词不是\"计数\"，而是\"多数元素一定抵消不完，候选人就是答案\"。\n\n## 💻 Java 题解\n\n### 解法 1：Boyer-Moore 投票\n\n维护候选人和计数器。相同+1，不同-1，计数器归零换候选人。多数元素一定最后留下。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int majorityElement(int[] nums) {\n        int candidate = nums[0], count = 1;\n        for (int i = 1; i \u003c nums.length; i++) {\n            if (count == 0) { candidate = nums[i]; count = 1; }\n            else if (nums[i] == candidate) count++;\n            else count--;\n        }\n        return candidate;\n    }\n}\n```\n\n**关键点：**\n- count归零换候选人\n- 多数元素出现\u003en/2次一定存活\n- 无需验证\n\n**执行步骤：**\n1. 遍历\n1. 相同+1不同-1\n1. 归零换人\n1. 返回候选人\n\n\n## ⚠️ 易错点\n\n- 题目保证多数元素存在，所以不需要二次验证。如果不保证，需要再遍历一次确认。\n- `count == 0` 时换候选者，不是 `count \u003c 0`。\n- 初始 `candidate` 可以是任意值（因为 `count` 从 0 开始，第一个元素就会成为候选者）。\n\n- 题目保证一定有多数元素，所以不用验证\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。遍历一次。\n- 空间复杂度：`O(1)`。只用两个变量。\n\n## 🏢 实际业务应用\n\n- 实时投票系统：在线投票或评分系统中，快速找到得票过半的选项，不需要存储所有投票记录。\n- 数据流中的频繁元素检测：网络流量分析中，找出占比超过一半的协议类型或 IP 地址。\n- 分布式系统的 Leader 选举：在多个节点快速达成共识，找到多数派支持的候选者。\n\n- 实时投票系统：在线投票或评分系统中，快速找到得票过半的选项，不需要存储所有投票记录。\n- 数据流中的频繁元素检测：网络流量分析中，找出占比超过一半的协议类型或 IP 地址。\n- 分布式系统的 Leader 选举：在多个节点快速达成共识，找到多数派支持的候选者。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊推举寨主的场景。\n\n一百零八条好汉要推举寨主，宋江派系超过半数。选法是：每人报一个支持的人名，如果当前的支持计数归零了，就换一个人当候选人。因为宋江派系人数超过一半，无论其他派系怎么抵消，最后站着的候选人一定是宋江。\n\n对应关系是：\n\n- \"好汉报名字\"对应遍历数组\n- \"当前候选人\"对应 `candidate`\n- \"支持计数\"对应 `count`\n- \"计数归零换人\"对应 `count == 0` 时更新\n- \"宋江派系过半\"对应多数元素超过 n/2\n\n这段记忆的关键是：超过半数的人不会被完全抵消。\n\n可以把它类比成《水浒传》里梁山泊推举寨主的场景。\n\n一百零八条好汉要推举寨主，宋江派系超过半数。选法是：每人报一个支持的人名，如果当前的支持计数归零了，就换一个人当候选人。因为宋江派系人数超过一半，无论其他派系怎么抵消，最后站着的候选人一定是宋江。\n\n对应关系是：\n\n- \"好汉报名字\"对应遍历数组\n- \"当前候选人\"对应 `candidate`\n- \"支持计数\"对应 `count`\n- \
