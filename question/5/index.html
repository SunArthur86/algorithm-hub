回文，取最长的。但子串个数是 `O(n²)`，每个判断要 `O(n)`，总复杂度 `O(n³)`。\n\n观察回文的性质：如果一个字符串是回文，那么去掉首尾两个字符后，剩下的也是回文。反过来，如果已知中间一段是回文，只要首尾两个字符相同，就能向外扩展一圈。这就是\"中心扩展法\"的思路。\n\n另一种方式是动态规划。定义 `dp[i][j]` 表示 `s[i..j]` 是否是回文。转移方程是 `dp[i][j] = (s[i] == s[j]) and dp[i+1][j-1]`。按子串长度从小到大填表即可。\n\n## 💻 Java 题解\n\n### 解法 1：中心扩展法\n\n对每个中心（奇数和偶数两种），向两边扩展找最长回文。\n\n- ⏱ 时间复杂度：`O(n²)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public String longestPalindrome(String s) {\n        int start = 0, maxLen = 1;\n        for (int i = 0; i \u003c s.length(); i++) {\n            int len1 = expand(s, i, i);     // 奇数\n            int len2 = expand(s, i, i + 1); // 偶数\n            int len = Math.max(len1, len2);\n            if (len \u003e maxLen) {\n                maxLen = len;\n                start = i - (len - 1) / 2;\n            }\n        }\n        return s.substring(start, start + maxLen);\n    }\n    private int expand(String s, int l, int r) {\n        while (l \u003e= 0 \u0026\u0026 r \u003c s.length() \u0026\u0026 s.charAt(l) == s.charAt(r)) { l--; r++; }\n        return r - l - 1;\n    }\n}\n```\n\n**关键点：**\n- 两种中心：i和i,i+1\n- expand返回长度\n- start = i-(len-1)/2\n\n**执行步骤：**\n1. 遍历每个中心\n1. 奇偶两种扩展\n1. 更新最大值和起点\n\n\n## ⚠️ 易错点\n\n- 中心扩展必须同时考虑奇数和偶数长度两种情况。奇数以单个字符为中心，偶数以两个相邻字符的间隙为中心。\n- 扩展结束后，`left` 和 `right` 都多走了一步，所以实际的回文区间是 `[left+1, right-1]`。\n- 单字符字符串本身就是回文，需要单独处理或保证循环正确覆盖。\n\n- start = i-(len-1)/2 不是 i-len/2\n\n- expand返回r-l-1 不是r-l+1\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n²)`。每个字符作为中心最多扩展 `O(n)` 次。\n- 空间复杂度：`O(1)`。只用了常数个变量。\n\n## 🏢 实际业务应用\n\n- DNA 序列分析：寻找基因序列中的回文片段，回文结构在 DNA 双链的稳定性和酶切位点识别中很重要。\n- 文本纠错与模式匹配：回文检测用于识别文本中的对称结构，如自然语言处理中的对称短语检测。\n- 数据压缩：某些压缩算法利用回文子串的重复性来做字符串的去重和编码优化。\n- 网络安全：恶意代码检测中，某些混淆技术会利用回文结构来隐藏关键字符串，检测回文模式可以辅助识别。\n\n- DNA 序列分析：寻找基因序列中的回文片段，回文结构在 DNA 双链的稳定性和酶切位点识别中很重要。\n- 文本纠错与模式匹配：回文检测用于识别文本中的对称结构，如自然语言处理中的对称短语检测。\n- 数据压缩：某些压缩算法利用回文子串的重复性来做字符串的去重和编码优化。\n- 网络安全：恶意代码检测中，某些混淆技术会利用回文结构来隐藏关键字符串，检测回文模式可以辅助识别。\n\n## 📖 形象类比\n\n可以类比《红楼梦》里园林的镜像对称设计。\n\n大观园的设计讲究中轴对称。贾政领人游览时，站在中轴线上的某一点，向左右两边看，如果左边的亭台和右边的
