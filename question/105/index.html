n- 题目名：从前序与中序遍历序列构造二叉树\n- 难度：中等\n- 题型：二叉树\n- 为什么选这题：它是\"遍历序列 ↔ 树结构\"互转的经典题，深度考察对前序和中序遍历本质的理解。\n\n## 🧠 思考路径\n\n前序数组的第一个元素就是根节点。用这个根节点的值去中序数组里找位置，就能把中序数组分成三部分：\n\n1. 根左边：左子树的中序遍历\n2. 根本身\n3. 根右边：右子树的中序遍历\n\n左子树的大小（节点数）等于中序数组中根左边的元素个数。有了大小，就能在前序数组中划分出左子树的前序和右子树的前序。\n\n然后递归处理左子树和右子树即可。\n\n优化：用哈希表预处理中序数组中每个值的位置，避免每次线性查找根的位置。\n\n## 💻 Java 题解\n\n### 解法 1：递归 + HashMap\n\n用 HashMap 存中序值到索引的映射。前序第一个是根，中序中定位根划分左右子树，递归构建。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    int preIdx = 0;\n    Map\u003cInteger, Integer\u003e inMap;\n    public TreeNode buildTree(int[] preorder, int[] inorder) {\n        inMap = new HashMap\u003c\u003e();\n        for (int i = 0; i \u003c inorder.length; i++) inMap.put(inorder[i], i);\n        return build(preorder, 0, inorder.length - 1);\n    }\n    private TreeNode build(int[] pre, int inLeft, int inRight) {\n        if (inLeft \u003e inRight) return null;\n        TreeNode root = new TreeNode(pre[preIdx++]);\n        int inMid = inMap.get(root.val);\n        root.left = build(pre, inLeft, inMid - 1);\n        root.right = build(pre, inMid + 1, inRight);\n        return root;\n    }\n}\n```\n\n**关键点：**\n- 前序第一个是根\n- HashMap存中序索引→O(1)查找\n- preIdx 全局递增\n\n**执行步骤：**\n1. 前序取根节点\n1. 中序定位根划分左右\n1. 递归构建左子树\n1. 递归构建右子树\n\n\n## ⚠️ 易错点\n\n- `preIdx` 的递增必须在创建节点后立即执行，不能延迟。因为前序数组的顺序就是\"根 → 左 → 右\"，`preIdx` 是全局递增的。\n- 递归顺序必须是先左后右。前序遍历中，根后面紧跟着的是左子树的所有节点，然后才是右子树。\n- 中序数组的划分用 `[inLeft, rootPos-1]` 和 `[rootPos+1, inRight]`，根本身不包含在子树中。\n- 题目保证不含重复元素，所以哈希表的映射是一一对应的。\n\n- preIdx 必须在递归左子树之前递增\n\n- 递归构建顺序：先左后右\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点处理一次，哈希查找 `O(1)`。\n- 空间复杂度：`O(n)`。哈希表 `O(n)`，递归栈 `O(h)`。\n\n## 🏢 实际业务应用\n\n- 序列化与反序列化：将树结构保存到文件或数据库时，存储前序和中序序列，读取时重建树结构。\n- 编译器的语法树重建：从运算符优先级（类似中序）和执行顺序（类似前序）重建表达式的抽象语法树。\n- 文件系统备份恢复：备份时记录目录的前序访问顺序和按名称排序的顺序，恢复时重建目录树。\n- 网络拓扑重建：从两种不同协议的路由信息（类似不同遍历序列）重建网络拓扑树。\n\n- 序列化与反序列化：将树结构保存到文件或数据库时，存储前序和中序序列，读取时重建树结构。\n- 编译器的语法树重建：从运算符优先级（类似中序）和执行顺序（类似前序）重建表达式的抽象语法树。\n- 文件系统备份恢复：备份时记录目录的前序访问顺序和按名称排序的顺序，恢复时重建目录树。\n- 网络拓扑重建：从两种不同协议的路由信息（类似不同遍历序列）重建网络拓扑树。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里诸葛亮从两份情报重建敌军阵型的场景。\n\n探马来报了两份情报：一份是\"先碰到的将帅是谁\"（前序遍历，根在前），另一份是\"从左到右扫过战场时各部队的位置\"（中序遍历，左根右）。\n\n诸葛亮先看前序情报的第一个名字——这是敌军主帅。然后在中序情报里找到主帅的位置，主帅左边的就是左翼部队，右边的就是右翼部队。接着看前序情报的下一个名字，那是左翼的先锋……如此层层拆解，完整的敌军阵型就浮现出来了。\n\n对应关系是：\n\n- \"前序遍历\"对应\"先碰到的将帅\"情报\n- \"中序遍历\"对应\"从左到右扫过战场\"的情报\n- \"根在中序中的位置\"对应主帅在战场上的位置\n- \"左子树、右子树\"对应左翼、右翼部队\n\n这段记忆的关键是：前序定根，中序分左右，递归下去。\n\n可以把它类比成《三国演义》里诸葛亮从两份情报重建敌军阵型的场景。\n\n探马来报了两份情报：一份是\"先碰到的将帅是谁\"（前序遍历，根在前），另一份是\"从左到右扫过战场时各部队的位置\"（中序遍历，左根右）。\n\n诸葛亮先看前序情报的第一个名字——这是敌军主帅。然后在中序情报里找到主帅的位置，主帅左边的就是左翼部队，右边的就是右翼部队。接着看前序情报的下一个名字，那是左翼的先锋……如此层层拆解，完整的敌军阵型就浮现出来了。\n\n对应关系是：\n\n- \"前序遍历\"对应\"先碰到的将帅\"情报\n- \"中序遍历\"对应\"从左到右扫过战场\"的情报\n- \"根在中序中的位置\"对应主帅在战场上的位置\n- \"左子树、右子树\"对应左翼、右翼部队\n\n这段记忆的关键是：前序定根，中序分左右，递归下去。\n\n小松鼠找到了两张藏宝图碎片。一张写着\"先找到哪棵树\"（前序），另一张写着\"从西到东树的排列顺序\"（中序）。小松鼠先看前序碎片，第一个写着\"7号树\"。再在中序碎片里找到 7 号树的位置，它西边的都是左边的树，东边的都是右边的树。然后看前序碎片的下一个\"3号树\"，这是左边最前面的树……就这样把整片果林的结构全还原了。\n\n小松鼠找到了两张藏宝图碎片。一张写着\"先找到哪棵树\"（前序），另一张写着\"从西到东树的排列顺序\"（中序）。小松鼠先看前序碎片，第一个写着\"7号树\"。再在中序碎片里找到 7 号树的位置，它西边的都是左边的树，东边的都是右边的树。然后看前序碎片的下一个\"3号树\"，这是左边最前面的树……就这样把整片果林的结构全还原了。\n\n## 🎵 记忆口诀\n\n前序定根，中序分界，递归重建。\n\n前序定根，中序分界，递归重建。\n\n## 🔗 延伸练习\n\n- `106. 从中序与后序遍历序列构造二叉树`：后序遍历的根在最后，其余逻辑相同。\n- `889. 根据前序和后序遍历构造二叉树`：前序 + 后序无法唯一确定二叉树（满二叉树除外），体会为什么需要中序。\n\n- `106. 从中序与后序遍历序列构造二叉树`：后序遍历的根在最后，其余逻辑相同。\n- `889. 根据前序和后序遍历构造二叉树`：前序 + 后序无法唯一确定二叉树（满二叉树除外），体会为什么需要中序。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🌳\"}],105,\". \",\"从前序与中序遍历序列构造二叉树\"]}],[\"$\",\"$Ld\",null,
