n能不能做得更省？关键是\"在哪做标记\"。既然某行或某列要被置零，我们可以在矩阵的第一行和第一列做标记——用 `matrix[i][0]` 标记第 `i` 行是否要清零，`matrix[0][j]` 标记第 `j` 列是否要清零。但第一行和第一列本身也可能需要清零，所以要用两个额外变量单独记录它们。\n\n这样就把额外空间压到了 `O(1)`。\n\n## 💻 Java 题解\n\n### 解法 1：原地标记（O(1)空间）\n\n用第一行/列记录是否有零。先检查第一行列自身是否有零，然后用它们标记其他行列，最后根据标记置零。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public void setZeroes(int[][] matrix) {\n        int m = matrix.length, n = matrix[0].length;\n        boolean firstRowZero = false, firstColZero = false;\n        for (int j = 0; j \u003c n; j++) if (matrix[0][j] == 0) firstRowZero = true;\n        for (int i = 0; i \u003c m; i++) if (matrix[i][0] == 0) firstColZero = true;\n        for (int i = 1; i \u003c m; i++)\n            for (int j = 1; j \u003c n; j++)\n                if (matrix[i][j] == 0) { matrix[i][0] = 0; matrix[0][j] = 0; }\n        for (int i = 1; i \u003c m; i++)\n            for (int j = 1; j \u003c n; j++)\n                if (matrix[i][0] == 0 || matrix[0][j] == 0) matrix[i][j] = 0;\n        if (firstRowZero) for (int j = 0; j \u003c n; j++) matrix[0][j] = 0;\n        if (firstColZero) for (int i = 0; i \u003c m; i++) matrix[i][0] = 0;\n    }\n}\n```\n\n**关键点：**\n- 用第一行/列做标记数组\n- 先记录第一行列自身是否有零\n- 最后处理第一行列\n\n**执行步骤：**\n1. 检查第一行列是否有零\n1. 用第一行列标记其他位置\n1. 根据标记置零\n1. 最后处理第一行列\n\n\n## ⚠️ 易错点\n\n- 必须先记录第一行和第一列的状态，再做标记。否则标记会覆盖掉原始信息。\n- 置零的顺序：先处理内部区域（第 2 行/列开始），再处理第一行和第一列。\n- 不能边扫描边置零，否则后面扫到的 `0` 可能是你自己设的，会连锁反应。\n\n- 必须先记录第一行列的状态再标记\n\n- 最后处理第一行列防止覆盖标记\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`，遍历矩阵若干遍，每遍都是 `O(m × n)`。\n- 空间复杂度：`O(1)`，只用了两个额外布尔变量。\n\n## 🏢 实际业务应用\n\n- 电子表格软件（Excel、Google Sheets）里，用户选中某行/列执行\"清除\"操作后，需要批量将该行和交叉列的数据置零或清空，逻辑与此题一致。\n- 图像处理中的\"掩码扩散\"：当某个像素被标记为遮挡时，它所在的整行和整列都需要用背景色填充。\n- 棋类游戏的合法走法标注：如果某个位置被判定为\"不可通行\"，需要把对应的行和列都标记为禁区。\n- 数据仓库的缺失值处理：当某个维度值为空时，关联的所有行和列数据都要做置零或置空处理。\n\n- 电子表格软件（Excel、Google Sheets）里，用户选中某行/列执行\"清除\"操作后，需要批量将该行和交叉列的数据置零或清空，逻辑与此题一致。\n- 图像处理中的\"掩码扩散\"：当某个像素被标记为遮挡时，它所在的整行和整列都需要用背景色填充。\n- 棋类游戏的合法走法标注：如果某个位置被判定为\"不可通行\"，需要把对应的行和列都标记为禁区。\n- 数
