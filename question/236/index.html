"左右根\"的顺序天然适合\"从下往上找祖先\"，是理解递归返回值的经典题目。\n\n## 🧠 思考路径\n\n对于 BST（235 题），可以利用大小关系直接决定搜索方向。但普通二叉树没有这个信息，必须遍历整棵树。\n\n关键想法是后序遍历（左 → 右 → 根）。后序遍历天然是\"自底向上\"的：先处理完左右子树，再处理当前节点。这意味着当我们在某个节点时，已经知道 `p` 和 `q` 分别在左子树和右子树的哪里了。\n\n递归函数的返回值设计：\n- 如果当前节点是 `p` 或 `q`，返回当前节点。\n- 如果当前节点是 `null`，返回 `null`。\n- 递归左右子树，得到 `left` 和 `right`。\n- 如果 `left` 和 `right` 都非空，说明 `p` 和 `q` 分布在两侧，当前节点就是 LCA。\n- 如果只有 `left` 非空，说明 `p` 和 `q` 都在左子树（或其中一个就是 `left`），返回 `left`。\n- 如果只有 `right` 非空，同理返回 `right`。\n\n这题的关键词不是\"找公共祖先\"，而是\"后序遍历的自底向上特性 + 返回值的设计\"。\n\n## 💻 Java 题解\n\n### 解法 1：递归后序遍历\n\n递归查找p和q。如果当前节点等于p或q返回。如果左右子树各返回非null，当前节点就是LCA。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public TreeNode lowestCommonAncestor(TreeNode root, TreeNode p, TreeNode q) {\n        if (root == null || root == p || root == q) return root;\n        TreeNode left = lowestCommonAncestor(root.left, p, q);\n        TreeNode right = lowestCommonAncestor(root.right, p, q);\n        if (left != null \u0026\u0026 right != null) return root;\n        return left != null ? left : right;\n    }\n}\n```\n\n**关键点：**\n- root==p 或 root==q 时返回\n- 左右都非null→当前是LCA\n- 一边为null→答案在另一边\n\n**执行步骤：**\n1. 递归在左右子树中找p和q\n1. 如果当前是p或q直接返回\n1. 左右都找到→当前是LCA\n1. 只有一边找到→返回那一边\n\n\n## ⚠️ 易错点\n\n- 基本条件 `root == p or root == q` 必须在递归之前判断，这是搜索终止的关键。\n- \"左右都非空\"是唯一能确定 LCA 的情况——此时当前节点就是答案。\n- 如果左为空右非空，返回右；右为空左非空，返回左。不要认为\"找到了一个就是答案\"——可能另一个还在更深处。\n- `p` 可以是 `q` 的祖先，这种情况下递归会先找到 `p` 并向上返回，不会出错。\n\n- p或q本身就是祖先的情况也能处理——因为遇到就返回\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。最坏情况需要遍历所有节点。\n- 空间复杂度：`O(h)`，`h` 为树高。递归栈的深度。\n\n## 🏢 实际业务应用\n\n- 组织架构系统中查找两个员工的最近共同上级（manager chain 的交集点），逻辑就是找 LCA。\n- Git 中查找两个分支的 merge base（最近公共提交），虽然实现更复杂（涉及 DAG），但核心思想相同。\n- 评论系统中，两条回复的最近公共父评论（嵌套回复的结构是树形的）。\n\n- 组织架构系统中查找两个员工的最近共同上级（manager chain 的交集点），逻辑就是找 LCA。\n- Git 中查找两个分支的 merge base（最近公共提交），虽然实现更复杂（涉及 DAG），但核心思想相同。\n- 评论系统中，两条回复的最近公共父评论（嵌套回复的结构是树形的）。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里赤壁之战前，诸葛亮找两个敌将的共同上级的场景。\n\n诸葛亮派出两路斥候，分别去左翼和右翼搜索敌将 `p` 和 `q` 的踪迹。如果左翼的斥候说\"找到了敌将 p 的线索\"，右翼
