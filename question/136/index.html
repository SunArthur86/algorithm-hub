计每个数出现的次数，但题目要求 `O(1)` 空间，哈希表就不行了。\n\n换个角度：异或运算 `XOR` 有三个关键性质：\n1. 一个数和自己异或结果是 0：`a ^ a = 0`\n2. 一个数和 0 异或结果是自身：`a ^ 0 = a`\n3. 异或满足交换律和结合律\n\n这意味着，如果把数组里所有数都异或起来，成对出现的数会互相抵消变成 0，最后只剩下那个只出现一次的数。\n\n比如 `[4, 1, 2, 1, 2]`：`4 ^ 1 ^ 2 ^ 1 ^ 2 = 4 ^ (1 ^ 1) ^ (2 ^ 2) = 4 ^ 0 ^ 0 = 4`。\n\n所以这题的关键词不是\"找唯一\"，而是\"用异或把成对的数消掉\"。\n\n## 💻 Java 题解\n\n### 解法 1：异或\n\n所有数字异或，出现两次的互相抵消为0，最后剩下的就是出现一次的。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int singleNumber(int[] nums) {\n        int result = 0;\n        for (int num : nums) result ^= num;\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 异或性质：a^a=0\n- 0^a=a\n- 交换律和结合律\n\n**执行步骤：**\n1. 遍历所有数\n1. 异或累加\n1. 返回结果\n\n\n## ⚠️ 易错点\n\n- `result` 初始化为 0，不是数组的第一个元素（虽然从第一个元素开始也可以，但 0 更通用，因为 `x ^ 0 = x`）。\n- 异或运算不关心顺序，所以即使数组无序也能正确消对。\n- 这个方法只适用于\"其余元素恰好出现两次\"的情况。如果出现三次，需要用 137 题的方法。\n\n- 初始值必须为0\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。遍历一次数组。\n- 空间复杂度：`O(1)`。只用了一个变量。\n\n## 🏢 实际业务应用\n\n- 数据校验中，快速找出奇偶不匹配的数据项。比如分布式系统里，两个副本互相异或，结果为 0 表示一致。\n- 密码学中的简单加密：`明文 ^ 密钥 = 密文`，`密文 ^ 密钥 = 明文`，异或的可逆性是许多流加密算法的基础。\n- 通信协议里的奇偶校验、纠错码，异或用来检测传输中的比特错误。\n\n- 数据校验中，快速找出奇偶不匹配的数据项。比如分布式系统里，两个副本互相异或，结果为 0 表示一致。\n- 密码学中的简单加密：`明文 ^ 密钥 = 密文`，`密文 ^ 密钥 = 明文`，异或的可逆性是许多流加密算法的基础。\n- 通信协议里的奇偶校验、纠错码，异或用来检测传输中的比特错误。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里赤壁之战的战船配对。\n\n曹操的战船用铁索连环，每两艘一组锁在一起。唯独有一艘战船因为来得晚，没有找到配对的船，独自漂浮在江面上。诸葛亮站在高处，用望远镜扫过整个船队，每看到一组配对的就\"对消\"掉（它们成双出现），最后剩下的那艘就是落单的。\n\n对应关系是：\n\n- \"成对的战船\"对应出现两次的数，异或后互相抵消\n- \"落单的战船\"对应只出现一次的数\n- \"扫过船队，成对对消\"对应逐个异或\n- \"最后剩下的\"对应 `result` 的最终值\n\n这段记忆的关键是：成对的东西会互相消掉，消到最后剩下的就是唯一的那个。\n\n可以把它类比成《三国演义》里赤壁之战的战船配对。\n\n曹操的战船用铁索连环，每两艘一组锁在一起。唯独有一艘战船因为来得晚，没有找到配对的船，独自漂浮在江面上。诸葛亮站在高处，用望远镜扫过整个船队，每看到一组配对的就\"对消\"掉（它们成双出现），最后剩下的那艘就是落单的。\n\n对应关系是：\n\n- \"成对的战船\"对应出现两次的数，异或后互相抵消\n- \"落单的战船\"对应只出现一次的数\n- \"扫过船队，成对对消\"对应逐个异或\n- \"最后剩下的\"对应 `result` 的最终值\n\n这段记忆的关键是：成对的东西会互相消掉，消到最后剩下的就是唯一的那个。\n\n小兔子和朋友们玩捉迷藏。大家约定每两人一组，同组的人穿一样的花衣裳。小兔子发现有一只穿蓝衣服的小鹿没有搭档。它不去一只一只数，而是让所有动物站成一排，相邻同色的手拉手——同色的一对自动消失，最后还站在原地的，就是穿蓝衣服的小鹿。\n\n小兔子和朋友们玩捉迷藏。大家约定每两人一组，同组
