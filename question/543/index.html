。对于每个节点，经过它的最长路径 = 左子树最大深度 + 右子树最大深度。\n\n所以做法是：对每个节点，计算它的左子树深度和右子树深度，两者之和就是经过该节点的路径长度。用全局变量维护所有节点中的最大值。\n\n每个节点返回以它为根的子树的最大深度（`max(左深度, 右深度) + 1`），供父节点使用。\n\n## 💻 Java 题解\n\n### 解法 1：DFS + 全局最大值\n\nDFS 返回以当前节点为端点的最大深度。过程中用 left+right 更新直径最大值。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    int maxDiameter = 0;\n    public int diameterOfBinaryTree(TreeNode root) {\n        depth(root);\n        return maxDiameter;\n    }\n    private int depth(TreeNode node) {\n        if (node == null) return 0;\n        int left = depth(node.left);\n        int right = depth(node.right);\n        maxDiameter = Math.max(maxDiameter, left + right);\n        return 1 + Math.max(left, right);\n    }\n}\n```\n\n**关键点：**\n- 直径 = 经过某节点的 left+right\n- depth返回子树深度\n- 全局变量更新最大直径\n\n**执行步骤：**\n1. DFS求深度\n1. 过程中 left+right 更新直径\n1. 返回 1+max(left,right)\n\n\n## ⚠️ 易错点\n\n- 直径的定义是\"边数\"不是\"节点数\"。`left + right` 已经是边数了，因为深度是从当前节点开始往下数的边数。\n- 直径不一定经过根节点，所以必须检查每个节点，不能只检查根。\n- 空节点的深度返回 0，不是 -1。\n\n- 直径是边数不是节点数\n\n- 不一定经过根节点\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，每个节点访问一次。\n- 空间复杂度：`O(h)`，递归栈深度。\n\n## 🏢 实际业务应用\n\n- 网络拓扑分析中，计算网络中两个节点之间的最长路径（网络直径）。Cisco 的网络监控工具使用类似的树形结构分析。\n- 组织架构分析中，找出公司层级结构中最长的汇报链条。Workday 的组织分析模块使用类似的树形深度计算。\n- 文件系统分析中，计算目录树的最大嵌套深度和最大路径长度。Linux 的 `find` 命令在分析目录深度时使用类似逻辑。\n\n- 网络拓扑分析中，计算网络中两个节点之间的最长路径（网络直径）。Cisco 的网络监控工具使用类似的树形结构分析。\n- 组织架构分析中，找出公司层级结构中最长的汇报链条。Workday 的组织分析模块使用类似的树形深度计算。\n- 文件系统分析中，计算目录树的最大嵌套深度和最大路径长度。Linux 的 `find` 命令在分析目录深度时使用类似逻辑。\n\n## 📖 形象类比\n\n好比《西游记》里，唐僧想知道取经路上最远的两个地方之间的距离。\n\n他让孙悟空变成一棵大树，每个分叉是一条路线。孙悟空从根开始，每到一个分叉点，就看看往左走最深到哪里、往右走最深到哪里——两者加起来就是经过这个分叉的最长路程。他一路走过所有分叉，最终找到了整条路上最远的两点。\n\n对应关系是：\n\n- \"路线分叉\"对应二叉树节点\n- \"往左走最深\"对应左子树深度 `left`\n- \"往右走最深\"对应右子树深度 `right`\n- \"最长路程\"对应直径 `left + right`\n\n好比《西游记》里，唐僧想知道取经路上最远的两个地方之间的距离。\n\n他让孙悟空变成一棵大树，每个分叉是一条路线。孙悟空从根开始，每到一个分叉点，就看看往左走最深到哪里、往右走最深到哪里——两者加起来就是经过这个分叉的最长路程。他一路走过所有分叉，最终找到了整条路上最远的两点。\n\n对应关系是：\n\n- \"路线分叉\"对应二叉树节点\n- \"往左走最深\"对应左子树深度 `left`\n- \"往右走最深\"对应右子树深度 `right`\n- \"最长路程\"对应直径 `left + right`\n\n小松鼠住在树洞里，想知道这棵大树最远的两个树洞之间隔几根树枝。它从根开始，每到一个分叉就数左边最深几层、右边最深几层，加起来就是经过这个分叉的最远距离。最后它找到了两个离得最远的树洞——正好隔了 5 根树枝。\n\n小松鼠住在树洞里，想知道这棵大树最远的两个树洞之间隔几根树枝。它从根开始，每到一个分叉就数左边最深几层、右边最深几层，加起来就是经过这个分叉的最远距离。最后它找到了两个离得最远的树洞——正好隔了 5 根树枝。\n\n## 🎵 记忆口诀\n\n左右深度和，全局取最大。\n\n左右深度和，全局取最大。\n\n## 🔗 延伸练习\n\n- `124. 二叉树中的最大路径和`：同样是树形 DP，但计算的是路径上的权值之和。\n- `687. 最长同值路径`：在直径的基础上增加\"值相同\"的约束。\n\n- `124. 二叉树中的最大路径和`：同样是树形 DP，但计算的是路径上的权值之和。\n- `687. 最长同值路径`：在直径的基础上增加\"值相同\"的约束。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🌳\"}],543,\". \",\"二叉树的直径\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0543\",\"lcId\":543,\"slug\":\"diameter-of-binary-tree\",\"title\":\"二叉树的直径\",\"question\":\"二叉树的直径\",\"answer\":\"$e\",\"difficulty\":\"Easy\",\"category\":\"binary-tree\",\"categories\":[\"binary-tree\"],\"tags\":[\"树\",\"深度优先搜索\",\"二叉树\"],\"url\":\"https://leetcode.cn/problems/diameter-of-binary-tree/\",\"planOrder\":40,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一棵二叉树的根节点 `root`。返回这棵树的直径长度——即任意两个节点之间的最长路径的边数。这条路径可能经过也可能不经过根节点。\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"name\":\"theme-color\",\"content\":\"#f97316\"}]]\n"])</script><script>self.__next_f.push([1,"8:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"1\",{\"children\":\"543. 二叉树的直径 - 算法面
