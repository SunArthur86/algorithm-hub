子数组，算每个的和，取最大的。两层循环，`O(n²)`，数组一大就慢。\n\n换个角度想：从左往右扫描，站在位置 `i`，我要决定\"以 `i` 结尾的最大子数组和是多少\"。有两种选择：要么把前面那段接上（前面的和是正的，带着它只会更大），要么从 `i` 重新开始（前面的和是负的，带上它只会更小）。\n\n所以 `dp[i] = max(nums[i], dp[i-1] + nums[i])`——要么自己干，要么继承前一段。最终答案就是所有 `dp[i]` 中的最大值。\n\n再进一步：`dp[i]` 只依赖 `dp[i-1]`，不需要整个数组，一个变量就够了。这就是 Kadane 算法。\n\n## 💻 Java 题解\n\n### 解法 1：Kadane算法（动态规划）\n\n遍历时维护当前连续和。如果当前和为负，不如从当前元素重新开始。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int maxSubArray(int[] nums) {\n        int maxSum = nums[0], currSum = nums[0];\n        for (int i = 1; i \u003c nums.length; i++) {\n            currSum = Math.max(nums[i], currSum + nums[i]);\n            maxSum = Math.max(maxSum, currSum);\n        }\n        return maxSum;\n    }\n}\n```\n\n**关键点：**\n- currSum=max(nums[i], currSum+nums[i])\n- 负数前缀不如丢弃\n- O(1)空间\n\n**执行步骤：**\n1. 遍历每个元素\n1. 当前和=max(自己, 当前和+自己)\n1. 更新全局最大值\n\n\n## ⚠️ 易错点\n\n- 初始值不能设为 `0`，必须设为 `nums[0]`。如果数组全是负数，答案应该是最大的那个负数，而不是 `0`。\n- `cur` 和 `best` 的更新顺序不能反：先更新 `cur`，再用 `cur` 更新 `best`。\n- 不要把 `cur = max(nums[i], cur + nums[i])` 写成 `cur += nums[i]`，后者没有\"断开重开\"的逻辑。\n\n- 初始值用nums[0]不是0（可能有全负数组）\n\n- 先更新currSum再更新maxSum\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。只遍历数组一次，每个元素做 O(1) 操作。\n- 空间复杂度：`O(1)`。只用了两个变量 `cur` 和 `best`。\n\n## 🏢 实际业务应用\n\n- 股票分析系统：找某段时间内连续交易日中收益最大的一段，每天的正负涨跌对应数组的正负元素。\n- 网络流量监控：在连续的时间窗口中检测流量突增的峰值区间，快速定位异常时段。\n- 游戏数据分析：玩家连续登录期间的活跃度变化，找出最活跃的一段连续天数，用于运营活动效果评估。\n- 信号处理：在带噪声的传感器数据中，找到信号强度最大的一段连续采样区间。\n\n- 股票分析系统：找某段时间内连续交易日中收益最大的一段，每天的正负涨跌对应数组的正负元素。\n- 网络流量监控：在连续的时间窗口中检测流量突增的峰值区间，快速定位异常时段。\n- 游戏数据分析：玩家连续登录期间的活跃度变化，找出最活跃的一段连续天数，用于运营活动效果评估。\n- 信号处理：在带噪声的传感器数据中，找到信号强度最大的一段连续采样区间。\n\n## 📖 形象类比\n\n《西游记》中，孙悟空保护唐僧取经，一路上遭遇的妖怪有强有弱。如果把每段路程的\"妖怪难度\"排成数组（厉害的正值，轻松的负值），孙悟空想知道：哪一段连续的路程最难走？\n\n对应关系：\n\n- \"数组元素\"对应\"每段路程的妖怪难度\"\n- \"连续子数组\"对应\"连续的一段路程\"\n- \"cur = max(自己, 接上前面的)\"对应\"这段路是连着前面的难路走，还是从这里重新算难度\"\n- \"best\"对应\"最难的那段路的总难度\"\n\n核心：到了每一段路，只关心\"前面那段路加起来是帮我还是害我\"。\n\n《西游记》中，孙悟空保护唐僧取经，一路上遭遇的妖怪有强有弱。如果把每段路程的\"妖怪难度\"排成数组（厉害的正值，轻松的负值），孙悟空想知道：哪一段连续的路程最难走？\n\
