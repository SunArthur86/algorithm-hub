来理解最优。\n\n## 🧠 思考路径\n\n这题可以看成完全背包问题：物品是完全平方数（1, 4, 9, ...），背包容量是 `n`，每个物品可以用无限次，求最少物品数。\n\n设 `dp[i]` 表示和为 `i` 的最少完全平方数个数。转移方程：`dp[i] = min(dp[i - j*j] + 1)`，其中 `j*j \u003c= i`。\n\n初始条件：`dp[0] = 0`，其余设为无穷大。从 `i = 1` 开始，依次尝试所有小于等于 `i` 的完全平方数，取最小值。\n\n还有一个数学定理（四平方和定理）：任何正整数最多可以表示为 4 个完全平方数的和。所以答案最多是 4。\n\n所以这题的关键词不是\"怎么凑\"，而是\"dp[i] = 所有可能的 j² 组合中取最小\"。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划\n\ndp[i]表示i最少需要几个完全平方数。枚举所有j²\u003c=i，dp[i]=min(dp[i-j²]+1)。\n\n- ⏱ 时间复杂度：`O(n√n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int numSquares(int n) {\n        int[] dp = new int[n + 1];\n        Arrays.fill(dp, Integer.MAX_VALUE);\n        dp[0] = 0;\n        for (int i = 1; i \u003c= n; i++)\n            for (int j = 1; j * j \u003c= i; j++)\n                dp[i] = Math.min(dp[i], dp[i - j * j] + 1);\n        return dp[n];\n    }\n}\n```\n\n**关键点：**\n- 枚举j*j\u003c=i的所有j\n- dp[i]=min(dp[i-j²]+1)\n- 初始化MAX_VALUE\n\n**执行步骤：**\n1. 初始化dp数组\n1. 双重循环枚举平方数\n1. 取最小值\n\n\n## ⚠️ 易错点\n\n- `j * j` 可能溢出（当 n 很大时），Java 中要注意。\n- `dp` 数组的大小是 `n + 1`，不是 `n`。\n- 初始值不能设为 `n + 1`（如果 n 恰好是最坏情况），用 `Integer.MAX_VALUE` 更安全。\n\n- dp[0]=0 是base case\n\n- Arrays.fill初始化为MAX_VALUE\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n * √n)`，外层 n 次，内层最多 `√n` 次。\n- 空间复杂度：`O(n)`。\n\n## 🏢 实际业务应用\n\n- 图形学中，像素网格上把矩形区域分割成最少的正方形。\n- 资源分配中，把总预算分配成最少数量的\"整数平方\"块。\n- 数学教学中，帮助学生理解数的分解和最优表示。\n\n- 图形学中，像素网格上把矩形区域分割成最少的正方形。\n- 资源分配中，把总预算分配成最少数量的\"整数平方\"块。\n- 数学教学中，帮助学生理解数的分解和最优表示。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊分配领地。\n\n宋江要把一片总面积为 `n` 的地分给好汉们，每块地必须是正方形（面积为完全平方数）。为了减少管理成本（最少块数），他要找最优的分法。对每块面积为 `i` 的地，他先切掉一个正方形（面积为 `j²`），剩下的面积 `i - j²` 交给副手按同样规则切。每种切法取最少块数的那个。\n\n对应关系是：\n\n- \"n\"对应领地总面积\n- \"完全平方数\"对应正方形地块\n- \"dp[i]\"对应面积 i 最少要几块地\n- \"dp[i - j²] + 1\"对应切掉一块后剩余面积的最优解加这一块\n\n这段记忆的关键是：每种切法都是\"切一块 + 剩余的最优解\"，取所有切法中最小的。\n\n可以把它类比成《水浒传》里梁山泊分配领地。\n\n宋江要把一片总面积为 `n` 的地分给好汉们，每块地必须是正方形（面积为完全平方数）。为了减少管理成本（最少块数），他要找最优的分法。对每块面积为 `i` 的地，他先切掉一个正方形（面积为 `j²`），剩下的面积 `i - j²` 交给副手按同样规则切。每种切法取最少块数的那个。\n\n对应关系是：\n\n- \"n\"对应领地总面积\n- \"完全平方数\"对应正方形地块\n- \"dp
