 思考路径\n\n最直接的做法是遍历链表把值存到数组里，然后在数组上用双指针判断回文。时间 `O(n)`，空间 `O(n)`，可以过但不够优雅。\n\n要做到 `O(1)` 空间，关键想法是：如果能把链表的后半段反转，然后前半段和反转后的后半段逐一比较，就能判断是否回文。\n\n具体步骤：\n1. 用快慢指针找到链表的中点（快指针走两步，慢指针走一步）。\n2. 反转后半段链表。\n3. 前半段和反转后的后半段逐一比较。\n4. （可选）把后半段再反转回来恢复原链表。\n\n这个方案把链表的三个经典操作串联在一起：快慢指针找中点、反转链表、双指针比较。每一步都是 `O(n)`，整体 `O(n)` 时间 `O(1)` 空间。\n\n这题的关键词不是\"判断回文\"，而是\"找中点、反转后半段、前后比较——三步搞定\"。\n\n## 💻 Java 题解\n\n### 解法 1：快慢指针 + 反转后半部分\n\n快慢指针找中点，反转后半部分链表，然后双指针比较前后两半。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public boolean isPalindrome(ListNode head) {\n        // 快慢指针找中点\n        ListNode slow = head, fast = head;\n        while (fast.next != null \u0026\u0026 fast.next.next != null) {\n            slow = slow.next; fast = fast.next.next;\n        }\n        // 反转后半部分\n        ListNode second = reverse(slow.next);\n        // 比较\n        ListNode p1 = head, p2 = second;\n        while (p2 != null) {\n            if (p1.val != p2.val) return false;\n            p1 = p1.next; p2 = p2.next;\n        }\n        return true;\n    }\n    private ListNode reverse(ListNode head) {\n        ListNode prev = null, curr = head;\n        while (curr != null) {\n            ListNode next = curr.next;\n            curr.next = prev;\n            prev = curr; curr = next;\n        }\n        return prev;\n    }\n}\n```\n\n**关键点：**\n- 快慢指针找中点\n- 反转后半部分与前半比较\n- O(1) 空间\n\n**执行步骤：**\n1. 快慢指针找中点\n1. 反转后半部分\n1. 双指针逐个比较\n\n\n## ⚠️ 易错点\n\n- 反转后半段时，`prev` 初始为 `null`，不是 `slow`。\n- 比较时只需要判断 `right != null`，因为如果链表长度为奇数，前半段会多一个中间节点，不影响判断。\n- 快慢指针的循环条件是 `fast and fast.next`，缺一不可。\n\n- 奇数长度时 slow 停在前半的最后一个\n\n- fast.next 和 fast.next.next 都要判空\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。找中点 `O(n/2)`，反转 `O(n/2)`，比较 `O(n/2)`。\n- 空间复杂度：`O(1)`。只用了几个指针变量。\n\n## 🏢 实际业务应用\n\n- DNA 序列分析中判断某段碱基序列是否为回文（回文序列在基因调控中有特殊意义），链表表示的序列可以直接用这个方法。\n- 数据校验中，判断某种链式存储的数据是否前后对称，用于数据完整性检查。\n- 文本编辑器中判断光标前后的字符是否对称（比如检测括号匹配的变体），底层可以用链表反转比较。\n\n- DNA 序列分析中判断某段碱基序列是否为回文（回文序列在基因调控中有特殊意义），链表表示的序列可以直接用这个方法。\n- 数据校验中，判断某种链式存储的数据是否前后对称，用于数据完整性检查。\n- 文本编辑器中判断光标前后的字符是否对称（比如检测括号匹配的变体），底层可以用链表反转比较。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里孙悟空用金箍棒搭桥的场景。\n\n孙悟空把金箍棒从中间折断（对应快慢指针找中点），后半段翻过来（对应反转后半段链表），然后看前半段和翻过来的后半段能不能严丝合缝地对上（对应逐一比较）。如果能对上，说明金箍棒是对称的——就像回文链表正着反着都一样。\n\n对应关系是：\n\n- \"从中间折断\"对应快慢指针找中点\n- \"后半段翻过来\"对应反转后半段链表\n- \"严丝合缝地对上\"对应前后逐一比较\n- \"对称的金箍棒\"对应回文链表\n\n这段记忆的关键是：找中点、反转后半段、前后比较——三步判断回文。\n\n可以把它类比成《西游记》里孙悟空用金箍棒搭桥的场景。\n\n孙悟空把金箍棒从中间折断（对应快慢指针找中点），后半段翻过来（对应反转后半段链表），然后看前半段和翻过来的后半段能不能严丝合缝地对上（对应逐一比较）。如果能对上，说明金箍棒是对称的——就像回文链表正着反着都一样。\n\n对应关系是：\n\n- \"从中间折断\"对应快慢指针找中点\n- \"后半段翻过来\"对应反转后半段链表\n- \"严丝合缝地对上\"对应前后逐一比较\n- \"对称的金箍棒\"对应回文链表\n\n这段记忆的关键是：找中点、反转后半段、前后比较——三步判断回文。\n\n小蚂蚁排成一队，猫头鹰要判断这支队伍是不是\"镜像对称\"的。它让队伍从中间分开，后半段掉个头，然后前后两端的小蚂蚁一一碰触角。如果每一对都能碰上，就说明队伍是对称的。\n\n小蚂蚁排成一队，猫头鹰要判断这支队伍是不是\"镜像对称\"的。它让队伍从中间分开，后半段掉个头，然后前后两端的小蚂蚁一一碰触角。如果每一对都能碰上，就说明队伍是对称的。\n\n## 🎵 记忆口诀\n\n快慢找中点，反转后半段，前后逐一比。\n\n快慢找中点，反转后半段，前后逐一比。\n\n## 🔗 延伸练习\n\n- `206. 反转链表`：这题的核心子操作，如果反转不熟练，先练这道。\n- `143. 重排链表`：同样用到找中点和反转链表，但反转后是交叉合并而非比较。\n\n- `206. 反转链表`：这题的核心子操作，如果反转不熟练，先练这道。\n- `143. 重排链表`：同样用到找中点和反转链表，但反转后是交叉合并而非比较。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⛓️\"}],234,\". \",\"回文链表\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0234\",\"lcId\":234,\"slug\":\"palindrome-linked-list\",\"title\":\"回文链表\",\"question\":\"回文链表\",\"answer\":\"$e\",\"difficulty\":\"Easy\",\"category\":\"linked-list\",\"categories\":[\"linked-list\"],\"tags\":[\"栈\",\"递归\",\"链表\",\"双指针\"],\"url\":\"https://leetcode.cn/problems/palindrome-linked-list/\",\"planOrder\":24,\"hasViz\":true,\"hasDiagram\":false,\"feynm
