是理解栈维护\"区间边界\"的绝佳题目。\n\n## 🧠 思考路径\n\n最朴素的想法是枚举所有子串，逐个判断是否合法。这显然是 `O(n³)`，不行。\n\n想一个更好的办法。括号匹配天然适合用栈——遇到 `(` 就入栈，遇到 `)` 就看栈顶有没有 `(` 来配对。但光判断合法不够，我们还需要知道\"连续合法的长度\"。\n\n关键观察：如果用栈来存字符本身，弹出配对之后，栈空了就不知道这段连续合法有多长了。但如果栈里存的是下标呢？\n\n栈里存下标。初始时把 `-1` 入栈作为\"基准线\"。遍历字符串，遇到 `(` 就把下标入栈；遇到 `)` 就先弹出栈顶。弹出之后如果栈不空，当前下标减去栈顶就是一段有效长度；如果栈空了，说明当前的 `)` 没人配对，就把它的下标作为新的基准线入栈。\n\n这样，栈顶始终是\"最后一个没有被匹配的右括号的下标\"（或初始的 -1），它就是当前有效区间的左边界。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划\n\ns[i]=')'时：若s[i-1]='('则dp[i]=dp[i-2]+2。若s[i-1]=')'且s[i-dp[i-1]-1]='('则dp[i]=dp[i-1]+2+dp[i-dp[i-1]-2]。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int longestValidParentheses(String s) {\n        int maxLen = 0;\n        int[] dp = new int[s.length()];\n        for (int i = 1; i \u003c s.length(); i++) {\n            if (s.charAt(i) == ')') {\n                if (s.charAt(i - 1) == '(') {\n                    dp[i] = (i \u003e= 2 ? dp[i - 2] : 0) + 2;\n                } else if (i - dp[i - 1] - 1 \u003e= 0 \u0026\u0026 s.charAt(i - dp[i - 1] - 1) == '(') {\n                    dp[i] = dp[i - 1] + 2 + (i - dp[i - 1] - 2 \u003e= 0 ? dp[i - dp[i - 1] - 2] : 0);\n                }\n                maxLen = Math.max(maxLen, dp[i]);\n            }\n        }\n        return maxLen;\n    }\n}\n```\n\n**关键点：**\n- 两种情况：()和))\n- 情况2：检查匹配的( 位置\n- 加上匹配( 之前的dp值\n\n**执行步骤：**\n1. s[i]==)时\n1. s[i-1]==( → dp[i]=dp[i-2]+2\n1. s[i-1]==) → 检查匹配位置\n\n\n## ⚠️ 易错点\n\n- 栈里存的是下标，不是字符。初始哨兵 `-1` 不能忘，否则第一个 `()` 的长度算不出来。\n- 遇到 `)` 时要先弹出，再判断栈是否为空。不是先判断再弹出。\n- 栈空时要把当前 `)` 的下标压入，作为新一轮的\"左边界\"，不能直接跳过。\n\n- 边界检查：i-dp[i-1]-1\u003e=0\n\n- 加上匹配位置之前的dp值\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个字符最多入栈、出栈各一次。\n- 空间复杂度：`O(n)`。最坏情况下栈里存了所有 `(` 的下标。\n\n## 🏢 实际业务应用\n\n- 代码编辑器的括号高亮功能：当光标移到某个括号上时，编辑器需要找到与它配对的括号以及整个有效区间，本质上就是括号匹配加区间计算。\n- 模板引擎解析嵌套标签：类似 `{{if}}...{{/if}}` 的嵌套结构，需要找到最长的合法嵌套片段，和括号匹配是同一个问题。\n- SQL 解析器或表达式解析器在检查语法正确性时，需要找出最长的语法合法片段来定位错误位置。\n\n- 代码编辑器的括号高亮功能：当光标移到某个括号上时，编辑器需要找到与它配对的括号以及整个有效区间，本质上就是括号匹配加区间计算。\n- 模板引擎解析嵌套标签：类似 `{{if}}...{{/if
