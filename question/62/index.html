规模。如果是 `2 × 2` 的网格，从左上到右下有 2 条路：先右再下，或先下再右。\n\n再想递推关系。站在某个格子上，你只可能从上面走下来或从左边走过来。所以到达这个格子的路径总数 = 上面格子的路径数 + 左面格子的路径数。这就是经典的 DP 递推式：`dp[i][j] = dp[i-1][j] + dp[i][j-1]`。\n\n边界条件很简单：第一行的格子只能从左边来，所以都只有 1 条路；第一列的格子只能从上面来，也都只有 1 条路。\n\n进一步优化空间：计算 `dp[i][j]` 只需要上一行的值和本行左边的值，所以用一维数组就够了，从左到右滚动更新。\n\n再进一步，这题其实可以用组合数学直接算。从左上到右下一共走 `m+n-2` 步，其中 `m-1` 步向下，`n-1` 步向右。路径数就是从 `m+n-2` 里选 `m-1` 的组合数 `C(m+n-2, m-1)`。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（空间优化）\n\ndp[j]=dp[j]+dp[j-1]。一维数组滚动。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int uniquePaths(int m, int n) {\n        int[] dp = new int[n];\n        Arrays.fill(dp, 1);\n        for (int i = 1; i \u003c m; i++)\n            for (int j = 1; j \u003c n; j++)\n                dp[j] += dp[j - 1];\n        return dp[n - 1];\n    }\n}\n```\n\n**关键点：**\n- 一维数组\n- dp[j]+=dp[j-1]\n- 第一行全1初始化\n\n**执行步骤：**\n1. 初始化全1\n1. 逐行累加\n1. 返回dp[n-1]\n\n\n## ⚠️ 易错点\n\n- 不要把 `m` 和 `n` 搞反了。`m` 是行数，`n` 是列数，初始化时数组长度应该是 `n`。\n- 暴力递归会超时。`m = 23, n = 12` 时路径数已经是上千万，递归深度和重复计算都会爆掉。\n- 用组合数学解法时，注意先除后乘防止溢出，Python 3 的 `math.comb` 已经处理好了。\n\n- 一维数组从1开始j\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`。遍历整个网格一次。\n- 空间复杂度：`O(n)`。用一维数组滚动更新。\n\n## 🏢 实际业务应用\n\n- 仓储机器人路径规划：在网格化仓库中，AGV 机器人从出发点到目标货位，只能沿固定方向移动，路径方案数就是不同路径问题。\n- 城市导航的可达路线估算：某些城市路网是类网格结构（如曼哈顿），从 A 到 B 的不同走法和不同路径问题同构。\n- 游戏关卡设计：策略游戏中角色从地图一端到另一端的可选路线数量，直接影响关卡难度。\n\n- 仓储机器人路径规划：在网格化仓库中，AGV 机器人从出发点到目标货位，只能沿固定方向移动，路径方案数就是不同路径问题。\n- 城市导航的可达路线估算：某些城市路网是类网格结构（如曼哈顿），从 A 到 B 的不同走法和不同路径问题同构。\n- 游戏关卡设计：策略游戏中角色从地图一端到另一端的可选路线数量，直接影响关卡难度。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里唐僧取经的路线规划。\n\n唐僧从长安出发，要去西天取经。路途被想象成一个巨大的网格，每次只能往西走一步或往南走一步。观音菩萨问：\"从长安到大雷音寺，有多少种走法？\"唐僧不会傻到一条条试，而是想：\"走到某个关口的路，只能从北边来或东边来。把两个方向的走法加起来，就是这个关口的走法总数。\"\n\n对应关系是：\n\n- \"网格\"对应从长安到西天的路线图\n- \"只能向右或向下\"对应只能向西或向南行进\n- `dp[i][j]` 对应到达第 `i` 行第 `j` 列关口的走法数\n- `dp[i-1][j] + dp[i][j-1]` 对应\"北边来的路数 + 东边来的路数\"\n\n可以把它类比成《西游记》里唐僧取经的路线规划。\n\n唐僧从长安出发，要去西天取经。路途被想象成一个巨大的网格，每次只能往西走一步或往南走一步。观音菩萨问：\"从长安到大雷音寺，有多少种走法？\"唐僧不会傻到一条条试，而是想：\"走到某个关口的路，只能从北边来或东边来。把两个方向的走法加起
