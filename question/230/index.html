中序遍历天然有序，第 K 个就是第 K 小，是理解 BST 核心特性的必做题。\n\n## 🧠 思考路径\n\n二叉搜索树的性质是：左子树所有节点值 \u003c 根节点值 \u003c 右子树所有节点值。这个性质意味着，对 BST 做中序遍历（左 → 根 → 右），输出的序列天然就是从小到大排序的。\n\n所以找第 `k` 小的元素，只需要做中序遍历，遍历到第 `k` 个时停下来，返回那个节点的值。\n\n可以用递归实现中序遍历，用一个全局计数器 `count` 记录当前是第几个，到 `k` 时记录答案。也可以用迭代方式（显式栈）实现，这样可以在找到答案时立即停止，不用遍历完整棵树。\n\n如果这棵树会被频繁查询第 `k` 小，可以在每个节点上额外维护\"左子树节点数\"，这样就能二分搜索，每次 `O(log n)` 查询。但单次查询用中序遍历就够了。\n\n这题的关键词不是\"排序找第K个\"，而是\"BST 的中序遍历 = 升序，走到第 K 个就停\"。\n\n## 💻 Java 题解\n\n### 解法 1：中序遍历（提前终止）\n\n中序遍历BST，遍历到第k个时返回。不需要遍历完整棵树。\n\n- ⏱ 时间复杂度：`O(h+k)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    int count = 0, result = 0;\n    public int kthSmallest(TreeNode root, int k) {\n        inorder(root, k);\n        return result;\n    }\n    private void inorder(TreeNode node, int k) {\n        if (node == null) return;\n        inorder(node.left, k);\n        count++;\n        if (count == k) { result = node.val; return; }\n        if (count \u003c k) inorder(node.right, k);\n    }\n}\n```\n\n**关键点：**\n- 中序遍历BST是升序\n- count==k 时提前终止\n\n**执行步骤：**\n1. 中序遍历\n1. 计数到 k 时记录结果\n1. 提前终止避免不必要的遍历\n\n\n## ⚠️ 易错点\n\n- 中序遍历的顺序是\"左 → 根 → 右\"，别写成\"根 → 左 → 右\"（前序）。\n- `k` 从 1 开始计数，不是从 0 开始。\n- 递归版本中，找到答案后要提前终止，不然会多遍历无用的节点。用返回值或标志变量控制。\n- 迭代法中，内层 `while` 是一路向左压栈，外层 `while` 是整体遍历控制。\n\n- 找到后要终止递归避免浪费\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(H + k)`，`H` 为树高。先走 `H` 步到底，再访问 `k` 个节点。最坏 `O(n)`。\n- 空间复杂度：`O(H)`，栈的深度等于树高。最坏 `O(n)`（退化为链表）。\n\n## 🏢 实际业务应用\n\n- 数据库索引（B+ 树本质上也是搜索树的变体）中查询\"第 K 条记录\"，底层就是沿着索引做类似中序遍历的顺序扫描。\n- 排行榜系统中，如果数据存储在 BST 结构中，查询\"第 K 名\"就是这题的直接应用。\n- 时间序列数据库中，按时间戳排列的数据用 BST 索引后，查询\"第 K 早的事件\"可以用中序遍历实现。\n\n- 数据库索引（B+ 树本质上也是搜索树的变体）中查询\"第 K 条记录\"，底层就是沿着索引做类似中序遍历的顺序扫描。\n- 排行榜系统中，如果数据存储在 BST 结构中，查询\"第 K 名\"就是这题的直接应用。\n- 时间序列数据库中，按时间戳排列的数据用 BST 索引后，查询\"第 K 早的事件\"可以用中序遍历实现。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里龙王给孙悟空展示兵器库的场景。\n\n龙宫的兵器按照重量从小到大排列在两侧的架子上（对应 BST 的左小右大）。孙悟空想找第 K 轻的兵器。龙王带他从最轻的开始，往右一个个看（对应中序遍历），数到第 K 个就是答案。\n\n对应关系是：\n\n- \"兵器按重量排列\"对应 BST 的有序性\n- \"从最轻的开始往右看\"对应中序遍历\n- \"数到第 K 个\"对应 `k` 的递减计数\n- \"找到就停\"对应提前终止\n\n这段记忆
