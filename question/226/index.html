直觉非常直接：对每个节点，把它的左孩子和右孩子交换一下就行了。问题是：怎么确保整棵树都被翻转？\n\n答案就是递归。对根节点，先交换它的左右孩子。交换完之后，左子树和右子树各自内部还没有翻转，所以对左子树递归做同样的操作，再对右子树递归做。递归到叶子节点（空节点）时自然停止。\n\n也可以用迭代的方式，借助队列做层序遍历：每个节点出队时交换它的左右孩子，如果有孩子就入队。效果完全一样。\n\n这题之所以出名，还因为一个典故：Homebrew 的作者 Max Howell 在 Google 面试时没写出这题，被拒了。他在推特上说\"Google: 90% of our engineers use the software you wrote (Homebrew), but you can't invert a binary tree on a whiteboard so f*** off\"，让这道题成为了算法面试文化的标志。\n\n这题的关键词不是\"翻转\"，而是\"递归的本质就是让每个节点做同一件简单的事\"。\n\n## 💻 Java 题解\n\n### 解法 1：递归交换\n\n交换当前节点的左右子树，递归翻转左右子树。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public TreeNode invertTree(TreeNode root) {\n        if (root == null) return null;\n        TreeNode temp = root.left;\n        root.left = invertTree(root.right);\n        root.right = invertTree(temp);\n        return root;\n    }\n}\n```\n\n**关键点：**\n- 交换左右子树\n- 递归处理子树\n\n**执行步骤：**\n1. 保存左子树引用\n1. left=递归翻转右子树\n1. right=递归翻转保存的左子树\n\n\n## ⚠️ 易错点\n\n- Python 的 `root.left, root.right = root.right, root.left` 可以一行完成交换；Java 需要临时变量，不能连续赋值。\n- 递归时交换和递归的顺序不影响结果——先交换再递归，或先递归再交换，都可以。\n- 空节点必须判断，否则访问 `null.left` 会报错。\n\n- 先保存 left 再赋值，否则会丢失引用\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点恰好被访问一次。\n- 空间复杂度：递归法 `O(h)`（`h` 为树高，递归栈深度），最坏 `O(n)`（退化为链表）；迭代法 `O(n)`（队列最多存一层节点）。\n\n## 🏢 实际业务应用\n\n- 数据库索引（B+ 树）在分裂或合并节点时，需要交换左右子树的指针，逻辑上和翻转二叉树的操作非常类似。\n- 编译器的 AST（抽象语法树）变换中，交换运算符两侧的操作数（比如把 `a - b` 变成 `b - a` 的等价变换），本质上就是在树上做节点交换。\n- 图像处理中的镜像翻转，如果图像数据存储在树结构中，翻转操作就是交换每个节点的左右子树。\n\n- 数据库索引（B+ 树）在分裂或合并节点时，需要交换左右子树的指针，逻辑上和翻转二叉树的操作非常类似。\n- 编译器的 AST（抽象语法树）变换中，交换运算符两侧的操作数（比如把 `a - b` 变成 `b - a` 的等价变换），本质上就是在树上做节点交换。\n- 图像处理中的镜像翻转，如果图像数据存储在树结构中，翻转操作就是交换每个节点的左右子树。\n\n## 📖 形象类比\n\n可以把它类比成《红楼梦》里大观园中左右对称的院落交换。\n\n贾母让下人把大观园里每个院子的东厢房和西厢房对调。总管不用画复杂的图纸，只需要一个规则：到每个院子，把东厢和西厢互换；然后去东厢看看还有没有更小的院落，有就同样换；再去西厢看看。每个院子做的事完全一样，最后整个园子的左右就全部对调了。\n\n对应关系是：\n\n- \"每个院子的东厢和西厢\"对应每个节点的左右子树\n- \"对调\"对应交换左右孩子\n- \"去更小的院落继续换\"对应递归处理子树\n- \"总管只记一条规则\"对应递归只需要一个简单操作\n\n这段记忆的关键是：不需要理解全局结构，只需要知道\"到了一个节点就交换，然后去子节点继续做\"。\n\n可以把它类比成《红楼梦》里大观园中左右对称的院落交换。\n\n贾母让下人把大观园里每个院子的东厢房和西厢房对调。总管不用画复杂的图纸，只需要一个规则：到每个院子，把东厢和西厢互换；然后去东厢看看还有没有更小的院落，有就同样换；再去西厢看看。每个院子做的事完全一样，最后整个园子的左右就全部对调了。\n\n对应关系是：\n\n- \"每个院子的东厢和西厢\"对应每个节点的左右子树\n- \"对调\"对应交换左右孩子\n- \"去更小的院落继续换\"对应递归处理子树\n- \"总管只记一条规则\"对应递归只需要一个简单操作\n\n这段记忆的关键是：不需要理解全局结构，只需要知道\"到了一个节点就交换，然后去子节点继续做\"。\n\n猫头鹰老师让小鸟们做体操：\"抬起左翅膀，放下右翅膀……不对，交换！左翅膀变右翅膀！\"每只小鸟只需要做一件事：把左翅膀和右翅膀换一下。大鸟带小鸟，小鸟带更小的鸟，一传十十传百，整棵树上的鸟都完成了翅膀交换体操。\n\n猫头鹰老师让小鸟们做体操：\"抬起左翅膀，放下右翅膀……不对，交换！左翅膀变右翅膀！\"每只小鸟只需要做一件事：把左翅膀和右翅膀换一下。大鸟带小鸟，小鸟带更小的鸟，一传十十传百，整棵树上的鸟都完成了翅膀交换体操。\n\n## 🎵 记忆口诀\n\n到了就换，换完往两边递归。\n\n到了就换，换完往两边递归。\n\n## 🔗 延伸练习\n\n- `101. 对称二叉树`：翻转的\"镜像版\"——不是翻转，而是判断左右子树是否互为镜像。\n- `951. 翻转等价二叉树`：两棵树是否可以通过若干次翻转子树的操作变成相同的。\n\n- `101. 对称二叉树`：翻转的\"镜像版\"——不是翻转，而是判断左右子树是否互为镜像。\n- `951. 翻转等价二叉树`：两棵树是否可以通过若干次翻转子树的操作变成相同的。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🌳\"}],226,\". \",\"翻转二叉树\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0226\",\"lcId\":226,\"slug\":\"invert-binary-tree\",\"title\":\"翻转二叉树\",\"question\":\"翻转二叉树\",\"answer\":\"$e\",\"difficulty\":\"Easy\",\"category\":\"binary-tree\",\"categories\":[\"binary-tree\"],\"tags\":[\"树\",\"深度优先搜索\",\"广度优先搜索\",\"二叉树\"],\"url\":\"https://leetcode.cn/problems/invert-binary-tree/\",\"planOrder\":38,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一棵二叉树的根节点，翻转这棵树，即交换每个节点的左右子树。  重点不在\\\"怎么翻转\\\"，而在\\\"怎么用递归让每个节点都做同样的交换操作\\\"。\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"
