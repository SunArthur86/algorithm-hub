合适的 key 把同一类元素归到一组。\n\n## 🧠 思考路径\n\n最朴素的想法是：对每对字符串都检查一下是不是异位词，是就分到同一组。但两两比较太慢，`O(n² × m)`。\n\n换个角度：两个字符串是异位词，等价于它们包含的字母种类和数量完全相同。那我们只需要找到一个\"统一的标准形式\"，让所有异位词都映射到同一个 key 上。\n\n最自然的 key 有两种：\n1. **排序后的字符串**：`\"eat\"` 排序后是 `\"aet\"`，`\"tea\"` 排序后也是 `\"aet\"`。排序是天然的\"统一标准\"。\n2. **字母计数编码**：统计每个字母出现的次数，拼成 `\"a1e1t1\"` 这样的字符串作为 key。对于包含 Unicode 的情况更通用。\n\n用哈希表存储 `key → 同组字符串列表`，遍历一次即可完成分组。\n\n## 💻 Java 题解\n\n### 解法 1：排序字符串作为哈希键\n\n对每个字符串排序，排序结果相同的即为异位词，分到同一组。\n\n- ⏱ 时间复杂度：`O(n·k·log k)`\n- 💾 空间复杂度：`O(n·k)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cString\u003e\u003e groupAnagrams(String[] strs) {\n        Map\u003cString, List\u003cString\u003e\u003e map = new HashMap\u003c\u003e();\n        for (String s : strs) {\n            char[] chars = s.toCharArray();\n            Arrays.sort(chars);\n            String key = new String(chars);\n            map.computeIfAbsent(key, k -\u003e new ArrayList\u003c\u003e()).add(s);\n        }\n        return new ArrayList\u003c\u003e(map.values());\n    }\n}\n```\n\n**关键点：**\n- 排序后字符串作为 key\n- computeIfAbsent 简化代码\n- 字母异位词排序后一定相同\n\n**执行步骤：**\n1. 遍历每个字符串\n1. 转为 char[] 排序得到 key\n1. 用 HashMap 分组\n1. 返回所有分组列表\n\n\n### 解法 2：字符计数数组作为键\n\n统计每个字母出现次数，用 26 长度数组转字符串作为 key，避免排序开销。\n\n- ⏱ 时间复杂度：`O(n·k)`\n- 💾 空间复杂度：`O(n·k)`\n\n```java\nclass Solution {\n    public List\u003cList\u003cString\u003e\u003e groupAnagrams(String[] strs) {\n        Map\u003cString, List\u003cString\u003e\u003e map = new HashMap\u003c\u003e();\n        for (String s : strs) {\n            int[] count = new int[26];\n            for (char c : s.toCharArray()) count[c - 'a']++;\n            String key = Arrays.toString(count);\n            map.computeIfAbsent(key, k -\u003e new ArrayList\u003c\u003e()).add(s);\n        }\n        return new ArrayList\u003c\u003e(map.values());\n    }\n}\n```\n\n**关键点：**\n- 26字母计数代替排序\n- 时间复杂度更优\n- key 用 Arrays.toString 转换\n\n**执行步骤：**\n1. 遍历每个字符串\n1. 统计26个字母出现频率\n1. 频率数组转字符串作为 key\n1. HashMap 分组\n\n\n## ⚠️ 易错点\n\n- Python 中 `sorted(s)` 返回的是字符列表，需要 `''.join()` 拼成字符串才能当 key。\n- Java 中用计数法时，`StringBuilder` 拼出的 key 格式要唯一。不能只拼计数不拼字母，否则 `\"abb\"` 和 `\"aab\"` 的计数数组不同但只拼数字可能冲突。\n- `groups.values()` 返回的不是 `list`，需要 `list()` 或 `new ArrayList\u003c\u003e()` 包装一下。\n- 空字符串也是合法输入，排序后还是空字符串，会被分到同一组。\n\n- 排序用 Arrays.sort(chars) 不是 String 排序\n\n- 注意空字符串的处理\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n × k log k)`，其中 `n` 是字符串个数，`k` 是字符串的最大长度。每个字符串排序需要 `O(k log k)`。如果用计数法，时间降到 `O(n × k)`。\n- 空间复杂度：`O(n × k)`。哈希表需要存储所有字符串。\n\n## 🏢 实际业务应用\n\n- **搜索引擎纠错**：用户输入 `from` 和 `form` 是常见的手指顺序错误。搜索引擎用字母异位词分组可以快速识别这类拼写错误，给出\"你是不是想搜 XXX\"的提示。\n- **文档查重**：两篇文章中的段落，如果打乱了句子顺序（洗稿），传统哈希无法识别。但如果把每个词的字母排序后作为指纹，异位词分组可以帮助发现这类\"字面相同、顺序不同\"的内容抄袭。\n- **推荐系统特征提取**：在自然语言处理中，两个词如果包含相同的字母组合，可能在词形变化上有联系（如 `listen` 和 `silent`）。分组后可以作为特征输入推荐模型。\n- **账号风控**：批量注册的垃圾账号可能用字母相同但顺序不同的用户名（如 `abc123`、`123abc`、`cba321`），用异位词分组可以快速发现这类批量注册行为。\n\n- **搜索引擎纠错**：用户输入 `from` 和 `form` 是常见的手指顺序错误。搜索引擎用字母异位词分组可以快速识别这类拼写错误，给出\"你是不是想搜 XXX\"的提示。\n- **文档查重**：两篇文章中的段落，如果打乱了句子顺序（洗稿），传统哈希无法识别。但如果把每个词的字母排序后作为指纹，异位词分组可以帮助发现这类\"字面相同、顺序不同\"的内容抄袭。\n- **推荐系统特征提取**：在自然语言处理中，两个词如果包含相同的字母组合，可能在词形变化上有联系（如 `listen` 和 `silent`）。分组后可以作为特征输入推荐模型。\n- **账号风控**：批量注册的垃圾账号可能用字母相同但顺序不同的用户名（如 `abc123`、`123abc`、`cba321`），用异位词分组可以快速发现这类批量注册行为。\n\n## 📖 形象类比\n\n可以类比《水浒传》中梁山泊英雄排座次的场景。\n\n宋江要给一百零八将分组，但分组的标准不是武功高低，而是\"名字的笔画用到了相同的字\"。比如\"李逵\"和\"逵李\"如果都是好汉，他们名字包含的字完全相同，只是排列不同，就应该分到同一组。宋江让每个好汉把自己的名字写在纸条上，然后把字按笔画排序重新贴好——排序后的结果就是分组的依据，排序结果相同的好汉归为一组。\n\n对应关系：\n\n- \"好汉名字\"对应输入字符串\n- \"名字按笔画排序\"对应 `sorted(s)`\n- \"排序后的标准名\"对应哈希表的 key\n- \"同一组的好汉\"对应同一 key 下的字符串列表\n\n可以类比《水浒传》中梁山泊英雄排座次的场景。\n\n宋江要给一百零八将分组，但分组的标准不是武功高低，而是\"名字的笔画用到了相同的字\"。比如\"李逵\"和\"逵李\"如果都是好汉，他们名字包含的字完全相同，只是排列不同，就应该分到同一组。宋江让每个好汉把自己的名字写在纸条上，然后把字按笔画排序重新贴好——排序后的结果就是分组的依据，排序结果相同的好汉归为一组。\n\n对应关系：\n\n- \"好汉名字\"对应输入字符串\n- \"名字按笔画排序\"对应 `sorted(s)`\n- \"排序后的标准名\"对应哈希表的 key\n- \"同一组的好汉\"对应同一 key 下的字符串列表\n\n小松鼠收集了一大堆橡果，每颗上面刻着不同的字母。它想把\"字母组成相同\"的橡果放进同一个篮子里。于是它把每颗橡果上的字母按 ABC 顺序重新排好，比如 `t-e-a` 变成 `a-e-t`，然后看哪个篮子上标着 `aet`，就放进去。很快，所有橡果就整整齐齐地分好了。\n\n小松鼠收集了一大堆
