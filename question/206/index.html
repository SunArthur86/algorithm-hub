过，但浪费了 `O(n)` 的额外空间，而且失去了练习指针操作的机会。\n\n正解的思路很纯粹：遍历链表，每到一个节点，就把它指向的下一个节点改成指向它前面的节点。问题在于：修改 `next` 指针时，原来的下一个节点就丢了。所以需要三个指针配合工作：`prev`（前驱）、`curr`（当前）、`next`（暂存后继）。\n\n也可以递归地做：假设后面的部分已经反转好了，我只需要让当前节点的 `next` 指向自己，再把自己指向 `null`。递归的终止条件是链表为空或只有一个节点。\n\n这题的关键词不是\"反转\"，而是\"三个指针的精准配合\"。\n\n## 💻 Java 题解\n\n### 解法 1：迭代（推荐）\n\n用 prev=null, curr=head。每次保存 next，翻转 curr.next=prev，然后 prev=curr, curr=next。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public ListNode reverseList(ListNode head) {\n        ListNode prev = null, curr = head;\n        while (curr != null) {\n            ListNode next = curr.next;\n            curr.next = prev;\n            prev = curr;\n            curr = next;\n        }\n        return prev;\n    }\n}\n```\n\n**关键点：**\n- 三指针：prev, curr, next\n- 先存 next 再翻转\n- prev 最终是新头节点\n\n**执行步骤：**\n1. prev=null, curr=head\n1. 保存 next=curr.next\n1. 翻转 curr.next=prev\n1. 前进 prev=curr, curr=next\n\n\n### 解法 2：递归\n\n递归反转后面的链表，然后让当前节点的 next 指回自己。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public ListNode reverseList(ListNode head) {\n        if (head == null || head.next == null) return head;\n        ListNode newHead = reverseList(head.next);\n        head.next.next = head;\n        head.next = null;\n        return newHead;\n    }\n}\n```\n\n**关键点：**\n- 递归到底再回溯翻转\n- head.next.next=head 是核心\n- head.next=null 断开原方向\n\n**执行步骤：**\n1. 递归到链表末尾\n1. 回溯时 head.next.next=head\n1. head.next=null\n\n\n## ⚠️ 易错点\n\n- 一定要在修改 `curr.next` 之前暂存 `curr.next`，否则后继节点就丢了。\n- 迭代法返回的是 `prev` 不是 `curr`，因为 `curr` 最终会变成 `null`。\n- 递归法中 `head.next.next = head` 是让下一个节点指向自己，不要写成 `head.next = head`。\n- 空链表和单节点链表直接返回 `head`。\n\n- 迭代法忘记先保存 next\n\n- 递归法忘记 head.next=null\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点访问一次。\n- 空间复杂度：迭代法 `O(1)`；递归法 `O(n)`（递归栈深度）。\n\n## 🏢 实际业务应用\n\n- 浏览器的前进/后退功能：后退栈就是一个不断被\"反转\"的访问历史链表，最后访问的页面要最先弹出。\n- 文本编辑器的撤销操作（Undo）：操作记录以链表形式存储，撤销时从最新的操作往回走，本质上就是在反转操作序列。\n- 链表类的 LRU 缓存：需要把最近访问的节点移到头部，涉及断开和重新插入，核心操作就是反转的变体。\n\n- 浏览器的前进/后退功能：
