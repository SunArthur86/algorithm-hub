"有向无环图 + 入度\"的核心图论思维。\n\n## 🧠 思考路径\n\n这个问题本质上是：给一个有向图，判断其中有没有环。如果没有环（有向无环图，DAG），就能找到一个合法的学习顺序；如果有环（比如\"学 A 要先学 B，学 B 要先学 A\"），就永远学不完。\n\n检测有向图是否有环，最经典的方法是拓扑排序。具体做法是用 BFS 配合\"入度\"：\n\n1. 统计每个节点的入度（有多少条边指向它）。入度为 0 表示没有前置依赖，可以先学。\n2. 把所有入度为 0 的节点放入队列。\n3. 从队列中取出一个节点，把它指向的所有邻居的入度减 1。如果减到 0，说明它的前置条件都满足了，也放入队列。\n4. 最后看处理了多少个节点。如果等于总课程数，说明没有环；如果有节点没被处理到，说明这些节点在环里。\n\n也可以用 DFS 做拓扑排序，通过颜色标记（白/灰/黑）来检测环。\n\n这题的关键词不是\"排课表\"，而是\"拓扑排序检测有向图中的环\"。\n\n## 💻 Java 题解\n\n### 解法 1：BFS 拓扑排序（Kahn算法）\n\n建图+入度数组。入度为0的入队，弹出时减少邻居入度。最终已修课程数=总数则无环。\n\n- ⏱ 时间复杂度：`O(V+E)`\n- 💾 空间复杂度：`O(V+E)`\n\n```java\nclass Solution {\n    public boolean canFinish(int numCourses, int[][] prerequisites) {\n        List\u003cList\u003cInteger\u003e\u003e graph = new ArrayList\u003c\u003e();\n        int[] inDegree = new int[numCourses];\n        for (int i = 0; i \u003c numCourses; i++) graph.add(new ArrayList\u003c\u003e());\n        for (int[] pre : prerequisites) {\n            graph.get(pre[1]).add(pre[0]);\n            inDegree[pre[0]]++;\n        }\n        Queue\u003cInteger\u003e q = new LinkedList\u003c\u003e();\n        for (int i = 0; i \u003c numCourses; i++)\n            if (inDegree[i] == 0) q.offer(i);\n        int count = 0;\n        while (!q.isEmpty()) {\n            int course = q.poll();\n            count++;\n            for (int next : graph.get(course))\n                if (--inDegree[next] == 0) q.offer(next);\n        }\n        return count == numCourses;\n    }\n}\n```\n\n**关键点：**\n- 入度为0先入队\n- 弹出后邻居入度-1\n- count==numCourses 表示无环\n\n**执行步骤：**\n1. 建图+入度数组\n1. 入度0的入队\n1. BFS弹出减少邻居入度\n1. 判断已修课程数\n\n\n## ⚠️ 易错点\n\n- 先修关系 `[a, b]` 表示的是\"先学 b 才能学 a\"，建图时边是 `b → a`，方向别搞反。\n- BFS 法中入度为 0 的课程可能不止一门，初始时都要入队。\n- DFS 法中三态标记缺一不可：`0` 未访问、`1` 正在当前路径上（遇到说明有环）、`2` 已完成（无需再处理）。\n\n- prerequisites[i] = [a,b] 表示先修b再修a\n\n- count==numCourses 才说明无环\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(V + E)`。每个节点和每条边各访问一次。\n- 空间复杂度：`O(V + E)`。邻接表存储图。\n\n## 🏢 实际业务应用\n\n- 编译系统的依赖分析：源文件之间的 include 关系形成有向图，编译顺序就是拓扑排序的结果，循环依赖会导致编译失败。\n- 项目管理的任务调度：大项目中的任务依赖关系（任务 A 完成才能开始任务 B），检测循环依赖就是本题的直接应用。\n- 数据库的迁移脚本执行顺序：数据库 schema 变更之间有先后依赖，需要拓扑排序确定执行顺序，避免环路。\n\n- 编译系统的依赖分析：源文件之间的 include 关系形成有向图，编译顺序就是拓扑排序的结果，循环依赖会导致编译失败。\n- 项目管理的任务调度：大项目中的任务依赖关系（任务 A 完成才能开始任务 B），检测循环依赖就是本题的直接应用。\n- 数据库的迁移脚本执行顺序：数据库 schema 变更之间有先后依赖，需要拓扑排序确定执行顺序，避免环路。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里取经团队的\"通关文牒盖章\"过程。\n\n每到一个国家，唐僧需要盖一个通关文牒的章，但有些国家的章必须先拿到其他国家的章才能盖（先修关系）。如果出现\"A 国的章需要 B 国的，B 国的章又需要 A 国的\"，师徒四人就陷入了死循环，永远拿不到全部章——这就是课程表中的环检测。\n\n对应关系是：\n\n- \"课程\"对应每个国家的通关章\n- \"先修关系\"对应\"先拿到某国章才能去另一国\"\n- \"入度为 0\"对应没有前置要求的章，可以直接去盖\n- \"BFS 减入度\"对应每盖到一个章，就解锁一批新的可盖章国家\n- \"环\"对应永远无法完成的盖章循环\n\n这段记忆的关键是：有环就无解，无环就能排好序。\n\n可以把它类比成《西游记》里取经团队的\"通关文牒盖章\"过程。\n\n每到一个国家，唐僧需要盖一个通关文牒的章，但有些国家的章必须先拿到其他国家的章才能盖（先修关系）。如果出现\"A 国的章需要 B 国的，B 国的章又需要 A 国的\"，师徒四人就陷入了死循环，永远拿不到全部章——这就是课程表中的环检测。\n\n对应关系是：\n\n- \"课程\"对应每个国家的通关章\n- \"先修关系\"对应\"先拿到某国章才能去另一国\"\n- \"入度为 0\"对应没有前置要求的章，可以直接去盖\n- \"BFS 减入度\"对应每盖到一个章，就解锁一批新的可盖章国家\n- \"环\"对应永远无法完成的盖章循环\n\n这段记忆的关键是：有环就无解，无环就能排好序。\n\n小猫要收集所有果实，但每种果实都有\"前置果实\"——必须先拿到红苹果才能摘金梨。她画了一张果实关系图，先找到没有前置要求的果实（入度为 0），摘完后发现有些果实的前置条件满足了，继续摘。如果最后所有果实都摘到了，说明关系图没有死循环；如果有些果实永远摘不到，那就是循环依赖了。\n\n小猫要收集所有果实，但每种果实都有\"前置果实\"——必须先拿到红苹果才能摘金梨。她画了一张果实关系图，先找到没有前置要求的果实（入度为 0），摘完后发现有些果实的前置条件满足了，继续摘。如果最后所有果实都摘到了，说明关系图没有死循环；如果有些果实永远摘不到，那就是循环依赖了。\n\n## 🎵 记忆口诀\n\n入度为零先进队，邻居减一再入队；数够节点无环。\n\n入度为零先进队，邻居减一再入队；数够节点无环。\n\n## 🔗 延伸练习\n\n- `210. 课程表 II`：本题的进阶版，不仅判断能否学完，还要输出具体的学习顺序。\n- `329. 矩阵中的最长递增路径`：拓扑排序在矩阵中的应用，从 DAG 最长路的角度理解。\n\n- `210. 课程表 II`：本题的进阶版，不仅判断能否学完，还要输出具体的学习顺序。\n- `329. 矩阵中的最长递增路径`：拓扑排序在矩阵中的应用，从 DAG 最长路的角度理解。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\
