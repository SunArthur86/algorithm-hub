n\n## 🧠 思考路径\n\n先看最简单的情况：只有两个节点 `1→2`。交换后变成 `2→1`，就是把 2 拉到前面，1 接到后面。这很容易。\n\n再看四个节点 `1→2→3→4`。先处理前两个，把 1→2 变成 2→1，然后 1 的 next 应该指向后面的交换结果。后面的 3→4 变成 4→3，所以 1 接上 4→3 就好。这就是递归的影子：先把后面的交换好，再把前面的接上去。\n\n迭代思路也一样。用三个指针：`prev` 指向前一个节点（或 dummy），`a` 和 `b` 是要交换的一对。每次把 `prev→a→b→b.next` 变成 `prev→b→a→b.next`，然后 `prev` 移到 `a` 的位置，继续处理下一对。\n\n关键操作就三步：`prev.next = b`、`a.next = b.next`、`b.next = a`。顺序不能乱。\n\n## 💻 Java 题解\n\n### 解法 1：迭代交换\n\n用 dummy 头。每次取两个节点交换，prev 指向交换后的第一个节点。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public ListNode swapPairs(ListNode head) {\n        ListNode dummy = new ListNode(0, head);\n        ListNode prev = dummy;\n        while (prev.next != null \u0026\u0026 prev.next.next != null) {\n            ListNode first = prev.next, second = prev.next.next;\n            first.next = second.next;\n            second.next = first;\n            prev.next = second;\n            prev = first;\n        }\n        return dummy.next;\n    }\n}\n```\n\n**关键点：**\n- 三个指针：prev, first, second\n- second.next=first 完成交换\n- prev 移到 first（交换后的第二个）\n\n**执行步骤：**\n1. 取 first 和 second\n1. first.next=second.next\n1. second.next=first\n1. prev.next=second\n1. prev=first\n\n\n## ⚠️ 易错点\n\n- 指针重连的顺序：必须先 `a.next = b.next`（保存后半段），再 `b.next = a`。如果先做 `b.next = a`，那 `b.next` 原来指向的后半段就丢了。\n- 奇数个节点时，最后一个不用交换。循环条件 `prev.next and prev.next.next` 自动处理了这种情况，但写递归终止条件时容易漏掉 `not head.next` 这个判断。\n- 忘记用 `dummy` 节点。如果直接操作 `head`，第一对交换后头节点就变了，最后返回的还是原来的 `head`，答案就错了。\n\n- 指针操作顺序错误导致环\n\n- prev 要移动到交换后的第二个节点\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，每个节点被访问一次。\n- 空间复杂度：`O(1)`（迭代版本）。递归版本是 `O(n)` 的递归栈空间。\n\n## 🏢 实际业务应用\n\n- **线程调度中的任务对换**：操作系统内核（如 Linux CFS 调度器）在调度队列中可能需要对相邻任务节点进行位置交换，以调整执行优先级或实现负载均衡。\n- **数据同步中的双向链表重排**：CRDT（Conflict-free Replicated Data Types）协同编辑器如 Automerge、Yjs 在同步操作日志时，可能需要交换相邻操作节点的顺序来解决冲突。\n- **数据库索引的 B+ 树节点分裂**：MySQL InnoDB 的 B+ 树在插入数据时触发节点分裂，分裂过程中需要在链表结构的叶节点之间重新调整指针关系，操作模式和两两交换的指针重连逻辑如出一辙。\n\n- **线程调度中的任务对换**：操作系统内核（如 Linux CFS 调度器）在调度队列中可能需要对相邻任务节点进行位置交换，以调整执行优先级或实现负载均衡。\n- **数据同步中的双向链表重排**：CRDT（Conflict-free Replicated Data Types）协同编辑器如 Automerge、Yjs 在同步操作日志时，可能需要交换相邻操作节点的顺序来解决冲突。\n- **数据库索引的 B+ 树节点分裂**：MySQL InnoDB 的 B+ 树在插入数据时触发节点分裂，分裂过程中需要在链表结构的叶节点之间重新调整指针关系，操作模式和两两交换的指针重连逻辑如出一辙。\n\n## 📖 形象类比\n\n可以类比《西游记》里孙悟空和猪八戒经常在队伍中调换位置的场景。\n\n取经队伍本来是\"悟空走在前面，八戒跟在后面\"。但遇到妖怪时，八戒有时候抢着要打头阵，于是两人换位：八戒走到前面，悟空退后一步，悟空的后面再接上沙僧。每一段路程，两人就可能换一次位置。\n\n对应关系：\n\n- \"取经队伍\"对应链表\n- \"悟空和八戒\"对应要交换的一对相邻节点 `a` 和 `b`\n- \"八戒走到前面\"对应 `b.next = a`（b 指向 a）\n- \"悟空退后一步、接上后面的人\"对应 `a.next = b.next`（a 接上原来的后半段）\n- \"唐僧看着队伍调整\"对应 `prev` 节点负责重连\n\n可以类比《西游记》里孙悟空和猪八戒经常在队伍中调换位置的场景。\n\n取经队伍本来是\"悟空走在前面，八戒跟在后面\"。但遇到妖怪时，八戒有时候抢着要打头阵，于是两人换位：八戒走到前面，悟空退后一步，悟空的后面再接上沙僧。每一段路程，两人就可能换一次位置。\n\n对应关系：\n\n- \"取经队伍\"对应链表\n- \"悟空和八戒\"对应要交换的一对相邻节点 `a` 和 `b`\n- \"八戒走到前面\"对应 `b.next = a`（b 指向 a）\n- \"悟空退后一步、接上后面的人\"对应 `a.next = b.next`（a 接上原来的后半段）\n- \"唐僧看着队伍调整\"对应 `prev` 节点负责重连\n\n小鹿和小兔手拉手排队走，小鹿在前、小兔在后。猫头鹰老师喊\"交换！\"，小兔就跳到前面，小鹿退到后面，但小鹿的手要赶紧抓住后面同学的手，不然队伍就断了。一对一对交换，整条队伍变成了新模样。\n\n小鹿和小兔手拉手排队走，小鹿在前、小兔在后。猫头鹰老师喊\"交换！\"，小兔就跳到前面，小鹿退到后面，但小鹿的手要赶紧抓住后面同学的手，不然队伍就断了。一对一对交换，整条队伍变成了新模样。\n\n## 🎵 记忆口诀\n\n三步走：前连后，左连尾，右连左。\n\n三步走：前连后，左连尾，右连左。\n\n## 🔗 延伸练习\n\n- `25. K 个一组翻转链表`：从\"两两交换\"升级为\"K 个一组翻转\"，思路一模一样，只是每次处理的节点数从 2 变成了 K。\n- `206. 反转链表`：整条链表全部反转，是\"两两交换\"的简化版（只有一组），适合先做热身。\n\n- `25. K 个一组翻转链表`：从\"两两交换\"升级为\"K 个一组翻转\"，思路一模一样，只是每次处理的节点数从 2 变成了 K。\n- `206. 反转链表`：整条链表全部反转，是\"两两交换\"的简化版（只有一组），适合先做热身。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⛓️\"}],24,\". \",\"两两交换链表中的节点\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"00
