为什么选这题：它是字符串 DP 的**母题**，几乎所有字符串匹配/比对问题都从这道题延伸出去。\n\n## 🧠 思考路径\n\n经典二维 DP 问题。定义 `dp[i][j]` 为 `text1` 的前 `i` 个字符和 `text2` 的前 `j` 个字符的最长公共子序列长度。\n\n对于每对 `(i, j)`：\n- 如果 `text1[i-1] == text2[j-1]`，那么这个字符可以加入公共子序列：`dp[i][j] = dp[i-1][j-1] + 1`。\n- 如果不等，那么取去掉 `text1[i-1]` 或去掉 `text2[j-1]` 两种情况的最大值：`dp[i][j] = max(dp[i-1][j], dp[i][j-1])`。\n\n初始条件：`dp[0][j] = 0` 和 `dp[i][0] = 0`（空串与任何串的公共子序列长度为 0）。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划\n\n字符相等：dp[i][j]=dp[i-1][j-1]+1。不等：dp[i][j]=max(dp[i-1][j], dp[i][j-1])。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(m×n)`\n\n```java\nclass Solution {\n    public int longestCommonSubsequence(String text1, String text2) {\n        int m = text1.length(), n = text2.length();\n        int[][] dp = new int[m + 1][n + 1];\n        for (int i = 1; i \u003c= m; i++)\n            for (int j = 1; j \u003c= n; j++) {\n                if (text1.charAt(i-1) == text2.charAt(j-1))\n                    dp[i][j] = dp[i-1][j-1] + 1;\n                else\n                    dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);\n            }\n        return dp[m][n];\n    }\n}\n```\n\n**关键点：**\n- 相等取对角线+1\n- 不等取上和左的最大\n- dp从1开始，字符串从0索引\n\n**执行步骤：**\n1. 双重循环\n1. 字符相等→dp[i-1][j-1]+1\n1. 不等→max(up,left)\n\n\n## ⚠️ 易错点\n\n- `dp` 数组大小是 `(m+1) × (n+1)`，不是 `m × n`，因为要处理空串的边界。\n- `text1[i-1]` 和 `text2[j-1]` 的下标是 `-1` 偏移，因为 `dp` 的索引从 1 开始。\n- 不要把子序列和子串搞混：子串要求连续，子序列不要求。这道题是子序列。\n- 空间优化时只能用一维数组，但必须用临时变量保存左上角的值（因为会被覆盖）。\n\n- dp索引从1开始，字符串索引差1\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`。两层嵌套循环，每个格子 O(1) 转移。\n- 空间复杂度：`O(m × n)`。可以优化到 `O(min(m, n))`，用一维滚动数组。\n\n## 🏢 实际业务应用\n\n- Git 的 `diff` 算法底层就是 LCS，用于比较两个版本文件之间的差异并生成补丁。\n- DNA 序列比对，NCBI 的 BLAST 工具用 LCS 的变种来衡量基因序列的相似度。\n- 版本控制中的三路合并算法，Git 的 merge 操作通过 LCS 找到两个分支的共同祖先。\n- 自动纠错和拼写检查，Google 拼写检查系统用 LCS 计算用户输入与正确词之间的相似度。\n- 聊天记录同步，微信的云端消息同步用 LCS 对比本地和远端消息序列来增量同步。\n\n- Git 的 `diff` 算法底层就是 LCS，用于比较两个版本文件之间的差异并生成补丁。\n- DNA 序列比对，NCBI 的 BLAST 工具用 LCS 的变种来衡量基因序列的相似度。\n- 版本控制中的三路合并算法，Git 的 merge 操作通过 LCS 找到两个分支的共同祖先。\n- 自动纠错和拼写检查，Google 拼写检查系统用 LCS 计算用户输入与正确词
