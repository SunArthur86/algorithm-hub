起点开始扩展\"，面试中考得很多。\n\n## 🧠 思考路径\n\n排序后找连续序列是最直观的思路，但排序需要 `O(n log n)`，不满足题目要求。\n\n用哈希集合可以在 `O(1)` 时间内判断一个数是否存在。关键问题是：如何避免重复扫描同一段序列？\n\n答案是：**只从序列的起点开始扩展**。如果一个数 `num` 的前驱 `num - 1` 不在集合中，说明 `num` 是某个连续序列的起点。从这个起点开始，逐个检查 `num + 1, num + 2, ...` 是否存在，统计长度。如果 `num - 1` 存在，就跳过——因为这段序列会从更小的起点被完整扫描。\n\n这样每个数最多被访问两次（一次判断是否是起点，一次在某个序列中被扩展），总时间 `O(n)`。\n\n## 💻 Java 题解\n\n### 解法 1：HashSet 枚举序列起点\n\n把所有数放入 HashSet。只从序列起点（num-1 不在集合中）开始向后枚举，保证 O(n)。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int longestConsecutive(int[] nums) {\n        Set\u003cInteger\u003e set = new HashSet\u003c\u003e();\n        for (int n : nums) set.add(n);\n        int maxLen = 0;\n        for (int n : set) {\n            // 只有序列起点才开始计数\n            if (!set.contains(n - 1)) {\n                int cur = n, len = 1;\n                while (set.contains(cur + 1)) {\n                    cur++; len++;\n                }\n                maxLen = Math.max(maxLen, len);\n            }\n        }\n        return maxLen;\n    }\n}\n```\n\n**关键点：**\n- 只从序列起点开始计数\n- 每个元素最多被访问两次 → O(n)\n- set.contains(n-1) 判断是否为起点\n\n**执行步骤：**\n1. 全部元素放入 HashSet\n1. 遍历集合中每个元素\n1. 若 num-1 不在集合中 → 这是序列起点\n1. 从起点向后数连续序列长度\n1. 更新最大值\n\n\n## ⚠️ 易错点\n\n- 判断\"是否是起点\"的条件是 `num - 1 not in set`，不是 `num + 1 not in set`。前者保证只从序列最左端开始扩展。\n- 遍历集合而不是数组，可以避免重复元素导致重复计算。\n- 空数组的最大长度是 0，不是 1。\n- 不要对数组排序，那样是 `O(n log n)`。\n\n- 不要对每个元素都向后枚举——会变成 O(n²)\n\n- 起点判断条件是 n-1 不在集合中\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。虽然有两层循环，但内层循环总共执行次数不超过 `n`，因为每个数字只会在一个序列中被扩展一次。\n- 空间复杂度：`O(n)`。哈希集合存储所有数字。\n\n## 🏢 实际业务应用\n\n- 日志分析中的\"连续错误检测\"：服务器每秒产生错误码，找出最长连续出错的时间段（秒数连续且都有错误），用于监控告警。\n- 用户行为分析中的\"连续活跃天数\"：统计用户最长连续登录的天数，用于评估用户粘性和流失风险。\n- 库存管理中的\"连续缺货检测\"：商品 ID 连续的一段范围内都缺货，找出最长的缺货序列，用于供应链预警。\n\n- 日志分析中的\"连续错误检测\"：服务器每秒产生错误码，找出最长连续出错的时间段（秒数连续且都有错误），用于监控告警。\n- 用户行为分析中的\"连续活跃天数\"：统计用户最长连续登录的天数，用于评估用户粘性和流失风险。\n- 库存管理中的\"连续缺货检测\"：商品 ID 连续的一段范围内都缺货，找出最长的缺货序列，用于供应链预警。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊招纳好汉的编号问题。\n\n每招纳一个好汉就分配一个编号。宋江想找出\"编号连续的好汉最长有多长\"。他
