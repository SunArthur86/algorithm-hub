n- 难度：中等\n- 题型：二叉树\n- 为什么选这题：BST 是二叉树中最重要的变种，验证 BST 是理解\"上下界约束逐层传递\"的关键一步。\n\n## 🧠 思考路径\n\n一种思路是利用 BST 的性质：中序遍历的结果必须是严格递增的。所以先做一遍中序遍历，再检查结果数组是否严格递增。简单直观，但需要额外的 `O(n)` 空间。\n\n更优雅的做法是在遍历的过程中直接传递上下界。对于每个节点，它必须在一个合法的范围内（`lower \u003c node.val \u003c upper`）。进入左子树时，上界更新为当前节点值；进入右子树时，下界更新为当前节点值。\n\n这样不需要额外的数组，也不需要先遍历完再检查，一次遍历即可。\n\n## 💻 Java 题解\n\n### 解法 1：递归 + 范围约束\n\n每个节点的值必须在 (min, max) 范围内。左子树上限更新为当前值，右子树下限更新为当前值。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    public boolean isValidBST(TreeNode root) {\n        return valid(root, null, null);\n    }\n    private boolean valid(TreeNode node, Integer min, Integer max) {\n        if (node == null) return true;\n        if (min != null \u0026\u0026 node.val \u003c= min) return false;\n        if (max != null \u0026\u0026 node.val \u003e= max) return false;\n        return valid(node.left, min, (Integer) node.val)\n            \u0026\u0026 valid(node.right, (Integer) node.val, max);\n    }\n}\n```\n\n**关键点：**\n- 用 Integer 而非 int（处理边界 null）\n- 左子树 max=当前值\n- 右子树 min=当前值\n\n**执行步骤：**\n1. 传入 (min, max) 范围\n1. 当前值不在范围内返回 false\n1. 递归更新范围约束\n\n\n### 解法 2：中序遍历（迭代）\n\nBST中序遍历必须严格递增。用一个 prev 变量记录前一个值。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    long prev = Long.MIN_VALUE;\n    public boolean isValidBST(TreeNode root) {\n        if (root == null) return true;\n        if (!isValidBST(root.left)) return false;\n        if (root.val \u003c= prev) return false;\n        prev = root.val;\n        return isValidBST(root.right);\n    }\n}\n```\n\n**关键点：**\n- prev 初始化为 Long.MIN_VALUE\n- 中序遍历必须严格递增\n\n**执行步骤：**\n1. 中序遍历\n1. 与 prev 比较\n1. 更新 prev\n\n\n## ⚠️ 易错点\n\n- BST 要求严格大于/小于，不是大于等于/小于等于。`node.val \u003c= lower` 或 `node.val \u003e= upper` 就不合法。\n- Java 中节点值是 `int`，范围边界用 `long` 避免溢出。`Long.MIN_VALUE` 和 `Long.MAX_VALUE`。\n- 不要只检查\"左子节点 \u003c 当前 \u003c 右子节点\"。这是必要条件但不是充分条件。必须检查整个子树。\n- 如果用中序遍历法，注意比较时要用严格递增（`\u003e` 不是 `\u003e=`）。\n\n- 不能只比较节点和左右子节点——子树中可能有更远的违反\n\n- 用 long 避免整数边界值\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点访问一次。\n- 空间复杂度：`O(h)`。递归栈深度等于树的高度。最坏 `O(n)`，平衡树 `O(log n)`。\n\n## 🏢 实际业务应用\n\n- 数据索引验证：数据库中 B+ 树索引创建后，需要验证树是否满足有序性约束，逻辑与验证 BST 相同。\n- 权限树的合法性检查：系统中的权限层级（如角色继承树），要求子权限必须满足特定的值域约束。\n- 配置文件校验：嵌套的配置项可能有\"子项的值必须在父项的某个范围内\"的约束，验证逻辑类似 BST 校验。\n- 自动驾驶的决策树验证：每个决策节点的条件区间必须不重叠且有序，验证过程就是 BST 合法性检查。\n\n- 数据索引验证：数据库中 B+ 树索引创建后，需要验证树是否满足有序性约束，逻辑与验证 BST 相同。\n- 权限树的合法性检查：系统中的权限层级（如角色继承树），要求子权限必须满足特定的值域约束。\n- 配置文件校验：嵌套的配置项可能有\"子项的值必须在父项的某个范围内\"的约束，验证逻辑类似 BST 校验。\n- 自动驾驶的决策树验证：每个决策节点的条件区间必须不重叠且有序，验证过程就是 BST 合法性检查。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里玉皇大帝给天庭众神定品级的场景。\n\n天庭的官职按品级排列成一棵树。玉帝的规则是：每个神仙左边的下属品级必须比自己低，右边的下属品级必须比自己高，而且这个约束必须一直传递下去——左边下属的右边下属的品级也不能超过自己。\n\n太白金星负责审查，他每走到一个神仙面前，都会带着一个\"最低品级\"和\"最高品级\"的约束范围。如果这个神仙的品级不在范围内，就说明有人越级了，整棵官职树不合法。\n\n对应关系是：\n\n- \"BST\"对应天庭的品级树\n- \"`lower` 和 `upper`\"对应太白金星手中的品级上下限\n- \"`node.val \u003c= lower`\"对应品级不够高（越界了）\n- \"递归左右子树\"对应继续审查下属\n\n这段记忆的关键是：约束从根往叶逐层传递，每进入一层都会把范围收窄。\n\n可以把它类比成《西游记》里玉皇大帝给天庭众神定品级的场景。\n\n天庭的官职按品级排列成一棵树。玉帝的规则是：每个神仙左边的下属品级必须比自己低，右边的下属品级必须比自己高，而且这个约束必须一直传递下去——左边下属的右边下属的品级也不能超过自己。\n\n太白金星负责审查，他每走到一个神仙面前，都会带着一个\"最低品级\"和\"最高品级\"的约束范围。如果这个神仙的品级不在范围内，就说明有人越级了，整棵官职树不合法。\n\n对应关系是：\n\n- \"BST\"对应天庭的品级树\n- \"`lower` 和 `upper`\"对应太白金星手中的品级上下限\n- \"`node.val \u003c= lower`\"对应品级不够高（越界了）\n- \"递归左右子树\"对应继续审查下属\n\n这段记忆的关键是：约束从根往叶逐层传递，每进入一层都会把范围收窄。\n\n老猫头鹰管理着一片果园，每棵树上的果子都有编号。规则是：每棵树左边枝上的果子编号必须比这棵树的小，右边枝上的必须比这棵树的大。\n\n小松鼠来帮忙检查。它从最大的那棵树开始，左手举着\"最小值\"的牌子，右手举着\"最大值\"的牌子。每走到一棵树，先看编号是否在牌子的范围内，不在就报告\"有问题\"。如果没问题，就去左边时把右手牌换成这棵树的编号（收窄上限），去右边时把左手牌换成这棵树的编号（收窄下限）。就这样一路检查到底，所有树都合格才算通过。\n\n老猫头鹰管理着一片果园，每棵树上的果子都有编号。规则是：每棵树左边枝上的果子编号必须比这棵树的小，右边枝上的必须比这棵树的大。\n\n小松鼠来帮忙检查。它从最大的那棵树开始，左手举着\"最小值\"的牌子，右手举着\"最大值\"的牌子。每走到一棵树，先看编号是否在牌子的范围内，不在就报告\"有问题\"。如果没问题，就去左边时把右手牌换成这棵树的编号（收窄上限），去右边时把左手牌换成这棵树的编号（收窄下限）。就这样一路检查到底，所有树都合格才算通过。\n\n## 🎵 记忆口诀\n\n上下界随身带，左收上界右收下界。\n\n上下界随身带，左收上界右收下界。\n\n## 🔗 延伸练习\n\n- `99. 恢复二叉搜索树`：BST 中恰好有两个节点被交换了，找到并恢复它们。\n- `700. 二叉搜索树中的搜索`：在 BST 中查找目标值，利用 BST 性质剪枝。\n\n- `99. 恢复二叉搜索树`：BST 中恰好有两个节点被交换了，找到并恢复它们。\n- `700. 二叉搜索树中的搜索`：在 BST 中查找目标值，利用 BST 性质剪枝。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🌳\"}],98,\". \",\"验证二叉搜索树\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0098\",\"lcId\":98,\"slug\":\"validate-binary-search-tree\",\"title\":\"验证二叉搜索树\",\"question\":\"验证二叉搜索树\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"binary-tree\",\"categories\":[\"binary-tree\"],\"tags\":[\"树\",\"深度优先搜索\",\"二叉搜索树\",\"二叉树\"],\"url\":\"https://leetcode.cn/problems/validate-binary-search-tree/\",\"planOrder\":43,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一棵二叉树的根节点 `root`，判断它是否是一棵有效的二叉搜索树（BST）。  BST 的定义：对于每个节点，左子树中所有节点的值都严格小于该节点的值，右子树中所有节点的值都严格大于该节点的值。\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"name\":\"theme-color\",\"content\":\"#f97316\"}]]\n"])</script><script>self.__next_f.push([1,"8:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"1\",{\"children\":\"98. 验证二叉搜索树 - 算法面试\"}],[\"$\",\"meta\",\"2\",{\"name\":\"description\",\"content\":\"给你一棵二叉树的根节点 `root`，判断它是否是一棵有效的二叉搜索树（BST）。  BST 的定义：对于每个节点，左子树中所有节点的值都严格小于该节点的值，右子树中所有节点的值都严格大于该节点的值。\"}],[\"$\",\"meta\",\"3\",{\"name\":\"application-name\",\"content\":\"算法面试\"}],[\"$\",\"link\",\"4\",{\"rel\":\"manifest\",\"href\":\"/algorithm-interview/manifest.json\",\"crossOrigin\":\"$undefined\"}],
