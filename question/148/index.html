的应用\"的代表作。\n\n## 🧠 思考路径\n\n插入排序是 `O(n²)`，不符合要求。快速排序在链表上实现较复杂（不方便随机取 pivot）。\n\n归并排序天然适合链表：\n1. **分割**：用快慢指针找到链表中点，分成两半。\n2. **递归排序**：对两半分别排序。\n3. **合并**：把两个有序链表合并成一个。\n\n但题目要求 `O(1)` 空间，递归的调用栈是 `O(log n)`。可以用**自底向上的迭代归并**：先 1 个 1 个合并，再 2 个 2 个合并，再 4 个 4 个合并……直到合并完整个链表。\n\n这样不需要递归，空间是 `O(1)`。\n\n所以这题的关键词不是\"排序\"，而是\"链表上的归并排序：找中点 + 合并两个有序链表\"。\n\n## 💻 Java 题解\n\n### 解法 1：归并排序（递归）\n\n快慢指针找中点切分，递归排序左右两半，然后合并两个有序链表。\n\n- ⏱ 时间复杂度：`O(n log n)`\n- 💾 空间复杂度：`O(log n)`\n\n```java\nclass Solution {\n    public ListNode sortList(ListNode head) {\n        if (head == null || head.next == null) return head;\n        // 找中点\n        ListNode slow = head, fast = head.next;\n        while (fast != null \u0026\u0026 fast.next != null) {\n            slow = slow.next; fast = fast.next.next;\n        }\n        ListNode mid = slow.next;\n        slow.next = null;\n        // 递归排序\n        ListNode left = sortList(head);\n        ListNode right = sortList(mid);\n        // 合并\n        return merge(left, right);\n    }\n    private ListNode merge(ListNode a, ListNode b) {\n        ListNode dummy = new ListNode(0), tail = dummy;\n        while (a != null \u0026\u0026 b != null) {\n            if (a.val \u003c= b.val) { tail.next = a; a = a.next; }\n            else { tail.next = b; b = b.next; }\n            tail = tail.next;\n        }\n        tail.next = a != null ? a : b;\n        return dummy.next;\n    }\n}\n```\n\n**关键点：**\n- 快慢指针找中点\n- 递归分治\n- 合并两个有序链表\n\n**执行步骤：**\n1. 快慢指针找中点\n1. 断开成两段\n1. 递归排序左右\n1. 合并\n\n\n## ⚠️ 易错点\n\n- 找中点时，`fast` 从 `head.next` 开始（不是 `head`），确保奇数长度时 slow 停在左半的末尾。\n- 断开链表时 `slow.next = None` 不能忘。\n- 合并时用哨兵节点 `dummy` 简化操作。\n- 自底向上归并中，`split` 函数需要在断开处截断（`head.next = null`）。\n\n- fast 初始是 head.next 不是 head（避免栈溢出）\n\n- slow.next=null 断开链表\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n log n)`。归并排序的标准复杂度。\n- 空间复杂度：递归版本 `O(log n)`（递归栈），迭代版本 `O(1)`。\n\n## 🏢 实际业务应用\n\n- 大规模日志排序：日志以链表形式存储（每条日志指向下一条），需要按时间戳排序时，归并排序是链表上最优的选择。\n- 数据库的外排序：当数据量大到内存放不下时，数据以链表形式分块存储，块间用归并排序合并。\n- 大文件合并：多个有序的小文件合并成一个大文件，核心就是链表归并。\n\n- 大规模日志排序：日志以链表形式存储（每条日志指向下一条），需要按时间戳排序时，归并排序是链表上最优的选择。\n- 数据库的外排序：当数据量大到内存放不下时，数据以链表形式分块存储，块间用归并排序合并。\n- 大文件合并：多个有序的小文件合并成一个大文件，核心就是链表归并。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》里诸葛亮整编投降的散兵。\n\n散兵按战斗力排成一个无序列表。诸葛亮的办法是：先把队伍分成两半，每半再分两半，直到每队只有一个人（天然有序）。然后两两合并：每次取两边较弱的排前面，较强的排后面。合并完的小队再和其他小队合并，最终整支大军从弱到强排列整齐。\n\n对应关系是：\n\n- \"散兵列表\"对应无序链表\n- \"分成两半\"对应快慢指针找中点\n- \"每队只有一个人\"对应递归基准情况\n- \"两两合并，弱的在前\"对应合并两个有序链表\n\n这段记忆的关键是：分到不能再分，再两两合回来。\n\n可以把它类比成《三国演义》里诸葛亮整编投降的散兵。\n\n散兵按战斗力排成一个无序列表。诸葛亮的办法是：先把队伍分成两半，每半再分两半，直到每队只有一个人（天然有序）。然后两两合并：每次取两边较弱的排前面，较强的排后面。合并完的小队再和其他小队合并，最终整支大军从弱到强排列整齐。\n\n对应关系是：\n\n- \"散兵列表\"对应无序链表\n- \"分成两半\"对应快慢指针找中点\n- \"每队只有一个人\"对应递归基准情况\n- \"两两合并，弱的在前\"对应合并两个有序链表\n\n这段记忆的关键是：分到不能再分，再两两合回来。\n\n小蚂蚁要把路上散落的面包屑按大小排好。它先把面包屑堆分成两堆，每堆再分两堆，分到每堆只有一颗。然后两颗两颗比大小合并，小的在前大的在后；合并好的小堆再和其他小堆比，继续合并。最后所有面包屑从最小到最大排成了一条整齐的队伍。\n\n小蚂蚁要把路上散落的面包屑按大小排好。它先把面包屑堆分成两堆，每堆再分两堆，分到每堆只有一颗。然后两颗两颗比大小合并，小的在前大的在后；合并好的小堆再和其他小堆比，继续合并。最后所有面包屑从最小到最大排成了一条整齐的队伍。\n\n## 🎵 记忆口诀\n\n快慢分中点，递归排两半；有序链表双指合并，分分合合即排序。\n\n快慢分中点，递归排两半；有序链表双指合并，分分合合即排序。\n\n## 🔗 延伸练习\n\n- `21. 合并两个有序链表`：本题合并步骤的基础，独立的链表合并练习。\n- `147. 对链表进行插入排序`：对比 `O(n²)` 和 `O(n log n)` 排序在链表上的差异。\n\n- `21. 合并两个有序链表`：本题合并步骤的基础，独立的链表合并练习。\n- `147. 对链表进行插入排序`：对比 `O(n²)` 和 `O(n log n)` 排序在链表上的差异。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"⛓️\"}],148,\". \",\"排序链表\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0148\",\"lcId\":148,\"slug\":\"sort-list\",\"title\":\"排序链表\",\"question\":\"排序链表\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"linked-list\"
