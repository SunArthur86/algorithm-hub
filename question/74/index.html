。\n\n## 🧠 思考路径\n\n最暴力的方法是遍历所有元素，`O(m × n)`。但矩阵是有序的，有序就应该想到二分。\n\n关键观察：如果把这个矩阵按行拼接成一个一维数组，它是严格递增的。那问题就变成了\"在一个有序一维数组里查找目标值\"。唯一需要处理的是坐标转换：一维下标 `mid` 对应矩阵中的 `(mid // n, mid % n)`。\n\n这样时间复杂度直接降到 `O(log(m × n))`。\n\n## 💻 Java 题解\n\n### 解法 1：二分查找（展平）\n\n将二维索引映射到一维：mid→(mid/cols, mid%cols)。标准二分。\n\n- ⏱ 时间复杂度：`O(log(m×n))`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public boolean searchMatrix(int[][] matrix, int target) {\n        int m = matrix.length, n = matrix[0].length;\n        int left = 0, right = m * n - 1;\n        while (left \u003c= right) {\n            int mid = left + (right - left) / 2;\n            int val = matrix[mid / n][mid % n];\n            if (val == target) return true;\n            else if (val \u003c target) left = mid + 1;\n            else right = mid - 1;\n        }\n        return false;\n    }\n}\n```\n\n**关键点：**\n- mid/n 得行，mid%n 得列\n- 本质就是一个有序一维数组\n\n**执行步骤：**\n1. 二分0到m*n-1\n1. mid映射到二维\n1. 比较并移动\n\n\n## ⚠️ 易错点\n\n- 坐标映射是 `mid // n` 和 `mid % n`，不是 `mid // m`。除的是列数 `n`。\n- `right` 的初始值是 `m * n - 1`，不是 `m * n`。\n- 注意题目的条件是每行第一个数大于上一行最后一个数（全局有序），不是普通的行内递增。如果是后者，需要用另一种策略。\n\n- 矩阵列数n不是m\n\n- mid/n 和 mid%n 不要搞反\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(log(m × n))`，标准二分查找。\n- 空间复杂度：`O(1)`，只用了几个变量。\n\n## 🏢 实际业务应用\n\n- 数据库的 B+ 树索引在叶子节点内部查找时，本质上就是在有序数组中做二分。数据库分页存储的数据可以类比成二维矩阵。\n- 游戏地图的分层加载系统：把大地图按网格分块，每块内部有序，查找某个坐标所在的区块就是二分定位。\n- 日志系统的按时间查找：日志按天分文件，文件内部按时间排序。跨天查某条日志时，先二分定位文件，再在文件内二分。\n\n- 数据库的 B+ 树索引在叶子节点内部查找时，本质上就是在有序数组中做二分。数据库分页存储的数据可以类比成二维矩阵。\n- 游戏地图的分层加载系统：把大地图按网格分块，每块内部有序，查找某个坐标所在的区块就是二分定位。\n- 日志系统的按时间查找：日志按天分文件，文件内部按时间排序。跨天查某条日志时，先二分定位文件，再在文件内二分。\n\n## 📖 形象类比\n\n可以类比《水浒传》里梁山泊的英雄座次表。\n\n一百零八将按天罡地煞排成好几排（矩阵的行），每排从左到右编号递增，下一排第一个人的编号比上一排最后一个还大（全局递增）。宋江想找\"编号 57 的好汉\"，不需要从第一排第一列逐个数，而是算出总人数做二分：先看正中间那位的编号，比 57 大就往左找，比 57 小就往右找。\n\n对应关系：\n\n- \"座次表\"对应矩阵\n- \"编号\"对应矩阵值\n- \"算中间位置\"对应 `mid`\n- \"行列转换\"对应 `mid // n` 和 `mid % n`\n\n可以类比《水浒传》里梁山泊的英雄座次表。\n\n一百零八将按天罡地煞排成好几排（矩阵的行），每排从左到右编号递增，下一排第一个人的编号比上一排最后一个还大（全局递增）。宋江想找\"编号 57 的好汉\"，不需要从第一排第一列逐个数，而是算出总人数做二分：先
