\n## 🧠 思考路径\n\n最朴素的想法是对每个位置，往左扫描找左边最高柱子，往右扫描找右边最高柱子，然后算出该位置能接多少水。每个位置要扫两遍，总共 `O(n²)`。\n\n进一步优化：可以预处理两个数组，`leftMax[i]` 记录位置 `i` 左边的最高值，`rightMax[i]` 记录右边的最高值。这样每个位置的答案就是 `min(leftMax[i], rightMax[i]) - height[i]`。时间降到 `O(n)`，但空间是 `O(n)`。\n\n还能不能省空间？这就是双指针的精妙之处。我们用左右两个指针从两端往中间走，同时维护左边的历史最大值 `leftMax` 和右边的历史最大值 `rightMax`。关键观察：如果 `leftMax \u003c rightMax`，那么左边指针所指位置的水量完全由 `leftMax` 决定（因为右边一定有一个更高的柱子挡住了），可以直接算出。反之亦然。这样一边走一边算，空间只需 `O(1)`。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（左右最大值数组）\n\n预处理 leftMax[] 和 rightMax[] 数组。每个位置雨水量 = min(leftMax[i], rightMax[i]) - height[i]。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int trap(int[] height) {\n        int n = height.length;\n        if (n == 0) return 0;\n        int[] leftMax = new int[n], rightMax = new int[n];\n        leftMax[0] = height[0];\n        for (int i = 1; i \u003c n; i++)\n            leftMax[i] = Math.max(leftMax[i - 1], height[i]);\n        rightMax[n - 1] = height[n - 1];\n        for (int i = n - 2; i \u003e= 0; i--)\n            rightMax[i] = Math.max(rightMax[i + 1], height[i]);\n        int water = 0;\n        for (int i = 0; i \u003c n; i++)\n            water += Math.min(leftMax[i], rightMax[i]) - height[i];\n        return water;\n    }\n}\n```\n\n**关键点：**\n- 预处理左右最大值数组\n- 雨水量 = min(leftMax,rightMax) - height\n- 三次遍历\n\n**执行步骤：**\n1. 正向遍历求 leftMax[]\n1. 逆向遍历求 rightMax[]\n1. 每个位置计算雨水量并累加\n\n\n### 解法 2：双指针（空间优化）\n\n左右指针从两端出发，维护 leftMax 和 rightMax 变量。移动较小的一边，因为较小边的雨水已经可以确定。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int trap(int[] height) {\n        int left = 0, right = height.length - 1;\n        int leftMax = 0, rightMax = 0, water = 0;\n        while (left \u003c right) {\n            if (height[left] \u003c height[right]) {\n                leftMax = Math.max(leftMax, height[left]);\n                water += leftMax - height[left];\n                left++;\n            } else {\n                rightMax = Math.max(rightMax, height[right]);\n                water += rightMax - height[right];\n                right--;\n            }\n        }\n        return water;\n    }\n}\n```\n\n**关键点：**\n- O(1) 空间\n- 移动较小边\n- leftMax-height[left] \u003e= 0\n\n**执行步骤：**\n1. left=0, right=n-1\n1. 比较两边高度\n1. 较小边：更新 max，累加雨水，移动指针\n\n\n## ⚠️ 易错点\n\n- 先移动指针，再更新最大值和算水量。顺序不能反，否则 `leftMax`/`rightMax` 的更新时机不对。\n- 移动指针时 `left++` 和 `right--` 不要写反：`leftMax` 更小时移动左指针，`rightMax` 更小时移动右指针。\n- 不要忘了处理空数组的边界情况。\n- `water += leftMax - height[left]` 中的 `leftMax` 是更新后的值，保证结果非负。\n\n- 双指针中 leftMax 是左侧实际最大值，不是假设值\n\n- 空数组直接返回 0\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。左右指针各最多走 `n` 步，相遇即停。\n- 空间复杂度：`O(1)`。只用了 `left`、`right`、`leftMax`、`rightMax`、`water` 五个变量。\n\n## 🏢 实际业务应用\n\n- **城市排水系统设计**：城市规划中需要计算不同地形剖面下的积水区域和积水量，以确定排水管道的合理布置。高度图就是地形剖面，积水量就是需要处理的雨水量。\n- **水利工程**：河道截面的水位分析中，需要根据河岸两侧的高程来估算河道在不同水位下的蓄水能力。双指针从两岸往中间扫描的思路，正好对应从两岸分析水位。\n- **仓储空间优化**：在仓库中，不同位置放置了不同高度的货物，需要计算货物之间的可用存储空间。接雨水的模型可以直接套用。\n- **3D 打印路径规划**：打印层之间的支撑材料计算，需要在层截面中找出\"凹槽\"区域的面积，本质和接雨水相同。\n\n- **城市排水系统设计**：城市规划中需要计算不同地形剖面下的积水区域和积水量，以确定排水管道的合理布置。高度图就是地形剖面，积水量就是需要处理的雨水量。\n- **水利工程**：河道截面的水位分析中，需要根据河岸两侧的高程来估算河道在不同水位下的蓄水能力。双指针从两岸往中间扫描的思路，正好对应从两岸分析水位。\n- **仓储空间优化**：在仓库中，不同位置放置了不同高度的货物，需要计算货物之间的可用存储空间。接雨水的模型可以直接套用。\n- **3D 打印路径规划**：打印层之间的支撑材料计算，需要在层截面中找出\"凹槽\"区域的面积，本质和接雨水相同。\n\n## 📖 形象类比\n\n可以类比《三国演义》中关羽水淹七军的经典战役。\n\n关羽要引汉水淹曹军，他先沿河岸从左右两侧勘察地形。左边他记下\"左岸最高堤坝有多高\"，右边记下\"右岸最高堤坝有多高\"。关羽发现：哪边堤坝更矮，水就会从哪边先溢出，所以水量由更矮的那一侧决定。他从两端往中间逐段评估，每到一个新位置，就和之前的最高堤坝比较，算出这一段能蓄多少水。\n\n对应关系：\n\n- \"柱子高度\"对应河岸两侧的堤坝高度\n- \"左右指针\"对应关羽从两岸向中间勘察\n- \"leftMax 和 rightMax\"对应两岸各自的历史最高堤坝\n- \"取较小值\"对应木桶原理——水位由更矮的一侧决定\n- \"蓄水量\"对应每段河道能拦住的水量\n\n可以类比《三国演义》中关羽水淹七军的经典战役。\n\n关羽要引汉水淹曹军，他先沿河岸从左右两侧勘察地形。左边他记下\"左岸最高堤坝有多高\"，右边记下\"右岸最高堤坝有多高\"。关羽发现：哪边堤坝更矮，水就会从哪边先溢出，所以水量由更矮的那一侧决定。他从两端往中间逐段评估，每到一个新位置，就和之前的最高堤坝比较，算出这一段能蓄多少水。\n\n对应关系：\n\n- \"柱子高度\"对应河岸两侧的堤坝高度\n- \"左右指针\"对应关羽从两岸向中间勘察\n- \"leftMax 和 rightMax\"对应两岸各自的历史最高堤坝\n- \"取较小值\"对应木桶原理——水位由更矮的一侧决定\n- \"蓄水量\"对应每段河道能拦住的水量\n\n小河狸在河边筑坝，但两岸的石头高低不一。它从河的最上游和最下游同时往中间走，每走一步都比较：左边最高的石头和右边最高的石头哪个更矮？更矮的那个决定了这一处能拦住多高的水。等两只河狸在中间碰头时，整条河能蓄多少水就全算出来了。\n\n小河狸在河边筑坝，但两岸的石头高低不一。它从河的最上游和最下游同时往中间走，每走一步都比较：左边最高的石头和右边最高的石头哪个更矮？更矮的那个决定了这一处能拦住多高的水。等两只河狸在中间碰头时，整条河能蓄多少水就全算出来了。\n\n## 🎵 记忆口诀\n\n矮侧走，水位定。\n\n矮侧走，水位定。\n\n## 🔗 延伸练习\n\n- `11. 盛最多水的容器`：同样是双指针，但目标是找两根柱子围成最大面积，不涉及中间的\"接水\"。\n- `84. 柱状图中最大的矩形`：用单调栈而非双指针，但和接雨水一样是经典的\"柱子类\"题目。\n\n- `11. 盛最多水的容器`：同样是双指针，但目标是找两根柱子围成最大面积，不涉及中间的\"接水\"。\n- `84. 柱状图中最大的矩形`：用单调栈而非双指针，但和接雨水一样是经典的\"柱子类\"题目。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🔀\"}],42,\". \",\"接雨水\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0042\",\"lcId\":42,\"slug\":\"trapping-rain-water\",\"title\":\"接雨水\",\"question\":\"接雨水\",\"answer\":\"$e\",\"difficulty\":\"Hard\",\"category\":\"two-pointers\",\"categories\":[\"two-pointers\"],\"tags\":[\"栈\",\"数组\",\"双指针\",\"动态规划\"],\"url\":\"https://leetcode.cn/problems/trapping-rain-water/\",\"planOrder\":7,\"hasViz\":true,\"hasDiagram\":true,\"feynman\":{\"essence\":\"给你一组柱子的高度图，比如 `[0,1,0,2,1,0,1,3,2,1,2,1]`。想象这些柱子之间下了一场雨，问柱子之间能接住多少雨水。  关键在于：每个位置能接多少水，取决于它左边最高的柱子和右边\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"name\":\"theme-color\",\"content\":\"#f97316\"}]]\n"])</script><script>self.__next_f.push([1,"8:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"1\",{\"children\":\"42. 接雨水 - 算法面试\"}],
