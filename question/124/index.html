\n- 为什么选这题：它是二叉树递归中最考验\"返回值 vs 全局答案\"区分能力的题目，帮你理解\"递归函数返回什么\"和\"最终答案是什么\"可以不同。\n\n## 🧠 思考路径\n\n路径在树中的形状只有两种：要么是一条\"直线\"（从某个节点往上走），要么是一条\"人字形\"（从左子树上来，经过当前节点，再下到右子树）。\n\n递归函数的返回值应该是\"从当前节点往下走的最大贡献\"（直线），而全局答案可能是一条\"人字形\"路径。\n\n对每个节点，计算：\n- 左子树能贡献的最大和 `left_gain = max(0, dfs(left))`（如果左子树贡献是负数，不如不要）\n- 右子树能贡献的最大和 `right_gain = max(0, dfs(right))`\n- 经过当前节点的\"人字形\"路径和 = `node.val + left_gain + right_gain`，用这个更新全局答案\n- 返回给父节点的\"直线\"贡献 = `node.val + max(left_gain, right_gain)`（只能选一侧往上传）\n\n## 💻 Java 题解\n\n### 解法 1：DFS + 全局最大值\n\nDFS返回以当前节点为端点的最大贡献值。过程中用 left+right+val 更新全局最大路径和。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(h)`\n\n```java\nclass Solution {\n    int maxSum = Integer.MIN_VALUE;\n    public int maxPathSum(TreeNode root) {\n        dfs(root);\n        return maxSum;\n    }\n    private int dfs(TreeNode node) {\n        if (node == null) return 0;\n        int left = Math.max(0, dfs(node.left));   // 负贡献直接剪掉\n        int right = Math.max(0, dfs(node.right));\n        maxSum = Math.max(maxSum, left + right + node.val); // 横跨路径\n        return Math.max(left, right) + node.val; // 只能选一条路向上\n    }\n}\n```\n\n**关键点：**\n- 负贡献取0（不选）\n- 横跨路径 = left+right+val\n- 返回只能选一边向上\n\n**执行步骤：**\n1. DFS求左右子树最大贡献\n1. 更新全局最大（横跨路径）\n1. 返回 max(left,right)+val\n\n\n## ⚠️ 易错点\n\n- 递归返回值和全局答案是两个不同的东西。返回值是\"向上传的直线贡献\"，全局答案是\"可能的人字形路径\"。\n- 子树贡献为负时要取 0，不要直接用负值。负贡献只会拖累路径和。\n- `max_sum` 初始化为负无穷，不是 0。因为节点值可能全是负数，最大路径可能就是某个单独的负数节点。\n- 不要在递归返回值中包含\"左右两侧都选\"的情况。返回值只能选一侧。\n\n- 负数贡献要取0\n\n- 返回值和更新全局最大值不同——返回只能选一边\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。每个节点只访问一次。\n- 空间复杂度：`O(h)`。递归栈深度等于树高。\n\n## 🏢 实际业务应用\n\n- 组织架构中的\"最优协作链\"：每个员工有一个\"协作价值\"，找到跨部门协作链的最大价值总和，用于组建高效团队。\n- 网络流量优化：网络节点有吞吐量属性，找到网络中最大吞吐的路径，用于流量调度。\n- 社交网络中的影响力传播：每个用户有影响力分数，找到影响力最大的传播路径，用于精准投放广告。\n\n- 组织架构中的\"最优协作链\"：每个员工有一个\"协作价值\"，找到跨部门协作链的最大价值总和，用于组建高效团队。\n- 网络流量优化：网络节点有吞吐量属性，找到网络中最大吞吐的路径，用于流量调度。\n- 社交网络中的影响力传播：每个用户有影响力分数，找到影响力最大的传播路径，用于精准投放广告。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊选择联合作战路线的策略。\n\n每个山头（节点）有战斗力值（可能为负——表示消耗大于产出）。宋江想找到一条\"联合作战路线\"，使得沿途战斗力总和最大。路线
