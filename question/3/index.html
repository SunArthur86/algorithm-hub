滑动窗口的入门经典题，训练\"右扩左缩\"的窗口维护思维。\n\n## 🧠 思考路径\n\n朴素想法是枚举所有子串，检查每个子串里有没有重复字符，取最长的那个。但子串总数是 `O(n²)` 级别，每个检查又要 `O(n)`，总复杂度 `O(n³)`，显然太慢。\n\n仔细想想，当我们在字符串上维护一个\"窗口\"时，窗口不断向右扩大，如果新加入的字符导致重复了，我们不需要从头再来，只需要把窗口左边界往右推，把重复的那个字符踢出去就行。这就是滑动窗口的核心思想。\n\n用一个哈希表（或数组）记录窗口内每个字符的最新位置。右指针每走一步，如果当前字符已经在窗口内，就把左指针跳到它上次出现位置的下一个。\n\n## 💻 Java 题解\n\n### 解法 1：滑动窗口 + HashSet\n\n左右指针维护无重复窗口。右指针尝试扩展，若遇到重复则左指针收缩直到无重复。记录窗口最大长度。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(min(m,n))`\n\n```java\nclass Solution {\n    public int lengthOfLongestSubstring(String s) {\n        Set\u003cCharacter\u003e set = new HashSet\u003c\u003e();\n        int left = 0, maxLen = 0;\n        for (int right = 0; right \u003c s.length(); right++) {\n            while (set.contains(s.charAt(right))) {\n                set.remove(s.charAt(left));\n                left++;\n            }\n            set.add(s.charAt(right));\n            maxLen = Math.max(maxLen, right - left + 1);\n        }\n        return maxLen;\n    }\n}\n```\n\n**关键点：**\n- HashSet 维护窗口内字符\n- 遇到重复时左指针收缩\n- 窗口大小 = right - left + 1\n\n**执行步骤：**\n1. left=0, 遍历 right\n1. 若 s[right] 在 set 中，移除 s[left] 并 left++\n1. 将 s[right] 加入 set\n1. 更新最大窗口长度\n\n\n### 解法 2：滑动窗口 + HashMap（优化跳转）\n\n用 HashMap 记录字符最新位置，遇到重复时直接跳到重复字符的下一个位置，避免逐步收缩。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(min(m,n))`\n\n```java\nclass Solution {\n    public int lengthOfLongestSubstring(String s) {\n        Map\u003cCharacter, Integer\u003e map = new HashMap\u003c\u003e();\n        int left = 0, maxLen = 0;\n        for (int right = 0; right \u003c s.length(); right++) {\n            char c = s.charAt(right);\n            if (map.containsKey(c)) {\n                left = Math.max(left, map.get(c) + 1);\n            }\n            map.put(c, right);\n            maxLen = Math.max(maxLen, right - left + 1);\n        }\n        return maxLen;\n    }\n}\n```\n\n**关键点：**\n- HashMap 直接记录位置\n- left = Math.max(left, map.get(c)+1)\n- 避免重复字符在 left 之前的情况\n\n**执行步骤：**\n1. 遍历 right\n1. 若字符在 map 中，left 跳到 max(left, 重复位置+1)\n1. 更新 map 和最大长度\n\n\n## ⚠️ 易错点\n\n- 左边界不能往回跳。判断条件必须加上 `charIndex[ch] \u003e= left`，否则已经不在窗口内的旧记录会把左边界错误地拉回去。\n- 窗口长度是 `right - left + 1`，别忘了加 1（因为是闭区间）。\n- 空字符串要返回 0，不是 1。\n\n- left 跳转时用 Math.max 防止回退\n\n- HashSet 方案中 while 不是 if\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。左右指针各最多遍历字符串一次。\n- 空间复杂度：`O(min(m, n))`。`m` 是字符集大小（ASCII 为 128），`n` 是字符串长度。\n\n## 🏢 实际业务应用\n\n- 网络会话管理：检测用户连续操作中是否有重复行为（如短时间内重复点击、重复提交），滑动窗口可以高效判断时间窗口内的去重。\n- 文本编辑器的查找高亮：在一段文本中找最长的不含重复字符的片段，用于自动补全或语法检查。\n- 数据流去重：实时处理数据流时，用滑动窗口统计最近一个时间段内不重复的元素个数，比如最近 N 秒内不重复的独立访客数。\n- 生物信息学中的序列分析：DNA 序列中寻找不含重复碱基的最长片段，用于定位特殊的基因区域。\n\n- 网络会话管理：检测用户连续操作中是否有重复行为（如短时间内重复点击、重复提交），滑动窗口可以高效判断时间窗口内的去重。\n- 文本编辑器的查找高亮：在一段文本中找最长的不含重复字符的片段，用于自动补全或语法检查。\n- 数据流去重：实时处理数据流时，用滑动窗口统计最近一个时间段内不重复的元素个数，比如最近 N 秒内不重复的独立访客数。\n- 生物信息学中的序列分析：DNA 序列中寻找不含重复碱基的最长片段，用于定位特殊的基因区域。\n\n## 📖 形象类比\n\n可以类比《西游记》里孙悟空辨认真假猴王的场景。\n\n孙悟空的眼睛像一面扫描镜，从左到右扫过花果山上的所有猴子。他要把连续排列的猴子中，找出最长的一段\"没有重复面孔\"的队列。每看到一张新面孔，他就在心里记下这个猴子的位置。如果又看到一个长得一样的，他就把扫描的起点直接跳到上次那个猴子后面的位置，因为中间那段已经不可能合法了。\n\n对应关系是：\n\n- \"花果山上的猴子队列\"对应字符串 `s`\n- \"扫描镜\"对应右指针 `right`\n- \"心里记住的位置\"对应 `charIndex` 哈希表\n- \"起点跳到重复猴子后面\"对应 `left` 的更新\n- \"最长的不重复段\"对应 `maxLen`\n\n记忆的关键是：遇到重复不要从头来，只把起点推到重复位置的下一个就行。\n\n可以类比《西游记》里孙悟空辨认真假猴王的场景。\n\n孙悟空的眼睛像一面扫描镜，从左到右扫过花果山上的所有猴子。他要把连续排列的猴子中，找出最长的一段\"没有重复面孔\"的队列。每看到一张新面孔，他就在心里记下这个猴子的位置。如果又看到一个长得一样的，他就把扫描的起点直接跳到上次那个猴子后面的位置，因为中间那段已经不可能合法了。\n\n对应关系是：\n\n- \"花果山上的猴子队列\"对应字符串 `s`\n- \"扫描镜\"对应右指针 `right`\n- \"心里记住的位置\"对应 `charIndex` 哈希表\n- \"起点跳到重复猴子后面\"对应 `left` 的更新\n- \"最长的不重复段\"对应 `maxLen`\n\n记忆的关键是：遇到重复不要从头来，只把起点推到重复位置的下一个就行。\n\n秋天到了，小松鼠在树枝上排了一排松果，每颗松果上刻着不同的符号。它想找最长的一段连续松果，上面不能有重复符号。小松鼠从左边开始看，每看到一颗新松果就记下符号。突然发现一颗松果的符号和之前见过的重复了，它就把起点移到上次那颗重复松果的右边，继续往前看。一路走到底，记下最长的一段有多长。\n\n秋天到了，小松鼠在树枝上排了一排松果，每颗松果上刻着不同的符号。它想找最长的一段连续松果，上面不能有重复符号。小松鼠从左边开始看，每看到一颗新松果就记下符号。突然发现一颗松果的符号和之前见过的重复了，它就把起点移到上次那颗重复松果的右边，继续往前看。一路走到底，记下最长的一段有多长。\n\n## 🎵 记忆口诀\n\n右扩遇重跳左边，窗口无重记最长。\n\n右扩遇重跳左边，窗口无重记最长。\n\n## 🔗 延伸练习\n\n- `76. 最小覆盖子串`：从\"无重复的最长\"变成\"包含所有目标字符的最短\"，窗口策略从右扩左缩变成先满足再左缩。\n- `438. 找到字符串中所有字母异位词`：固定长度的滑动窗口，窗口内字符频次要和目标完全匹配。\
