选这题：它是滑动窗口的教科书级题目，窗口大小固定，考察的是\"如何用计数器判断两个字符串是否互为异位词\"。\n\n## 🧠 思考路径\n\n暴力做法：对 `s` 的每个长度为 `len(p)` 的子串，判断它是否和 `p` 互为异位词。每次判断需要排序或计数，总复杂度 `O(n × m)`。\n\n优化思路：窗口大小固定为 `len(p)`，窗口每次向右滑动一格。关键在于：窗口右移时，只有左边出一个字符、右边进一个字符，大部分字符的频率不变。所以我们可以维护一个字符频率计数器，每次滑动时只更新两个字符的计数，然后检查频率是否匹配。\n\n具体做法：用两个计数数组（或哈希表）分别记录 `p` 的字符频率和当前窗口的字符频率。为了不用每次比较整个数组，可以维护一个 `match` 变量，记录当前有多少种字符的频率已经匹配。\n\n更简洁的写法：只用一个 diff 数组，记录 `窗口频率 - p频率`。diff 全为 0 时就匹配了。用一个 `diffCount` 记录 diff 不为 0 的字符种数，避免每次遍历整个数组。\n\n所以这题的关键词是\"固定窗口 + 字符频率差值\"。\n\n## 💻 Java 题解\n\n### 解法 1：固定窗口 + 频率数组\n\n维护大小为 p.length() 的窗口，用 26 长度频率数组记录窗口内字符频率，与 p 的频率比较。\n\n- ⏱ 时间复杂度：`O(n·26) = O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public List\u003cInteger\u003e findAnagrams(String s, String p) {\n        List\u003cInteger\u003e result = new ArrayList\u003c\u003e();\n        if (s.length() \u003c p.length()) return result;\n        int[] pCount = new int[26], sCount = new int[26];\n        for (char c : p.toCharArray()) pCount[c - 'a']++;\n        int window = p.length();\n        for (int i = 0; i \u003c s.length(); i++) {\n            sCount[s.charAt(i) - 'a']++;\n            if (i \u003e= window) sCount[s.charAt(i - window) - 'a']--;\n            if (i \u003e= window - 1 \u0026\u0026 Arrays.equals(sCount, pCount))\n                result.add(i - window + 1);\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 窗口大小固定 = p.length()\n- 用 Arrays.equals 比较频率数组\n- i \u003e= window 时移除窗口最左字符\n\n**执行步骤：**\n1. 统计 p 的字符频率\n1. 滑动窗口遍历 s\n1. 窗口满时比较频率数组\n1. 匹配则记录起始位置\n\n\n## ⚠️ 易错点\n\n- 窗口大小固定为 `len(p)`，不是变长窗口，不能用\"扩展-收缩\"模式。\n- 比较频率时，Python 用 `Counter` 直接 `==` 比较（会忽略值为 0 的 key）；Java 需要逐位比较。\n- 窗口左边界计算是 `i - len(p) + 1`，不是 `i - len(p)`。\n- `s` 比 `p` 短时要直接返回空列表。\n\n- s 长度小于 p 时直接返回空\n\n- 频率数组比较用 Arrays.equals\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。窗口滑动 `O(n)`，每次比较频率 `O(26)` = `O(1)`。\n- 空间复杂度：`O(1)`。频率数组固定 26 个位置。\n\n## 🏢 实际业务应用\n\n- 文本编辑器（如 VS Code、Sublime Text）的\"模糊搜索\"功能，允许用户输入乱序关键词，底层需要判断子串是否为目标字符串的排列。\n- DNA 序列分析工具（如 BioPython）在查找基
