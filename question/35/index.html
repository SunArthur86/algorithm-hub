指针的含义。\n\n## 🧠 思考路径\n\n最直接的想法是遍历数组，找到第一个大于等于 `target` 的位置。但这是 `O(n)`，题目要求 `O(log n)`，所以要用二分。\n\n标准二分在找到 `target` 时就返回了。但这题还要处理 `target` 不存在的情况——返回\"该插入的位置\"。\n\n观察二分的循环 `while left \u003c= right`：循环结束时，`left` 一定停在\"第一个大于 `target` 的位置\"或者\"等于 `target` 的位置\"上。换句话说，`left` 就是我们要的答案。\n\n具体来说，当 `nums[mid] \u003e= target` 时，我们让 `right = mid - 1`（往左压）；当 `nums[mid] \u003c target` 时，让 `left = mid + 1`（往右走）。这样最终 `left` 会精确停在该插入的位置。\n\n## 💻 Java 题解\n\n### 解法 1：二分查找\n\n标准二分。循环结束后left即为插入位置。\n\n- ⏱ 时间复杂度：`O(log n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int searchInsert(int[] nums, int target) {\n        int left = 0, right = nums.length - 1;\n        while (left \u003c= right) {\n            int mid = left + (right - left) / 2;\n            if (nums[mid] == target) return mid;\n            else if (nums[mid] \u003c target) left = mid + 1;\n            else right = mid - 1;\n        }\n        return left; // 插入位置\n    }\n}\n```\n\n**关键点：**\n- while left\u003c=right\n- 找不到时left就是插入点\n- mid=left+(right-left)/2 防溢出\n\n**执行步骤：**\n1. 标准二分\n1. target不存在时返回left\n\n\n## ⚠️ 易错点\n\n- 循环条件是 `left \u003c= right`（不是 `\u003c`），否则当 `target` 比所有元素都大时，`left` 会停在 `n`，但如果用 `\u003c` 可能少判断一轮。\n- 最终返回 `left` 不是 `right`。当 `target` 大于所有元素时，`left` 会等于 `n`，而 `right` 会等于 `n-1`，返回 `right` 就错了。\n- 当数组为空时直接返回 0，但二分框架本身也能处理（`left=0, right=-1`，循环不执行，返回 0）。\n\n- 循环条件是\u003c=不是\u003c\n\n- 找不到返回left不是-1\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(log n)`。标准二分，每次排除一半。\n- 空间复杂度：`O(1)`。只用常数个变量。\n\n## 🏢 实际业务应用\n\n- 数据库 B+ 树索引的插入定位：在有序的索引页中找到新记录应该插入的槽位，就是\"搜索插入位置\"的精确描述。\n- 排行榜系统中计算排名：在按分数排序的列表中，用二分确定新分数应该插入的位置，从而得出排名。\n- 时间序列数据库的写入：新的时间戳数据需要插入到有序的时间序列中，二分定位插入点保证写入后仍然有序。\n\n- 数据库 B+ 树索引的插入定位：在有序的索引页中找到新记录应该插入的槽位，就是\"搜索插入位置\"的精确描述。\n- 排行榜系统中计算排名：在按分数排序的列表中，用二分确定新分数应该插入的位置，从而得出排名。\n- 时间序列数据库的写入：新的时间戳数据需要插入到有序的时间序列中，二分定位插入点保证写入后仍然有序。\n\n## 📖 形象类比\n\n可以类比《西游记》里龙王的水晶宫藏书阁。\n\n藏书阁里的书按编号从小到大排在架子上。龙王拿到一本新书，编号是 7，要放到正确的位置。管家不会从第一本开始一本本比对，而是先看架子中间的编号：比 7 小就看右半边，比 7 大就看左半边。来回几次就知道 7 该放在哪两个编号之间了。如果 7 号已经存在，就直接知道在哪。\n\n对应关系是：\n
