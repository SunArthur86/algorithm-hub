巅峰之作，理解了\"以每根柱子为高度的最大矩形\"这个核心思想，单调栈就算真正入门了。\n\n## 🧠 思考路径\n\n暴力方法是枚举每对左右边界，计算矩形面积，`O(n²)`。\n\n换个角度：以第 `i` 根柱子的高度为矩形高度，矩形能向左右扩展多远？答案是：向左到第一根比它矮的柱子右边一位，向右到第一根比它矮的柱子左边一位。即找到每个柱子的\"左右边界\"。\n\n\"找左边/右边第一个比它小的元素\"——这正是单调栈的拿手好戏。维护一个单调递增栈，当新来的柱子比栈顶矮时，栈顶柱子的右边界就确定了（就是当前柱子）。弹出栈顶后，新的栈顶就是它的左边界。面积 = `heights[栈顶] × (right - left - 1)`。\n\n## 💻 Java 题解\n\n### 解法 1：单调递增栈\n\n栈存索引，高度递增。遇到比栈顶矮的柱子时弹出，计算以弹出柱子为高的矩形面积。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(n)`\n\n```java\nclass Solution {\n    public int largestRectangleArea(int[] heights) {\n        Deque\u003cInteger\u003e stack = new ArrayDeque\u003c\u003e();\n        int maxArea = 0;\n        for (int i = 0; i \u003c= heights.length; i++) {\n            int h = i == heights.length ? 0 : heights[i];\n            while (!stack.isEmpty() \u0026\u0026 h \u003c heights[stack.peek()]) {\n                int height = heights[stack.pop()];\n                int width = stack.isEmpty() ? i : i - stack.peek() - 1;\n                maxArea = Math.max(maxArea, height * width);\n            }\n            stack.push(i);\n        }\n        return maxArea;\n    }\n}\n```\n\n**关键点：**\n- 单调递增栈\n- i==n 时 h=0 强制清空栈\n- 宽度 = i - stack.peek() - 1\n\n**执行步骤：**\n1. 遍历到i+1（含末尾哨兵0）\n1. 比栈顶矮→弹出计算面积\n1. 宽=当前i-新栈顶-1\n\n\n## ⚠️ 易错点\n\n- 哨兵 `0` 不能忘。没有它，最后栈里可能还有柱子没被处理。\n- 宽度计算：弹出后如果栈为空，宽度就是 `i`（从 0 到 i-1）；否则是 `i - stack[-1] - 1`。\n- 栈里存的是下标不是高度，取出后要用 `heights[stack[-1]]` 来获取高度。\n\n- 末尾哨兵h=0确保栈清空\n\n- 栈空时宽度=i\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，每个元素最多入栈出栈各一次。\n- 空间复杂度：`O(n)`，栈的大小。\n\n## 🏢 实际业务应用\n\n- 城市天际线分析中的最大建筑群面积计算：给定一组建筑高度，找出能框出的最大矩形地块。\n- 股票交易的最大利润区间分析：把价格序列看作柱状图，找最大矩形对应最优持有区间。\n- 水资源管理中的最大蓄水面积：堤坝高度数组中，计算能围出的最大水面面积。\n- UI 布局引擎的最大矩形空间查找：在有限高度和宽度约束下，找到能放置最大组件的空间。\n\n- 城市天际线分析中的最大建筑群面积计算：给定一组建筑高度，找出能框出的最大矩形地块。\n- 股票交易的最大利润区间分析：把价格序列看作柱状图，找最大矩形对应最优持有区间。\n- 水资源管理中的最大蓄水面积：堤坝高度数组中，计算能围出的最大水面面积。\n- UI 布局引擎的最大矩形空间查找：在有限高度和宽度约束下，找到能放置最大组件的空间。\n\n## 📖 形象类比\n\n可以类比《三国演义》里诸葛亮设伏的地形分析。\n\n山谷两侧的山峰高度不同（柱子高度）。诸葛亮要找一段山谷，使得在某个高度上能横向展开最宽的伏击面。每座山峰只能向左右延伸到比它矮的山峰为止。他用单调栈从左到右扫描：当前山峰比前一做高就继续往前看，遇
