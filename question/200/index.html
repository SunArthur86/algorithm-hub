 `'1'` 时，说明发现了一个新岛屿，计数器加 1。然后用 BFS 或 DFS 把这个 `'1'` 所在的整个连通块全部\"淹没\"（标记为 `'0'`），这样后续遍历就不会重复计数。\n\n关键是：每发现一个未访问的 `'1'`，就触发一次\"扩散染色\"，把相连的陆地全部标记。扩散的次数就是岛屿的数量。\n\n## 💻 Java 题解\n\n### 解法 1：DFS 洪水填充\n\n遍历网格，遇到'1'就DFS把整个岛标记为'0'（沉岛），岛屿数+1。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(m×n)`\n\n```java\nclass Solution {\n    public int numIslands(char[][] grid) {\n        int count = 0;\n        for (int i = 0; i \u003c grid.length; i++)\n            for (int j = 0; j \u003c grid[0].length; j++)\n                if (grid[i][j] == '1') {\n                    dfs(grid, i, j);\n                    count++;\n                }\n        return count;\n    }\n    private void dfs(char[][] grid, int i, int j) {\n        if (i \u003c 0 || i \u003e= grid.length || j \u003c 0 || j \u003e= grid[0].length || grid[i][j] != '1')\n            return;\n        grid[i][j] = '0'; // 沉岛\n        dfs(grid, i+1, j); dfs(grid, i-1, j);\n        dfs(grid, i, j+1); dfs(grid, i, j-1);\n    }\n}\n```\n\n**关键点：**\n- 沉岛法：访问过的直接改为'0'\n- 四个方向DFS\n- 每个岛只需触发一次DFS\n\n**执行步骤：**\n1. 遍历每个格子\n1. 遇到'1'→DFS标记整个岛为'0'\n1. 计数+1\n\n\n## ⚠️ 易错点\n\n- 边界检查：DFS 递归前必须判断下标是否越界。\n- 标记时机：BFS 中要在入队时就标记为 `'0'`，不要在出队时标记，否则同一个格子可能被重复入队。\n- 四个方向是上下左右（4 连通），不是对角线（8 连通）。\n- 网格是 `char` 类型，比较时用 `'1'` 和 `'0'`，不是 `1` 和 `0`。\n\n- grid是char不是int，用'1'不是1\n\n- DFS终止条件要先检查边界\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`，每个格子最多被访问一次。\n- 空间复杂度：`O(m × n)`（DFS 递归栈最坏情况，或 BFS 队列最大长度）。\n\n## 🏢 实际业务应用\n\n- 图像处理中的连通区域标记：识别图像中有多少个独立的色块。\n- 地理信息系统（GIS）中计算地图上的独立岛屿、湖泊数量。\n- 社交网络中的连通分量统计：计算有多少个独立的社交圈子。\n- 游戏开发中的地图生成：检测生成的地图中陆地是否连通。\n\n- 图像处理中的连通区域标记：识别图像中有多少个独立的色块。\n- 地理信息系统（GIS）中计算地图上的独立岛屿、湖泊数量。\n- 社交网络中的连通分量统计：计算有多少个独立的社交圈子。\n- 游戏开发中的地图生成：检测生成的地图中陆地是否连通。\n\n## 📖 形象类比\n\n可以类比成《三国演义》里诸葛亮派人勘察地形，统计\"有多少座独立的山头\"。\n\n勘察兵在地图上从左到右、从上到下扫描。每到一处发现\"山地\"（`'1'`），就在地图上标记\"这是第 N 座山\"，然后派人把这座山的所有相连区域都走一遍，全部标上记号（变成 `'0'`）。继续扫描时，已经标过记号的就不会重复计数。\n\n对应关系是：\n\n- \"地图网格\"对应 `grid`\n- \"山地\"对应 `'1'`\n- \"派人把整座山走一遍\"对应 DFS/BFS 扩散\n- \"标上记号\"对应 `grid[i][j] = '0'`\n- \"第 N 座山\"对应 `count++`\n\n这段记忆的关键是：发现一个 `'1'` 就启动扩散，扩散次数 = 岛屿数量。\n\n可以类比成《三国演义》里诸葛亮派人勘察地形，统计\"有多少座独立的山头\"。\n\n勘察兵在地图上从左到右、从上到下扫描。每到一处发现\"山地\"（`'1'`），就在地图上标记\"这是第 N 座山\"，然后派人把这座山的所有相连区域都走一遍，全部标上记号（变成 `'0'`）。继续扫描时，已经标过记号的就不会重复计数。\n\n对应关系是：\n\n- \"地图网格\"对应 `grid`\n- \"山地\"对应 `'1'`\n- \"派人把整座山走一遍\"对应 DFS/BFS 扩散\n- \"标上记号\"对应 `grid[i][j] = '0'`\n- \"第 N 座山\"对应 `count++`\n\n这段记忆的关键是：发现一个 `'1'` 就启动扩散，扩散次数 = 岛屿数量。\n\n小熊从空中俯瞰湖泊里的岛屿。它看到一块陆地就跳上去，把这块陆地和相连的陆地全部插上旗帜。然后回到空中继续找下一块没有旗帜的陆地。插了多少次旗帜，就有多少座岛。\n\n小熊从空中俯瞰湖泊里的岛屿。它看到一块陆地就跳上去，把这块陆地和相连的陆地全部插上旗帜。然后回到空中继续找下一块没有旗帜的陆地。插了多少次旗帜，就有多少座岛。\n\n## 🎵 记忆口诀\n\n遇一就扩散，扩散次数即岛屿数。\n\n遇一就扩散，扩散次数即岛屿数。\n\n## 🔗 延伸练习\n\n- `695. 岛屿的最大面积`：不只是数岛屿数量，还要计算每座岛的大小，取最大值。\n- `130. 被围绕的区域`：类似的网格 DFS，但目标不同——把被 `'X'` 包围的 `'O'` 变成 `'X'`。\n\n- `695. 岛屿的最大面积`：不只是数岛屿数量，还要计算每座岛的大小，取最大值。\n- `130. 被围绕的区域`：类似的网格 DFS，但目标不同——把被 `'X'` 包围的 `'O'` 变成 `'X'`。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🕸️\"}],200,\". \",\"岛屿数量\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0200\",\"lcId\":200,\"slug\":\"number-of-islands\",\"title\":\"岛屿数量\",\"question\":\"岛屿数量\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"graph\",\"categories\":[\"graph\"],\"tags\":[\"深度优先搜索\",\"广度优先搜索\",\"并查集\",\"数组\",\"矩阵\"],\"url\":\"https://leetcode.cn/problems/number-of-islands/\",\"planOrder\":51,\"hasViz\":true,\"hasDiagram\":true,\"feynman\":{\"essence\":\"给你一个由 `'1'`（陆地）和 `'0'`（水）组成的二维网格，计算网格中岛屿的数量。岛屿是四面相连的 `'1'` 组成的连通区域。\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"]
