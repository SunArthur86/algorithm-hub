 思考路径\n\n如果只有正数，这题和最大子数组和完全一样——每一步要么接着乘，要么重新开始。但负数搞乱了这件事：一个很大的负数乘上另一个负数，可能变成一个更大的正数。\n\n所以我们必须同时记住当前位置的\"最大乘积\"和\"最小乘积\"。当遇到负数时，最大和最小会互换角色。状态转移是：\n\n- `maxDP[i] = max(nums[i], maxDP[i-1] * nums[i], minDP[i-1] * nums[i])`\n- `minDP[i] = min(nums[i], maxDP[i-1] * nums[i], minDP[i-1] * nums[i])`\n\n每一步更新两个值，全局取最大的那个 `maxDP`。\n\n所以这题的关键词不是\"乘积\"，而是\"负数让最大变最小，必须两手都抓\"。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（双状态）\n\n维护maxProd和minProd。负数时交换。maxProd=max(num, maxProd*num)，minProd=min(num, minProd*num)。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int maxProduct(int[] nums) {\n        int maxProd = nums[0], minProd = nums[0], result = nums[0];\n        for (int i = 1; i \u003c nums.length; i++) {\n            int num = nums[i];\n            if (num \u003c 0) { int t = maxProd; maxProd = minProd; minProd = t; } // 负数交换\n            maxProd = Math.max(num, maxProd * num);\n            minProd = Math.min(num, minProd * num);\n            result = Math.max(result, maxProd);\n        }\n        return result;\n    }\n}\n```\n\n**关键点：**\n- 同时维护最大积和最小积\n- 负数时交换max和min\n- 更新result\n\n**执行步骤：**\n1. 遇负数交换max和min\n1. 更新maxProd和minProd\n1. 更新全局最大值\n\n\n## ⚠️ 易错点\n\n- 遇到负数时必须先交换再计算，否则交换后用的是已更新的值。\n- 空间可以优化到 O(1)，只需要两个变量，不需要整个 DP 数组。\n- 不要忘记 `nums[i]` 本身也可能成为新的起点——比如前面乘积很小，不如从当前重新开始。\n\n- 负数会让最小变最大——必须交换\n\n- 先交换再计算\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。遍历一次数组。\n- 空间复杂度：`O(1)`。只用了常数个变量。\n\n## 🏢 实际业务应用\n\n- 金融领域的连续收益率计算：每天的涨跌百分比相乘得到累计收益，遇到下跌（负收益率）后可能反弹更大，需要同时跟踪最大和最小累计收益。\n- 信号处理中的能量累积：某些信号有正负交替的波形，乘积运算需要跟踪正负极值。\n- 游戏开发里的连击伤害系统：某些 buff/debuff 效果有正负加成，连续叠加时需要计算最优组合。\n\n- 金融领域的连续收益率计算：每天的涨跌百分比相乘得到累计收益，遇到下跌（负收益率）后可能反弹更大，需要同时跟踪最大和最小累计收益。\n- 信号处理中的能量累积：某些信号有正负交替的波形，乘积运算需要跟踪正负极值。\n- 游戏开发里的连击伤害系统：某些 buff/debuff 效果有正负加成，连续叠加时需要计算最优组合。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里孙悟空战力值的变化。\n\n悟空一路西行，每遇到一个妖怪，战力可能增加（正数）也可能削弱（负数）。但有个关键：如果悟空之前被削弱得很厉害（很大负数），再遇到一个削弱效果（又一个负数），反而因\"负负得正\"触发暴走模式，战力暴涨。所以观音菩萨给悟空同时记两本账：一本记\"当前最强战力\"，一本记\"当前最弱战力\"。每次遇到妖怪，都要两本账一起算，才知道真正的上限在哪。\n\n对应关系是：\n\n- \"战力变化\"对应 `nums
