coin] + 1)\"的直觉。\n\n## 🧠 思考路径\n\n暴力做法：递归尝试每种硬币，对每个金额枚举用 0 个、1 个、2 个……直到金额不够。这是指数级复杂度。\n\n动态规划：定义 `dp[i]` 为凑出金额 `i` 需要的最少硬币数。转移方程：`dp[i] = min(dp[i - coin] + 1)`，对每种面额 `coin` 都试一下。如果 `i - coin \u003e= 0` 且 `dp[i - coin]` 可达，就取最小值。\n\n初始化 `dp[0] = 0`，其余 `dp[i] = ∞`。最终如果 `dp[amount]` 仍是 `∞`，返回 -1。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（完全背包）\n\ndp[i]表示凑成金额i的最少硬币数。对每个金额枚举所有面值。\n\n- ⏱ 时间复杂度：`O(n×amount)`\n- 💾 空间复杂度：`O(amount)`\n\n```java\nclass Solution {\n    public int coinChange(int[] coins, int amount) {\n        int[] dp = new int[amount + 1];\n        Arrays.fill(dp, amount + 1);\n        dp[0] = 0;\n        for (int i = 1; i \u003c= amount; i++)\n            for (int coin : coins)\n                if (coin \u003c= i) dp[i] = Math.min(dp[i], dp[i - coin] + 1);\n        return dp[amount] \u003e amount ? -1 : dp[amount];\n    }\n}\n```\n\n**关键点：**\n- 初始化amount+1表示不可达\n- 完全背包：正向遍历\n- 最后检查是否可达\n\n**执行步骤：**\n1. 初始化dp\n1. 对每个金额枚举面值\n1. 返回dp[amount]或-1\n\n\n## ⚠️ 易错点\n\n- `dp[0] = 0` 是边界条件，凑出金额 0 不需要任何硬币。\n- Java 中用 `amount + 1` 代替无穷大更方便，因为最多只需要 `amount` 个 1 元硬币。\n- 硬币可以重复使用（完全背包），所以内层循环是金额而不是硬币数量。\n\n- 用amount+1初始化比MAX_VALUE更安全\n\n- coin\u003c=i 才能使用\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(amount × n)`，`n` 是硬币种类数。\n- 空间复杂度：`O(amount)`，`dp` 数组。\n\n## 🏢 实际业务应用\n\n- 自动售货机的找零算法，用最少数量的硬币找零。\n- 数字货币交易所的最优交易路径，用最少的手续费/交易次数完成兑换。\n- 资源调度中的\"最优分配\"问题，比如用最少数量的服务器承载特定负载。\n- 快递包装优化，用最少数量的纸箱尺寸组合出目标体积。\n\n- 自动售货机的找零算法，用最少数量的硬币找零。\n- 数字货币交易所的最优交易路径，用最少的手续费/交易次数完成兑换。\n- 资源调度中的\"最优分配\"问题，比如用最少数量的服务器承载特定负载。\n- 快递包装优化，用最少数量的纸箱尺寸组合出目标体积。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》中唐僧化缘凑斋饭的故事。\n\n唐僧需要凑够一定数量的斋饭，村民给他的碗有大有小（不同面额的硬币），每种碗可以用无限个。他要选择用最少数量的碗凑出所需的斋饭数量。他从小目标开始想：\"凑 1 碗用哪个碗？凑 2 碗用哪几个碗？……\"直到凑到目标数量，每一步都取最少碗数。\n\n对应关系是：\n\n| 算法概念 | 故事角色/元素 |\n|---------|------------|\n| `coins` | 不同大小的碗 |\n| `amount` | 需要凑的斋饭数量 |\n| `dp[i]` | 凑 i 碗斋饭最少需要几只碗 |\n| `dp[i-coin] + 1` | 用一只 coin 大小的碗后，还差多少碗 |\n\n可以把它类比成《西游记》中唐僧化缘凑斋饭的故事。\n\n唐僧需要凑够一定数量的斋饭，村民给他的碗有大有小（不同面额的硬币），每种碗可以用无限个。他要选择用最少数量的碗凑出所需的斋饭数量。他从小目标开始想：\"凑 1 碗用哪个碗？凑 2 碗用哪几个碗？……\"直到凑
