第 `i` 级台阶上，你只可能从第 `i-1` 级跨 1 步上来，或从第 `i-2` 级跨 2 步上来。所以到达第 `i` 级的方法数 = 到达第 `i-1` 级的方法数 + 到达第 `i-2` 级的方法数。\n\n这不就是斐波那契数列吗？没错。`dp[1] = 1`，`dp[2] = 2`，`dp[i] = dp[i-1] + dp[i-2]`。\n\n空间优化：计算 `dp[i]` 只需要前两个值，用两个变量滚动即可，空间 `O(1)`。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（空间优化）\n\nf(n)=f(n-1)+f(n-2)。用两个变量滚动。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int climbStairs(int n) {\n        if (n \u003c= 2) return n;\n        int prev2 = 1, prev1 = 2;\n        for (int i = 3; i \u003c= n; i++) {\n            int curr = prev1 + prev2;\n            prev2 = prev1; prev1 = curr;\n        }\n        return prev1;\n    }\n}\n```\n\n**关键点：**\n- 斐波那契数列\n- 两个变量滚动\n- n\u003c=2直接返回\n\n**执行步骤：**\n1. prev2=1, prev1=2\n1. 滚动更新\n1. 返回prev1\n\n\n## ⚠️ 易错点\n\n- `n = 1` 时只有 1 种方法，`n = 2` 时有 2 种方法，不要统一用 `dp[0] = 1, dp[1] = 1` 的方式搞混下标。\n- 暴力递归会超时。`n = 45` 时递归深度 45 层，但重复子问题呈指数增长，必须用 DP 或记忆化。\n- 滚动变量更新时要注意顺序，不能先覆盖 `prev` 再算 `curr`。\n\n- n=1和n=2的base case\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`。遍历一次。\n- 空间复杂度：`O(1)`。只用了两个变量。\n\n## 🏢 实际业务应用\n\n- 组合计数：任何\"每步有固定几种选择\"的计数问题，递推式都类似。比如解码方式（91 题）、走方格。\n- 资源分配方案数：`n` 个资源分成若干份，每次分配 1 份或 2 份，求方案数。\n- 金融中的期权定价：某些简单的期权模型中，二叉树递推和爬楼梯的递推结构完全一致。\n\n- 组合计数：任何\"每步有固定几种选择\"的计数问题，递推式都类似。比如解码方式（91 题）、走方格。\n- 资源分配方案数：`n` 个资源分成若干份，每次分配 1 份或 2 份，求方案数。\n- 金融中的期权定价：某些简单的期权模型中，二叉树递推和爬楼梯的递推结构完全一致。\n\n## 📖 形象类比\n\n可以把它类比成《西游记》里孙悟空翻筋斗云的场景。\n\n孙悟空要飞过 `n` 座山头。每次可以翻越 1 座或 2 座山头。唐僧问他：\"一共有多少种飞法？\"孙悟空不算也知道：飞到第 `i` 座山头，要么从第 `i-1` 座飞过来（翻 1 座），要么从第 `i-2` 座飞过来（翻 2 座）。所以飞法就是这两个位置的飞法之和。\n\n对应关系是：\n\n- \"第 `i` 座山头\"对应第 `i` 级台阶\n- \"翻 1 座\"对应爬 1 级\n- \"翻 2 座\"对应爬 2 级\n- `prev + curr` 对应\"前两种飞法相加\"\n\n可以把它类比成《西游记》里孙悟空翻筋斗云的场景。\n\n孙悟空要飞过 `n` 座山头。每次可以翻越 1 座或 2 座山头。唐僧问他：\"一共有多少种飞法？\"孙悟空不算也知道：飞到第 `i` 座山头，要么从第 `i-1` 座飞过来（翻 1 座），要么从第 `i-2` 座飞过来（翻 2 座）。所以飞法就是这两个位置的飞法之和。\n\n对应关系是：\n\n- \"第 `i` 座山头\"对应第 `i` 级台阶\n- \"翻 1 座\"对应爬 1 级\n- \"翻 2 座\"对应爬 2 级\n- `prev + curr` 对应\"前两种飞法相加\"\n\n小青蛙要跳上 `n` 级荷叶。每次可以跳 1 级或 2 级。妈妈问：\"到最上面有几种跳法？\"小青蛙想了想：\"跳到第 3 片荷叶，要么从第 2 片跳上来，要么从第 1 片跳上来。所以跳法就是这两种跳法的总
