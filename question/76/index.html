 难度：困难\n- 题型：滑动窗口\n- 为什么选这题：它是滑动窗口的标杆题，涵盖了窗口扩张、收缩、合法性判断三大核心操作。\n\n## 🧠 思考路径\n\n暴力方法是枚举所有子串逐一检查，`O(n²)`。但可以用滑动窗口优化。\n\n关键思路：用两个指针 `left` 和 `right` 维护一个窗口。先不断右移 `right` 扩大窗口，直到窗口包含了 `t` 的所有字符；然后尝试右移 `left` 缩小窗口，直到窗口不再满足条件。每次窗口满足条件时记录最小长度。\n\n为了高效判断\"窗口是否包含了 `t` 的所有字符\"，用两个哈希表（或数组）分别统计 `t` 需要的字符频率和当前窗口中的字符频率。用一个计数器 `formed` 追踪已经满足要求的字符种类数。\n\n## 💻 Java 题解\n\n### 解法 1：滑动窗口（模板）\n\n用两个指针维护窗口。右指针扩展直到窗口包含 t 的所有字符，然后左指针收缩到最短。用 needMap 和 have 计数器跟踪。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(m)`\n\n```java\nclass Solution {\n    public String minWindow(String s, String t) {\n        Map\u003cCharacter, Integer\u003e need = new HashMap\u003c\u003e();\n        Map\u003cCharacter, Integer\u003e window = new HashMap\u003c\u003e();\n        for (char c : t.toCharArray()) need.merge(c, 1, Integer::sum);\n        int left = 0, right = 0, valid = 0;\n        int start = 0, minLen = Integer.MAX_VALUE;\n        while (right \u003c s.length()) {\n            char c = s.charAt(right++);\n            if (need.containsKey(c)) {\n                window.merge(c, 1, Integer::sum);\n                if (window.get(c).equals(need.get(c))) valid++;\n            }\n            // 所有字符都满足时收缩\n            while (valid == need.size()) {\n                if (right - left \u003c minLen) {\n                    start = left;\n                    minLen = right - left;\n                }\n                char d = s.charAt(left++);\n                if (need.containsKey(d)) {\n                    if (window.get(d).equals(need.get(d))) valid--;\n                    window.merge(d, -1, Integer::sum);\n                }\n            }\n        }\n        return minLen == Integer.MAX_VALUE ? \"\" : s.substring(start, start + minLen);\n    }\n}\n```\n\n**关键点：**\n- need 记录需要的字符及数量\n- valid 记录已满足的字符种类数\n- 先扩展再收缩的滑动窗口模板\n\n**执行步骤：**\n1. 统计 t 的字符频率\n1. 右指针扩展加入字符\n1. valid==need.size() 时开始收缩\n1. 收缩时更新最短长度\n\n\n## ⚠️ 易错点\n\n- `formed` 的更新时机：是 `window[ch] == need[ch]` 时才加一，不是 `\u003e=`。否则会重复计数。\n- 缩小窗口时 `formed--` 的条件：是 `window[ch] \u003c need[ch]`，即某个字符的窗口数量跌破需求量。\n- `t` 中可能有重复字符，所以需求量可能大于 `1`，不能用\"字符是否存在\"来判断。\n- 空串或 `s` 比 `t` 短的情况要提前返回。\n\n- valid 是满足的种类数不是总数\n\n- 收缩后要检查 valid 是否仍满足\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(|s| + |t|)`。左右指针各最多遍历 `s` 一次。\n- 空间复杂度：`O(1)`。字符集有限（ASCII 或 Unicode），哈希表大小固定。\n\n## 🏢 实际业务应用\n\n- 搜索引擎的关键词高亮：用户输入多个搜索词，要在文档中找到包含所有关键词的最短片段，高亮显示为\"最佳摘要\"。\n- 生物信息学的序列匹配：在 DNA 序列中寻找包含特定碱基组合的最短片段，用于基因定位。\n- 网络安全的关键词检测：在流量数据中检测包含一组敏感关键字的最小窗口，定位可疑通信片段。\n- 实时字幕的上下文截取：从连续语音识别结果中提取包含关键词的最短句子作为摘要。\n\n- 搜索引擎的关键词高亮：用户输入多个搜索词，要在文档中找到包含所有关键词的最短片段，高亮显示为\"最佳摘要\"。\n- 生物信息学的序列匹配：在 DNA 序列中寻找包含特定碱基组合的最短片段，用于基因定位。\n- 网络安全的关键词检测：在流量数据中检测包含一组敏感关键字的最小窗口，定位可疑通信片段。\n- 实时字幕的上下文截取：从连续语音识别结果中提取包含关键词的最短句子作为摘要。\n\n## 📖 形象类比\n\n可以类比《西游记》里唐僧取经需要集齐三件法器（`t` 中的字符）。\n\n唐僧一路西行（右指针移动），沿途收集法器。当三件都集齐后，他尝试把走过的路缩短——如果不回头走某段路也能集齐三件，那就从起点砍掉那段（左指针移动）。这样不断调整，最终找到最短的一段路程。\n\n对应关系：\n\n- \"三件法器\"对应 `t` 中的字符集\n- \"西行沿途\"对应右指针扫描 `s`\n- \"砍掉不必要的路程\"对应左指针收缩窗口\n- \"集齐三件的最短路程\"对应最小覆盖子串\n\n可以类比《西游记》里唐僧取经需要集齐三件法器（`t` 中的字符）。\n\n唐僧一路西行（右指针移动），沿途收集法器。当三件都集齐后，他尝试把走过的路缩短——如果不回头走某段路也能集齐三件，那就从起点砍掉那段（左指针移动）。这样不断调整，最终找到最短的一段路程。\n\n对应关系：\n\n- \"三件法器\"对应 `t` 中的字符集\n- \"西行沿途\"对应右指针扫描 `s`\n- \"砍掉不必要的路程\"对应左指针收缩窗口\n- \"集齐三件的最短路程\"对应最小覆盖子串\n\n小鹿在森林超市采购食材，菜单上写着需要面粉、鸡蛋和黄油。它推着购物车从货架一头走到另一头，遇到需要的食材就放进去。当三样都凑齐了，它开始回头看看——从车头到车尾中间有没有哪段可以不经过？如果能省掉开头的一段路程也还是三样齐全，那就把起点往后挪。最后它找到了最短的一条购物路线。\n\n小鹿在森林超市采购食材，菜单上写着需要面粉、鸡蛋和黄油。它推着购物车从货架一头走到另一头，遇到需要的食材就放进去。当三样都凑齐了，它开始回头看看——从车头到车尾中间有没有哪段可以不经过？如果能省掉开头的一段路程也还是三样齐全，那就把起点往后挪。最后它找到了最短的一条购物路线。\n\n## 🎵 记忆口诀\n\n右扩窗口凑齐字符，左缩窗口寻找最短；formed 计数追进度，需求窗口两表对。\n\n右扩窗口凑齐字符，左缩窗口寻找最短；formed 计数追进度，需求窗口两表对。\n\n## 🔗 延伸练习\n\n- `209. 长度最小的子数组`：简化版的最小窗口，目标从\"包含指定字符\"变成\"总和大于等于 `target`\"。\n- `438. 找到字符串中所有字母异位词`：窗口大小固定的滑动窗口，判断窗口内是否是 `t` 的排列。\n\n- `209. 长度最小的子数组`：简化版的最小窗口，目标从\"包含指定字符\"变成\"总和大于等于 `target`\"。\n- `438. 找到字符串中所有字母异位词`：窗口大小固定的滑动窗口，判断窗口内是否是 `t` 的排列。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"
