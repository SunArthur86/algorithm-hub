价，展示 DP 递推式的灵活变化。\n\n## 🧠 思考路径\n\n还是那个核心观察：每个格子只能从上方或左方到达。那么到达当前格子的最小代价，就是\"从上面来的最小代价\"和\"从左边来的最小代价\"中较小的那个，再加上当前格子本身的代价。\n\n递推式：`dp[i][j] = min(dp[i-1][j], dp[i][j-1]) + grid[i][j]`。\n\n边界条件：第一行的格子只能从左边来，所以 `dp[0][j] = dp[0][j-1] + grid[0][j]`；第一列的格子只能从上面来，所以 `dp[i][0] = dp[i-1][0] + grid[i][0]`。起点格子 `dp[0][0] = grid[0][0]`。\n\n空间优化：和前两题一样，用一维数组滚动更新。`dp[j] = min(dp[j], dp[j-1]) + grid[i][j]`，其中 `dp[j]` 是从上面来的，`dp[j-1]` 是从左边来的。\n\n## 💻 Java 题解\n\n### 解法 1：动态规划（原地修改）\n\n直接在grid上修改。grid[i][j]+=min(grid[i-1][j], grid[i][j-1])。\n\n- ⏱ 时间复杂度：`O(m×n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public int minPathSum(int[][] grid) {\n        int m = grid.length, n = grid[0].length;\n        for (int i = 0; i \u003c m; i++)\n            for (int j = 0; j \u003c n; j++) {\n                if (i == 0 \u0026\u0026 j \u003e 0) grid[i][j] += grid[i][j-1];\n                else if (j == 0 \u0026\u0026 i \u003e 0) grid[i][j] += grid[i-1][j];\n                else if (i \u003e 0 \u0026\u0026 j \u003e 0) grid[i][j] += Math.min(grid[i-1][j], grid[i][j-1]);\n            }\n        return grid[m-1][n-1];\n    }\n}\n```\n\n**关键点：**\n- 原地修改O(1)空间\n- 第一行只加左边\n- 第一列只加上边\n\n**执行步骤：**\n1. 第一行累加\n1. 第一列累加\n1. 内部取min累加\n\n\n## ⚠️ 易错点\n\n- 不要忘记处理起点 `dp[0][0]`，它直接等于 `grid[0][0]`，不是 0。\n- 第一列的更新：`dp[j] = dp[j] + grid[i][j]`，这里右边的 `dp[j]` 是上一行的值（从上面来），不是本行新算的。\n- 如果想直接在原数组上改，可以省掉 `dp` 数组，但会破坏原始数据，面试时先问清是否允许修改。\n\n- 第一行和第一列的base case\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(m × n)`。遍历整个网格一次。\n- 空间复杂度：`O(n)`。一维数组滚动更新。\n\n## 🏢 实际业务应用\n\n- 物流配送成本最优化：每条路有不同运费，从仓库到客户选总运费最低的路线。\n- 图像处理的能量最小路径：图像缩放算法（Seam Carving）中，找一条从上到下能量最小的路径来删除。\n- 项目资源分配：项目有多个阶段，每阶段有多种方案（代价不同），选总代价最小的方案组合。\n\n- 物流配送成本最优化：每条路有不同运费，从仓库到客户选总运费最低的路线。\n- 图像处理的能量最小路径：图像缩放算法（Seam Carving）中，找一条从上到下能量最小的路径来删除。\n- 项目资源分配：项目有多个阶段，每阶段有多种方案（代价不同），选总代价最小的方案组合。\n\n## 📖 形象类比\n\n可以把它类比成《三国演义》中关羽\"过五关斩六将\"的赶路场景。\n\n关羽从许昌出发要赶到古城找刘备，路上每经过一个关口都有一定消耗（兵力、粮草、时间）。他每次只能往南走或往东走，想知道怎么走总消耗最小。\n\n对应关系是：\n\n- \"每个关口的消耗\"对应 `grid[i][j]`\n- \"从南或东选择\"对应 `min(dp[i-1][j],
