\"，理解了这个变形，背包问题就通了。\n\n## 🧠 思考路径\n\n首先，如果总和是奇数，不可能平分，直接返回 `false`。目标是判断能否从数组中选出若干元素，使它们的和恰好等于 `sum / 2`。\n\n这就是 0-1 背包问题：容量为 `sum/2` 的背包，每个物品（数组元素）选或不选，问能否恰好装满。\n\n定义 `dp[j]` 表示\"能否凑出和为 `j`\"。转移方程：`dp[j] = dp[j] || dp[j - nums[i]]`。从大到小更新 `j`，避免重复使用同一个元素。\n\n初始化 `dp[0] = true`（和为 0 总是能做到，什么都不选）。\n\n## 💻 Java 题解\n\n### 解法 1：0-1背包（布尔dp）\n\ntarget=sum/2。dp[j]表示能否凑成和j。倒序遍历防重复使用。\n\n- ⏱ 时间复杂度：`O(n×target)`\n- 💾 空间复杂度：`O(target)`\n\n```java\nclass Solution {\n    public boolean canPartition(int[] nums) {\n        int sum = 0;\n        for (int n : nums) sum += n;\n        if (sum % 2 != 0) return false;\n        int target = sum / 2;\n        boolean[] dp = new boolean[target + 1];\n        dp[0] = true;\n        for (int num : nums)\n            for (int j = target; j \u003e= num; j--)\n                dp[j] = dp[j] || dp[j - num];\n        return dp[target];\n    }\n}\n```\n\n**关键点：**\n- 总和为奇数直接false\n- 0-1背包倒序遍历\n- dp[j]=dp[j]||dp[j-num]\n\n**执行步骤：**\n1. 计算总和判断奇偶\n1. 初始化dp\n1. 倒序背包\n1. 返回dp[target]\n\n\n## ⚠️ 易错点\n\n- 内层循环必须倒序（从 `target` 到 `num`），否则同一个元素可能被重复使用（变成完全背包）。\n- `dp[0] = true` 是关键初始化，表示\"不选任何元素时和为 0\"。\n- 如果数组中有元素大于 `target`，该元素不可能被选中，但代码本身能处理。\n\n- 倒序遍历防止重复使用同一元素\n\n- 总和为奇直接返回false\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n × target)`。`n` 为数组长度，`target = sum/2`。\n- 空间复杂度：`O(target)`。一维 DP 数组。\n\n## 🏢 实际业务应用\n\n- 公平分配问题：把一组资源分成两份，使总价值相等（如离婚财产分割、合伙人利益分配）。\n- 负载均衡：把任务分成两组，使两组总执行时间相等。\n- 游戏设计：卡牌对战中判断能否把手牌分成等值的两堆。\n\n- 公平分配问题：把一组资源分成两份，使总价值相等（如离婚财产分割、合伙人利益分配）。\n- 负载均衡：把任务分成两组，使两组总执行时间相等。\n- 游戏设计：卡牌对战中判断能否把手牌分成等值的两堆。\n\n## 📖 形象类比\n\n可以把它类比成《水浒传》里梁山泊分赃的过程。\n\n一百零八将劫了生辰纲，要把财宝分成两堆，让两拨人各拿一堆，且两堆价值相等。吴用先算总价值：如果是奇数，就没法平分；如果是偶数，就问\"能否从这些宝贝中挑出一部分，恰好等于总价的一半\"。这就是 0-1 背包——每件宝贝要么拿要么不拿。\n\n对应关系是：\n\n- \"财宝\"对应数组元素\n- \"总价的一半\"对应 `target`\n- \"拿或不拿\"对应 0-1 背包的选/不选\n- \"恰好等于\"对应 `dp[target] = true`\n\n可以把它类比成《水浒传》里梁山泊分赃的过程。\n\n一百零八将劫了生辰纲，要把财宝分成两堆，让两拨人各拿一堆，且两堆价值相等。吴用先算总价值：如果是奇数，就没法平分；如果是偶数，就问\"能否从这些宝贝中挑出一部分，恰好等于总价的一半\"。这就是 0-1 背包——每件宝贝要么拿要么不拿。\n\n对应关系是：\n\n- \"财宝\"对应数组元素\n- \"总价的一半\"对应 `target`\n- \"拿或不拿\"对应 0-1 背包的选/不选\n- \"恰好等于\"对应 `dp[target] = true`\n\n小松鼠和小兔子要平分一堆松果。它们先把松果按重量排好，然后从最重的开始，试着挑出一部分正好等于总重量的一半。每次拿一颗松果，看看能不能凑出目标重量。如果凑得出，两人就各拿一半；凑不出，就只能遗憾地摇头。\n\n小松鼠和小兔子要平分一堆松果。它们先把松果按重量排好，然后从最重的开始，试着挑出一部分正好等于总重量的一半。每次拿一颗松果，看看能不能凑出目标重量。如果凑得出，两人就各拿一半；凑不出，就只能遗憾地摇头。\n\n## 🎵 记忆口诀\n\n总和偶数，倒序 01 背包。\n\n总和偶数，倒序 01 背包。\n\n## 🔗 延伸练习\n\n- `494. 目标和`：另一个 0-1 背包变形——给每个元素分配正负号。\n- `322. 零钱兑换`：完全背包——每个物品可以用多次。\n\n- `494. 目标和`：另一个 0-1 背包变形——给每个元素分配正负号。\n- `322. 零钱兑换`：完全背包——每个物品可以用多次。"])</script><script>self.__next_f.push([1,"4:[\"$\",\"main\",null,{\"className\":\"detail-main\",\"style\":{\"maxWidth\":760,\"margin\":\"0 auto\",\"padding\":\"16px\",\"minHeight\":\"100vh\"},\"children\":[[\"$\",\"$Lc\",null,{\"href\":\"/\",\"style\":{\"display\":\"inline-block\",\"marginBottom\":\"12px\",\"fontSize\":\"13px\"},\"children\":\"← 返回题库\"}],[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"22px\",\"fontWeight\":700,\"margin\":\"0 0 4px\"},\"children\":[[\"$\",\"span\",null,{\"style\":{\"marginRight\":\"6px\"},\"children\":\"🧩\"}],416,\". \",\"分割等和子集\"]}],[\"$\",\"$Ld\",null,{\"q\":{\"id\":\"0416\",\"lcId\":416,\"slug\":\"partition-equal-subset-sum\",\"title\":\"分割等和子集\",\"question\":\"分割等和子集\",\"answer\":\"$e\",\"difficulty\":\"Medium\",\"category\":\"dynamic-programming\",\"categories\":[\"dynamic-programming\"],\"tags\":[\"数组\",\"动态规划\"],\"url\":\"https://leetcode.cn/problems/partition-equal-subset-sum/\",\"planOrder\":89,\"hasViz\":true,\"hasDiagram\":false,\"feynman\":{\"essence\":\"给你一个只包含正整数的数组 `nums`，判断能否把它分成两个子集，使得两个子集的元素之和相等。  比如 `[1,5,11,5]` 可以分成 `[1,5,5]` 和 `[11]`，和都是 11，返回\",\"analogy\":\"\",\"key_points\":[]},\"first_principle\":{\"problem\":\"\",\"axioms\":[],\"rebuild\":\"\"}}}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"name\":\"theme-color\",\"content\":\"#f97316\"}]]\n"])</script><script>self.__next_f.push([1,"8:[[\"$\",\"meta\",\"0\",
