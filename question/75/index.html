两遍。\n\n更好的方法是荷兰国旗算法。用三个指针把数组分成四个区域：`[0, low)` 全是 `0`，`[low, mid)` 全是 `1`，`[mid, high]` 是待处理区域，`(high, end]` 全是 `2`。`mid` 指针从左到右扫描：遇到 `0` 就和 `low` 交换然后都右移，遇到 `1` 就直接跳过，遇到 `2` 就和 `high` 交换然后 `high` 左移。\n\n一趟扫描就排好了。\n\n## 💻 Java 题解\n\n### 解法 1：三指针（荷兰国旗）\n\n三个指针：left指向0的右边界，right指向2的左边界，curr遍历。遇到0交换到left，遇到2交换到right。\n\n- ⏱ 时间复杂度：`O(n)`\n- 💾 空间复杂度：`O(1)`\n\n```java\nclass Solution {\n    public void sortColors(int[] nums) {\n        int left = 0, right = nums.length - 1, curr = 0;\n        while (curr \u003c= right) {\n            if (nums[curr] == 0) {\n                swap(nums, curr++, left++);\n            } else if (nums[curr] == 2) {\n                swap(nums, curr, right--);\n            } else {\n                curr++;\n            }\n        }\n    }\n    private void swap(int[] nums, int i, int j) {\n        int t = nums[i]; nums[i] = nums[j]; nums[j] = t;\n    }\n}\n```\n\n**关键点：**\n- 遇到0: swap(curr,left),curr++left++\n- 遇到2: swap(curr,right),right--\n- 遇到1: curr++\n\n**执行步骤：**\n1. curr遍历\n1. 0→交换到左边\n1. 2→交换到右边\n1. 1→跳过\n\n\n## ⚠️ 易错点\n\n- 遇到 `2` 和 `high` 交换后，`mid` 不能右移，因为换过来的元素还不知道是什么，需要再判断一次。\n- 遇到 `0` 时是和 `low` 交换，不是和最左边交换。`low` 和 `mid` 可能不同步。\n- 循环条件是 `mid \u003c= high`，不是 `mid \u003c high`，因为 `mid == high` 时那个元素还没处理。\n\n- 交换2后curr不自增——交换来的元素还需检查\n\n- while条件curr\u003c=right\n\n## 📊 复杂度分析\n\n- 时间复杂度：`O(n)`，每个元素最多被访问一次。\n- 空间复杂度：`O(1)`，原地操作。\n\n## 🏢 实际业务应用\n\n- 数据库查询结果的分组排序：比如把商品按\"有货\"（0）、\"预订\"（1）、\"缺货\"（2）分区展示，用一趟扫描即可完成。\n- 网络数据包的优先级分类：将到达的数据包按紧急、普通、低优先级分成三个队列，荷兰国旗算法可以在原地完成。\n- 垃圾回收的标记-整理阶段：存活的、待定的、可回收的对象分区整理，类似于三向切分。\n- 图像处理的直方图均衡化预处理：对像素按亮度区间（暗、中、亮）做快速分区。\n\n- 数据库查询结果的分组排序：比如把商品按\"有货\"（0）、\"预订\"（1）、\"缺货\"（2）分区展示，用一趟扫描即可完成。\n- 网络数据包的优先级分类：将到达的数据包按紧急、普通、低优先级分成三个队列，荷兰国旗算法可以在原地完成。\n- 垃圾回收的标记-整理阶段：存活的、待定的、可回收的对象分区整理，类似于三向切分。\n- 图像处理的直方图均衡化预处理：对像素按亮度区间（暗、中、亮）做快速分区。\n\n## 📖 形象类比\n\n可以类比《红楼梦》里王熙凤安排宴席座位。\n\n宾客分三等：贵客（`0`）坐主桌，普通客人（`1`）坐中桌，下人（`2`）坐偏桌。王熙凤站在中间，左手往主桌方向送贵客，右手往偏桌方向送下人，剩下的自然就在中间了。她不需要把所有人的身份先数一遍，边看边调整就行。\n\n对应关系：\n\n- \"贵客/普通/下人\"对应 `0/1/2`\n- \"左手送
